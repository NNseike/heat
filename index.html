　序　出生から画家になるまで





　ファン・ゴッホは生きることの難しい人間であった。その気難しさと真剣さとのゆえに妥協ができず、何をやっても人とぶつかり、何をやっても社会に適応できない。今日画家として世界的な名声を獲得したのは、生まれもった画才のゆえではなく、その生きる難しさのゆえであった。学校にも、画商にも、教会にもなじめず、万策尽き果てた時に残されていたのが「画家」という仕事だった。たったひとつ残された仕事に集中する以外、彼にはもはや生きる道がなかった。他に道がなかったからこそ、絵を描くことだけに懸けられたのである。もし、ファン・ゴッホに天才と呼ぶべきものがあったとすれば、それは決して画才ではなく、生きる難しさに耐え、生きる難しさから学び、極限にまで追い詰められながらも、残された道にすべての力を傾注できるだけの強きよう靭じんな生命力だったとしか言いようがない。





　１８５２年３月30日、オランダ南部の村フロート・ズンデルトのファン・ゴッホ牧師の家に男の子が生まれた。死産だった。両親はこの子にフィンセントという名を授けて埋葬している。そのちょうど一年後の同日、１８５３年３月30日、ふたたびファン・ゴッホ家に男の子が生まれた。今度は、両親は二人の祖父の名前をとって、この子にフィンセント・ウィレムという名を授けている。後の画家、ファン・ゴッホの誕生である。この後、ファン・ゴッホ家には二人の弟、三人の妹が生まれることになる。四歳年下の弟テオは、兄フィンセントを生涯にわたって精神的、経済的に支えつづけることになった。父テオドルスは生涯、田舎を転々としながら小さな教会の牧師を務めた。決して高名でも裕福でもなかったが、それでも牧師といえば村や町の名士である。父方の祖父も牧師で、母アンナ・ファン・ゴッホ＝カルベントゥスの側の伯父にもアムステルダムの高名な説教師ストリッケルがいた。親族には他に画商や軍人もいる。ファン・ゴッホはそのような家庭の長男として、愛情と教育を受けて育っていった。

　しかし、フィンセントはすでに少年時代から扱いにくい子だったようだ。小学校は途中でやめて自宅で家庭教師につき、その後は寄宿学校に入ることになった。中学校も中退している。伯父フィンセントの口ききでグーピル画廊で働かせてもらい、ロンドン支店にも、パリ支店にも勤務させてもらった。英語、フランス語をともに習得し、若い頃から英、独、仏語の文学作品に親しんでいる。学歴は中学中退だが高い教養を身につけ、後に大学の神学部入学を志した時には家庭教師からギリシャ語、ラテン語も習っている。

　画廊での仕事は当初、まずまず順調に思えた。しかし、ロンドン勤務中に下宿の娘ウジェニーに失恋した頃から、仕事がうまく行かなくなる。この頃、父親は弟テオに宛てた手紙でフィンセントについてこう記している。「自分の過ちに眼を開かせようとはしてみた。効き目はあるだろうか。わたしたちはひどく悲しい思いでいる。本当に心労と悲しみとで疲れ果てている」「彼の中にはたくさん風変わりなところがあるが、でも、よいところもたくさんある。神に祈りつづけていよう」



　父の祈りもむなしく、ファン・ゴッホはグーピル画廊を事実上解雇されることになる。その後、イギリスのメソジスト教会で説教をさせてもらったり、オランダのドルトレヒトにあった書店で働いたりするが、やがて父と同じ聖職者になりたいと考えるようになる。神学部入学を目指し、伯父のストリッケルなどにも世話になってアムステルダムでギリシャ語とラテン語の勉強を始めた。伯父や父らの助言を聞き、「知恵と最善の意図をもって」周到な計画がたてられ、牧師への道を進むはずだった。しかし、ファン・ゴッホは神学や教義や古典語を学ぶことにはどうしても興味が持てずに挫ざ折せつする。この時代のことをファン・ゴッホは後に「人生で最悪の時だった」と回想している。

　結局、神学部を出ていなくても聖職につけるという理由で、ファン・ゴッホはベルギーの炭坑地帯ボリナージュで伝道師見習いとして働くことになった。その頃、母親からテオに宛てた手紙にはこう記されている。「ベルギーではたくさん仕事があって、働ける人は少なく、あそこなら意志と能力のある人にはきっと試験なしでも仕事が見つかるでしょう。あそこなら何か光明が見いだせるかもしれません。でも私はいつもとても心配しています。フィンセントはどこかに行こうとしたり、何かをしようとしたりすると、その風変わりさや、驚くような考えや人生観やらで、それを壊してしまうのではないかと」

　母の予感は的中した。伝道師見習いとしてファン・ゴッホは献身的に仕事をしたが、自分の持っている物はことごとく炭鉱労働者やその家族たちに与えてしまい、自身はもっともみすぼらしい身なりをしていた。そんな過度な献身がベルギーの伝道師教会にはあまりに奇矯な行動に見えたのだろう。結局、ファン・ゴッホは伝道師にも採用されなかった。

　ファン・ゴッホはどこにも受け入れてもらえなかった。その高い理想と、激しい気性と、有り余る宗教的情熱のやり場を、現実世界のどこにも見つけることができなかったのである。当時の手紙にはこう記されている。「僕の苦悩は以下のことにほかならない。僕は何をするのがいちばんいいのか、何かの役に立つことができないのだろうか、どうすれば何らかの問題をもっと詳しく、それを深く知ることができるのだろうか。僕がずっと頭を悩ませているのはこのことなのだ」（155/133）

　しかし、長い失意の日々の末に、ファン・ゴッホは「自分に力がよみがえってくる」のを感じ、「大きな落胆の中で捨ててしまったクレヨンをもう一度取りあげよう。またデッサンを始めよう」と考える。二十七歳にしてはじめて画家になる決心をするのである。





　ファン・ゴッホは宗教を重く引きずったまま画家になった。聖職者になることを断念し、牧師も教会も嫌いになったとはいうものの、生まれて以来ずっと彼を育んできたキリスト教が彼の心から離れるはずもなかった。芸術家となったファン・ゴッホは、彼の内にも外にもある宗教との闘争を余儀なくされる。画家になったといっても今度は美術学校に行くわけでもない。まったくの独学である。オランダ時代は、画家としては基礎の修業時代、人間としては父親の宗教との葛かつ藤とうの時代であった。





　人間的に見れば、ファン・ゴッホはやや過保護なわがまま息子である。画家になる決心をしたといっても、自分で生計を立てながら苦学するわけでもない。寛容な両親はこの難しい子になんとか落ち着いてもらおうと、おろおろしながら、親しん戚せきなどに手を回してきた。画家としての最初の年もファン・ゴッホは結局エッテンに住んでいた両親の家に転がり込んでいる。両親にしてみれば、自分たちの目の届くところにいればなんとか助力もできると考えていたのだろう。しかし、その目の届く範囲内でも、事件は起こった。

　アムステルダム時代に世話になった伯父で説教師のストリッケルの娘ケーが、夏の間、息子を連れてエッテンに滞在した。ケーは牧師と結婚して一子をもうけていたが、夫を早く亡くして未亡人になっていた。ファン・ゴッホはこのケーに熱烈に恋をしたのである。しかし、ケーにとっては迷惑な話だったのだろう。ファン・ゴッホは自分を避けるケーを追って、アムステルダムの両親の家まで押しかけていき、ランプの灯に指を突っ込んで、こうやっていられるだけでいいからケーに会わせてほしいと迫ったという。ファン・ゴッホの手紙だけを読めば、熱烈な愛情にケーが応こたえてくれなかったということになるが、ケーの方からすれば、迷惑なストーカー行為以外の何ものでもない。ファン・ゴッホの両親にしてみれば、自分たちの息子が高名な説教師ストリッケルの傷心のお嬢さんにさんざん不快な思いをさせたことになる。

　ともあれ、この熱愛も実るはずはなく、ファン・ゴッホはいづらくなったエッテンを後にしてハーグに移り住んだ。





　ハーグ派の画家との交流


　田舎暮らしが多かったファン・ゴッホにとって、ハーグは二度にわたってもっとも長く住んだ都市である（オランダ語ではスフラーフェンハーへあるいはデン・ハーグと呼ぶ）。ファン・ゴッホはまず１８６９年に伯お父じフィンセントが経営するグーピル画廊ハーグ支店に勤め始めてから１８７３年にロンドンに転勤するまでの約四年間、この都市で画廊の店員として働いていた。次にこの町に戻ったのは１８８１年である。エッテンの実家で父親とはげしい喧けん嘩かをしてこの町にやってきた。以後、弟テオからの仕送りで生活と制作を続けていくことになり、１８８３年までの二年間ここで画家としての修業時代を過ごすことになる。つまりファン・ゴッホはハーグで画廊店員として四年、画家として二年、計六年をすごしている。アムステルダムには牧師になる勉強をしていた一年、ロンドンに二年、パリにも計三年ほどしか住んでいないことを考えても、このハーグという都市がファン・ゴッホにとって大きな意味をもっていたことは想像に難くない。

　ハーグには当時、ヨゼフ・イスラエルス、ヘンドリック・ウィレム・メスダッハ、マリス三兄弟、ファン・ゴッホの義理の従兄いとこにあたるアントン・マウフェなど、のちにハーグ派と呼ばれる多くの画家たちが集まっていた。ハーグ派はレアリスムの画派で、都市とその近郊で制作してはいたがフランスのバルビゾン派にも通じる部分があった。ファン・ゴッホはグーピル画廊に勤務していた頃から当然ハーグ派の画家たちの作品に接していて、イスラエルスらを高く評価していたし、画家たちの何名かとは面識もあった。イスラエルスの作品とファン・ゴッホの作品には主題的に共通するものが多い。イスラエルスの《食卓につく農家の家族》（図１）や《年老いて》（図２）は、それぞれファン・ゴッホの《ジャガイモを食べる人たち》や《悲しみ》に通じるものがあり、ファン・ゴッホがこの画家から強い影響を受けていたことをうかがわせる。義理の従兄のマウフェはすでにハーグでプロの画家として生計を立てていた（図３）。ファン・ゴッホはマウフェから水彩画などの手ほどきも受け、テオの援助でアトリエも構えて画家としての修業を進めていった。ファン・ゴッホ同様マウフェも父親が牧師であった。二人の描く農耕の主題には、当時の牧師の説教によく使われた「鋤く人」など、共通する主題が多いのもよくうなずける（図４）。





　ファン・ゴッホのハーグ時代は基本的に修業時代といってよい。ただ、ハーグ派の画家たちと接触する中で、画家としての個性を形成し、独自の様式や主題を獲得した重要な時代でもある。実際、この時期にモデルを使って描かれたデッサンの人物像のいくつかはその後も使われ続け、たとえば《永遠の入り口にて》（図５）のように晩年の油彩画（第四章）でふたたびとりあげられたものもある。





　マウフェとの関係は当初きわめて良好だった。しかし、半年後にファン・ゴッホが娼婦のシーンと同棲を始めると、さすがにマウフェとの仲にも亀裂が入った。テオにとっても、両親にとっても娼婦との同棲は由々しき事態だった。牧師の家の、もう三十歳にもなろうかという長男が、子もちの娼婦と同棲しているというのは大スキャンダルである。画廊に勤めて安定した収入を得ていた弟テオはすでに早くからファン・ゴッホに経済的な支援をしていたが、そのテオも、マウフェも、この件については強く反対したにちがいない。

　後年、ファン・ゴッホはアルルに移り住んでまもなく、マウフェの訃報を知らされる。その時彼は描いていた《花咲く桃の木》に「マウフェの思い出に」と書き込んで未亡人のイェットに贈っている（「はじめに」）。





　《悲しみ》





　心の肌を逆さか撫なでするような線。その線は、それまでぎこちなかったファン・ゴッホのデッサンに突然のように現れた。画家になって以来、まずファン・ゴッホがデッサンに心血を注いできたことはまちがいない。少しずつデッサン力もついてきた。しかし、それだけではとうてい説明がつかないほど、この《悲しみ》の線だけが、まるで突然変異のように出色のできなのだ。この線は、おそらくモデルとなった女との出会いがなければ生まれなかった。娼婦に身を落として路頭に迷っていた女と、社会と教会と女に拒まれた傷心の画家との出会いがなければ。





　捨てられた女


　描かれている女はファン・ゴッホがハーグで同棲することになったクラシナ・マリア・ホールニク（１８５０‐１９０４）、通称シーンまたはクリスティンである。シーンはハーグでカトリックの貧しい家に生まれ、子供時代には貧しい人々を保護する教会施設の世話にもなった。戸籍の職業欄には「お針子」と記されているが、貧困から逃れるため娼婦に身を落としていた。

　ファン・ゴッホと出会った当時、シーンは三十過ぎで、未婚ながらすでに三人の子供を出産し、うち二人を生後間もなく亡くしている。ひとり生き残った五歳になる女の子を養い、さらに四人目の子を身ごもっていた。ファン・ゴッホはシーンとの出会いを次のように手紙に記している。





「この冬、ぼくはひとりの身ごもった女に出会った。男に捨てられ、その男の子供を宿していた。

　身ごもった女が冬の通りに立たねばならなかった。パン代を稼がねばならなかった。どのようにしてか、分かるよね。

　ぼくはこの女をモデルにして、冬の間ずっとこの女で制作した。十分なモデル代は払ってやれなかったが、それでも彼女分の家賃は払ってやったし、これまでのところ、自分のパンを分け合うことで、ありがたいことに、女とこの子供を飢えと寒さから守ってやれた。女と出会った時に目をとられたのは、女が病んでいることが分かったからだ。ぼくは女を風呂に入れてやり、できるだけ栄養のあるものをとらせたので、ずっと元気になってきた」



（224/192）





　ファン・ゴッホは惨めな境遇にあったシーンを見捨てておくことができなかった。そして、年上で、子連れで、身重の娼しよう婦ふを自分の家に住まわせるという行動に出た。従姉いとこケーへのストーカー行為の次が娼婦との同どう棲せいである。この行動に弟のテオや、両親や知人達はどんなに驚き、眉まゆをひそめたことだろう。もちろん、ファン・ゴッホの「扶養家族」たちの生活費もテオの仕送りの中からまかなわれることになった。

　このデッサンの下の余白にはフランス語の書き込みがある。「だがどうして一人身の女が地上に存在するのか、見捨てられて」。フランスの歴史家で『フランス史』、『フランス革命史』などの著者として知られるジュール・ミシュレの『女』の序文の第三節「教養ある女」からの引用だが、最後の「見捨てられて」という言葉は原文にはなく、ファン・ゴッホが付け加えたものだ。引用文のもとの意味をすこしはっきりさせるために、少し前から原文を引いてみよう。





「女にとって最悪の運命とは、一人身で暮らすことだ。

　一人身！　この言葉そのものが、言うも悲しい言葉だ……だがどうして一人身の女が地上に存在するのか！」





「教養ある女」というタイトルが示す通り、この一節は貧しい女や娼婦について書かれたものではない。ファン・ゴッホはそこから一文だけを取り出してきて、デッサンの下に書き込んだ。このデッサンにふさわしい言葉だと考えたのだろう。また、このデッサンについて書かれた手紙にはミシュレの『鳥』からの不完全な引用も使われている。「しかし、心の空虚さは残り、何者もそれをうめることはない」

　ファン・ゴッホが引用するミシュレの文が不正確なことからも分かるように、ファン・ゴッホはミシュレの文章の中から自分の欲しい断片だけを借りているにすぎない。ファン・ゴッホはミシュレを愛読していたし、まちがいなくミシュレの思想から何らかの影響は受けている。しかし、『女』に記された女性観とファン・ゴッホの女性観ならびに行動との間に大きな隔たりがあるのも事実である。

　また、この絵の右下に記されたもうひとつの言葉「悲しみ」が英語で記されていることからも、この絵が単純にミシュレの著作だけに影響されて描かれたものでないことは分かる。「悲しみ」という英語のタイトルをファン・ゴッホがどのようにして思いついたのかはわからないが、おそらくイギリス絵画、特に民衆を描いた版画を意識していたと考えられる。《悲しみ》の中で、シーンはうずくまり、顔を伏せた姿で描かれている。このようなイメージはファン・ゴッホが気に入って収集していたイギリスの版画や挿し絵入り雑誌『ザ・グラフィック』『イラストレイティド・ロンドン・ニュース』などによく見られたものである。





　線の表現力


《悲しみ》についてファン・ゴッホはこう手紙に記している。





「去年の夏、君がミレーの大きな木版画《羊飼いの女》を持っていた時、ぼくは思った。たった一本の線でなんと多くのことができるものかと。もちろん、ぼくは一本の輪郭線だけでミレーと同じぐらい多くのことが表現できるなどと言うつもりはない。それでも、この人物像にぼくはいくばくかの情感を込めようと試みた。このデッサンが君の気に入るようだったらと願うばかりだ。（……）

　同封のものはこれまでに描いたデッサンのなかで一番いい人物画だと思う。だから君に送りたいと思ったのだ。これはモデルを前にして描いたものではないが、それでもモデルをもとに描いたようなものなのだ。紙の下に二枚紙を敷いておいたことを知っておいてほしい。そうしてぼくは輪郭線を正確にとらえようと努めた。デッサンを画板からはずすと、輪郭は下の二枚の紙にきれいに型押しされていた。そこでぼくは最初の習作をもとに仕上げたのだ。後のデッサンは最初のデッサンよりもより生き生きしてさえいる」



（216/186）





　この手紙を受け取ったテオはデッサンを気に入ったこと、そして版画のささくれを取り除いていないような効果についてもコメントしたようだ。それについてファン・ゴッホはこう記している。





「ぼくの送ったデッサンを気に入ってくれてとてもうれしい。あれにはたしかに何かがあると思う。あれは是非シンプルなグレーの台紙に入れてもらいたい。それが一番よく合うと思うから。（……）

　また、目利きたちが正当に高く評価しているあの独特の効果は、デッサンの場合、画材によってというよりは、感情を動かされて制作するときの独特の手の震えに起因するのだと考えている」



（217/187）





「人とその作品との間には確かに何かのつながりがあるが、そのつながりがどのようなものなのかを定義するのは決して容易ではない。そしてこの点について多くの人はまったく誤解している。

　ところで、そう、お母さんが病気だということは知っている。それに、ぼくらの家庭、他の家庭を問わず、多くのもっと暗いできごとをぼくは知っている。

　そして、ぼくはそのようなことに無感覚なんかではない。もしぼく自身が無感覚だったら、あの〈悲しみ〉を描くことなんかできなかっただろうと思う」



（217/187）





　これらの手紙から、ファン・ゴッホが《悲しみ》を「これまでに描いたデッサンのなかで一番いい人物画」だと考えていることがわかる。制作方法は、紙を三枚重ねて一番上の紙に強くデッサンし、下の二枚に輪郭線の型をしっかりとつける。そしてその型をたよりに二枚目と三枚目に輪郭線を描き込んだ。線の独特のささくれ立ったような効果は、画材の種類よりは、「感情を動かされて制作するときの独特の手の震え」によるもので、家庭のなかの暗いできごとに無感覚ではないからこそこのようなデッサンが描けるのだという。身ごもったまま男に捨てられた女、今は自分が保護し、抱いている女の生身の体を目の前にし、感情を激しくたかぶらせることによって、この線は生み出された。そしてこの線とともに、この女の裸体は人々の記憶の中に深く刻み込まれることになった。





　決別


　牧師の息子と娼しよう婦ふの同どう棲せいは当初まずまず順調に見えた。ファン・ゴッホにとっては子育ての新鮮さも手伝い、彼の部屋は一時家庭の雰囲気に包まれたことだろう。しかし、ファン・ゴッホの性格はいまさらふれるまでもなく、やがてシーンの悪い性格も顔を出しはじめ、そこにシーンの母親が関わり、意見の食い違いも出はじめ、この「家庭」も徐々に壊れ始め、崩壊した。

　ファン・ゴッホはこの頃の手紙に記している。「ぼくは家庭生活の哀歓の中を通っていきたい。それを自分自身の体験をもとに素描できるようになるために」（228/193）。

　彼にとって大切だったのは、女を救い、家庭を持つことだったのだろうか。それとも、そのような女と接することで画家としての自分を育てることだったのだろうか。

　冬の街路に立つ身ごもった女がファン・ゴッホに憐れん憫びんの情を起こさせたことはおそらくまちがいない。同棲後まもなく、ファン・ゴッホはシーンと結婚する意図もテオに伝えている。少なくともその頃は、ファン・ゴッホの心の中で、女を救うことと絵を磨くこととは共存できていたのだろう。しかし、結果的に見れば、彼は女を捨て、絵を描きつづけることになった。確かなことは、女を救い家庭を持つために画業を犠牲にする選択肢は微み塵じんも考えられなかったということである。とすれば、「シーン」は絵を描くためのモティーフであり、感情をたかぶらせてくれる存在であり、極言すれば、絵を描くための手段だったということになるのだろうか。ハーグ時代最末期の手紙にファン・ゴッホはきっぱりとこう書き記している。





「……ぼくの考えでは、仕事は女よりもさらに重要な義務であり、後者のために前者が煩わされるようなことになってはいけない。去年は事情がちがったが、今ではぼくの気持ちはすっかりドレンテの地に向かっている。人間の感情も分裂することはあり、二つのことを両方ともやりたくなることもあるだろう。しかし、現状ではそれはありえない。金のこともあるが、それ以上に彼女が信頼するに足りないからだ」



（384/322）





　シーンへの愛着が消えたわけではない。しかし、ひとつの過去を振り切るかのように、ファン・ゴッホははるかオランダ北東部のドレンテの田舎に引きこもって絵を描きつづけることになった。彼は、何よりもまず画家として、その作品によって、人々の記憶にとどまることを決意していたというべきだろう。

　ドレンテでの孤独な田舎暮らしの中、ファン・ゴッホは弟テオに画家になるように勧めているが、テオにその意図はない。結局、放ほう蕩とう息子はふたたび、当時ニューネンに住んでいた両親の家に戻ることになる。ニューネンで牧師館の一角にアトリエを作ってもらったファン・ゴッホはその旺おう盛せいな制作意欲で次々に作品を描きあげていく。まだ、作品の質にはばらつきがあり、色調も暗いが、まちがいなく成長の跡が見えるようになってきた。

　私生活ではまたしても騒ぎを起こす。牧師の娘で年上のマルホ・ベーヘマンと愛人関係になるが、マルホの家族の反対などもあって、マルホは自殺未遂事件を起こしたのである。狭いニューネンの村のなかでのできごとにつき、スキャンダルは隠しようもなく、またしてもファン・ゴッホの父は顔に泥を塗られることになった。





　《ジャガイモを食べる人たち》





　ランプの灯からたちのぼる細い煙、茹ゆでたジャガイモの湯気、農民の服についた泥、焦げたベーコン、踏みつけられた藁わら。この絵には、農家の匂いが充満している。





　真実の農民たち


　ファン・ゴッホは手紙の中でこの絵について饒じよう舌ぜつに語っている。





「ぼくは、ランプの灯の下でジャガイモを食べているこれらの人々が、まさに、皿に伸ばしているその手で土を掘り返したのだということを、伝えたいと思ったのだ。だからこの絵は〈手の労働〉を語っているのであり、彼らがその食べ物をいかに正直に〈稼いだ〉かを語っている。（……）

　この冬中、ぼくはこの織物の糸を手に、最終的な模様を探しつづけてきた。粗くてごわごわした感じの織りになったが、糸は一定の法則に従い注意深く選ばれた。そして、これが〈真の農民の絵〉であることがいずれわかるだろう。ぼくはそうだと確信している。（……）農家の娘の方がご婦人よりも美しい、とぼくは思う。雨風や日光にさらされてこの上なく微妙な色合いを見せる、埃ほこりまみれで、継ぎはぎのある青いスカートと上着を着た農家の娘の方がね。（……）

　もし、農民の絵にベーコンや煙やジャガイモの湯気のにおいがしたら、申し分ない、それは不健全じゃあない。廏うまやにこやしのにおいがしたら、結構、それこそ廏らしい。畑に、熟れた麦やジャガイモやグアノ［堆たい肥ひ］やこやしのにおいがしたら、それこそ健全だ。ことに都会人にとっては。（……）

　だが、〈何てきたない絵だ〉と言われるかもしれない。その心づもりでいてくれ。ぼくもその心づもりでいる。それでも〈真実なもの、正直なもの〉を表現しつづけるだけだ」



（497/404）





　ニューネンに住むようになって一年が経った頃、ファン・ゴッホはおびただしい数の習作（図６）を描き始め、周到な準備を積み重ねて、この《ジャガイモを食べる人たち》を描きあげた。それは、ファン・ゴッホの作品中にあって、油彩による最初の本格的タブロー（構成画）だといってもよいだろう。ファン・ゴッホは少なくともオランダ時代にはエチュード（習作）とタブロー（構成画あるいは完成作）とをかなりはっきりと区別していた。習作はどれほど美しく描かれていてもあくまで習作であり、これらをもとに構成し、何らかの思想をこめ、想像力のはたらく余地を与えた作品こそがタブローと呼ぶにふさわしいと考えていたのである。事実、彼はこの頃、パリの画商アルフォンス・ポルティエに「これまでぼくは習作しかやってこなかったけれども、これからタブローが来ることになります」（496/403）と書いている。





　ファン・ゴッホはこの絵の制作過程を織物にたとえているが、まさに一反の織物を仕上げるように、糸を選び、組み合わせ、綿密な準備と細心の注意をもって、この絵を描き上げたのである。これほど周到な準備の末に描き上げられた作品は、ファン・ゴッホのそれまでの作品には見当たらないし、おそらく彼の全作品中にもないだろう。それだけに、ファン・ゴッホはこの作品に対して、かなりの自信をもっていたようである。

　このタブローにこめられた思想とは何だったのだろうか。画面から伝わる不快なにおいが鼻につくほど、真実らしさをそなえた農民の姿を描き出すこと。おそらくそれがファン・ゴッホの狙いであった。そのようなスタンスには当時ファン・ゴッホが読んでいた自然主義文学、特にゾラの影響もあっただろう。そしてその誠実さ、真実さに到達するためにファン・ゴッホがみずからに課したもののひとつが、執しつ拗ようなまでの習作デッサンの積み重ねであり、そしていまひとつは、抑制され、暗いながらも、考え抜かれた色彩表現であった。





　色彩研究


　オランダ時代、ファン・ゴッホの色彩は暗い。しかし、油絵を本格的に始めたニューネン時代には、自己流ながら理論書を読み、ドラクロワを研究し、色彩の研究に取り組んでいた。

《ジャガイモを食べる人たち》においても、白いところにもほとんど白をそのまま使わずに中間色を使い、全体的に茶褐色や灰色系の暗い色が支配する中に、赤、青、黄などさまざまな色を混ぜ、微妙に色合いを変えて描きあげている。この色合いをファン・ゴッホは「皮をむいていない、まったく泥だらけのジャガイモの色」だといい、また、ミレーの言葉を引きながらこうも記述している。

「ぼくはこれを描きながら、ミレーの農民たちについて、『彼の農民たちは種まきをしているその土で描かれているかのようだ』と言われた言葉は本当に的を射ていると思った」、そして、「あれほどぼくの言いたいことを明確に言い表わしているものは他にない」（500/406）と書いている。

　ここでは、色彩による直接的な感情表現はまだ影をひそめている。ニューネン末期のファン・ゴッホには、「色彩はそれ自体で何かを表現する」という考えがすでに芽生えてはいるが、その考えをつきつめるとどのような絵画になるのかは、まだイメージされてはいない。パリ時代に大きく変化し、アルル時代に開花する、あの色彩による感情表現はまだ眼を覚ましてはいない。色彩は、あくまで真実らしさ、農民の真実らしさを描き出すための手段であり、ゾラ流の自然主義的表現、真実を描き出す表現にとっては、この暗い、褐色の色調がふさわしい、そうファン・ゴッホは考えていたのだろう。

　ファン・ゴッホの色彩へのこだわりは徹底していた。この絵に合う額縁についても明確なイメージをもって指示している。「ジャガイモを食べる人たちの絵は、金の額縁に入れると引き立つ。それはまちがいない。また熟れた麦の濃い色調の紙を貼った壁に掛けても同様によく映えるだろう。でも、そうした縁どりをしなかったら、まったく見栄えしなくなる」（497/404）とテオに書いている。





　自負の芽生え


　この頃、テオはパリの画廊で働いていたので、ファン・ゴッホはテオに頼んでパリ・サロン展のカタログを送ってもらっている。このカタログに載せられた作品について手紙にはこう記されている。





「たとえばサロン特集号のなかには、技法的には申し分なく素描され、描かれた多くの絵が見られる。しかし、それらの多くは恐ろしく退屈な感じをぼくに与える。それらはぼくに何も感じさせず、何も考えさせるところがないからだ。それらはあきらかに何らの情熱もなく制作された絵だからだ。ぼくが君に送る絵には情熱がある。

　ぼくはこの絵を描きあげたいという大きな欲望を感じ、少なからぬ熱意をもって制作した。

　退屈などしなかった。おそらく、そのために他人も退屈させることはあるまい。そう信じるからこそ、ぼくはこの絵を君に送るのだ」



（500/406）





　しかし、この絵はまだ高い評価を得るまでにはいたらなかった。テオからこの絵を見せられたパリの画商たちがどのような評価を下したのかは定かではない。友人ファン・ラッパルトはファン・ゴッホからこの絵の石版画を送られ、そのあまりの出来の悪さを酷評する。ファン・ゴッホが懸命に習作を重ねた人体像や手も、ことごとく、完膚なきまでに批判したのである。





「あんな作品は本気で描いたものじゃないということには同意してくれるね。君はもっと上手く描ける、幸いなことにね。なのに、どうしてすべてを表面的に見て、表面的に描くことしかできないのかね。どうして動きというものを研究しなかったのかね。あの人物たちはポーズをとっているだけじゃないか。（……）

　こんなやり方で仕事をしながら、ミレーやブルトンの名前を引き合いに出すというのかい？　冗談じゃない。芸術は、こんなに無神経に扱われるには、あまりに崇高なものだとぼくは思う」



（503/R51a）





　ファン・ゴッホは、酷評の記されたこの手紙を、短いコメントとともに送り返した。そして後日、「ぼくのあらゆる作品をあんな侮辱した口調で断罪する権利はない」と書いて怒りをぶちまけている。後にファン・ゴッホも言いわけしているように、《ジャガイモを食べる人たち》の石版画は「記憶だけをたよりに一日で制作した」ものなので表現が稚拙でもいたしかたない。ファン・ラッパルトはこの石版画しか見ていないのだから、低く評価しても決しておかしくはない。なのに、何年も続いた友情を完全に終わらせるほどファン・ゴッホの怒りにふれたのはなぜだったのだろうか。

　この「絶交」はおそらく、ファン・ゴッホの自信と、ミレーへの崇敬、このふたつの裏返しであろう。彼はそれほどまでに《ジャガイモを食べる人たち》に自信をもち、内心、いくらかでも崇敬するミレーに近づけたと思っていたかもしれない。それを「ミレーの名前を引き合いに出す」に値しない、と批判されたのである。崇敬するミレーの名をもって批判されたことでファン・ゴッホはどれほど傷ついたことだろう。次の手紙の結びでファン・ゴッホが「ミレーのことで喧嘩をしないでほしい。ミレーのことで喧嘩はしたくない」と書いていることからもファン・ゴッホの怒りの原因のひとつがここにあったことはまちがいない。

　ともあれ、低い評価への怒りは、自信のあらわれにちがいない。そして同時に、自信のなさのあらわれでもある。事実、ファン・ゴッホの当時の作品はその程度の質しか持ち合わせていなかった。もし、この年１８８５年でファン・ゴッホの生涯が終わっていたとすれば、画家フィンセント・ファン・ゴッホの名は、西洋近代美術史はおろか、オランダ近代美術史にすら残っていなかったであろう。





　父の死


「キュウシ　コイ　ファン・ゴッホ」、

「チチ　ノウソッチュウ　コイ　シキョ　ファン・ゴッホ」、

「チチ　ノウソッチュウ　ファン・ゴッホ」。





　早朝、テオにこんな電報が打電された。ファン・ゴッホが《ジャガイモを食べる人たち》のための習作と格闘している最中の１８８５年３月26日、父テオドルスが脳卒中で急逝する。夜、自宅に帰って戸口で倒れたまま、息を引き取ったという。翌早朝、ファン・ゴッホはニューネンから隣町エイントホーフェンまで行って、パリに住むテオに電報を三通送っている。

　電報の記録時刻はそれぞれ午前６時、７時35分、７時58分。テオの勤務するグーピル画廊の二つの支店宛てに送られている。慌てて朝一番で打電してもらったものの、最初の電文では誰が死んだのか伝わっていない上、テオが他の支店に出勤しているかもしれないと思って、おそらく一度帰宅してからまた７時台に、二つの支店宛てに電報を打ちに行ったのだろう。

　電報を受け取ったテオはすぐに帰郷し、３月30日に葬儀が行われた。奇くしくもファン・ゴッホの死産の兄の誕生日、ファン・ゴッホ自身の誕生日でもある。五日後、ファン・ゴッホは葬儀を終えてパリに戻ったテオに手紙を書いている。冒頭ですこし父親の死にふれ、「しばらくは仕事がいつも通りに進まなかった」と書いてはいるものの、「誰にとっても人生は長くはなく、問題はそれをどのように生きるかということだ」と冷淡に結んで、すぐに自分の作品について書き始めている。

　テオの友人ボンゲルがその父親に書いた手紙によると、テオは「これまで見たことのないぐらい憔しよう悴すいしきっていた」という。しかし、フィンセントは父の急死に直面しても、消沈したり、取り乱したりした様子がなく、むしろ異様なまでに冷徹に受け止めていたようだ。葬儀に参列したヤン伯父から妹マリア（ミーチェ）への手紙にもこう記されている。「フィンセントはきちんと振る舞っていました。もちろんずいぶんと陰にこもっている感じでしたが、それでも許容の範囲内でした。ただ、醒めたような発言はしていました」。

　親族もファン・ゴッホと父親の関係が好ましいものでなかったことは知っていたようで、この手紙からも、葬儀でフィンセントがどんな行為や発言をするのか心配していたことがうかがえる。「醒めたような発言」の内容の一部も知られている。葬儀の折、ある女性が父親の顔をもう一度見たいと言った時、ファン・ゴッホはこう言ったという。「そうです、ポーツさん、死ぬのはつらい、しかし、生きることはさらにつらい」と。





　朽ちていく教会


　父の死の二ヶ月後、ファン・ゴッホは《〈農民の墓地〉ニューネンの古い教会の塔》（図７）という作品を描いている。ファン・ゴッホはニューネン滞在の二年間に、この教会の塔を何度も描いているが、滞在中にこの教会の塔は取り壊されることになり、この絵が描かれた頃には尖せん塔とうのある屋根部分がすでに取りはずされていた。





＊戻る





「ぼくが言いたかったのは、農民たちが生前自分たちの耕していたその畑に何世紀にもわたって埋葬されてきたということを、この廃墟がいかに示しているかということだ。（……）今、この廃墟はぼくたちに語っている。どれほど地面に根を強く張っていても信仰や宗教が朽ちていったかを、そして墓地の地面に生える草や花が芽を出して枯れていくように、農民の生と死がいかに永えい劫ごうに変わらぬものであるかを。宗教はうつろい、神は残る、とはやはり近年埋葬されたヴィクトル・ユゴーの言葉だ」



（507/411）





　つまり、ファン・ゴッホが描きたかったのは、朽ちていく教会、宗教と、永遠に続く生のいとなみの対比である。人間が作り上げた制度としての教会や宗教はいずれ朽ちていくが、神はなくならない、そして農民の生のいとなみも。

　たしかに、教会は朽ちても神は残るのだろう。しかし、なぜ、ほかならぬ農民の生のいとなみが、教会よりも、宗教よりも永遠だということになるのだろうか。まるでファン・ゴッホは、自分を拒絶し、みずからも拒否した教会よりもさらに価値あるものを、ただ想像上の「農民」の中に探しているかのようだ。

　しかし、どれほど農民の生活を間近で見つづけたとはいえ、所しよ詮せんファン・ゴッホは農民とは生活も、喜怒哀楽も、運命も本当に共にしたことはなかった。彼にとっては農作業の多くは聖書の中のキリストのたとえ話と結びつく行為であり、現実的な意味で、生活の糧を稼ぐ手段などではなかった。ファン・ゴッホの描く農民たちは、どれほど泥にまみれ、こやしの匂いを放っていようと、ある意味で理想化された農民であった。その農民にファン・ゴッホは「教会」以上の永遠性を与えようとしたということなのである。





　《開かれた聖書のある静物》





　漆黒の背景に浮かび上がる大きな聖書。大人の一抱えもあろうかというほど大きく、重く、古い聖書。その脇に、消えたろうそく。手前には小さな黄色い表紙の本。ここに描かれているのは、ただそれだけ。本とろうそくしか描かれていない、暗く、地味な絵。しかし、ここにファン・ゴッホが描いた聖書が、半年前に急逝した父親のものであることを人が知り、さらに、絵の中に書き込まれた文字に気づいた時、この絵の前に無数の言葉が引き寄せられ、踊り始める。書き込まれた文字の意味を解読しようとする後世の人々が、この絵の前で饒じよう舌ぜつに語り始めるのである。





　絵の中の文字


　書き込まれた文字は「ISAIE LIII」（イザヤ書　五十三章）と「EMILE ZOLA LA JOIE DE VIVRE」（エミール・ゾラ　生きる歓よろこび）。それだけである。「イザヤ書」の文字は、描かれた聖書の右ページ上の余白に、「五十三章」は、右ページ右端の段の上から五分の一ぐらいのところに、そして、「エミール・ゾラ　生きる歓び」は聖書の右下の黄色い本の表紙に書き込まれている。聖書は亡き父が愛用していたもので、装丁は重厚な革張り板表紙、持ち運びの時にページがばらけないよう金属製の留め具が二個ついている。現物はオランダ語聖書だが、ファン・ゴッホは「イザヤ」という言葉をオランダ語のJESAIAではなくフランス語で書き込んでいる。黄色い本はファン・ゴッホが愛読していたゾラの小説『生きる歓び』、そして、消えたろうそくは伝統的にヴァニタス（はかなさ）のシンボルとして使われてきたモティーフである。文字を読み取った者の関心は、当然これらの書き込みの意味の解読に向かうだろう。しかし、ファン・ゴッホ自身がこれらの言葉の意味について書き記した手紙は知られていない。



『旧約聖書』の「イザヤ書」五十三章は五十行あまりからなり、キリスト教では「主の僕しもべの歌」と呼ばれる部分である。「主の僕」とは、聖書で神に従って生きる人を指す言葉で、イエス・キリストの預言として解釈されるだけでなく、イエスに近い生き方をした人々に当てはめられることもある。ここには多くの人々の罪を背負う羊のように死刑にされる「主の僕」の姿が描かれている。イザヤの預言は新約聖書に多く引用され、なかでもメシア（救世主）としてのキリストの十字架を象徴的に描写した預言として重要視されている。ここでは五十三章から、「主の僕」がどのように死んでいったかを伝える部分を引用しておこう。





彼は軽けい蔑べつされ、人々に見捨てられ

多くの痛みを負い、病を知っている。

彼はわたしたちに顔を隠し

わたしたちは彼を軽蔑し、無視していた。

彼が担ったのはわたしたちの病

彼が負ったのはわたしたちの痛みであったのに

わたしたちは思っていた

神の手にかかり、打たれたから

彼は苦しんでいるのだ、と。

（……）

苦役を課せられて、かがみ込み

彼は口を開かなかった。

屠ほふり場に引かれる小羊のように

毛を切る者の前に物を言わない羊のように

彼は口を開かなかった。

捕らえられ、裁きを受けて、彼は命を取られた。

彼の時代の誰が思い巡らしたであろうか

わたしの民の背きのゆえに、彼が神の手にかかり

命ある者の地から断たれたことを。

（……）

多くの人の過ちを担い

背いた者のために執り成しをしたのは

この人であった。



（引用文は新共同訳による、以下同）





　ファン・ゴッホはなぜ「五十三章」の文字を読めるように書き込んだのだろうか。ファン・ゴッホと父親の関係、当時の状況などから推測すれば、ファン・ゴッホはこの「イザヤ書」の中の「彼」と父親を重ね合わせていたと考えられる。ファン・ゴッホは決して孝行息子とは言えなかった。さんざん父の世話になりながらも、父には反抗しつづけた。父の方はと言えば、学校でも職場でも問題を起こしつづける息子に対し、学校を変え、仕送りをし、親類や知人に頭を下げて息子の世話を頼むといった具合に、まさに、さまざまな「執り成し」をしつづけてきた人である。この「五十三章」の文字を書き込んだ時、ファン・ゴッホはおそらく父を「主の僕しもべ」と見なし、その死を悼むという意図を込めていたのだろう。

　それではゾラの『生きる歓び』の書き込みの方はどうだろうか。この点については、ファン・ゴッホがこの小説の特定の登場人物と自分を重ねているという説をはじめ、さまざまな説がある。しかし、ファン・ゴッホの手紙をよく読んでみると、このモティーフの意味を読み解く鍵かぎはある。この絵が描かれてから二年後、妹のウィルに宛てた手紙にはこのように記されている。





「そこで善意をもってして、闇の中に光を投じると言われているような本を探してみても、こちらの志がどれほどまともでも、確実なものはほとんどなく、また必ずしも十分にわれわれに個人的慰めを与えてくれるものがあるわけではない。われわれ文明人を何よりも悩ませている病はメランコリーとペシミズムだ。

　そこで、たとえばぼくのように、何年もの間、笑いが欠乏していた人間は──それがぼくのせいかどうかはともかく──そういう人間は心から笑いたい欲求を特に感じる。ぼくはそれをギ・ド・モーパッサンのなかに見つけた。（……）それとは反対に真実を、あるがままの人生を欲するなら、たとえばド・ゴンクールの『ジェルミニー・ラセルトゥー』や『娼婦エリザ』、ゾラの『生きる歓び』や『居酒屋』、その他多くの傑作がある。彼らは人生をありのままに描くから、人生の真実を語ってほしいというぼくらの欲求を満たしてくれる。

　フランスの自然主義者、ゾラ、フロベール、ギ・ド・モーパッサン、ド・ゴンクール、リシュパン、ドーデやユイスマンスはすばらしい。もし彼らの作品を知らなければ、現代の人間であるとは言えない。（……）

　ぼくらには聖書だけで十分だろうか。

　イエスが現代に生きていたら、メランコリーの状態にいつづける人たちにこう言うだろう。ここではない。立ちて行け。なにゆえ汝死せるもののなかに生けるものを求めるのか、と」



（574/W1）





　ここでファン・ゴッホはメランコリーの「闇の中に光を投じると言われているような本」としてフランス自然主義文学をあげ、そのなかのひとつにゾラの『生きる歓び』をあげている。そして、「闇」という言葉で旧来のキリスト教社会をさし、「聖書だけで十分だろうか」と問いかける。ファン・ゴッホが聖書とゾラの小説を並べて描いた意図はおそらくここにある。聖書は父親たちの旧来のキリスト教世界を暗示し、ゾラの小説本は、メランコリーとペシミズムに満ちた、父親のキリスト教世界の「闇」を照らす「光」として描き込まれたのである。聖書の大きさ、重厚さは、父親の世界がファン・ゴッホの中に占めてきた大きさと重みを伝えるが、その脇に置かれた「消えたろうそく」がその世界の死を暗示している。そして異様に黄色い小説本が暗闇に差し込む光を示している。つまり、父親の死に接したファン・ゴッホは、父の遺品である聖書を使って、父の世界の死を表現し、ゾラの小説を使って「来るべき新しい世界」を表現したのである。





　闇の中の光


　しかし、ファン・ゴッホは父の世界から本当には解放されてなどいなかった。ファン・ゴッホが父の世界を葬るために持ち出した概念「闇の中の光」は、もとをたどれば聖書の中にあった。「ヨハネによる福音書」一章五節の「光は暗闇の中で輝いている。暗闇は光を理解しなかった」である。ファン・ゴッホは牧師になる勉強を始める少し前には、この「闇の中の光」という言葉を「福音書だけでなく聖書全体の基本的真理のひとつ」とまで評していたし、その後も同様の考えを何度か手紙に書きつづっている。また、アムステルダムで聖職者を志して勉強していた頃には、「夜もたびたびランタンをさげて病人や死にかかっている人たちを訪ねていき、苦しみと悩みの闇に光明の言葉を与えたまう方について語って聞かせるお父さんのような人」（131/110）という表現で、「闇の中の光」によって人々に慰めをもたらす主と父への敬意を表現している。

《開かれた聖書のある静物》で、ファン・ゴッホが古いキリスト教世界を葬るために持ち出した「闇の中の光」という表現は、まさに彼がそのキリスト教世界から授かった「基本的真理」にほかならなかった。ファン・ゴッホはいわば敵から授かった武器で、その敵を倒そうとしていたのである。そのことに、はたして彼自身は気がついていただろうか。

　ファン・ゴッホにとって父親は師であると同時に敵であり、理解者であると同時に無理解者であり、自分の心身の一部であると同時に、自分の中から排除すべき他者であった。父の死によって、日常生活でうさ晴らしのけんかをする相手を失った今、ファン・ゴッホは彼の心身の一部である「父」と闘うしかなくなった。自分の内部にいて、自分と不可分な敵と果てしない闘いをつづけるしかなくなったことは、ファン・ゴッホの「余生」にこれまで以上の緊張を与えつづけることになる。父の死に接してもあれほど冷徹、冷淡でいられたのは、誰よりもファン・ゴッホ自身がそのことを知っていたからにほかならない。





　二年間の滞在の後、ファン・ゴッホはニューネンを後にする。恋愛事件などさまざまな人間関係でニューネンにもいづらくなったし、農民相手では裸体のモデルにはなってもらえない。テオが知らせてくるパリの美術動向も気になっただろう。ファン・ゴッホは、とうとうオランダを出て、まずベルギーのアントウェルペンの美術学校に入り、短期間ながら正規の美術教育を受けた。石せつ膏こうデッサンや裸体モデルによるデッサンも描いている。しかし、ファン・ゴッホは教師の言うことは聞かず、長続きはしなかった。





　近代絵画史上の短くも重要な一幕は、こんな走り書きから始まった。





「突然やって来てしまったことを怒らないでほしい。このことについてはよく考えてのことで、結局こうしたほうが時間の節約になるのだと思う。正午か、君がよければもっと早くルーヴルに行っている。何時に君がサル・カレ〔ルーヴル美術館・方形の間〕に来られるか、返事して下さい」



（567/459）





　１８８６年の２月末頃、ファン・ゴッホは突然、アントウェルペンからパリに現れた。パリ北駅に着くと、スケッチブックを切り取った紙切れに黒いクレヨンで走り書きをしたため、赤帽にテオのところに届けさせたという。ファン・ゴッホは少し前から、テオが画商として働いていたパリに行きたがっており、テオは、６月に大きなアパルトマンに引っ越すのでそれまで待つように伝えていた。しかし、三ヶ月を待ちきれなかった兄は、突然、なんの前ぶれもなくやって来てしまったのである。走り書きを受け取ったテオはお昼にルーヴル美術館に急いだのだろう。再会したふたりはそこでどんな表情を浮かべ、どんな会話を交わしたのだろうか……。当惑しながらもにこやかに迎える弟、あいさつもそこそこにお気に入りの絵の前に弟を連れて行ってまくしたてる兄、そんな場面だっただろうか。

　ともあれ、こうして兄弟の二年にわたる同居生活が始まった。この二年間はファン・ゴッホの画業にとって、多くの刺激と、大きな変化に満ちた期間であり、近代絵画史上の重要なできごとに満ちた二年でもあった。残念なのは、この期間、ファン・ゴッホが弟テオと一緒に住んだために、ほとんど手紙を書く必要がなくなったことである。この時期にもしファン・ゴッホが多くの手紙を残していたら、ファン・ゴッホの、そして近代絵画史上の重要なできごとを克明に知る手がかりになったことはまちがいない。しかし、なぜか、歴史の女神はこの時代にだけ封印をした。

　パリ時代は、ファン・ゴッホの絵画にさまざまな影響が大量に流れ込み、彼がそれらを自分なりに消化していった時代である。作風は変化が多く、多様で、混沌とすらしている。この豊穣な混沌の中、ファン・ゴッホは、パリという都市と画商である弟テオの尽力によって劇的に進化する。この二年間がなければ、今日ファン・ゴッホの名は歴史上にすら残っていなかったかもしれない。外国人画家など珍しくもないパリで、ファン・ゴッホが短期間で画家たちと知り合いになれ、親交を結べるようになったのは、言うまでもなく、画商でもある弟テオの紹介があったからである。画家たちも、弟が画商をしていると聞かなければ、こんなどこの馬の骨かわからない変人とはお付き合いしてくれなかったことだろう。ファン・ゴッホは、ゴーガンやトゥールーズ＝ロートレック、シニャック、エミール・ベルナールらの画家と知り合いになり、印象派や、のちにポスト印象派と呼ばれる画家たちの作品や理論に接することができた。





　この時期、印象派と並んでファン・ゴッホに大きな影響を与えたのが浮世絵である。ファン・ゴッホは画商ビングの屋根裏部屋で大量の浮世絵を研究し、浮世絵の展覧会も開いた。テオとともに浮世絵の委託販売もしていたらしい。ジークフリート・ビングはドイツ、ハンブルク出身のユダヤ系画商である。いち早く開国間もない日本にやって来て、大量の美術品を買い込んでパリで販売し、『藝術の日本』という雑誌を刊行し、「自然を唯一の師とする」日本人をモデルとして、ヨーロッパ工芸の刷新をはかり、やがてメゾン・ド・ラール・ヌヴォーという店を構えて、あのアール・ヌヴォー様式のプロデューサーとなった。

　浮世絵は19世紀末のヨーロッパの画家たちを魅了した。そのなかにあって、ファン・ゴッホは浮世絵に最も強い関心を示した画家のひとりである。浮世絵の模写をし、肖像画の背景にもいっぱいに浮世絵を描き込んだ。そして、彼の日本の夢はしだいに膨らんでいくことになる。鮮やかな色彩ゆえだろうか、ファン・ゴッホはある時期から南フランスと日本とをだぶらせて考えるようになっていった。

　イギリス人画家リーヴェンズに宛てた手紙の中で、ファン・ゴッホはこう書き記している。「春になったら、二月かあるいはもっと早く、ぼくは南仏に行くかもしれない。青い色調と明朗な色彩の国に」（569/459a）。この手紙が書かれたのは１８８６年の秋と考えられている。つまり、パリに着いて半年後にはもうファン・ゴッホは南フランスに行くことを考えていたことになる。なぜそんなに早く南仏に関心を寄せたのか、そのあたりの事情もまた封印されたままである。





　《アニエールのレストラン》





　パリに着いてからしばらくは褐色の暗い色調で描いていたファン・ゴッホも、次第に印象派の影響を受け、印象派風の明るい色調の作品を描くようになる。それらのなかでも《アニエールのレストラン》は最も印象派的な作品のうちの一枚だろう。主題といい、様式といい、それはもう典型的な印象派絵画のように見える。

　描かれているのは、パリ郊外、アニエール橋のたもとに建っていたレストラン・ド・ラ・シレーヌ。画中には、レストランの名前のほか、Salons et Cabinets de Société（宴席、パーティー会場）、Salon pour Noces（結婚披露宴会場）の文字も見える。郊外にあるブルジョワ向けの娯楽施設という主題も、すっかり明るくなった画面も、ファン・ゴッホが印象派の影響を強く受けたことを物語っている。しかし、それでも、この絵はモネやシスレーらの印象派絵画とは何かが本質的にちがう。





　印象主義


「モネは眼にすぎない。でも何という眼だろう」。ポスト印象主義の画家セザンヌは、印象主義の代表的画家モネをこう評したという。この短いモネ評は印象主義の本質を的確に言い当てている。つまり、モネが目指したものは、純粋視覚の絵画であり、眼に映ったうつろいゆく光の効果を捉とらえる絵画であった。モネが《積み藁わら》連作を描く際、朝、午後、黄昏たそがれなどの光の効果のちがいを別々のカンヴァスに描き分けたのも、彼が時々刻々とうつろいゆく光の効果をカンヴァスに定着させたかったからにほかならない。

　色彩理論の点からは、印象派は次のように説明される。印象派は固有色を否定し、筆触分割、視覚混合の手法を使う。つまり、通常の太陽光のもとで緑に見える木の葉も、夕陽を受ければちがう色に見える。固有色とはあくまで昼間の白色光下での色にすぎない。また、色の三原色は混ぜると黒になるが、光の三原色は混ぜると白になる。つまり、パレット上で色を混ぜれば混ぜるほど色は暗く沈んでいくことになる。印象派画家たちはパレット上でできるだけ色を混ぜず、カンヴァス上に原色に近い色の、小さなタッチを並べることで、明るく澄んだ色合いを作り出そうとした。たとえば、紫の効果を出す時には原色に近い青と赤の細かいタッチを並列する。細かいタッチは遠くから見ると、視覚上で混合されるから、紫に見えていながら澄んだ色合いが保たれる。

　もちろん、これはあくまで印象派がある程度よりどころにし、批評家が印象派を説明する際に引き合いに出してきた「理論」にすぎず、実際の印象派絵画では混色もされているし、原色ばかりを使うわけでもない。モネが理論嫌いだったこともよく知られている。また、同じような理論が背景にあっても、モネの絵画と、点描画法を用いた新印象派のスーラやシニャックの絵画との間には大きなちがいがある。モネはあくまでうつろいゆく光の戯れとしての視覚的な絵画を目指したが、スーラは、さながら色彩理論の実験のような理知的な方法を用いながら、同時に詩情を感じさせるような絵画を描いていた。同じような色彩理論への関心が背景にあったとしても、実践の仕方はそれぞれの画家で大きく異なったのである。





　印象派から得たもの


《アニエールのレストラン》は、たとえばモネの作品とどうちがうのだろうか。一言でいえば、ファン・ゴッホの印象派風作品は、どの絵も泥を洗い落としきれず、少し濁っていて垢あか抜ぬけしない。モネやシスレーのような澄んだ色彩、澄んだ空気感が出せていない。ファン・ゴッホは実際に印象派の作品を見て、彼らの色彩理論も知り、印象主義というものを自分なりに消化して作風を変へん貌ぼうさせてはいった。しかし、主題や描き方がどれほど印象派風でも、ファン・ゴッホは印象派画家にはなりきらない。厳密にいえば、ファン・ゴッホは一度として印象派画家であったことはない。もとより彼が望んだのは、うつろいゆく光の戯れをカンヴァスに定着させることではなかったからである。そのことはファン・ゴッホの他の印象派風作品を見てもよくわかる。《レストランの内部》（図８）なども一見印象派風でもあり、点描画法を用いている点では新印象派風でもある。しかし、モネでもスーラでもない。ただ、ファン・ゴッホが印象主義を自分なりに消化吸収しようと試行錯誤していることは伝わってくる。





　印象派から学んだ細かいタッチを、ファン・ゴッホは自画像にすら使っている。眼のまわりを取り囲むように並べられたタッチは、もはや印象派の色彩分割とはまったく別物で、眼に宿る力の効果を増すために使われている。アントウェルペン時代、ファン・ゴッホはこのように手紙に書いたことがある。「ぼくはカテドラル［大聖堂］よりは人々の眼を描きたい。カテドラルがどれほど荘厳で堂々としていようと、そこにない何かが眼の中にはあるからだ」（549/441）。モネが描いた《ルーアンのカテドラル》連作は印象派の傑作としてよく知られているが、ファン・ゴッホはカテドラルではなく、自画像の眼の中にある何ものかを描くために印象派の技法を転用していたのである。

　色彩理論についていえば、ファン・ゴッホはとりわけ補色の理論に関心をもっていたようだ。補色とは、赤と緑、紫と黄のように、色相環（図９）で反対の位置にあり、混ぜると黒（光なら白）になる二色のことで、この二色を並列すると互いの色を引き立てあうことが知られている。ただ、ファン・ゴッホはこの補色を、自然の色彩効果を再現するためではなく、また色彩理論の実験のためでもなく、何らかの象徴的意味を表現するために使うようになっていく。アルル時代の手紙に書かれているように、「ふたつの補色の結婚によってふたりの恋人たちの愛を表現すること」（673/531）を目指し、また、「赤と緑によって人間の恐ろしい情念を表現しよう」（676/533）とするようになっていくのである。





　画家としての出発から、ファン・ゴッホは印象派とはまったく相あい容いれない画家であった。そもそも、印象派のような絵画を描くために画家になった人間ではない、といってもよい。ただ、ファン・ゴッホは印象派絵画とその色彩理論が、自分が求める絵画にとって大きな意義をもっていることは直感したのだろう。だからこそ、それを取り入れようとして印象派風の絵もかなり描いた。このような模索を経てファン・ゴッホが学んだものは、筆触と色彩がそれ自体で何かを「表現」できるということであった。これまで想像していたよりはるかに多くのことを表現できる手段を、ファン・ゴッホは印象主義との格闘のなかで獲得していったのである。





　《広重模写　亀戸の梅》





　赤、鮮烈な赤、視界を大胆に横切る梅の枝。そこには西洋の画家たちを驚嘆させる絵画世界が広がっていた。広ひろ重しげの《名所江戸百景　亀戸梅屋舗》（図10）はファン・ゴッホにもどれほどの鮮烈な印象を与えたことだろうか。ビングの店の屋根裏部屋で大量の浮世絵を見ていたファン・ゴッホは、広重や北ほく斎さいから何を感じ、いったいどんな表情でそれらを見て、どんな言葉をもらしていたのだろうか。





　浮世絵模写


　ファン・ゴッホがパリ時代に油彩で描いた浮世絵模写は三点知られている。浮世絵が大流行した19世紀末のヨーロッパにおいても、このような模写をした画家は珍しい。静物画や人物画の背景に浮世絵が描き込まれることはよくあるが、模写はほとんど残されていない。ファン・ゴッホはなぜ、木版画の浮世絵を油彩で模写しようと思ったのだろうか。

　模写作品を間近でよく見ると、木の幹のあたりにうっすら格子状の線の下書きが見える。

　ファン・ゴッホはこの拡大模写を描くにあたって、まず浮世絵の原画のうえにトレース紙を置き、主な輪郭を写し取ると同時に、格子状の線を全面に引いた。次にカンヴァス上に同じ本数の格子状の線をより広い間隔で引き、それらをたよりに木の輪郭をフリーハンドで写したのである。このようにして描いたので、構図や輪郭はほぼ正確に写し取られている。しかし、色を塗るにあたってファン・ゴッホは、原画よりも鮮やかな、より原色に近い色を使っている。また、絵の両側には漢字が書き込まれている。左側には「大黒屋錦にしき木ぎ江戸町一丁目」、右側はやや判読がむずかしいが「新吉原筆（？）六丁目屋本」と書かれているように見える。「大黒屋」は吉原にあった遊郭のひとつで、「錦木」はそこにいた花魁おいらんの名前。これらの言葉も「江戸町一丁目」も、また右側の「新吉原……」も、浮世絵からとってきた漢字だが、ファン・ゴッホ自身がこれらの漢字の意味を知っていたかどうかはわからない。また、なぜ両側にこのような漢字の帯を配したのかもわかっていない。

　他の二点の浮世絵模写は広重の《名所江戸百景　大はしあたけの夕立》と渓けい斎さい英えい泉せんの《花魁》を模写したもの（図11）で、《大はしあたけの夕立》にも漢字の書き込まれた縁取りが描かれている。また《花魁》の模写では、花魁は雑誌『パリ・イリュストレ』日本特集号の表紙に使われていた英泉の花魁を《亀戸梅屋舗》と同様に敷き写して拡大したもので、周囲には蓮はす池いけや小舟、葦あしなどを組み合わせた風景が描き込まれている。これらも浮世絵や他の日本美術から写されたモティーフかもしれないが、どこから取られたかはわかっていない。トノサマガエルやガマ、鶴については、他の浮世絵から部分的に写し取ったものである。ここでは、ファン・ゴッホは浮世絵を模写するだけでなく、さまざまなモティーフを組み合わせて、何か独特な「日本」世界を描き出そうとしているかのようだ。それがどのような世界だったかは、残念ながら正確にはわからない。





　その後のファン・ゴッホの画業を考えた時、これら三点の模写の中では、《名所江戸百景　亀戸梅屋舗》の模写が特に重要だ。なぜなら、将来ファン・ゴッホの傑作を生み出す独特の表現様式が、この《亀戸梅屋舗》の模写にもっとも早く現れているからである。





　「触媒」としての浮世絵


　ファン・ゴッホはパリでさまざまな表現方法を模索した。印象派の影響を受けて色彩を明るくし、色彩分割の方法を試して点描風の細かい筆触でも描いた。印象派からは多くを学んだが、それは彼のスタイルにはなり得ないものだった。そんな中で出会ったのが浮世絵である。浮世絵は木版画なので当然輪郭線が太く、微妙な陰影は付けにくいので、平へい坦たんで鮮やかな色面表現になる。しかし、この木版画独特のスタイルがファン・ゴッホをはじめ何人かの画家たちを刺激した。まだ二十歳にも満たない若いエミール・ベルナールは、いち早く太い輪郭線と平坦な色面を使って描きはじめ、それをクロワゾニスムと呼んでいる。クロワゾニスムとはエマイユ・クロワゾネ（七宝焼）のように輪郭がくっきりとした様式という意味合いをもち、ベルナールの他、ゴーガンもこの時期に類似の様式で描き始めている。

　ファン・ゴッホがこのような様式で本格的に描き出すのはアルルに行ってからで、パリ時代にはまだほとんど描いていない。ただ、パリ時代にこの様式で描いたほとんど唯一の作品が《亀戸梅屋舗》模写なのである。これは、ただの浮世絵模写ではない。浮世絵が当時と比べて褪たい色しよくしていることを考えても、ファン・ゴッホの模写ほど鮮やかな赤や黄色の効果はなかったはずだ。ここで、ファン・ゴッホは浮世絵をただ模倣しているのではなく、模写という形を借りて、新しい絵画を創りだすための色彩の実験をしていたのだ。

　どれほど想像力にあふれる芸術家でも、自由自在に新しい形や様式を生み出しつづけることなどできない。必ず自分の属する文化圏で教育を受け、通常はその文化環境の範囲内で進化する。しかし、そこに他の文化圏から「異物」が入り込むと面白い現象が起きる。それまで想像もしなかったような形態、色彩が画家を刺激する。19世紀末にヨーロッパで日本美術が大流行し、ジャポニスムという現象が起こったのは、それまで鎖国で国外にほとんど出ていなかった日本の美術品が流出しはじめ、その価値と新鮮さを画家たちが発見したからである。この時、流行の主役になったのは浮世絵であった。屛風びようぶや掛け軸などの一点ものは数が限られ伝でん播ぱ範囲が限られるが、木版画である浮世絵は大量に同じものが出回り、輸送も簡単なので、伝播能力がきわめて高かった。それだけではない。浮世絵は鎖国下にすでに日本に流入していた西洋画の影響を直接、間接に受けていて、西洋人の受け入れやすいスタイルになっていたし、また、商業芸術としての浮世絵の主題は花魁（すなわち娼しよう婦ふ）、役者（俳優、芸人）、名所図（風景）などであり、19世紀末西洋で取りあげられる主題にもよく似ていたため、西洋でも受け入れやすかっただろう。それにしても、浮世絵をはじめて目にした画家たちの感覚はどのようなものだっただろうか……。

　ジャポニスムの画家たちの中には浮世絵を単純に模倣しただけの画家もいる。しかし、多くの創造的な画家たちは、決して単なる模倣をしたのではなく、浮世絵という異物から刺激をうけ、それを自分なりに吸収して独自のスタイルを生み出して行った。ファン・ゴッホもまさにそのような画家のひとりであった。ファン・ゴッホにとってパリ時代に出会った浮世絵は化学反応における触媒のようなものだった。浮世絵の様式や内容がそのままファン・ゴッホの作品に受け継がれたわけではないが、浮世絵という異物が混入することで、通常では生じないような劇的な反応が生じた。浮世絵を模写するという行為を通じて、ファン・ゴッホはそれまで誰も描かなかったような独自の様式を獲得することができたのである。それはまだパリ時代には本格的には現れず、アルル時代になってようやく本格的に姿を見せるようになる。





　《タンギー爺さんの肖像》





　人の良さそうな初老の老人がまっすぐにこちらを見つめている。麦わら帽のような大きな帽子をかぶり、骨太な手を組み合わせ、こちらを見つめている。背景にはびっしりと浮世絵が描かれている。パリの小さな絵具屋の親おや爺じは、この肖像画によって絵画史にその名と姿を残すことになった。





　ユートピスト


　老人の名はジュリアン・タンギー（１８２５‐１８９４）。彼が他の絵具屋とちがっていたところがあるとすれば、貧しい画家たちを商売そっちのけで支えていたことぐらいだろう。タンギー爺じいさんは、ビングのように浮世絵を売っていたわけではない。なのに、なぜ、ファン・ゴッホはこのタンギー爺さんの背景いっぱいに浮世絵を配して描いたのだろうか。屋内で描いたはずなのに、なぜわざわざ帽子をかぶせ、西洋の肖像画としてはやや異例の正面向きポーズで描いたのだろうか。

　タンギーが亡くなってから十五年も経ってから、画家エミール・ベルナールがタンギーの回想を『メルキュール・ド・フランス』誌に書いたのも、まだ十代の駆け出しの貧乏画家だった頃に何かと世話になったからだろう。ベルナールの文章はタンギーの人となりもファン・ゴッホとの関係もよく伝えてくれる。





「ジュリアン・タンギーはすべての人類を互いに結びつけ、つねに痛々しく血なまぐさい利己的、野心的争いを無くすような、そういう絶対的な愛を信じていた。フィンセント［ファン・ゴッホ］はこれと同じ理想をもっており、ただ芸術家であるという点でタンギーと異なり、その社会的調和を一種の宗教か美学にしようとしていた。（……）ジュリアンはきっとフィンセントの絵よりは、彼の社会主義のほうにずっと惹かれていたにちがいないが、しかし、絵のほうも、彼の抱いている希望を眼に見える形に表したものとして崇拝はしていた。幸福の時代を待ちわびながら、ふたりともとても貧しかったにもかかわらず、自分たちの持っているものを人々に分け与えていた。画家は絵を、商人は絵具、お金、テーブルを、ある時は友人に、ある時は労働者に、またある時は娼婦たちに与えた。絵をもらった者は古物商に二束三文で売りに行った。ふたりはこのようなことを、まったく利害に関係なく、彼らの知りもしない人々に対しても行ったのである」





　ベルナールによれば、タンギーは素朴なユートピア的「社会主義者」であり、ファン・ゴッホと共に「幸福の時代」を渇望していたのだという。ファン・ゴッホのアルル時代の手紙からは、彼の頭の中ではタンギーと日本人とが結びついていることがわかる。





「ここでぼくはますます日本の画家のように、小市民として自然のただ中に生きていくことになるだろう。そのほうが頽たい廃はい的になって悲惨な思いをするよりはましだと君も思うだろう。もしぼくがかなり高齢になるまで生きのびられたら、タンギー爺さんのようになるだろう」



（685/540）





　つまり、「日本の画家のように自然のただ中に生きて」、齢よわいを重ねればタンギー爺さんのようになれる、とファン・ゴッホは思っていたことになる。裏を返せば、ファン・ゴッホは日本人がタンギー爺さんのような人物だと想像していたということでもある。ファン・ゴッホとタンギーは素朴な空想的「社会主義者」であり、「幸福の時代」とベルナールが呼ぶユートピアを待ち望んでいた。そして彼らの理想としてのユートピアと日本とは、少なくともファン・ゴッホの中では重なっていたらしい。ファン・ゴッホはただの気まぐれからタンギー爺さんを浮世絵のただ中に描き込んだのではない。浮世絵によって象徴される「日本」は、タンギー爺さんとファン・ゴッホとが共有していたユートピアと重なっていたのである。

　タンギー爺さんのポーズについてもベルナールは興味深い記述を残している。「フィンセントは１８８６年頃、タンギーの肖像を描いた。彼はタンギーを日本の浮世絵が壁に貼られた部屋に座らせ、植木屋の大きな帽子をかぶせ、仏陀のように左右対称の正面観で描いている」。このような正面観は西洋の肖像画では異例なので、あるいはファン・ゴッホは仏像のポーズを意識していたのかもしれない。また、ベルナールが描いたタンギーの肖像でも、ファン・ゴッホが描いた別のタンギーの肖像でも、タンギーは帽子などかぶっていないのに、ここではファン・ゴッホはわざわざ帽子をかぶらせている。ファン・ゴッホにとって日本はタンギー爺さんのユートピアと重なっていたと同時に、「陽光に満ちた」国としての南フランスとも重なっていたことがわかっている。つまり、南仏のように陽光に満ちた国「日本」にふさわしいものとして、この大きな日よけの帽子も描かれたのだろう。

《タンギー爺さんの肖像》はただの肖像画ではない。それはタンギー爺さんとファン・ゴッホの共有するユートピアと日本と南仏とが三重に重なりあった肖像画であり、二人が思い描くユートピアと、そのユートピアの住人としての理想的人物像を描き出したものだったのである。





　南仏へ


　ファン・ゴッホは二年間、パリでテオと生活を共にし、画家として大きな成長をとげて南仏に向かった。テオにとって兄との同居はかなりきついものだったにちがいなく、実際、もともと体の丈夫ではないテオはやつれて病人のように見えていたという。フィンセントが南仏に去り、厄介者の兄から解放されてせいせいするはずだったテオは、心にぽっかりと穴があいたようになって、その穴をどのようにしても埋められない。二年前、フィンセントからの走り書きを手にした当時、テオはこんなことになるとは予想もしていなかった。ファン・ゴッホが南仏に発たった後、テオは妹ウィルへの手紙にこうしたためている。





「フィンセントは前の日曜日、南へ発ちました。まずアルルで様子を見て、それからおそらくマルセイユへ行くでしょう。（……）二年前に彼がここに来た時、僕たちはこれほど強く結びつくとは思っていませんでした。というのも、アパルトマンにひとりになった今、大きな空虚感を感じるからです。誰かを見つけて一緒に住むこともできるでしょうが、フィンセントのような人間のかわりを見つけるのは容易ではありません。彼は信じられないほど多くのことを知り、世界に明快な視線を向けています。だからぼくは、彼があと何年か生きられれば、きっと名声を得るだろうと思っています」





　パリで波乱の一幕を終えて幕が下りた時、舞台にはひとり放心したように立ちつくすテオの姿があった。しかし、この時テオは、世界中でただひとり、画家フィンセント・ファン・ゴッホの名声を確信し、予言していたのである。





　夜行列車の黒い窓がほのかに白みはじめた。白さはどんどん増していって、やがて車窓は一面の雪景色になった。

　ファン・ゴッホを乗せたマルセイユ行き特急「パリ‐リヨン‐地中海」号は、１８８８年２月20日早朝、南仏タラスコンの駅に着いた。ここでアルル行きの支線に乗り換え、ファン・ゴッホはアルル駅に降り立った。太陽の国、南仏での初日は、「60センチを超える」積雪と降りつづく雪の中で始まった。それでも、アルルからの最初の手紙にファン・ゴッホは「雪の中で雪のように明るい空を背景に白い山頂を見せた風景は、まるでもう日本人たちが描いた冬景色のようだった」（577/463）と記している。

　南仏へ向かう夜行列車の中で、ファン・ゴッホはどんな胸の高鳴りを覚え、どんな表情を浮かべていたのだろうか……。後に彼はこの時の列車旅行の感動をこう伝えている。





「この冬、パリからアルルに向かう道中に受けた感動は今思い出してもまだありありと浮かんでくる。『まるでもう日本に来たんじゃないか』と目を凝らしたほどだった。子供じみていると思われるかもしれないが」



（706/B22）





　南仏は無邪気な幻術師である。それは北から来た旅人たちに蜃しん気き楼ろうを見せ、白昼夢の中に誘い込む。この幻術師の術の中で、ファン・ゴッホは短いながら、おそらく人生で最も幸福な時間を過ごすことになった。

　パリで印象派と浮世絵に出会い、色彩表現に目覚めたファン・ゴッホは「青い色調と明朗な色彩の国」、「日本のような」南仏に向かう。それ以降もファン・ゴッホは日本について書かれたものを読みかじっては、自分なりの日本人イメージを想像で作り上げ、膨らませ、「日本」と南仏をユートピアに仕立てていくことになる。そのユートピアとは、画家たちが日本人のように兄弟愛に満ちた共同生活を送る「画家の天国」であり、ファン・ゴッホはそれをアルルで住み始めた「黄色い家」で実現させることを、夢見るようになるのである。





　《ラングロワの橋》





　雪景色で始まったアルルの風景も、春の足音に合わせて輝きを増していった。芽吹き、水ぬるみ、風薫る３月、そんな頃にこの絵（「はじめに」、図12）は描かれた。ファン・ゴッホの作品中、これほど瑞みず々みずしさと穏やかさに満ちあふれた絵がほかにあっただろうか。

　この頃、ファン・ゴッホはアルルからベルナール宛ての最初の手紙を書いている。





「君に便りをする約束をしたので、まずこの土地が、空気の透明さと明るい色彩効果のためにぼくには日本のように美しく見えるということからはじめたい。水が風景の中でエメラルド色と豊かな青の色斑をなして、まるで浮世絵のなかで見るのと同じような感じだ。淡いオレンジ色の夕日が地面の色を青く見せる。華麗な黄色の太陽」（587/B02）





　オランダやパリでは決して目にすることのできなかった鮮やかな色彩を前に、心を動かされている様子がありありと伝わってくる。

　この跳ね橋は、アルル旧市街の南西のはずれの運河にかかっていた。正式名をレジネル橋といい、橋の管理人の名をとって通称ラングロワの橋と呼ばれていた。この作品では、ファン・ゴッホは市街側の岸に立って、ほぼ真南を向いて橋を描いている。この後、ファン・ゴッホは、さまざまな角度からこの橋を描くことになる。





　失敗作


　それらのなかに一点、ファン・ゴッホが失敗作と見なした作品がある。そのスケッチ（図13）はベルナール宛ての手紙に描かれていて、そこには色を示すメモ書きもある。水はエメラルド・グリーン、道はバラ色、草は緑、空は黄色、橋はライラック色である。土手には体を寄せ合って歩く男女が二組。男は船乗りたちで、恋人と連れ添って町に戻るところだという。彼らの服の色も詳細に書き込まれている。手前の男女の男の帽子は黄色、上着は青、ズボンはイエロー・オーカー（黄土色）、女の髪はオレンジ、上着は赤、スカートはカーマイン（赤）。遠くの男女は、男がイエロー・オーカー、女がバラ色と黒である。





　ベルナールにこの手紙を書いた時、ファン・ゴッホはすでに《ラングロワの橋》を描き終え、ちょうどこの絵と格闘していた。黄色い大きな太陽、男女の服装の色などを想像してみてもわかるように、とても色鮮やかな絵である。しかし、油彩画自体は現存せず、手前の二人連れを描いた部分の断片（「はじめに」）だけが個人コレクションに収められている。この絵についてファン・ゴッホはこう弟に書き送っている。「ベルナール宛てに書いた夕陽と人物の絵は壁にぶち当たっている。悪天候のため現場で仕上げることができず、家で仕上げたらまったく台無しになってしまった」（589/471）





　架空の太陽


　この絵では、ファン・ゴッホはアルルの市街地の反対側の岸に渡り、そこから橋を描き始めた。しかし、天候が悪く、現場で仕上げられなかったのでアトリエで仕上げようとして失敗したのだという。ファン・ゴッホはおそらくアトリエで二組の恋人たちを描き込み、太陽も描き、想像で色を塗っていったのだろう。ここで、面白いのは、太陽の位置である。アルルの市街地の反対側に渡ったこの場所は橋のほぼ真南にあたり、ファン・ゴッホはほぼ真北を見て描いていることになる。つまり、この場所に太陽が見えることはありえないから、ファン・ゴッホは明らかに架空のモティーフとして太陽を描き加えたことになる。

　なぜそのようなことをしたのかは手紙にも記されていない。ただ、アルル時代の作品には、しばしば架空の太陽が絵の中に描き込まれていて、それらが「恋人たち」のモティーフと組み合わされることも多い。たとえば、《夏の夕暮れ》（図14）は、町のシルエットや蒸気機関車の線路などから、アルルの町の北のはずれからほぼ真南を見て描いた風景だとわかる。





　もちろん、真南の地平線に太陽や月が見えることはないので、これも架空の太陽であり、その太陽のすぐ右下にはやはり散策する「恋人たち」の絵が描かれている。太陽や小さな人物像は実際に目にしなくても絵の中に描き込むことができる。ファン・ゴッホは実際に目にしたものしか描かないのではなく、自然な景観に見える範囲内で、自分の描き込みたいモティーフをかなり自由に描き込んでいる。

　ではなぜ失敗した《ふたり連れのいるラングロワの橋》には太陽や恋人を描き込もうとしたのだろうか。南仏の太陽はファン・ゴッホにとってユートピアの象徴であり、特別な存在だ。その太陽と恋人たちを描き込むことで、ファン・ゴッホは現実の風景を、彼自身のユートピアを象徴する理想的風景画に仕立て上げたかったのだろう。もし、天候が悪化していなかったら、ファン・ゴッホはそのままこの土手の上で制作をつづけ、太陽も描くことなく、作品をそれなりに成功作に仕上げられていたかもしれない。しかし、天候の悪化によってアトリエで仕上げることを余儀なくされたため、想像力をはたらかせて、理想的風景を描きたいと考えてしまったのだろう。ファン・ゴッホの腕はまだ、想像で瑞みず々みずしい風景を描けるほどには上達していなかった。





　橋


　しかし、天気が悪くなったばかりに想像で描くことになった失敗作は、ある意味で、ファン・ゴッホの思い描いていた理想をより明確に浮かび上がらせた。南仏の太陽の下、愛に満ちた生活をすることこそ、ファン・ゴッホが思い描いたユートピアだったからである。ごく平凡なモティーフに思える橋も、実はファン・ゴッホの全作品中、二度の期間にだけ頻繁に描かれるモティーフである。一度目はドレンテ時代、そして二度目がこのアルル時代初期である。ふたつの時代に共通するのは、仲間を誘っていたことである。ドレンテ時代、ファン・ゴッホは孤独な田舎生活のなかで、弟テオに一緒に画家になろうとしきりに誘っている。そして、アルル時代初期は、仲間の画家と弟テオまでもアルルに誘っていた時期だった。橋、太陽、恋人、これらはまぎれもなくファン・ゴッホが思い描いていたユートピアへの誘いざないのテーマである。だからこそ、アルルからのベルナール宛ての最初の手紙の冒頭でも、そのスケッチが克明な色の記述とともに描かれたのである。





　だが、皮肉なことに、ファン・ゴッホが描いた《ラングロワの橋》の作品群のなかで、このユートピアの魅力をもっとも瑞々しく伝えるのに成功したのは、おそらく最初に、そしてもっとも自然に描いた作品だった。ファン・ゴッホの筆は、南仏の幻術に捕われ、われを忘れている時ほど、輝きと冴さえを見せるようにすら思われる。





　《種まく人》





　色彩の洪水！　描かれているのは太陽、種まく人、畑。ただそれだけ。あとはただ、色彩の洪水。

　夏の日差しが強くなっていく６月中頃、ファン・ゴッホは念願の《種まく人》に取り組んだ。





「耕された畑、地平線までつづく、紫色の土くれのある畑に、青と白の服を着た種まく人がいる。地平線には短い熟れた麦の畑。これらすべての上には黄色い太陽のある黄色い空。この単純な色調の名を前にして、君は色彩がこの構成画の中でとても重要な役を演じていると感じるだろう。（……）そんなわけでこのエスキース──25号のカンヴァス──にぼくはすっかり悩まされている。真剣に取り組んでこんな恐ろしい絵を描いてよいものかと思ったりするが、それでもやはり、描いてみたい。しかし、描き上げるだけの力が自分にあるだろうかと自問している。（……）種まく人を描くのはぼくのかねてからの念願だが、かねてからの念願がいつも成就するとはかぎらない。だから恐ろしいような気がする。しかし、ミレーとレルミットの後になお残されている仕事……それは色彩で大きなカンヴァスに描かれた種まく人だ」



（629/501）





　自分自身で「恐ろしい絵」と形容する絵。なぜ恐ろしいのだろうか。約一週間後、ファン・ゴッホはこの絵をすっかり描き直したと手紙で伝えている。





「昨日と今日、ぼくは種まく人と取り組んですっかり描きかえた。空は黄色と緑、地面は紫色とオレンジ色だ。このすばらしいモティーフは、このような絵にきっと描かれるべきものだし、いつか、ぼくかほかの誰かが描くことを願っている。問題は依然としてここにある。つまり、ユジェーヌ・ドラクロワの《キリストの舟》とミレーの《種まく人》は描き方がまったく違うということだ。《キリストの舟》──ぼくが言っている絵は円光、つまり後光に紫色と赤と少しシトロン・イエローを伴った青と緑のエスキース（習作）だが──は、色彩それ自体によって象徴的な言葉で話している。

　ミレーの《種まく人》は色彩のない「灰色」だ。イスラエルスの作品同様にね。

　それではたとえば（ちょうど黄と紫の、ドラクロワのアポロンの天井画のように）種まく人を黄と紫を同時に並べて対照させて、色彩で描けるのか、それとも描けないのか。もちろん、描ける。ではやってみよ！　マルタン親おや爺じが言っていたように『傑作を描かないといけないのだ』。

　しかしいざやってみると、モンティチェッリ風の色彩の完全な抽象に陥ってしまい、この泥沼からすっかり抜け出すのははなはだ厄介だ。

　それで、夢遊病者のように放心状態になる。それでも何かいいものが描ければよいのだが」



（634/503）





　二つの記述と完成作をよく比べるとファン・ゴッホがどのように手直しをしたかがおおよそ推測できる。ひとつめの手紙やその四日ほど前の手紙では、空と太陽は黄色、畑は紫色、としか書かれていないが、二つめの手紙には空に緑、地面にオレンジ色が加わる。実際に完成作をよく見ると、空には黄緑色のタッチが、地面にはオレンジ色のタッチがたくさん描き加えられている。また、ファン・ゴッホは「種まく人」の色とポーズも変えた。青い上着と白いズボンをはいていた「種まく人」は、最終的に紫色になり、左足を前に出したポーズから右足を前に出すポーズに変わった。





　以前、デジタル高精細画像で変更前の絵を再現してもらったことがある。加筆されたと思われる緑とオレンジのタッチを消してもらうと、空は真黄色、地面は全面紫色で全体に平板な感じがした。しかし、これに緑とオレンジを加えることで、色の厚みと豊かさがはるかに増した。その色彩効果にファン・ゴッホ自身がどの程度満足したかはともかく、この絵は今日わたしたちが想像する以上に「恐ろしい」、大胆な試みだったに違いない。

　ファン・ゴッホ自身の言葉で言えば、ドラクロワの色彩をもってミレーの《種まく人》を描くという試みである。こう言うだけでは、現代のわたしたちにとってはさほど大胆な試みには思えない。しかし、実際にファン・ゴッホがここでやっていることは、それ以上に大胆な実験だった。それは単に色彩の実験というだけではない。彼の若い頃からの精神的、宗教的理想の詰まった「種まく人」という主題を、現代の造形言語で語り、現代に蘇そ生せいさせるというきわめて野心的な試みをやっているのだ。





　種まく人、掘る人


　ファン・ゴッホの「種まく人」は生身の農民ではない。《ジャガイモを食べる人たち》（第一章）についてすでに述べたように、ファン・ゴッホは農家に生まれたミレーとはちがって、農民たちと生活も、苦楽も、運命も共にしたことはない。そんな経験は一度たりともない。ファン・ゴッホにとって「種まく人」はもともと聖書のキリストのたとえ話に出てくる人物であり、生身の、個性をもつ農民ではない。だからファン・ゴッホが描く「種まく人」は、身振りにも、顔にも表情が乏しい。約五ヶ月後に描かれた《種まく人》（図15）にいたっては、目鼻や口が描かれていておかしくない大きさなのに、まったく顔が描き込まれていない。農作業を見る時、おそらくファン・ゴッホは聖書の文章を思い起こさずにはいられない。たとえば次のような文章を。





「また、イエスは言われた。『神の国は次のようなものである。人が土に種を蒔まいて、夜昼、寝起きしているうちに、種は芽を出して成長するが、どうしてそうなるのか、その人は知らない。土はひとりでに実を結ばせるのであり、まず茎、次に穂、そしてその穂には豊かな実ができる。実が熟すと、早速、鎌を入れる。収穫の時が来たからである』」



（「マルコによる福音書」四章26‐29節）





　ミレーの《種まく人》についてもファン・ゴッホは「ミレーの描く種まく人は種まきをするただの農民ではなく、魂なのだ」と述べている。ファン・ゴッホはただ農民を描くためにこの主題を取りあげているのではない。ファン・ゴッホとミレーの農作業の主題を比較すると、あきらかにミレーの主題の方がバリエーションに富んでいて、現実に農民の細かい仕事や生活をよく知っていることをうかがわせる。たとえば、接ぎ木をする、堆たい肥ひをまく、鶏に餌をやる、羊の毛を刈る、雨宿りをする、麦刈りの途中で休息する、といったテーマは実際に農村で育ってきたミレーならではの主題である。それに対してファン・ゴッホの描く農作業はいくつかの類型、主に聖書に出てくる類型に限られていて、そこには生活感はない。農作業の手を休めて昼寝する農民というような主題は、ミレー作品の模写以外、ファン・ゴッホの作品には見られない。





　ファン・ゴッホは「種まく人」、「掘る人（耕す人）」、「鋤すく人」、「麦刈りをする人」などさまざまな農作業をその生涯でとりあげてきた。モティーフによって描かれる時期に偏りはあるが概ね生涯を通じて描かれてはいる。そのなかでもっとも奇妙な描かれ方をしているのは「掘る人」というモティーフである。このモティーフは「種まく人」よりももっと頻繁に描かれているにもかかわらず、１８８７年と１８８８年の二年間だけ、ぱったりと描かれなくなる。最初期に描いたのがミレーの《掘る人》という版画の模写で、その後もモデルを使い、あるいはモデルなしの点景人物としても描かれる。キリスト教圏で「種まく人」が「神の言葉を種まく人」、あるいは人の誕生を意味し、「麦刈りをする人」が人の死を意味するのと同様、この「掘る人」にも聖書的な意味があった。つまり、アダムとイブが禁断の木の実を食べてしまい、楽園から追放されたあとのアダムの労働と結びつけられていたのである。聖書の「創世記」三章17‐19節からその場面を引用しておこう。





　神はアダムに向かって言われた。

〈お前は女の声に従い

　　取って食べるなと命じた木から食べた。

　お前のゆえに、土は呪われるものとなった。

　お前は、生涯食べ物を得ようと苦しむ。

　お前に対して

　土は茨いばらとあざみを生えいでさせる。

　野の草を食べようとするお前に。

　お前は顔に汗を流してパンを得る。

　土に返るときまで。

　お前がそこから取られた土に。

　塵ちりにすぎないお前は塵に返る〉





　この中の「お前は顔に汗を流してパンを得る」という語句は、当時、ミレーの《掘る人》とも、また他の美術、文学作品における「掘る人」のテーマともしばしば結びつけられている。「掘る人」とはショベルで地面を掘り起こし、土地を耕している農民のことだが、この作業は鋤すきを引く馬を買えない貧しい農民に課せられた、もっとも厳しい労働であった。ブルターニュ地方の農民の歌に次のようなものがあった。「娘よ、夫を選ぶなら、兵隊はいけない。兵隊の命は王様のもの。船乗りもいけない。船乗りの命は海のもの。でも耕す人（掘る人）だけは絶対にいけない。その生は疲労と不幸に満ちているから」

　また、ファン・ゴッホ自身、ハーグ時代に「掘る人」のデッサン（図16）を描いていた時、このテーマを聖書の一句とはっきりと結びつけているのである。「禿はげた頭が黒い地面のうえにかがみ込んでいて、ぼくには何らかの意味、たとえば『お前は顔に汗を流してパンを得る』ということを考えさせるような意味をもつように思えた」（333/277）





　つまり、「掘る人」はファン・ゴッホにとって「楽園追放」のテーマなのである。そして、この意味から、問題の二年間にこのモティーフが描かれない理由も明らかになる。１８８７年から１８８８年というのはパリ時代の後半とアルル時代の前半にあたり、ファン・ゴッホが南仏の、そして「日本の」ユートピアを思い描いていたまさにその時期、ファン・ゴッホのユートピア時代とでも言うべき二年間なのである。この時期彼はまさに「楽園」に生きていたのであって、そこでは「楽園追放」のモティーフを描く必要を感じなかったのだ。

　それに対して、「種まく人」はこの時期にもよく描かれている。「楽園」と「掘る人」は相あい容いれないが、「種まく人」は誕生や生の始まりといったポジティヴな意味をもつので、「楽園」とも共存できたのである。「種まく人」や「掘る人」にせよ、また「麦刈りをする人」にせよ、ファン・ゴッホの描く主題の基本的レパートリーはいずれもキリスト教的意味のあるものが多い。ファン・ゴッホはいわば古くさいキリスト教的主題から脱しきれない画家であった。それでありながらなお、近代画家になろうとしていた。それが、ミレーの主題をドラクロワの色彩で描くという行為だったのである。「種まく人」は彼の中に根強く残っている宗教的情熱と近代画家としての情熱という、二つの相容れないはずの情熱をかろうじてつなぎ得る数少ないテーマのひとつなのだ。そして、そのテーマで新しい絵画を描くには、われわれが想像する以上に、ファン・ゴッホに大きな勇気が必要になった。大きな恐れを感じさせた。そのような勇気と野心と恐れが創りだしたのが、この光と色彩の洪水の中を泳ぐように歩く「種まく人」である。

　この絵の主役は明らかに「太陽」である。「種まく人」は脇役にすぎない。しかし、この脇役は、画家になる前の過去のファン・ゴッホと、これから生まれようとする未来の画家ファン・ゴッホとを、ひとりの人間としてつなぎ止める重要な役を演じている。





　《ひまわり》





　それまで、全面が黄色の絵などあっただろうか……。

　ファン・ゴッホの《ひまわり》は、絵として上手うまいとか、美しいとか、そんな基準とは関係なく、何か特別に大きなオーラを発している。他のどの画家の絵とも異なり、ファン・ゴッホの他のどの作品とも異なる。役者にたとえれば、特に演技がうまいわけでも、二枚目でもないのに、主役をはれる何か、余人をもって代えがたい何かをもっている。だからこそ、《モナ・リザ》などと並んで、世界でもっとも有名な絵画のひとつになったのだろう。では、その「何か」とはいったい何なのだろうか。

　そもそも、なぜ、ファン・ゴッホはひまわりを描いたのだろうか。また、彼は描きあげた《ひまわり》で「黄色い家」を装飾しようと考えたが、それはなぜなのだろうか。ファン・ゴッホはそれほど多くひまわりを描いたわけではない。また、それほど特別扱いした絵でもない。なのになぜ、ひまわりは「ファン・ゴッホの花」になったのだろうか。





　向日性


　北米原産のひまわりは、16世紀にスペインに持ち込まれ、その後17世紀になってから西欧諸国にも広がったという。「向日葵ひまわり」という、日本語での漢字表記は、この花が太陽に顔を向ける「向日性」をもつ花だと考えられたことに由来するが、実際には、ひまわりの花には向日性はない。ひまわりはその生長期には葉を太陽に向ける。日没時に葉を西に向け、夜の間にまた葉を東に向ける。しかし、つぼみが付き、開花する頃には、西に首を振る動きが鈍る。一方、夜の間に東を向く動きはなぜか鈍らないため、花はずっと東を向いていることになるという。にもかかわらず、日本語で「向日葵」と書き、フランス語でトゥルヌソル（tournesol, tourner＝回る、sol＝太陽）と呼ばれるようになったのは、この大きな円形の花がいかにも太陽に似ていて、また、いかにも太陽に顔を向けつづけるように見えたからだろうか。

　ともあれ、ここで重要なのは「ひまわりが向日性をもつと信じられていた」という事実である。そして、その独特の容よう貌ぼうと「向日性」のゆえに、ひまわりにはさまざまな意味が与えられた。現代の日本では知られていない、しかし、ファン・ゴッホを含め19世紀の多くの西洋人は知っていた意味がひまわりにはある。





　象徴的意味、エンブレマータ


　１６２５年にオランダ人ザハリアス・ヘインスが出版した『エンブレマータ』（象徴辞典）の一ページに、ひまわりと太陽を描いたものがある（図17）。ページの上部には「キリストを真似る」という意味のラテン語、その下には太陽に顔を向けているひまわりの花、その下には、「わたしは世の光である。わたしに従う者は暗闇の中を歩かず、命の光を持つ」という、「ヨハネによる福音書」八章12節の文章が、オランダ語とフランス語で印刷されている。このページが伝えようとしているのは、「ひまわりが太陽に顔を向けつづけるように、信心深い人はずっとキリストに、あるいは神に関心を向けつづける」というメッセージ。つまり、ここではひまわりは「信仰心」の象徴として使われているのである。





　また、オランダ生まれの画家で、ルーベンスの師匠としても知られるオットー・ファン・フェーンが１６０８年に出版した『アモルの寓ぐう意い集』にも、太陽とひまわりが描かれたページがある（図18）。『アモルの寓意集』は全編にわたってアモル（キューピッド）が愛の本質を伝える寓意集で、絵と、その解説で成り立っている。ひまわりのページではキューピッドは右手でひまわりを、左手で太陽を指さしている。ここで伝えようとしているのは「ひまわりが太陽に顔を向けつづけるように、愛する者は愛の対象にずっと顔を向けつづける」というメッセージである。つまり、ここではひまわりは「愛」の象徴として用いられている。





「信仰心」にせよ「愛」にせよ、その意味はひまわりの「向日性」とのアナロジーから紡ぎだされた。16、17世紀に広がり始めたこれらの象徴的意味は、しだいに定着し、19世紀の絵画にもこれらの意味は生きている。ファン・ゴッホは、自身の描いた《ひまわり》について、手紙でその象徴的意味にふれてはいない。しかし、牧師の息子であったファン・ゴッホが、ひまわりにこのような意味が与えられていることを知らなかったとは考えにくい。





　黄色い家


　西洋の図像的伝統のなかで、ひまわりが「信仰心」や「愛」の象徴として使われていたことがわかれば、ファン・ゴッホがなぜ「黄色い家」を《ひまわり》で装飾しようとしたかもよく理解できる。ファン・ゴッホにとって「黄色い家」は南仏の太陽を崇拝する画家たちが集まり、兄弟愛に満ちた共同生活を送る、疑似宗教的な共同体であった。このことは、ファン・ゴッホが弟テオに、もし君が加われば、「君は最初の画商＝使徒になる」（694/544）と書いていることからもわかる。このような性格を与えられていた「黄色い家」に、「信仰心」と「愛」の象徴であるひまわりほどふさわしい花はない。ファン・ゴッホがこの花を集め、花瓶に挿し、描き始めた時、ひまわりの伝統的意味をどの程度意識していたかはわからない。しかし、たとえ無意識に、なんとなくこの花を選んでいたとしても、ファン・ゴッホにとってひまわりはただの黄色い花ではなく、「信仰心」や「愛」といった伝統的意味と結びついた花だったはずである。

　のちに《揺りかごをゆらす女》を描いた時、ファン・ゴッホは、この絵の両側にひまわりの絵を配して、三枚一組で展示することを指示している。あとで述べるように、《揺りかごをゆらす女》は聖母のイメージと重なる絵であり、三枚一組（トリプティック）は祭壇画の形式である。このことからも、ファン・ゴッホにとってひまわりは聖なるイメージと結びついていたことがわかる。





　潜在的意味


　ファン・ゴッホの同時代の人々にも、すこし後の人々にも、この花の含意や、ファン・ゴッホにとってこの花がもった意味は、伝わっていたのだろう。だからこそ、この画家の没後二年経った１８９２年、アムステルダムで回顧展が開かれた時、オランダの画家リシャルト・ロラント＝ホルストは展覧会カタログの表紙デザインにひまわりを使うことにしたのだろう（図19）。ここで、ロラント＝ホルストは、萎しおれゆくひまわりに円光を描き込み、下にはVincentの文字、地平線には沈みゆく太陽を描き込んでいる。ファン・ゴッホの死が萎れるひまわりによって表され、その円光はファン・ゴッホを聖人あるいは殉教者と見なしている。太陽がその姿を隠すと、フィンセントも死ぬという表現になっていることは明らかだろう。ロラント＝ホルストはファン・ゴッホが南仏の太陽を崇拝していたことをおそらく知っていて、太陽を見失おうとしているファン・ゴッホが殉教者のように死ぬというデザインを採用したのである。





　このようなデザイン自体は、実はけっして斬ざん新しんなものではなく、二百五十年以上も前に似たような先例がある。17世紀初頭にイェレミアス・ドレクセルが刊行したエンブレマータ『ヘリオトロピウム　あるいは人間の意思と神の意思の相似』の一ページ、「妨げ」（Impedimenta）は、萎れるひまわりと顔を半分隠した太陽の組み合わせという点で、まさにロラント＝ホルストのデザインの原型とでもいうべきものだろう（図20）。ロラント＝ホルストがこのエンブレマータを見ていたかどうかはわからない。しかし、ここでとりあえず大切なのは、ひまわりの向日性に由来するさまざまな象徴が、ヨーロッパ美術の中にかなり根強く生きていて、少なくとも19世紀においては、絵を描く者、絵を見る者の記憶の中に刻印されていたということである。





　ファン・ゴッホは《ひまわり》を見る者に、この花のもつ伝統的、象徴的意味を読むことは要求してはいない。しかし、描く者にも、見る者にもかつては共有されていた暗黙の意味、潜在的意味があって、おそらくそれがこの絵を特別なものにしてきた一因なのだ。そして、ひとたびその特別な地位を得た絵は、もともと知られていた象徴的意味が忘れられていっても、今度はその作者であるファン・ゴッホという画家を象徴する花として一人歩きを始めたのである。

「種まく人」同様、「ひまわり」は古い主題である。その古くさいはずの主題をファン・ゴッホはこの上なく新しい描き方で描こうとした。つまり、全面黄色というとんでもなく現代的な描き方で。ファン・ゴッホは伝統的な主題を近代の主題へといわば接ぎ木しているのである。《種まく人》の主役は太陽であり、黄色い空だった。《ひまわり》の主題は太陽に顔を向けるひまわりと、全面の黄色である。《開かれた聖書のある静物》（第一章）に「闇の中の光」として現れた小さな黄色は、いまやファン・ゴッホの絵画全面に溢あふれ出した。黄色だけの世界の登場である。そこには教会の暗がりや、父親の世界は微み塵じんもない。ただ、理想の世界、「黄色い家」というユートピアが広がっているだけ。ファン・ゴッホをもっともファン・ゴッホらしく輝かせたのは、このまっ黄色の幻想にほかならない。だからこそ、《ひまわり》はファン・ゴッホの花と呼ぶにふさわしいのだろう。





　《夜のカフェ》





　赤と緑が強烈なコントラストと微妙なニュアンスを醸し出す不穏な世界。奥に向かって収しゆう斂れんするような不安な空間。場所はアルルのカフェ。奥の柱時計は夜半過ぎを指している。黄色く輝くランプ。ビリヤード台の横には、白服に身を包み、薄緑色の髪をした亡霊のような男が立ちつくし、テーブルに酔っぱらいが突っ伏している。

　しかし、この不穏な絵画は、アルルのおやじたちの、なんともコミカルなやりとりのあとに描かれた。





　カフェ・ド・ラ・ガール


　１８８８年９月８日にテオ宛てに書かれた手紙にその経緯が記されている。





「親切な手紙と同封の三百フランをありがとう。何週間か気苦労がつづいたあとで、今度はずっと楽しい思いをした。苦あれば楽あり、楽あれば苦ありということだろう。というのは、家主への払いに困って、いつもやっつけられているぼくは、ここはひとつ楽しくやってやろうと腹をくくったのだ。根は悪い男ではないこの家主に、ぼくはさんざん因縁をつけてやった。そしてぼくに無駄金を使わせた分の埋め合わせとして、金を返す代わりにこのぼろ家をぼくに描かせろと言ってやったのだ。結局、家主をはじめ、以前描いた郵便配達員、夜遊びの客たち、ぼく自身までが大喜びで、三晩徹夜して、昼間眠って、描きあげた。ぼくは昼間よりは夜の方が生き生きとして、色彩も豊かだと思うことがよくある。

　家主に払った金を絵で取り戻すことは、もうどうでもよい。というのも、この絵はこれまでの絵の中でいちばん醜いもののひとつだからだ。いくぶん違いはあるが、《ジャガイモを食べる人たち》に匹敵する。ぼくは人間の恐ろしい情念を赤と緑で表現しようとした」



（676/533）





　ここに出てくる家主とはジョゼフ・ミシェル・ジヌー、アルルのカフェ・ド・ラ・ガールの持ち主で、ファン・ゴッホは当時まだこのジヌーから部屋を借りて住んでいた。郵便配達員とはジョゼフ・ルーラン。ジヌーもルーランもファン・ゴッホの友人となり、家族も含め肖像画にその姿を残している。オランダからやってきた風変わりな画家と、家主のおやじが家賃や家の不具合でもめた末、ファン・ゴッホが払いすぎた金を返金してもらう代わりに描かせてもらうことになったのが、この絵なのだという。本当にファン・ゴッホが金を払いすぎたのかどうかも定かではなく、返金しなくていいから代わりに絵を描かせろというのも、筋の通ったような、通らないような話だが、ともあれ、画家本人と飲み客も含め、アルルの男どもはこの提案に大喜びしたらしい。こうして、カフェ・ド・ラ・ガールでは、三晩にわたって風変わりな画家がイーゼルを立て、飲み客たちを尻しり目めに絵を描きつづけることになった。陽気なおやじたちや、酔いつぶれてくだをまく酔っぱらいたちの中、酒と煙草と油彩絵具のぷんぷん臭う中で、歴史に残る傑作は描かれていった。

　さきほどの手紙の翌日に書かれたと思われる、テオへの手紙にはこう記されている。





「ぼくは《夜のカフェ》の絵のなかで、カフェという所が、人が身を持ち崩し、おかしくなり、罪を犯しかねない場所だということを表現しようとした。要するに、やわらかいバラ色と鮮血のような赤、ぶどうの搾りかすのような赤、黄緑と硬い感じの青緑と対照をなすルイ15世風のやわらかな緑とヴェロネーゼ・グリーン。これらすべてを白っぽい硫黄色の地獄の業火のような雰囲気の中におき、居酒屋の闇の力のようなものを表現しようとした。ただし、日本人の陽気さとタルタランの人のよさでこれらを包んでね」



（677/534）





　多様な緑と、多様な赤との組み合わせでできあがった絵は、「人間の恐ろしい情念」、「人が身を持ち崩し、おかしくなり、罪を犯しかねない場所だということ」を表現しようとしたものであり、「居酒屋の闇の力のようなもの」を表現しようとしたものだという。





　居酒屋の闇の力


「居酒屋の闇の力」（la puissance des ténèbres d'un assommoir）という言葉には意外な、そして豊かな含意がある。「居酒屋」（assommoir）という語は、ゾラの有名な小説のタイトルと同じである。ゾラはファン・ゴッホが愛読していた作家であり、もちろん『居酒屋』も読んでいた。手紙を受け取ったテオも、この言葉がゾラの小説のタイトルであることに気づいただろう。また、「闇の力」もある文学作品のタイトルと同じなのである。ゾラの『居酒屋』ほど有名ではないが、「闇の力」はトルストイの戯曲のフランス語訳のタイトルである。このフランス語訳はファン・ゴッホのパリ時代にあたる１８８７年に出版され、さらに、翌１８８８年２月10日と17日、ファン・ゴッホがアルルに発たつすこし前に、パリのテアトル・リーブル（自由劇場）で上演されていた。ファン・ゴッホがこの上演を見たかどうかはわかっていないが、彼はシニャックらとともにこのテアトル・リーブルに作品を展示していたこともある。当時のフランスではロシア文学が流行していて、ファン・ゴッホもトルストイやドストエフスキーの作品をフランス語で読んでいたことがわかっている。また、ファン・ゴッホは後の手紙にテアトル・リーブルがロシアもので成功したことも記している。

　このような状況を考えれば、ファン・ゴッホとテオが、このトルストイの戯曲の上演を一緒に見ていた可能性すらある。もしテオがこの戯曲または上演を知っていれば、手紙の記述を読んだテオは「居酒屋の闇の力」という言葉から、その豊かな文学的連想を読み取っていただろう。『居酒屋』で主人公ジェルヴェーズの堕落を象徴する場は「コロンブ親おや爺じの居酒屋」であり、『闇の力』で、どろどろした親族間の争いの中で殺人に手を染めていくニキータが酔いつぶれるのは、やはり居酒屋なのだ。

　ファン・ゴッホがこの絵を描いた時、彼の脳裏にはおそらくこれらの居酒屋のイメージがあったのだろう。そして、「居酒屋の闇の力」という言葉を読んだテオも、「人が身を持ち崩し、おかしくなり、罪を犯しかねない場所」がどのような場所なのかを、その文学的連想と記憶から、鮮明な具体的イメージとして思い描けたにちがいない。





　しかし、ファン・ゴッホ自身が《ジャガイモを食べる人たち》に匹敵する、もっとも醜い絵画のひとつと言い、「硫黄色の地獄の業火のような雰囲気」のなかにある「居酒屋の闇の力のようなもの」を表現したという絵は、あまり悲壮感を感じさせない。この頃、ファン・ゴッホは、おそらく人生の中でもっとも希望に満ちて過ごしていた。当時まだアトリエとして使っていただけの「黄色い家」に、まもなく引っ越すことになり、翌月にはそこにゴーガンも来ることになる。芸術家の共同体が実現しそうな時期のことであり、アルルにも人のよい友人ができつつあった。だからこそ、「醜い」絵画を記述したあとにも、「日本人の陽気さとタルタランの人のよさでこれらを包んでね」と付け加えたのだろう。





　《夜のカフェ・テラス》





　アルルは夜もファン・ゴッホを魅了した。

　南仏に来てひと月あまりたった４月初め、夏を待たずして、ファン・ゴッホは「ここには、とても美しい夜がある」（594/474）と記している。その半年後の１８８８年９月30日、アルルの地元誌『ロンム・ド・ブロンズ』の「美術・音楽欄」にこんな短い記事が載った。「印象派の画家ヴァンサン氏は、夜、ガス灯の明かりをたよりに、市内の広場で絵を描いているとのことです」。事実、この少し前に、ファン・ゴッホはアルルのプラス・デュ・フォロム（フォロム広場）で夜、イーゼルを立てて、カフェ・テラスの絵を描いていた。その頃に妹ウィルに宛てた手紙には次のように記されている。





「このごろぼくは星空をどうしても描きたいと思っている。ぼくは夜の方が昼よりもずっと色彩が豊かだと思うことがよくある。もっとも強い紫や青や緑で彩られている。注意深く見れば、星にはレモン色のものもあれば、燃えるようなバラ色や、緑、忘れな草の青色のものもある。星空を描くのに、青黒い色のうえに小さな白い点々をおいただけでは不十分なことなど言うまでもない。（……）

　この手紙を書きかけてからもう二、三日になるが、さてつづきを書こう。実を言うと、この数日、夜のカフェの外側を描いた新しい絵にかかりきっていて、手紙が中断していたのだ。テラスには酒を飲んでいる小さな人物群がいる。大きな黄色いランプがテラスやショーウィンドウや歩道を照らし、通りの舗石にも光を投げかけて、紫とバラ色の色調に見えている。星のまたたく青い空の下、長くのびた通りの家々の切妻は濃い青か紫で、緑色の木が立っている。黒のない夜の絵、美しい青と紫と緑だけで描いたものだ。そしてこのような周囲の中で、光に照らされた広場は薄い硫黄色と緑がかったレモン・イエローを帯びている。夜を現場で描くのはとても楽しい。かつてはスケッチをもとに昼間、デッサンをしたり油彩で描いたりするのが普通だったが、ぼくは直接現場で描くのが気に入っている。もちろん、暗がりの中では、色調をはっきりと見分けられないから、青を緑と間違えたり、青系のライラック色（薄紫）をバラ色系のライラック色と間違えたりすることはある。しかし、これは、弱く青ざめた白っぽい光で黒い夜景を描く従来の因襲から脱する唯一の方法だ……」



（678/W07）





　ファン・ゴッホがイーゼルを据えたのは、アルルの中心部にあるプラス・デュ・フォロム（フォロム広場）。描いているのは、グラン・カフェ・デュ・フォロムのテラス。ガス灯の下で、色を見分けるのに苦労しながらファン・ゴッホはこの絵を描いていたのだろう。手紙に記されている通り、ファン・ゴッホは夜の色彩に魅了されながら、黒は塗らずに絵を仕上げている。画面は中央で縦に二つに分けられ、黄色系と青色系の対比が美しい。それは《夜のカフェ》の不安をかき立てる赤と緑の組み合わせとは違い、穏やかで心地よい対比だ。しかし、どちらのカフェの絵も、単純に「赤・緑」「黄・紫」という補色系の対比だけで絵が成り立っているわけではなく、豊かで微妙な色彩にあふれている。《夜のカフェ》に多様な赤と緑があったように、《夜のカフェ・テラス》にも多様な黄色・橙だいだい色いろ、多様な青、紫、緑がある。舗石の紫、テーブルの薄緑、星にもさまざまな色が使われている。夜をこんなにカラフルに描いた画家が、それまでほかにいただろうか。





　アルルの星空


　この頃、《夜のカフェ・テラス》以外にもファン・ゴッホは星空を描いている。《ユジェーヌ・ボックの肖像》（図21）や《ローヌ河畔の星空》（図22）である。《ユジェーヌ・ボックの肖像》は《夜のカフェ・テラス》が描かれる前月の８月にベルギーの画家をモデルに描かれた。





「ぼくはある友人の芸術家の肖像を描いてみたい。彼は大きな夢を抱き、うぐいすが歌うように仕事をする。それが彼の天性だから。この男の髪はブロンドにする。ぼくは絵の中にこの男に対する評価を、ぼくの愛を込めたい。まずはじめにありのままに、できるだけ忠実に描くだろう。

　しかし、絵はそのままでは終わらない。仕上げにあたって、ぼくは気ままな色彩画家になる。ぼくは髪の毛のブロンドを強調し、ついにはオレンジのトーン、クロームと薄いレモン・イエローにまで達するだろう。

　顔のうしろには、みすぼらしいアパルトマンのつまらぬ壁の代わりに、無限を描く。出せるだけ豊かな強烈な青の単純な空を描き、その単純な配色によって、豊かな青の背景のうえに明るいブロンドの頭が、深い紺こん碧ぺきのなかに光る星のように神秘的な効果を獲得する」



（663/520）





　のちにファン・ゴッホ自身によって「詩人の肖像」と呼ばれることになる絵は、このようにして描かれた。そして、その中で星空は重要な意味を与えられている。さらに《ローヌ河畔の星空》では、街灯がローヌ河に反射する光景に二人の男女を描き、その上いっぱいに星空を描く。空の中央には大熊座、つまり北斗七星が輝いている。この風景を描くためにファン・ゴッホは南西方向に蛇行するローヌ河の東岸に立ち、南西方向を向いている。北斗七星は当然北方向にしか見えないから、ファン・ゴッホはこの光景には見えるはずのない北斗七星をわざわざ描き込んでいることになる。この点については、南西方向に見えた「秋の大びしゃく」をファン・ゴッホは描いたのではないかという天文学者の指摘もある。実際、ファン・ゴッホの記述する星の明るさや色もこの「秋の大びしゃく」に近いが、ファン・ゴッホは手紙にはっきりと「大熊座」（北斗七星）と書いているので、あるいは「秋の大びしゃく」を見て北斗七星と勘違いしたという可能性もある。ともあれファン・ゴッホが「大熊座」を描きこんだ意図はまだわかっていない。しかし、《ユジェーヌ・ボックの肖像》の背景といい、《ローヌ河畔の星空》の星空といい、ファン・ゴッホが星空に特別な意味を与え始めているのはまちがいない。アルルで「背景」として描かれ始めた星空はやがて、サン＝レミ時代の《星月夜》（第四章）で「主役」としてその圧倒的な存在感を見せることになる。





　たしかに南仏の夜は美しい。夜の色彩の美しさにファン・ゴッホの眼を開かせたのはアルルの夜だったにちがいない。いや、アルルの夜にこれほど豊かな色彩と色調を与えたのは、ほかならぬファン・ゴッホであったと言うべきだろうか。ともあれ今日、アルルの夜景を見に行く人々の多くは、そこにファン・ゴッホが与えた色彩を見るため、プラス・デュ・フォロムに、ローヌ河畔に立つのである。





　《坊主ボンズとしての自画像》





「ぼくはまた習作として自分自身の肖像画を描いた。そこではぼくは日本人のように見える」



（678/W07）





　剃そりあげたような丸い頭、つり上がった目。たしかにこの自画像の中でファン・ゴッホは日本人のような顔立ちをしている。１８８８年９月、ゴーガンの到着を翌月にひかえた時期に、ファン・ゴッホはゴーガンのために一枚の自画像を描き、ゴーガンへの手紙にこう書き送っている。「しかし、ぼくもまた自分の個性を強調して、永遠なる仏ぶつ陀だの素朴な崇拝者である坊主ボンズの性格というものを描き出そうとした」（695/553a）。目は意図的に「日本人風につり上げた」（697/545）　という。





　想像上の日本人


　ファン・ゴッホが南仏と日本を重ねあわせていたことについてはすでに述べてきた。しかし、この自画像でファン・ゴッホはなぜ、自分をほかならぬ日本の僧そう侶りよの顔で描いたりしたのだろうか。彼は少し前にピエール・ロチの異国趣味小説『お菊さん』を夢中になって読んでいて、日本を舞台にしたこの挿し絵入り小説でさまざまな日本人の登場人物に親しんでいる。その中に僧侶も登場するが、僧侶は主要人物ではなく、他に日本人画家の「ムッシュ・シュクル」（シュクル＝砂糖。砂糖〔佐藤？〕さん）をはじめ、より重要な人物はたくさんいる。なのに、なぜ僧侶を選んだのだろうか。

　その理由は次の手紙に隠されている。これらの手紙は当時ファン・ゴッホが抱いていた日本人のイメージをよく伝えてくれる。





「日本美術を研究すると、明らかに賢く哲学的で、知的な人物に出会う。その人物は何をして時を過ごしているのだろうか。地球と月の距離を研究しているのか。違う。ビスマルクの政策を研究しているのか。いや、違う。その人はただ一本の草の芽を研究している。しかし、この草の芽がやがて彼にありとあらゆる植物を、ついで四季を、自然の大景観を、最後に動物、そして人物を描かせるようになる。彼はそのようにして生涯を過ごすが、人生はそれらすべてを描きつくすにはあまりに短い。

　どうかね。まるで自分自身が花であるかのように自然の中に生きる。こんなに単純な日本人が教えてくれるものこそ、真の宗教ではないだろうか」



（686/542）





「日本の芸術家たちがお互いに作品を交換していたことにぼくはずいぶん前から心を打たれてきた。これは彼らが愛し合い、支え合い、彼らの間はある種の調和が支配していたということの証拠だ。もちろん彼らはまさしく兄弟のような自然な生活をしていたのであり、陰謀の中で生きたのではない。その点、彼らを見習えば、それだけぼくらもよくなるのだ。また、これらの日本人はわずかな金しか稼がず、素朴な労働者として生活をしていたようだ」



（696/B18）





　ファン・ゴッホの想像する「日本人画家」とは、知的で、自然に没入して生きる素朴な「自然人」であり、兄弟愛に満ちた共同生活をし、そして、「真の宗教」を信仰する人たちだという。実のところ、それはファン・ゴッホ自身の理想にほかならない。ファン・ゴッホは「日本人」という核のまわりに、自分自身のすべての理想を結晶化させて自分の理想的人物像を作り出しているのである。彼の芸術的、社会的、宗教的理想はすべて日本人のものになっていく。そして、ファン・ゴッホが現実世界でどこにも置き場を見つけられなかった宗教的情熱のやり場を、「真の宗教」が息づく虚構の国「日本」にようやく見つけ出すのだ。彼がほかならぬ僧侶の顔で自画像を描いた理由はここにある。

　ファン・ゴッホは日本人にならって、アルルに「黄色い家」という共同体、芸術家のユートピアを作ろうと考えた。十二脚も椅子を買い込み、ゴーガンが来ることが分かってからは、彼のために部屋をひまわりの絵で装飾した。ひまわりに宗教的な意味があったことはすでに《ひまわり》の項で述べたが、十二脚の椅子というのも、おそらく同様に宗教的意味があった。当時、ファン・ゴッホの「黄色い家」に参加する見込みがあったのはゴーガンただ一人。十二脚もの椅子はまったく必要ない。なぜそんなにたくさん、しかも十一でも十三でもなく十二脚買ったのか。この数から連想できるのは、言うまでもなくキリストの十二人の使徒たちである。ファン・ゴッホがテオに、もし「黄色い家」に参加することになれば、「君は最初の画商＝使徒になる」（694/544）と書いていることからも、椅子は十二人の使徒を意識して買われたと思われる。つまり、「黄色い家」とは、南仏の太陽を神のように崇拝し、修道僧たちのように共同生活する、そのような疑似宗教的共同体だったのである。





　レ・ミゼラブル


《坊主ボンズとしての自画像》は、「レ・ミゼラブル」という書き込みのあるゴーガンの自画像と交換された作品である。ファン・ゴッホはまず「日本人にならって」作品の交換をしようと仲間たちに提案する。ゴーガンやベルナール、シャルル・ラヴァルらがこの提案に応じるが、ゴーガンがファン・ゴッホに送った《自画像、レ・ミゼラブル》（図23）はファン・ゴッホに強い印象を与えることになった。ゴーガンはこの作品を送るとともに、手紙にこう記している。





「高貴さと心の優しさを備え、ジャン・ヴァルジャンのように貧しい身なりをした強きよう靭じんな悪漢の顔（……）そして社会に圧迫され、無法者扱いされながらも、愛と力を備えたこのジャン・ヴァルジャンこそは、今日の印象派画家のイメージではないだろうか。そして、彼を私の顔立ちで描くことによって、社会の哀れな犠牲者としての、私の個人的イメージとわれわれ皆の肖像画ができる」





　この自画像の右下には「レ・ミゼラブル　友人ヴァンサンへ　Ｐ・ゴーガン　88」と書き込まれており、背景にはベルナールの横顔が描かれている。『レ・ミゼラブル』は言うまでもなくヴィクトル・ユゴーの小説のタイトルであり、ジャン・ヴァルジャンはその主人公である。ゴーガンはこの小説とジャン・ヴァルジャンの名に託して、自分自身とその（印象派の）仲間たちがおかれていた苦しい社会的、経済的立場を言い表している。ゴーガンの手紙に心を動かされたファン・ゴッホは、すでに描いていた自画像について弟テオにこう書き送っている。





「今、ゴーガンの自画像とベルナールの自画像を受け取ったところだ。（……）これはゴーガンも手紙に書いていることだが、この絵はぼくには何よりも囚人を描いたものだという印象を与える。陽気さの気配すらない。（……）ゴーガンへの返事にぼくはこう書いた。肖像画の中で自分の個性を拡大することがぼくにも許されるなら、ぼくは自分の肖像のなかに、自分だけでなく印象主義者一般を表現しようと試みた。だから、ぼくはこの肖像画を永遠なる仏陀の素朴な崇拝者である坊主ボンズの像だと考えていると。ゴーガンのコンセプトとぼくのものを比べてみると、ぼくのは同じように重い意味をもつが、ゴーガンのほど絶望的じゃない」



（697/545）





　ゴーガンが自分とその仲間たちをジャン・ヴァルジャンにたとえた自画像に対し、ファン・ゴッホは自分とその仲間を日本の僧そう侶りよにたとえて描いてみせた。そしてこの自画像の上部に「友人ゴーガンへ　フィンセント」と書き込んで、絵をゴーガンに送ったのである。それは悲観的なゴーガンの自画像に対する、ファン・ゴッホの楽観的な返答であり、アルルの「黄色い家」への招待状でもあった。つまり、アルルに来て、日本人のように生きようという、ユートピアへの誘いだったのである。





　「耳切り事件」


　１８８８年10月23日の早朝５時頃、ゴーガンはアルル駅に降り立った。住んでいたブルターニュ地方のポン＝タヴェンからパリ経由でほとんど二日がかりの旅行であった。ファン・ゴッホはどんな顔でゴーガンを迎え、ユートピアの住人が二人になった喜びをどのように表現していたのだろうか。

　しかし、ゴーガンがアルルに来たのは、ファン・ゴッホの理想を共有していたからではない。アルルに合流すればテオの資金援助が受けられたからである。金に困っていたゴーガンはアルルに行くことで当面の生活費、制作費を確保し、そのうち絵が売れるようになれば、南太平洋に行こうと考えていたのである。ともあれ、二人の共同生活のなかで、ファン・ゴッホは尊敬するゴーガンから少なからぬ影響を受けた。しかし、個性の強い二人、理想を共有しない二人が、長く共同生活することは難しかった。芸術上の意見の不一致などが重なり、わずか二ヶ月後に悲劇は起こる。いわゆる「耳切り事件」である。

　12月23日の夜、ファン・ゴッホは自分の左耳を剃刀かみそりで切り取って、その肉片をラシェルという娼しよう婦ふのもとに持っていき「これを大事に持っておいてくれ」と手渡したという。翌朝、ファン・ゴッホは自宅で瀕ひん死しの状態でいるところを警察に発見された。この事件については異説もあり、真相は定かではないが精神疾患の発作を起こしていたのはまちがいない。発作の引き金になったのは、ゴーガンがアルルを去る意思を伝えたことか、あるいは、テオの結婚の知らせであったかもしれない。なぜこんなことをしたのかと医師に問われた時、ファン・ゴッホ自身は「それは個人的な事情だから」と言って明言を避けたという。身の危険を感じたゴーガンは事件後すぐにアルルを去っている。





　傷跡、夢の終わり


　今日、《坊主ボンズとしての自画像》には破損し修復した箇所が見える。それはちょうど絵の上の部分、「友人ゴーガンへ　フィンセント」と書き込まれていた部分と首の後ろである。１９８４年にフォッグ美術館が行った調査から、これらの部分は溶剤とパレットナイフのような鋭利なものを使って意図的に搔かき削られたもので、修復はおそらくゴーガンによってなされたのではないかと考えられている。重要な献辞の部分を誰が削ったのかについて、確実なことはわかっていない。しかし、当時の状況から考えれば、共同生活の破は綻たんを察知したファン・ゴッホが、発作的に、自分たちの友情の印であり、南仏のユートピアの象徴でもあったこの自画像をみずからの手で搔き削ったのだろう。日本の「坊主ボンズ」の顔をした自画像は、ファン・ゴッホ生涯一度の夢とその破綻を、その痛々しい傷跡とともに私たちに伝えることになった。





　《包帯をした自画像》





　自分で傷つけた自分の姿を描く。その時、画家は何を考えていたのだろうか。

「耳切り事件」でみずから傷つけた耳の包帯も痛々しい自画像。最初の発作がおさまった後の１８８９年１月に描かれた。自画像を描くことは、自分を、自分の内面を見つめるいとなみだとよく言われる。ほんとうにそうだろうか。また、自画像は変身の場、つまり、さまざまな「自己」を演じつづける場だという見方もある。たしかに、ファン・ゴッホは自画像でさまざまな自分を演じている。ある時は労働者か農民のような身なりで、ある時はパリのブルジョワのような身なりで、またある時は日本の僧そう侶りよの風ふう貌ぼうで自分を描いている。この《包帯をした自画像》はファン・ゴッホのすべての自画像の中で、身につけているものがもっとも多い。分厚い上着、帽子、包帯、パイプ。これ以上身につけるものがないぐらい完全武装している。「武装」が必要だったとすれば、何かから自分を守らねばならなかったのだろうか。





　眼の高さを境に分かれる背景のオレンジと赤。オレンジには濃紺の帽子、赤には緑の上着が組み合わされる。補色系のいたって単純な色面分割。オレンジ系と青は《夜のカフェ・テラス》ほかアルル時代の作品でしばしば使った組み合わせ。アルル時代の作品を見る限り、「ふたつの補色の結婚によってふたりの恋人たちの愛を表現すること」とファン・ゴッホが言った時、彼の念頭にあった補色はおそらくこの黄色・オレンジ系と紫・青系の組み合わせだっただろう。赤と緑は《夜のカフェ》で「人間の恐ろしい情念」を表現するために使った組み合わせ。この絵ではこの相あい容いれない二組の補色が真っ向からぶつかりあっている。衝突は眼の高さで起こり、その眼の中には緑、赤、オレンジ、青すべてが混在している。

　最初の発作がファン・ゴッホに与えたショックは計り知れない。発作中はほとんど意識を失っていて、自分がやったことを後で知らされる。「人間の恐ろしい情念」はもはや自分の作品上の表現でも、文学作品中のテーマでもなく、自身の現実の問題としてファン・ゴッホにふりかかってきた。ファン・ゴッホはこの自画像でそのことを表そうとしているのだろうか。この絵を描いた時のファン・ゴッホの心情は不安と挫ざ折せつ感に満ちたものだっただろう。そのことは十分に察することができる。そしてその心情はこの自画像に反映していておかしくはない。しかし、それだけではこの自画像は描けない。

　確かなことは、発作が起こっていない時のファン・ゴッホの頭脳は明めい晰せききわまりないということだ。二組の補色を眼の高さでぶつからせる。その効果のために、この帽子と服は選ばれたのではないかと思わせるほど、この作品は冷静な計算に満ちている。単純に色彩を衝突させるだけだと表現が瘦やせる。それを避けるために白い包帯が描かれ、パイプが描かれ、円弧を描くようにたちのぼる煙が描かれる。

　かつて、ハーグで同どう棲せいしたシーンが自分の芸術を高めるための契機になったように、ファン・ゴッホは自分自身にふりかかった不幸をも芸術のために冷静に利用しているようにすら見える。身を削ってでも優れた作品を残すという強い意志。その意志が創りだした傑作のひとつといってよいだろうか。





　《浮世絵のある自画像》再考


《包帯をした自画像》に似た作品に《浮世絵のある自画像》（図24）がある。これらの作品はその包帯姿からもわかるように同時期の作品と見られてきた。いや、正確に言えば、《浮世絵のある自画像》の方は、一応ファン・ゴッホの作品とされながらも、ずっと贋がん作さくの疑いがかけられてきた作品である。贋作だという確実な資料的根拠が示されたことはなく、そのような論文が発表されたこともないが、一部の有力な専門家の間ではかなり長い間、贋作視されつづけ、口頭ではあからさまに「贋作」と言われてきた。その影響で、画集に掲載したり、展覧会に出展したりすることを控える動きもあった。





　この作品についてファン・ゴッホが手紙ではっきりとふれていないことも、贋作説が現われる理由のひとつだが、それは《包帯をした自画像》もほぼ同様である。この二点の作品の真贋に関する資料的な根拠はほぼ同じ、つまり、《包帯をした自画像》も資料的には同様に「怪しい」にもかかわらず、こちらの作品について贋作説が出たという話は聞いたことがない。《浮世絵のある自画像》だけが贋作視された一番の理由は、二点の作品の質の差にある。《包帯をした自画像》と比べると《浮世絵のある自画像》は色彩表現も弱く、特に人物や空間の描写力が弱いというのがその理由である。

　たしかに二点の自画像は質がちがう。《包帯をした自画像》の強烈な色彩表現に対して、《浮世絵のある自画像》は穏やかでインパクトも弱い。筆触の力強さにおいても劣る。しかし近年、ファン・ゴッホ美術館が所蔵していたテオとその未亡人ヨーがつけていた家計簿が出版された。その家計簿によれば、《浮世絵のある自画像》はヨーが１８９７年に画商アンブロワーズ・ヴォラールに売った作品である可能性が高い。ということは、この自画像はテオが持っていたものということになり、ほぼ真作と見てまちがいないことになる。

《浮世絵のある自画像》を真作として改めて見てみよう。この絵の中でファン・ゴッホはパイプはくわえていない。顔の右側の壁には浮世絵が描かれており、左側には白っぽいカンヴァスがイーゼルにのせられている。何か描かれているようにも見えるが判別はできない。これらのモティーフを描いた意図は手紙には記されていない。ただ、状況を考えると、浮世絵はファン・ゴッホがアルルで実現できなかったユートピアを表し、白いカンヴァスは「実現できなかった」ことを暗示しているという読みもできる。

　アルルで日本の夢に夢中になっていた頃、ファン・ゴッホは「ぼくにはここでは日本の版画は必要ない。なぜならぼくは日本にいるのだから」（678/W07）と書いていた。たしかに、ファン・ゴッホはアルルに来てからずっと浮世絵を描いていない。「日本」である南仏にいる以上、目の前のものを描けばそれがもう「日本」だったからである。

　しかし、夢は終わった。この自画像でファン・ゴッホはふたたび浮世絵を描くことになった。今度はユートピアへの希望をもって描くのではなく、アルルで実現できなかった「日本」というユートピアへの追想として描くことになったのである。ファン・ゴッホは発作のしばらく後にテオに書いている。





「それでもやはり、画家の共同体、何人かが生活を共にするという考えは──ぼくらが成功しなかったにせよ、哀れで悲惨な破局を迎えたにせよ──依然としてほかの多くの考え同様、正しいしまた理にかなっている。だが、二度とやらない」



（761/586）





　この時期を境に、ファン・ゴッホの手紙からは「日本」、「日本人」という言葉がぱったりと姿を消す。「日本」とは、ファン・ゴッホにとって南仏で実現すべきユートピアの名前であった。そのユートピアが失敗に終わった以上、「日本」はファン・ゴッホにとってほとんど意味を持たなくなったのだろう。





　ファン・ゴッホがパリで夢想し始め、アルルで実現しようと考えた二年越しのユートピアはあっけなく崩壊した。ファン・ゴッホはのちにそれを「子供じみた夢」とも回想しているが、しかし、まさにこのユートピアの夢のさなかで、ファン・ゴッホは数々の傑作を次々に描き上げたのである。恐ろしいほどの創作意欲に満ち溢あふれ、そしておそらく最も幸福な時代は、まさにその子供じみた「日本」の夢によって生み出されたと言ってもよいだろう。





　《揺りかごをゆらす女》





　発作が起こる前に描いていた絵がある。友人で郵便局員のジョゼフ・ルーランの妻オーギュスティーヌをモデルにした《揺りかごをゆらす女》である。絵は発作で中断され、発作がおさまった後、１８８９年１月に描き上げられた。この絵についてファン・ゴッホはテオとゴーガンに次のように書いている。





「ああ、わが友よ。絵画で、すでにわれわれより前にベルリオーズやワーグナーが作った音楽のようなもの……悲嘆に暮れる心を慰めてくれるような芸術をつくることができれば！　（……）他の時には歌うことのできないぼくが、歌を歌ったらしく、それも古い子こ守もり唄うたを。その時、病気になる前に色の配置で探し求めていた、船乗りたちを寝かしつける〈揺りかごをゆらす女〉が歌うのを夢見ながら歌ったようなのだ」

（739　ゴーガン宛て１月）



「ぼくはこの絵についてゴーガンにこう書いたところだ。彼とぼくとが氷島の漁師について、そして荒涼たる海の上にとり残され、あらゆる危険にさらされた彼らの沈ちん鬱うつな孤独についてしんみり語りあったあとで、ふと、子供であり、殉教者でもある船乗りたちが、その絵をアイスランドの漁船の船室で見たら、自分の子守唄を思い出させるあの揺りかごにゆられている感じを抱くような絵を描いてみたい。そういう気がふと起こった。そうゴーガンに書いたところだ」



（743/574）





　発作の最中、ファン・ゴッホはこの「揺りかごをゆらす女」が歌うのを妄想の中で見ながら、自分で古い子守唄を歌ったのだという。ファン・ゴッホはピエール・ロチの小説『氷島の漁夫』を読んでいて、この絵を描くにあたってはその小説の内容が頭にあったらしい。そこには北の荒海で漁をする漁師たちがその船室に聖母像を掛ける習慣があることが記されている。ファン・ゴッホは危険と隣り合わせの仕事をする漁師を慰める聖母のイメージのような、母の子守唄のような、あるいはベルリオーズやワーグナーの音楽のように「悲嘆に暮れる心を慰めるような」絵を描きたいと考えたのだという。モデルであるオーギュスティーヌは椅子に座り、揺りかごの揺りひもを手に持っている。絵の前にいる者が揺りかごの中にいることになる。

　のちにファン・ゴッホはこの絵を中央に置き、両側にひまわりの絵を配して、祭壇画のようなトリプティック（三連画）にする案を伝えている（図25）。このことから、《揺りかごをゆらす女》を「世俗化された聖母マリアのイメージ」と解釈する者もいる。ファン・ゴッホが描いているのはあくまで揺りひもをもった友人の奥さんにすぎないが、そこに世俗化された聖母のイメージを見ているというのである。ファン・ゴッホがどの程度、聖母マリアを意識していたのかはわからない。しかし、この女性のイメージが不安な気持ちを抱く者に慰めを与える聖母のようなイメージとして構想されたことはおそらくまちがいない。





　レプリカ


　最初の発作の後、ファン・ゴッホの作品制作にひとつの大きな変化が現れた。「レプリカ」の制作である。それまでにも習作をもとにアトリエでレプリカのような作品を描くことはあった。しかし、同じ構図で数点ものレプリカを制作するようになるのは発作以後のことである。《揺りかごをゆらす女》はこの第一作をふくめ３月までにレプリカが制作され、計五点が知られている。

　レプリカを描くようになったのは、自分の重要な作品を家族や友人の手元に置いてもらいたいと願うようになったからである。送り先は、弟テオ、ゴーガンなどの画家仲間、オランダの家族、モデルになった人物などであった。

《揺りかごをゆらす女》以外の作品についてもレプリカは制作されている。《ひまわり》も第一作は１８８８年の８月に制作されていて、同時期に構図の違う作品がほかに三点描かれている。これらの作品は構図も異なるので、あくまでバリエーションであってレプリカではない。ただ、そのうちの一枚について、同構図のレプリカが少なくとも二点、翌年１月に制作されている。《アルルの女》（＊）はもともとジヌー夫人を描いたゴーガンのデッサンをもとに油彩で描いたもので、同構図で色やディテールを微妙に変えたものが計四点知られている。

　レプリカはいわば形見である。自分の作品中、優れたものを親しい人の手元に置いてほしいと思うのは、自分の人生はもうあまり長くないという意識から生まれてきたにちがいない。ファン・ゴッホ自身、何年も前から、自分が長生きできるとは思っていなかった。しかし、発作を現実に体験して、ますますその意識は強まったことだろう。制作されたレプリカ群は、必ずしもファン・ゴッホが手元に置いてほしいと思った人物のもとにはとどまらなかった。しかし、レプリカを制作したおかげで、ファン・ゴッホの代表作のいくつかは、一個人に秘蔵されることなく世界各地に、また公的コレクションに散らばり、著名な美術館にはいることによって、ファン・ゴッホの評価、名声に大きく貢献する結果になったのである。





　夢破れたあとの傷が癒えることはなかった。あのクリスマス前に襲って来た発作の悪魔は、その後も繰り返しファン・ゴッホを襲った。

「耳切り事件」に怯おびえたアルルの住民は、この「危険」なオランダ人画家を隔離するよう市長に嘆願書を出していた。ファン・ゴッホはアルルの地を後にする決意をし、サン＝レミの療養院に入ることになった。医師の監視下で治療をつづけるものの、発作は断続的に襲って来た。宗教的幻覚、幻聴をともない、時にはファン・ゴッホにチューブの絵具を喰くわせることにもなったともいう。

　しかし、発作の合間に絵を描く時のファン・ゴッホの頭脳は明めい晰せきで、作品の質も落ちない。落ちないどころか、さらに迫力を増してさえいった。そこにはあのアルル時代の静穏で瑞みず々みずしい色彩の美しさはない。画面からはひまわりも恋人達も姿を消し、浮世絵のような平へい坦たんで鮮やかな色面は、激しくうねるような筆触の海に変わった。しかし、激しい筆触といっても、感情にまかせて塗りたくったようなものではない。綿密に考え抜かれ、ていねいにカンヴァスの上に置かれた。手紙の文章にも乱れはなく、カンヴァスや絵具の選択も冷静に行われた。ただ、発作の悪魔は去ってくれなかった。ファン・ゴッホは約一年間このサン＝レミの療養院にいたが、病気は完治しない。病名については、統合失調症、てんかん、性病、アルコール中毒から緑内障、メニエール病まで、さまざまな診断がこれまでされてきたが、今なお診断が分かれていて確定しない。

　ユートピアを夢見る前にファン・ゴッホを悩ませていた「宗教」が幻覚、幻聴となってふたたび彼を悩ませるようになる。闘争は終わっていなかった。逃走も成功していなかった。ファン・ゴッホはただしばらくの間、夢の世界に逃げ込んでいたにすぎなかった。夢破れたところから、逃げ道のない本当の闘争は始まった。





　《星月夜》





　星空


「それでもやはり、ぼくには、なんというか、宗教とでも言うべきものがどうしても必要だと感じる。そんな時、ぼくは夜、星を描きに外に出る」



（691/543）





《ローヌ河畔の星空》を描いた頃にアルルで書かれた手紙の一節である。「宗教」という言葉を使うのはためらっているが、ファン・ゴッホのユートピアの夢の最中、彼の心が「宗教」からいちばん遠いところにあったように思える時期にあっても、星空は宗教、神を思わせた。それは、アムステルダムで神学を志していた頃の次のような手紙と何も変わらない。





「月が輝いていて、すべてがマテイス・マリスとアンデルセンの世界だった。そこからは街並みや塔の眺めが見え、すばらしい光景だ。（……）あたりはすっかり静まり返っていた。『枯れ葉の音が止むと、ただ星だけが語りはじめる』『すべての音が止むと、星空の下で神の声が聞こえる』」



（131/110）





　父親と同じく牧師になることを熱望していた頃の手紙である。二つの詩の引用は、オランダ18世紀の詩人ヒエロニムス・ファン・アルフェンの「星空、カンタータ」とイギリス19世紀の小説家・詩人ディナ・クレイクの詩「星の下で」からとられたもので、ファン・ゴッホはクレイクの「星の下で」を気に入っていたらしく、ほかの手紙でも引用している。





　つくられた風景


　最初の発作から約半年後、１８８９年の５月にサン＝レミの療養院に入っていた。それから一ヶ月ほど経った日の夜明け前、ファン・ゴッホは鉄格子の入った窓から東の空を眺めていた。





　「今朝、ぼくは日の出前に窓から長い間、田園風景を眺めていた。明け方の星だけが、とても大きく見えていた。それでも、ドービニーやルソーはこういう絵を描き、その融和、その偉大なる平和と荘厳さとを一分の隙もなく表現し、しかも同時に身にしみるような、そしてひそやかな自分自身の感情を付け加えた。そのような感情をぼくは嫌いではない。

　自分の仕事が自分のやりたいと思っていたこととこれほど違うかと思うと、ぼくはいつも悔恨を猛烈に感じる。いずれはもっといいものを描けるようになると思うが、まだそこまでは達していない」



（777/593）





　そして間もなく描いたのが《星ほし月づき夜よ》である。ここにはいったい何が描かれているのだろうか。

　風景は療養院のファン・ゴッホの部屋から見た東の山並み。しかし、山はこのように見えたとしても、本来はこの風景の中には村もなければ尖せん塔とうのある教会もない。この村も教会もファン・ゴッホが付け加えた架空のものだ。しかも教会は南仏の教会ではなく、オランダの教会のように見える。空には三日月の逆のような形をした月、夜明けの空に見える、いわゆる「有あり明あけ月づき」と、左下にひときわ明るい星。中央には渦巻きのような形のものがある。左手前に大きくそびえる糸杉は実際にファン・ゴッホの部屋の窓から見えたものではないだろう。

　１８８９年６月半ばすぎの明け方の東の空を、プラネタリウムで再現したところ、月と左下の明るい星の位置はほぼ絵と一致したという。明るい星は金星、つまり「明けの明星」で、月もほぼこの位置に見えていた。ただし、実際には月の形はこのような形ではなく、ラグビーボールのような形状、いわゆる「更ふけ待まち月づき」だったという。中央の渦巻き状のものが何なのかは、プラネタリウムでは説明がつかなかった。星座も確実には確認できなかった。つまり、星空については、この絵が描かれた時期の明け方の東の空にだいたい一致しているので、おそらくファン・ゴッホが記憶をもとに描いたのだろう。そもそも、ファン・ゴッホが東の風景を見ることのできた窓のある部屋は寝室で、絵は別の部屋で描いていたから、糸杉も、山の風景も、すでに描き上げていた自分の風景画からとられたモティーフだという指摘もある。ともあれ、この絵はアルル時代の星空の絵のように現場で制作されたものではなく、記憶と想像で描かれたことはまちがいない。

　それにしてもなぜ見えるはずのない教会を描き込んだのだろうか。





　オリーブ園のキリスト


　この絵についてはこれまで、発作で見た幻覚ではないかと言われたり、聖書の場面を再現したものだと言われたり、さまざまに解釈されてきた。ファン・ゴッホ自身はテオに次のように記している。





「君がしばらくの間この二つの習作や木蔦の習作を見てくれたら、ゴーガンやベルナールやぼくがときどき語りあっていたことやぼくらの関心を占めていたことが、言葉で説明するよりもいっそうよくわかってもらえるだろう。それはロマン主義的、あるいは宗教的な観念への回帰ではない。それは違う。とはいえ、ドラクロワの仕事を表面ではなくさらに深く通過することによって、色彩とだまし絵トロンプ・ルイユ的な正確さよりももっと意志のこもったデッサンを用いることによって、郊外より、パリのキャバレーより、もっと純粋な自然が表現されることになるだろう」



（782/595）





「この二つの習作」とは《星月夜》と《アルピーユ山脈を背景にしたオリーブ園》（図26）である。ゴーガンやベルナールと論じあっていたこと、というのはおそらく宗教的主題を描くこと。その後は、ロマン主義や宗教的観念に回帰せず、色彩とデッサンによって「純粋な自然」を表現しようということを述べている。ゴーガンはしばしば宗教的主題を描いていたし、ベルナールもこの頃「オリーブ園のキリスト」（ゲッセマネのキリスト）という主題を描いているが、その絵を見た時にファン・ゴッホは猛烈に批判をしている。ファン・ゴッホも、実はアルル時代、《オリーブ園のキリストと天使》という絵を描いている。この主題は、キリストがユダの裏切りで逮捕される前に、ゲッセマネという場所に弟子とともに行き、苦悩の中、そのオリーブ園で主に祈りをささげると、天使が現れキリストを力づけるという場面である。１８８８年７月に一度描き、その色も詳細に手紙に書いているので絵はかなりできあがっていたはずだが、「モデルなしにこのような人物を描いてはいけない」という理由で搔かき削っている。さらに９月にも描こうとして断念し、ふたたび搔き削っている。





「オリーブ園のキリストと天使の習作を、ふたたび搔き削った。なぜなら、ここではぼくは本物のオリーブ園を見られるからだ。

　ぼくはモデルなしにこれを描けないというか、描きたくないのだ。しかし、色も含め頭の中には絵はできている。星月夜、キリストの姿は青、もっとも強い青、そして天使はレモンイエローの混じった黄色。

　そして風景は鮮血のような赤から灰色系にいたるまですべて紫色だ」



（685/540）





　この色の記述を読むと、あきらかに《星月夜》の色に似ている。また、ファン・ゴッホは、《星月夜》と《アルピーユ山脈を背景にしたオリーブ園》をほとんどいつも対作品のように語っている。このほぼ同サイズの絵を二枚並べれば、《オリーブ園のキリストと天使》の場面のうち、キリストと天使以外のすべての要素がその中に入っていることになる。オリーブ園、星空、青、黄色、紫。アルルで搔き削った《オリーブ園のキリストと天使》にある色はほとんどすべてこの二枚にあり、キリストと天使以外のすべてのモティーフ、星空とオリーブ園もここにある。

　つまり、《星月夜》は《アルピーユ山脈を背景にしたオリーブ園》と二枚一組で、一年前にファン・ゴッホが描こうとして断念していた「オリーブ園のキリストと天使」という主題を、自然のモティーフと、色彩と、「意志のこもったデッサン」によって描き出したものなのである。とすれば、彼がわざわざ架空の教会を小さく描き込んだ理由も理解できる。この風景がただの風景ではなく、宗教的主題であることを暗示するために描き込んだのだろう。





「ゲッセマネのキリスト」あるいは「オリーブ園のキリスト」はファン・ゴッホが若い頃から強い関心を抱いていた主題である。しかし、発作による宗教的幻覚、幻聴に悩まされ、死期をより身近に感じていたこの時期、この主題はより切実なものとしてファン・ゴッホに迫っていたにちがいない。そしてついに《星月夜》にそれを描いたのだ。ただ、「それはロマン主義的、あるいは宗教的な観念への回帰ではない。それは違う」という強い否定が示すように、牧師を捨てて画家になったファン・ゴッホには、「宗教画」を描くことはできなかった。自分の中に渦巻いている宗教的感情を、「自然」のモティーフだけを使って、色彩とデッサンだけをたよりに表現すること。それが《星月夜》に課せられた使命であった。





　この絵の不穏な雰囲気は、ゲッセマネのキリストの苦悩を表現すると同時に、ファン・ゴッホ自身の苦悩の表現でもあった。それは単に死がひたひたと近づいてくる不安と苦悩だけではなく、夢の崩壊以後、ますます頭をもたげてくるようになった「宗教的感情」と、「自然」を描くという近代画家としての使命との葛かつ藤とうからくる苦しみでもあった。この星空は、「宗教」と「自然」とが壮絶な闘いを繰り広げる場でもあったのである。





　《アーモンドの花咲く枝》





　瑞みず々みずしい白い花、爽さわやかな青空、ファン・ゴッホ晩年の作品とはとても思えない。

　１８９０年１月31日、テオとヨーに男の子が生まれた（図27）。両親はこの子に画家と同じフィンセント・ウィレムという名を授けている。ファン・ゴッホは久しぶりに母親に手紙を書き、赤ん坊のために一枚の絵を描いていることを伝えている。





「たぶんお母さんもぼくと同様、度々心の中でヨーとテオのもとに行っておられると想像しています。（……）テオの息子には、ぼくの名前よりはお父さんの名をつけてくれるほうがずっとよかったのに、と思います。このごろ、お父さんのことをよく考えていました。でも、名づけはもうすんでしまったことなので、ぼくはすぐに彼らの寝室に掛ける絵を、その子のために描き始めました。青空を背景に、白い花を咲かせている大きなアーモンドの枝の絵です」



（855/627）





　描き上がったのはファン・ゴッホの作品中でもきわめて異例な、特にサン＝レミ以降の作品としては異例な、瑞々しい白い花の絵である。生まれたばかりの新しい命にふさわしい主題、構図、色彩。このうえないプレゼントだった。絵はテオのもとに送られ、「ピアノの上」に掛けられていたという。

　ファン・ゴッホはなぜ赤ん坊に自分の名ではなく父の名テオドルスをつけることを望んだのだろうか。決して幸福な人生を歩んでいない自分よりも、父や弟のような穏やかな人生をこの赤ん坊に送ってほしいと願ったからだろうか。

　絵の瑞々しさとはうらはらに、ファン・ゴッホ自身の容態は悪化していた。１月の後半、アルルを訪問した後にまず発作を起こし、甥おいの誕生をはさんで、翌２月から３月にかけてもまた発作を起こしている。この二つの発作の合間に絵は描かれた。ファン・ゴッホの発作は、テオの結婚、甥の誕生の知らせをきっかけに起こったと見る者もいる。本当にそうなのかどうかは、病名の特定もできない以上よくはわからない。しかし、自分のただひとりの精神的、経済的支えであるテオが結婚し、子供をもつことに、ファン・ゴッホは心中穏やかではいられなかっただろう。自分への援助が減ることも心配だが、それ以上に、自分の存在がテオの家庭の経済的、精神的負担になるのではないかという心配の方が大きな負担になっていっただろう。

《アーモンドの花咲く枝》は、たてつづけに襲ってくる発作と、膨らんでいく不安の中で、新しい命の幸福を願って描いた精一杯の贈り物であった。





　《ラザロの復活》





「こう言ってから『ラザロ、出て来なさい』と大声で叫ばれた。すると、死んでいた人が、手と足を布で巻かれたまま出てきた。顔は覆いで包まれていた。イエスは人々に、『ほどいてやって、行かせなさい』と言われた」（「ヨハネによる福音書」十一章43‐44節）





　キリストが死んでいたラザロを生き返らせる奇跡の場面である。ファン・ゴッホはレンブラントの版画（図28）をもとにこの場面を油彩で描いた。レンブラントの版画には、奇跡を起こすキリストが大きく後ろ姿で描かれ、墓の中からラザロが起き上がっている。この奇跡に接して驚く人々も描かれている。しかし、ファン・ゴッホはこの版画のごく一部分だけを模写した。蘇そ生せいしたラザロと墓の脇にいる二人の女だけを描き、中心人物のはずのキリストも、後方の人物群も画面からはずしてしまった。その代わりにファン・ゴッホが描き加えたのが太陽である。ここでは、ラザロはキリストのもとで復活するのではなく、太陽のもとで生き返っているのだ。





　次に、人物をよく見ると、生き返ったラザロの髪と鬚ひげは赤っぽい色で塗られている。驚く女たちの髪の毛や服装の色を見ると、中央で両手をあげて驚いている女は、明るい色の髪の毛に緑の服を着ている。また、右側の女は黒っぽい髪の毛で描かれている。レンブラントの原画は版画なので、これらの色は当然、ファン・ゴッホが作り出したものだ。赤っぽい髪と鬚のラザロはおそらくファン・ゴッホ自身であろう。そして、中央の女はあきらかに、《揺りかごをゆらす女》（第三章）のモデルになったあのルーラン夫人に似ている。また、黒い髪の女は、やはりファン・ゴッホの肖像画のモデルになったジヌー夫人に似ている。

　つまり、ファン・ゴッホはレンブラントの版画をもとにし、聖書主題にもとづきながらも、おそらく個人的な意味をこの場面に付与している。復活するのは自分自身であり、復活させるのはキリストではなく南仏の太陽。ここでは太陽はあきらかにキリスト、あるいは神に代わる存在として描かれている。そしてまわりでそれを見守るのが彼の親しい友人たちである。度重なる発作の間、ファン・ゴッホは模写という形で聖書主題の場面を借り、そこで自らが南仏の太陽の下で復活することを願ったのだろうか。





　模写・翻訳


　サン＝レミ時代のファン・ゴッホの特徴は、レプリカを多く制作したことと、版画や複製をもとに油彩で模写を描いたことである。頻繁に発作が襲ってくる状況で、ファン・ゴッホは戸外で制作することを制限された。室内で描くといっても療養院ではモデルの数にも限界がある。そこで、ファン・ゴッホはテオから版画や複製画を送ってもらい、それらを油彩で模写するという方法を思いついた。模写といっても、もとが白黒の版画や複製だから、もともと白黒である。色のない作品を、色彩を使って模写するのである。このような模写をファン・ゴッホは「翻訳」と呼んでいる。模写にはちがいないが、描き方を学ぶための模写ではなく、色彩による翻訳作品として、これら自体、十分に芸術的価値をそなえている。そのなかでも《ラザロの復活》は原作に色彩を加えただけでなく、構図自体も大きく変え、そこに個人的な意味も込めたという意味で、ほとんどオリジナルの作品だと言ってよいだろう。

　このようにしてファン・ゴッホは、ミレー、ドーミエ、レンブラント、ドラクロワなどの版画や複製から油彩画を描いていった。世俗の主題のものもあるが、宗教的主題も少なくない。ファン・ゴッホは結局、自分自身で宗教的主題を描いた作品は一点も残さなかったが、模写という形では何点かの宗教的主題を描いている。「宗教」が頭をもたげ、幻覚にも現れるようになったサン＝レミ時代、ファン・ゴッホは宗教的主題を描くためのいわば口実、あるいは唯一許せる手段として、「模写・翻訳」を選んだのかもしれない。





　成功の兆し


　ファン・ゴッホの作品が評価され始めたのは、死の直前になってからであった。１８９０年１月、フランスの象徴主義の批評家アルベール・オーリエが『メルキュール・ド・フランス』誌に「孤高の人々　ファン・ゴッホ」という評論を書いている。また、１月から２月にかけてベルギーのブリュッセルで開かれていた〈第七回二十人展（レ・ヴァン）〉の展覧会に六点の作品が展示され、そのうちの一点《赤いぶどう畑》を画家アンナ・ボックが購入している。アルル時代にファン・ゴッホが肖像画を描いていたユジェーヌ・ボックの姉である。

　テオが予想していた通り、成功の兆しは見えてきた。しかし、この時すでにファン・ゴッホの命は尽きかけていた。みずからの成功の兆しを生きて見ることができたのはわずか七ヶ月にすぎなかった。





　サン＝レミでの療養生活にもかかわらず、病気は良くならない。テオの勧めもあって、ファン・ゴッホはついに南仏を後にし、パリ郊外のオーヴェール＝シュル＝オワーズに移り住んで、美術好きの精神科医ガシェ博士に診てもらうことになった。オーヴェールはかつてバルビゾン派の画家ドービニーが住み、セザンヌらが制作に来たこともある町である。この地でファン・ゴッホは最晩年の二ヶ月を過ごすことになった。

　発病以来、体の調子によって作品の質にばらつきはある。アルル時代のように次々に力強い作品を生み出すエネルギーはない。しかし、最晩年の作品群、特に50センチ×１メートルの横長のカンヴァスに描かれた最後の作品群は、その十年間の画業と、三十七年間の闘いの掉ちよう尾びを飾るにふさわしい。





　「日本」との接触ふたたび


　オーヴェールに住み着く前、南仏から汽車でまずパリに戻ったファン・ゴッホは、テオのアパルトマンに三泊してテオと再会し、新妻のヨー、自分と同じ名を授かった幼子フィンセントと初めて対面した。１８９０年５月17日朝にパリに着き、20日にオーヴェールに向かうまでの間、ファン・ゴッホは久しぶりのパリでいくつか展覧会を見ている。パリの国立美術学校で開かれていた大浮世絵展（図29）もおそらく見逃さなかっただろう。ジャポニスム大流行の火付け役のひとりだった画商ジークフリート・ビングが企画したこの大浮世絵展は、出展作品数は千点以上、著名な画家や政治家も訪れた歴史的な展覧会であった。その規模だけ見ても、今日、同規模の浮世絵展を開くのは難しいと思われる。ファン・ゴッホは二年三ヶ月の南仏滞在中、限られた数の浮世絵しか見ていないが、パリでふたたび大量の浮世絵を見る機会に恵まれることになった。





　この展覧会にはファン・ゴッホ作品に影響を与えたと思われるものが少なくないが、もっとも顕著なのは浮世絵の雨の表現である。オーヴェールに移動してからファン・ゴッホが描いた《オーヴェール、雨》では雨が直線で描きこまれている。このような雨の表現はそれまでの西洋美術には見られないが、浮世絵師たちは頻繁に使っていたもので、たとえば国立美術学校での浮世絵展にも出ていた広ひろ重しげの《六十余州名所図会　伯耆ほうき　大野大山遠望》（図30）にもそのような表現が見られる。





　ファン・ゴッホはアルルでの「耳切り事件」を機に「日本の夢」から醒さめていったが、日本美術、浮世絵への関心は失っていなかった。それどころか依然として新しい表現を浮世絵から吸収し自分の表現に組み込もうとしていたことがわかる。





　パリ滞在中、彼はシャン・ド・マルスで開かれた国民美術協会で「デムーラン」が日本を描いた絵を見ている。「デムーラン」はファン・ゴッホの誤記で、正しくはデュムーラン、フルネームはルイ・ジュール・デュムーラン（１８６０‐１９２４、図31）である。デュムーランは１８８８年、ファン・ゴッホが「フランスの日本」にあたる南仏に夜汽車で向かっていた頃、新妻とともに現実の日本に向かう船上にいた。日本に到着後、長期滞在して多くの絵を描き、写真も撮影し、パリに戻った後、翌１８８９年12月にジョルジュ・プティ画廊で展覧会を開催している（図32）。デュムーランはその後、海軍・植民地省の画家となり世界各地を旅行して異国風景を描く画家として地位を確立し、フランス植民地画家協会を創立、亡くなるまでその会長をつとめた。ファン・ゴッホのオーヴェール滞在中、デュムーランがオーヴェールに来たことがあったらしく、ファン・ゴッホが彼と会おうとしていたことが手紙からわかっている。実際に会ったかどうかは確かではないが、ファン・ゴッホが現実の日本に行っていたこの画家に関心を示していたことはまちがいない。





　この時期、ファン・ゴッホは日本経験のあるもうひとりの画家とは確実に接触している。手紙には「ブルック」と記されているが長い間その素性がまったくわかっていなかった。「ブルック」はエドムンド・ウォルポール・ブルック（１８６５‐１９３８）というイギリス国籍の画家で、生まれはオーストラリアのメルボルン郊外、１８６９年、四歳の時に家族とともに横浜に移住した。父親は『ジャパン・デイリー・ヘラルド』紙の編集長、のちに社主となるジョン・ヘンリー・ブルックで、エドムンドは成人するまで横浜の外国人居留地で育った。その後、画家になるため１８８５年ごろからパリに留学し、国立美術学校ではジェロームのもとで学び、ロンドンのロイヤル・アカデミーやパリ・サロンなどに作品を出展している。ファン・ゴッホとは１８９０年にオーヴェールで会って、一緒に戸外制作に出かけたりもしている。

　ファン・ゴッホがブルックと会っていたことはまちがいないが、どのような会話を交わしていたかまではわからない。しかし、オーヴェール時代、ファン・ゴッホがデュムーランやブルックといった日本体験者と積極的に接触しようとしていたのはまちがいない。ファン・ゴッホの「日本の夢」はアルル時代に破れはしたが、その後も日本への関心がなくなったわけではなく、最晩年には現実の日本への関心を持ち続けていたらしいことがわかる。

　ブルックのその後についても簡単に記しておこう。ブルックは１８９０年にファン・ゴッホや弟テオと会った後もしばらくはパリに住んでいたが、１８９４年、１８９６年に横浜で個展を開いている。しかし、以後、画家として活動した痕跡は見つかっておらず、どのような生活をしていたのかもまだわかっていない。ただ、横浜の根岸外国人墓地にはウメ・ブルックと記された墓があり、墓碑にはウメが１９１２年に六歳で亡くなったことが記されている。横浜市の記録にはこの女の子の名前としてセキ・ウメとも記されているため、セキという姓の女性とブルックとの間に生まれた女の子ではないかと推測できる。その後のブルックの活動についてもよくわかっていないが、１９２３年、関東大震災で被災した。自宅にあった絵画作品や遺品は火災で焼失した可能性が高い。その中には彼自身の作品のほかに、あるいはファン・ゴッホのデッサンや手紙もあったかもしれない。おそらく思い出の品々をほとんど震災で失ったブルックは神戸に移住し、そこで余生を送って第二次世界大戦直前の１９３８年に心臓病で他界した。墓は神戸市立外国人墓地に残されている（図33）。これまで、いつ、どこで亡くなったかさえも知られていなかったが、ようやくその生涯がぼんやりとわかってきた。ただ、顔写真も知られておらず、作品もそれらしいものがアメリカに一、二点見つかっているのみである。





　《ガシェ博士の肖像》





「ガシェ博士は絶対にあてにしてはいけないと思う。まず、ぼくの見たところ、彼はぼく以上に病気がひどいか、でなければ同じぐらいに悪い。目の不自由な人が目の不自由な人を導けば、二人とも同じ溝に落ちるのではないだろうか」



（RM20/648）





　医師ガシェについての、ファン・ゴッホの第一印象である。どうやら自分の主治医としてはあまりあてにならないことをすぐに見抜いてしまったらしい。しかし、「最後には彼と友人になれるという希望はもっている」とも記している。実際、この二人はすぐに親しくなっていった。

　ポール＝フェルディナン・ガシェは当時六十一歳。フランス北部のリル出身で、パリ大学で学び、博士号は「憂ゆう鬱うつ症の研究」でとっている。ファン・ゴッホの手紙によると、田舎での医者稼業にはうんざりしていたらしい。しかし、自ら絵を描き、画家との交友関係も多く、医学よりは美術のパトロン、コレクターとして美術の歴史の方に名を刻むことになった。





　ファン・ゴッホはこのガシェ博士とその肖像画について、妹ウィルに宛てて、次のように書いている。





「わが友ガシェ博士はこのアルルの女の肖像（図34）──ぼくも自分用のレプリカを持っているが──とぼくの自画像（図35）にまったく感動してしまっている。ぜひ肖像画を描くように言ってくれているので大変うれしく、いずれ面白いモデルをぼくのために見つけてくれればと思っている。ぼくが画業のなかで、他のどんなものよりもずっと、ずっと情熱を感じるのは、肖像画、現代の肖像画だ。ぼくはそれを色彩で追究しようとしているが、同じ方法で探究しようとしているのはぼくだけではない。ぼくがやりたいと思っているのは、──自分にそんなことが成し遂げられると言うのも気が引けるが、とにかくそうしたいと思ってはいる──ぼくがやりたいと思っているのは、一世紀のちに、その時代の人たちに〈出現アパリシオン〉のように見えるような肖像画だ。それは、写真のように似せることによってではなく、性格を表現し高揚させる手段として現代の色彩科学と色彩感覚を用いて、情熱的な表現によってそれをもとめるのだ。ガシェ博士の肖像も顔は加熱したレンガのような色をして真っ黒に日焼けし、赤い髪の毛に白いひさし付きの帽子をかぶって、背景に青い丘が見える田舎の風景に囲まれている。服はウルトラマリンの青で、そのため、顔がレンガ色をしているにもかかわらず、浮き出して白っぽく見える。手、産婦人科医のような手は顔よりももっと青白い。彼の前にある赤い庭用テーブルの上には黄色い小説本と暗い紫のジギタリスの花がある」



（879/W22）





＊戻る





「ぼくはガシェさんの肖像を憂鬱質メランコリーの表情で描いた。絵を見る人にはこの表情はしかめ面をしているように見えるかもしれない。それでも、このように描くしかない。というのも、このように描けば、かつての冷たい感じの肖像画に比べて、現代のわれわれの脳裏にどれほどの表現があり、また情熱とか期待めいたもの、叫びのようなものがあるのかがわかってもらえるからだ。悲しくも優しく、しかし、明めい晰せきで知的な、そんなふうにたくさんの肖像画を描いていかねばならない。そうすれば、人々に時にある種の感銘を与えることもあるだろう。

　これからも長く見つづけてもらえるような、たぶん百年後にも偲しのんでもらえるような現代人の顔がある。もしぼくが十年前に今知っていることを知っていたら、野心を持ってこれと取り組めるのだが。しかし、今の状態ではぼくにはたいしたことはできない。自分が働きかけたいような人々とは付き合いがないし、付き合うこともできそうにないからね。

　いつかぜひ君の肖像を描きたいと思っている。お便り、鶴かく首しゆしています。できればまた近いうちに」



（886/W23）





　「出現」


　ファン・ゴッホはアントウェルペン時代から「ぼくはカテドラルよりは人間の眼を描きたい」と書いていた。肖像画に対する情熱は晩年になっても変わらない。いや、情熱はさらに高まっているように見える。

　この手紙で使われている「出現アパリシオン」（apparition）という言葉のニュアンスをくみ取るのはむずかしい。たとえばフランスの巡礼地ルルドで聖母の姿を見た人が出た時に、それを亡霊とか幻影とは言わずに、この「出現アパリシオン」という言葉を使って「聖母の出現アパリシオン」と言う。それを聖母だと信じているのだから当然「幻」ではない。「アパリシオン」は幽霊や亡霊、幻という意味でも使うが、ここではおそらくそのようなものではなく、「実在するように見える」というニュアンスを含むのだろう。しかし、蠟ろう人にん形ぎようのように本人そっくりに見えるということではない。だから「写真のように似せる」のではなく、「かつての冷たい感じの肖像画」とはちがう、とファン・ゴッホは書いている。ファン・ゴッホが目指したのは、色彩によって、ある種のオーラを放つような実在感を感じさせる肖像画、その人の性格を冷たく描写するだけでなく、百年後に生前の情熱や思念を彷ほう彿ふつとさせるような肖像画、とでも言えばよいだろうか。

　テオ宛ての手紙にもこの絵の色についての記述があるが、ゴーガン宛てには「今、われらの時代における悲痛な表情をしたガシェ博士の肖像をやっている」（RM23/643）と書いている。ガシェ博士はたしかに険しそうな表情を浮かべ、頰ほお杖づえをついている。頰杖をつくポーズは西洋では一般的に憂鬱質メランコリアのポーズであり、その「憂ゆう鬱うつ症」はガシェ博士の博士論文の研究テーマでもあった。ジギタリスはホメオパシー（同毒｟同種｠療法）で心臓病などに効くとされている植物である。ガシェ博士はこのホメオパシーを実践していたらしい。机の上にはゴンクール兄弟の小説が二冊。『ジェルミニー・ラセルトゥー』と『マネット・サロモン』が置かれている。





　ガシェ博士が主治医として適任だったかどうかはわからない。しかし、美術好きのこの精神科医との交流は、ファン・ゴッホを少なくとも孤独からは救い、また、ガシェ博士自身を含め、モデルを提供することにもなった。ガシェ博士の娘マルグリットもファン・ゴッホは描いている。療養院の患者たちの中にいるよりは、より気持ちよく仕事のできる環境にいるほうがよい、おそらくテオはそう判断してオーヴェールのガシェ博士のもとに兄を呼ぶことにしたのだろう。風景画が多い最晩年の二ヶ月に、豊かな肖像画群が加わったのは、ガシェ博士との交友関係のおかげであった。ファン・ゴッホ本人はもはや「たいしたことはできない」と記しているが、彼が情熱を傾けつづけた肖像画の人物たちは、さまざまな想いと情念をかかえた生身の人間として、ファン・ゴッホが望んだ「百年」を越えた今も、私たちの前に「出現」しつづけている。





　《オーヴェールの教会》





　大きな巣のまわりに蠢うごめく蜂の群れのように、筆触はカンヴァス上を飛び回る。自在に飛び回るように見えて、蜂たちはみごとに統制されている。

　描かれているのはオーヴェールの小さな石の教会。その小さな教会がまるで巨大な生き物のように迫ってくる。





「そのほかにぼくは村の教会の大きな絵を描いた。純粋なコバルトブルーの、深く、シンプルな青の空を背景に、建物は紫がかって見える。ステンドグラスはウルトラマリンの青い斑はん点てんのように見え、屋根は紫で一部オレンジ色をしている。前景には花の咲いた草地がすこし、陽のあたったバラ色の砂地がある。これはまた、ぼくがニューネンで古い塔と墓地を描いた習作とほとんど同じものだ。ただ、今ではおそらく色彩にもっと表現力があり、もっと鮮やかになっている」



（879/W22）





　ニューネンの教会（第一章）と同様、モニュメンタルな、堂々とした教会だが、ファン・ゴッホも書いているように、色彩ははるかに表現力を増し、鮮やかになっている。しかし、それだけではない。ファン・ゴッホが晩年に獲得した表現手段は、何と言ってもその筆触の表現力だ。その筆触によって画面が、場面の空気が動き出す。教会のなんでもない輪郭線の揺らぎが、その冷たい石の塊に命を吹き込む。オーヴェールでこの教会の現物の前に立った人はおそらく皆、その小ささに驚くだろう。そしてこの建物が動かない石の塊だというあたりまえの事実に気づく。そのぐらい絵の中の教会は大きく、色彩豊かで、そして迫ってくる生き物のようにすら見える。よく見ると教会の左手前を農婦が去ってゆく。その後ろ姿は、服装から、オランダの農婦のようにも見える。





　ファン・ゴッホが教会をこんなに大きく描くのは珍しい。ニューネン時代に何点か教会は描いているし、手紙でふれている《〈農民の墓地〉ニューネンの古い教会の塔》（＊）でも教会は堂々とした大きさに描かれている。しかし、あの教会はすでに尖せん塔とう部分を失った廃はい墟きよだった。その絵のテーマも「宗教はうつろい、神は残る」、あるいは「宗教のはかなさと農民の生の永遠性」であった。そしてニューネン時代から後、ファン・ゴッホはかたくなに教会を主題に選ぶことを拒んできた。パリでも、アルルでも、サン＝レミでも、彼は決して教会を大きく描いたりはしなかった。しかし、廃墟になっていたはずの教会が、この絵の中ではあきらかに息を吹きかえして、迫ってくる。

　なぜ、今、ファン・ゴッホは教会を選んだのだろうか。自分自身の内なるキリスト教、内なる「父」との闘いはもはやあきらめたのか、あるいは、もう闘う気力もなくなっていたのだろうか。





　《鴉の群れ飛ぶ麦畑》





　１８９０年７月６日、日曜日、ファン・ゴッホはパリに住む弟一家を訪問した。生後まだ五ヶ月の赤ん坊はその前何日間か病気で苦しんでいたらしいが、テオは前日の手紙で、ロバの乳のおかげでずいぶんよくなったので、訪問は延期しなくてよいと兄に伝えている。ヨーの回想によれば、ファン・ゴッホはパリで自分について評論を書いてくれたアルベール・オーリエと会って、一緒に作品を見ながら話した。トゥールーズ＝ロートレックも訪ねてきてくれて昼食を共にし、「階段のところで出くわした葬儀屋のことで大笑いをしていた」という。しかし、ヨーによると「わたしたちは子供の重い病気で疲れきっていた。テオはグーピルをやめて自分で商売を始めようというかつての計画を思案中だった。フィンセントは絵を掛けてある場所が不満だった。そして、わたしたちがもっと大きな家に引っ越すという話が持ち上がっていた。そういうわけで、いろいろと心配や苦労が重なっていた日々だった」。ロートレックとファン・ゴッホが馬鹿話で大笑いしたという場面だけはほほえましいが、それ以外は、ヨーは子供の看病疲れ、テオの独立の話は要するに家計が大変だからということ、引っ越しもファン・ゴッホが自分の絵をもっといい場所に掛けろと言ったからで、ファン・ゴッホは決して気持ちよくオーヴェールには帰れなかったのだろう。ファン・ゴッホが亡くなった頃、オランダにいたヨーがテオに宛てた手紙が残されている。テオはファン・ゴッホが銃弾を腹部に受けたことはヨーに伝えず、「ひどい病気」だと知らせていた。その「病気」がどうなったのか心配しているヨーは手紙にこう記している。





「ああ、どうかフィンセントがよくなりますように。私たちの家に来てもらった時、もっとやさしくしてあげればよかった」





　この手紙を出してまもなくヨーはテオから手紙で直接にではなく、オランダに住むテオの親族を通して義兄の死と真相を知り、テオに手紙を書いている。そのなかにこのような一文がある。





「ぜひフィンセントに会って、この前会った時あんなにいらいらしていたことをどんなに申し訳なく思っているか、伝えておきたかった」





　当時の状況とこれらの手紙の文面から、７月６日にテオの家がどのような雰囲気にあったのかはおよそ想像できる。ヨーの立場になってみれば、夫の兄である画家フィンセントははっきり言って邪魔者だ。夫の収入の多くを仕送りとして持っていかれ、しかもやっかいな病気も抱えている。テオの人柄があればこそ、病気ですねかじりの兄がいることも承知の上で結婚したとはいえ、赤ん坊が生死の境をさまようような日が何日も続いた後、病み上がりの赤ん坊と、二人の訪問客と義兄の世話をし、挙げ句の果てに絵の掛け方が悪いなどと言われれば、多少はいらついて邪険にしてもおかしくはない。





　「極度の孤独」


　７月10日、ファン・ゴッホはテオとヨーに手紙を書いている。手紙は「ヨーの手紙はぼくにとってまさに福音のようだった」という書き出しから始まる。ヨーの手紙は残っていないが、内容から察するに、おそらく６日のおわびと優しい心遣いに満ちた手紙だったのだろう。すこし長くなるが、当時のファン・ゴッホの心情を知るために引用しよう。





「ヨーの手紙はぼくにとって本当に福音のようだった。みんなにとってかなり辛く重苦しかったあの時の不安、ぼくも共有していた不安を吹き払ってくれた。みんなが日々のパンにもこと欠く危険を感じていたのだし、またああいうことが原因でなくとも自分たちの健康の不安が感じられたのだから、やはりただ事ではなかった。

　こちらに帰って来てからぼくもまたとても悲しくなり、君たちを脅かしているあの雷雨が自分の上にも重くのしかかってくるのをずっと感じつづけていた。（……）

　ぼくは君たちの恐るべき重荷になっているのではないかと──頭からそうとも思わないものの多少は──心配になっていた。しかし、ヨーの手紙を読めば、ぼくも君たち同様働き苦しんでいるという事実を君たちがわかってくれていることがはっきりわかった。

　あの時、ここに帰ってふたたび仕事にかかった時、筆がほとんど手から落ちそうになった。それでも自分のやりたいことはわかっていたので、あれからぼくは三点の大きな絵を描いた。

　それはいまにも嵐が来そうな空の下の広々とした麦畑で、ぼくは思い切って悲しみを、極度の孤独を、表現してみようとした〔ファン・ゴッホは「悲しみを表現してみようとした」と書いた後で「極度の孤独を」と行間に書き加えている〕。

　できるだけ早くこの絵をパリへ持っていきたいと思っているから、まもなく見てもらえると思う。というのも、これらの絵は言葉では言えないもの、健康で力づけてくれる田舎の自然の力とでもいうべきもの、そういうものをおそらく君たちに語ってくれると思うからだ。

（……）

　ぼくはよく赤ん坊のことを思う。絵を描くのに全神経を傾け、すり減らすよりは、たしかに子供を育てる方がいいことだと思うが、いまさらしかたがない。ぼくはもう年をとりすぎていて──少なくともそう感じる──道を引き返すこともならず、また他のものを望むこともできない。そういう欲望はなくなったが、それでも心に苦しみが残っている」



（898/649）





　この手紙でファン・ゴッホとテオの家族が置かれた状況はだいたいわかる。また、敏感な神経の持ち主ならば、ヨーの手紙が優しければ優しいほど、その本音も状況も正確に察知できただろう。ファン・ゴッホは、この時、自分の存在がやはりテオの家庭の重荷になっていることを確信できたのだ。この時に描かれた三枚の大作の一枚と考えられているのが《鴉からすの群れ飛ぶ麦畑》である。ファン・ゴッホは筆を取り落としそうな精神状態の中で、その絵を描き、「悲しみ」と「極度の孤独」を表現しようとした。「健康で力づけてくれる田舎の自然の力」という二つめの説明は矛盾するように思えるが、このあたりの真意は量りがたい。





　張りつめた糸が切れる時


　熟れた麦畑、三つに分かれた道、その上を飛ぶ黒い鳥の群れ。キリスト教図像では麦刈りは人の死にたとえられる。したがって熟れた麦は死を間近にひかえていることを暗示する。画面全体の不穏な雰囲気も、不吉な印象を与える黒い鳥も、すべてはまもなくやってくる画家の死と結びつけやすい。そのような理由からこの絵はしばしば「絶筆」扱いされてきた。先に引用した手紙でふれられているのがこの絵だとすれば、絵は死の二十日ほど前には描かれていたことになるから、絶筆ではない。それでもこの絵は小説、映画などあらゆる伝記的物語のなかで「絶筆」として扱われてきた。「鴉の群れ飛ぶ麦畑」というタイトルも、ファン・ゴッホ自身がつけたものではない。遺族がつけたタイトルでもない。ファン・ゴッホの没後しばらくして、展覧会にこの絵が出展された時のタイトルは「黒い鳥のいる麦畑」であった。たしかにこの鳥が鴉だという根拠はない。しかし、画家の死後、ある時期に「絶筆」という記述がつき始め、十数年経ってから「黒い鳥」の代わりに「鴉」が使われ始め、その後しだいに「鴉の群れ飛ぶ麦畑」、「絶筆」という二つの記述とこの絵は切り離せなくなっていった。それはこの絵の醸し出す雰囲気がまさに画家の最期にふさわしいという暗黙の了解に基づいている。

　しかし、あるいはこの絵は実質的に絶筆のようなものだったのかもしれない。自分と同じ名前をもった新しい命を自分の腕に抱き、その命にとって自分が少しでも邪魔者であるとわかったその時点で、ファン・ゴッホのなかで張りつめていた糸はぷつんと切れていたのかもしれない。





　１８９０年７月27日、ファン・ゴッホは腹部に銃弾をかかえたまま帰宅した。自殺か他殺かについては異説がある。翌日、パリからテオがかけつけたが、医師も銃弾を取り除く処置はできず、29日、ファン・ゴッホは息をひきとった。享年三十七歳。画家仲間からは絵を認められ始め、作品もすでに一点売れていた。あと十年、いやせめてあと五年生き延びていれば、画家として自立し、自身の成功を目の当たりにすることもできたかもしれない。しかし、ファン・ゴッホ自身、数年前に予測していた通り、これ以上この難しい生を生き続けることは不可能だったのである。

　ファン・ゴッホが死んだ日に持っていた手紙がある。ファン・ゴッホはこの手紙を７月23日に書きかけたが、途中で止め、新たに書きなおしたものを投とう函かんした。持っていたのは途中で止めた手紙である。





「親切な手紙と同封の五十フラン札をありがとう。

　いろいろたくさんのことを書きたいとも思うが、それも無駄なような気がする。（……）

　君は君の家庭が平和な状態にあるとしてぼくを安心させようとしてくれているが、それにはおよばない。ぼくはよい面もそうでない面も見たと思っている。〔子供を五階で育てるのが君にとってもヨーにとっても苦労の種になるということにはまったく同感だ〕（……）

　ともあれ、まさに、ぼくらはぼくらの絵に語らせる以外には何もできない。しかしそれでも弟よ、これは今までにもずっと言ってきたことだが、もう一度言っておく。できる限りいい絵を描くために考えぬき、努力しつづけてきた果ての、全生涯の重みをかけて、もう一度言っておくが、君は単なるコローの画商とはちがう何者かだ。君はぼくを介して、倒産の危機にあっても落ち着いていられるような、そんな絵の制作そのものに加わったのだ。（……）

　ともあれぼくは仕事に命をかけ、ぼくの理性はそのために半ば壊れてしまった。それもよい。しかし、君はそこいらの画商ではない。ぼくが知る限り君は現実的に人間に対する愛をもって行動できると思うが、しかし君はどうしたいのか」



（RM25/652）





　ここで手紙は途切れていた。兄を失ったテオは長く生きられなかった。もともと病気がちで、兄の埋葬でも人目を憚はばからずに泣き崩れていたテオは、兄の埋葬から二ヶ月も経たないうちに病気を発症した。窓から飛び降りようとし、家族に暴力を振るおうとしたこともあったという。梅毒の兆候が出てきた。体も心も蝕むしばまれ、入院を余儀なくされる。兄の死からわずか半年後、オランダ、ユトレヒトの病院で兄の後を追うように他界した。残されたヨーは四半世紀の歳月をかけて１９１４年にファン・ゴッホの書簡全集を刊行し、ユトレヒトにあったテオの墓をオーヴェールのフィンセントの墓の隣に移設している。書簡全集の冒頭にヨーはこう記している。





　この書は、フィンセントとテオの想い出にささげられる。

「二人は生くるにも死ぬるにも離れざりき」



（「サムエル記下」一章23節）





　ヨーはあの７月６日のことを悔いていなかっただろうか。自分がもうすこし寛容であれば、画家ファン・ゴッホは闘病しながらでもあとすこし生きながらえて作品を描きつづけ、テオも早世しなくてよかったのでは、とは考えなかっただろうか。その後のヨーの人生を見る限り、ヨーがあの膨大な書簡集を編へん纂さんし、テオの墓をオーヴェールに移設し、作品を管理しつづけられたのは、そこにフィンセントとテオへの深い自責の念があったからではないかと思わずにはいられない。





　画家の想い、そしていくつもの切実な想いが重なり、託されて、画家ファン・ゴッホは今日なお生き続けている。





　おわりに





　本書を書くにあたって、自分自身がファン・ゴッホとはじめて出会った時のことを思い出そうとしてみた。最初の記憶にあるのは中学の美術の教科書にあった《ラングロワの橋》。たしか、ノートの表紙の端切れで裏打ちして、壁にピンでさしていたと思う。でももっと記憶をたどると、小学校高学年の時に公園で写生大会をしていた時に自分の絵が水彩なのに「ゴッホの厚塗り」みたいだと思ったか、言われたかのような記憶もぼんやりとある。その後、高校の野球部合宿所で寝転がって画集を見ていた時に、チームメートに変人扱いされたのも覚えている。美術館で本物に接したのは大学一年の時。まもなく『ファン・ゴッホ書簡全集』を通読した。他のどの本とも違う濃密な読書体験だった。





　ファン・ゴッホを他のどの画家とも違う特別な存在にしているのは、その才能でもなければ、「耳切り事件」や「自殺」でもない。彼以上に才能のある画家など山ほどいるし、自殺した画家も少なくはない。ファン・ゴッホを特別な存在にしているもの、それは彼の手紙である。
