　現存するファン・ゴッホの手紙は弟テオ宛が六百通以上、画家ファン・ラッパルト、ベルナール、妹ウィルなどに宛てたものも合わせると八百通近くになる。また、ファン・ゴッホに宛てた手紙で現存するものも合わせると全部で約九百通にのぼる。重要なのは数だけではない。ひとつひとつの手紙は長く、内容も濃密だ。人生に起こった出来事、作品についての考えなどが詳細に綴つづられている。

　もしファン・ゴッホの手紙が一通も現存しなかったとしよう。わたしたちはこの画家が何を考えてひまわりや農民や星空を描き、日本について何を思い、家族や友人、知人たちとどう付き合ったかといったことについて何も知ることができない。ある自画像が日本の僧そう侶りよとして描かれていることもまったく知られないまま、ただ奇妙な顔をした自画像として的外れな解釈をされていたかも知れない。

　ただ、美術史家の扱う資料として重要だと言うのではない。およそ一人の画家、いや一人の人間についてこれほど濃密な情報がえられる資料が残っていること自体、ほとんど奇跡に近い。かりに数千年後、「芸術」などという言葉は消え、「絵画」でさえ完全に過去のものになっていても、ファン・ゴッホの手紙が残れば、数千年前に「芸術家」、「画家」という人種がいて、それがどのような人間だったのか、どのような「生き方」だったのかを未来の人間は実感することができるだろう。





　最初のファン・ゴッホ書簡全集はヨーが編へん纂さんして１９１４年に刊行された。その後版を重ね、翻訳も数多くされてきた。日本語訳全集も１９６９年から70年にかけて刊行されている。ファン・ゴッホに関する伝記、小説、伝記映画など、あらゆる書物と映像作品はこの書簡集をベースに作られてきた。

　２００９年秋に、この書簡全集の改訂版が出た。改訂版というよりはもうほとんど決定版といってよい。ファン・ゴッホ美術館が十五年という気の遠くなるような歳月をかけて準備した決定版の書簡全集である。そのプロジェクトがスタートした時のことはよく覚えている。ファン・ゴッホ美術館が新書簡全集刊行のために専任のスタッフを二人雇ったと館員から聞いた。二人は書簡全集の仕事だけをする専任スタッフである。この二人を美術館は十五年間雇いつづけ、途中からはさらに一人加えて三人になった。刊行の前年、いよいよ来年辺りに刊行できそうだ、という話を聞いて、ファン・ゴッホ美術館に行ったおりに、編集者の一人ハンス・ライテンにその内容を見せてもらった。その完成度の高さに啞あ然ぜんとした。

　作業は手紙の書き起こしの再チェックから始まり、日付の洗い直しももちろん行われた。ファン・ゴッホの手紙にはほとんど日付が書かれていない。そこで消印の他、書かれている内容、当時の天候の記録、当時の郵便配達日数など、ありとあらゆる情報をもとに、日付が特定された。ヨーの編纂した書簡全集については手紙の順序や日付がまちがっていることはかねてから指摘されていて、研究者が逐次修正してきたが、今回の書簡全集では、たとえば未刊行のファン・ゴッホの家族（母親や妹など）の手紙や、友人知人の手紙なども参照している。また、ヨーは書簡を編集するにあたって、存命中の人に配慮して人名の一部をイニシャルで表したり、都合の悪い箇所をとばしたり、場合によってはインクで塗りつぶした形跡すらある。もしかすると、廃棄した手紙もあったかもしれない。新しい書簡全集では、すべて手紙のオリジナルをもとに旧版の誤りを訂正し、紛失した手紙についても、誰宛の手紙が紛失したかすべてリストアップされている。

　書簡中にふれられている文学作品、新聞・雑誌記事、美術作品などもすべて可能な限り洗い出している。これがどれほど気の遠くなるような作業かは、すこしでもやってみたことのある者にはよくわかる。私自身も実際にこれらのデータをリストアップしたカードを作っていたが、あくまで研究に必要な情報を得るためのツールとして使っていたにすぎない。つまり、すべてを洗い出すのはあまりに大変なのでそれは諦あきらめて、自分の研究に必要な分だけを探すということをしていた。ひとつ、ふたつを探すだけでも、フランス時代のものならパリの国立図書館の定期刊行物閲覧室で何日も新聞をめくりつづけて、結局見つからないとかいう経験もしていたから、全部について探すという作業はもう気の遠くなるような、おそろしく根気のいる作業である。

　美術作品の洗い出しも決して簡単ではない。ミレーやドラクロワなど、今日有名な画家ならば情報は得やすいので、比較的見つけやすいが、今日もうほとんど忘れられているような画家の作品もかなりある。それらの作品を、手紙にふれられた情報だけをもとに見つけるのも至難の業である。今回の編集スタッフたちは、この作業を根気よくつづけてきたのである。そして、手紙の中でふれられている作品のうち特定できたものはすべて、その頁に図版掲載された。ファン・ゴッホがオリジナルで見た作品についてはすべてカラーで掲載し、複製写真などで見た場合は白黒で掲載してある。つまり、ファン・ゴッホが経験したのと同じ視覚体験を追体験しながら手紙を読み進められるのだ。初出では大きく掲載し、何度も手紙でふれられる場合、二度目からはサムネイルのような小さな図版で何度でも掲載されている。その結果、全六巻の新書簡全集の図版数は四千を超えた。これだけ聞いただけでもその凄すごさに圧倒された。こんなに時間をかけたのだから完成度は高いだろうとは思っていたが、惜しげもなく情報をのせるその徹底ぶりに啞然とした。これら以外にもテキストには註ちゆうがたっぷりとついている。手紙でふれられている人物、出来事にはことごとく註がついた。

　ここまで話を聞いただけでも十分に圧倒されていたのに、ハンスは次に私をパソコンのモニターの前に連れて行った。「ウェブ版も同時公開するんです」と言って、ほぼ完成しているウェブ版を見せてくれた。ウェブ版は無料で公開するのだと言う。「そんなことをしたら誰も高い本を買わなくなるのでは？」と訊きいてみると、「わたしたちはそうは考えていないんです」と言う。「ウェブ版は検索もできて非常に便利だけれど、通読できるようなものではないので、ウェブ版が宣伝になって書籍版も結果的に売れるとふんでいます」と自信をもって言う。

　ウェブ版は手紙が書かれた言語（オランダ語、フランス語、英語）と英語翻訳のみ、冊子版はオランダ語版、英語版、フランス語版、中国語版の四種類が出版されている。ウェブ版は専門家にはきわめて便利なツールだ。何よりも検索機能が便利で、たとえば「ひまわり」という言葉で検索すれば、この言葉を含む手紙と註のすべてが数秒以内に表示される。また、書籍版は紙面に限度があるので註もある程度の分量までで止めているが、ウェブ版は註を惜しげもなくつけてあって、随時更新していくのだと言う。つまり今後ずっと改訂版が出つづけることになる。また本文に訂正の必要が出てくれば、それも随時改訂される。

　こんな書簡全集は見たこともない。これまでのファン・ゴッホ書簡全集でもきわめて貴重な情報源だったのに、新版はさらに正確になり、さらに情報量が増えている。ファン・ゴッホの人生と作品にかかわるあらゆる情報が極めて高い精度で、容易に入手できるのである。作品がいつどのように構想されたか、制作の動機は何か、何月何日に完成し、いつ絵具が乾き、いつテオに送られたか。画家がどのような意図や心情をもって制作したか、そのようなことが詳細にわかる。

　旧書簡全集でも、ファン・ゴッホを十分に「特別な」存在にしていたが、新書簡全集ではさらに「特別」になる。一人の画家、人間について、おそろしいほどの精度で情報が得られるのだから。旧書簡全集がブラウン管に映し出されたファン・ゴッホだったとすれば、新全集は高精細液晶大画面に映し出されたファン・ゴッホだと言ってよいだろうか。そのぐらいの差がある。新しい書簡全集が出た今、これが「ファン・ゴッホ」という画家にどのような変化をもたらすのか興味深い。

　もちろん、新書簡全集の日本語版も是非刊行するべきだが、今のところまだ実現の見込みは立っていない。翻訳といえども、ファン・ゴッホ美術館が十五年をかけた出版物の翻訳である。そんなに簡単に取り組めるものではない。しかし、オランダ語、英仏中の各国語版でこの新書簡全集に親しめる人たちと、旧版の日本語訳でしか読めない日本人との間には途方もなく大きな差ができる。旧全集はおよそ一世紀の間その役割を果たしてきたが、新全集はおそらくそれ以上の寿命をもつだろう。日本語でも早く出版され、長く愛読されるものになって欲しいと願っている。

　ただ、書簡全集は膨大すぎて多くの読者には通読はむずかしい。そこでファン・ゴッホ美術館は全書簡のなかからおよそ三分の一にあたる二六五通を厳選した書簡集も２０１４年のオランダ語版、英語版を皮切りに刊行し始めた。その後、フランス語、ドイツ語、トルコ語などの翻訳が出され、近々、日本語版も筆者の全訳で刊行される。

　ファン・ゴッホ美術館には他にもまだ書簡が所蔵されている。テオから両親への手紙やテオから兄弟姉妹などへの手紙で、これらはファン・ゴッホ家の私的所蔵物であったし、現在もファン・ゴッホ財団の所蔵なので公開されていない。これまでごく一部だけ引用されており、本書のなかでもいくつか引用しているが、ファン・ゴッホの両親や兄弟の心情が読み取れて非常に興味深い。いずれ部分的にでも公刊されることになるであろう。





　手紙の存在は、作品に豊かな意味を与えてくれる。ファン・ゴッホは投とう函かんされなかった最後の手紙でテオに「ぼくらはぼくらの絵に語らせる以外には何もできない」と書き、さらに「きみはぼくを仲介として、倒産の危機にあっても落ち着いていられるような、そんな絵の制作そのものに加わったのだ」と書いている。しかし、テオとその遺志を受け継いだヨーは、さらに手紙をすべて後世に伝えるという大仕事を通じて、ファン・ゴッホの絵に、「絵に語らせる以外」のことを可能にしたのである。新しい書簡全集を十五年に渡って編集してきた人たちも、ヨーの遺志をさらに受け継いだことになる。

　本書で伝えたかったのはフィンセントと彼を支えた人々の想いであった。ひとつひとつの作品に、ひとつひとつの手紙に、画家の、そして人々の愛情や苦しみや後悔やさまざまな想いがみちていたことを、絵に語らせ、絵以外のものに語らせることであった。

　想いはできるだけ多くの人に伝えたい。だから、ファン・ゴッホの絵を初めて見るという読者も念頭において書いた。なかにはむずかしい話も混じっているかもしれないが、あくまでファン・ゴッホについて最初に読んでいただく本として書いた。これまでに書いてきた研究書とは何もかも違った。思い浮かべる読者も、書いている間の感覚やたのしみもちがった。自分自身がはじめてファン・ゴッホの作品や手紙と出会った頃のことも書きながらずいぶん思い出した。

　執筆の機会を与えていただいた角川書店（現、ＫＡＤＯＫＡＷＡ）、遅筆の私に締切というものがあることを穏やかに伝え、辛抱強くお付き合いいただいた藤田有希子さん、ソフィア文庫の改訂版でお世話になった伊集院元郁さんにこの場を借りて心からお礼申し上げたい。

　本を書き上げた時の感触も今回は違った。研究書が武装した心を完成した兵器のように輸送船に詰めて送る感じだとすると、文庫本は、静かに育ててきた大切なものを白い旅客機に乗せて送り出す感じがする。夏の真っ青な空に輝きながら飛んでいく飛行機が小さな点になるまで見送るのは、とてもすがすがしく、すこしだけ悲しい。

        function chunkText() {

        // 指定されたページの文章を表示する
        function displayPage(pageNumber) {
            if (pageNumber >= 0 && pageNumber < textChunks.length) {
                textDisplay.textContent = textChunks[pageNumber];

            }

                if (currentPage < textChunks.length - 1) {
                    currentPage++;
                    displayPage(currentPage);
                }
                inputBox.value = '';
            }

            // Backspaceキーが押され、入力バーが空の時に前のページへ
            if (e.key === 'Backspace') {
                if (inputBox.value === '') {
                    if (currentPage > 0) {
                        currentPage--;
                        displayPage(currentPage);
                    }
                }
            }
        });

        // ページ読み込み時の初期化処理
        function init() {
            chunkText();
            displayPage(currentPage);
            inputBox.focus();
        }
