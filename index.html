「三年前。大きな時間震しん動どうが検出されたの。ああうん、今の時間から数えて三年前ね。キョンくんや涼宮さんが中学生になった頃ころの時代。調査するために過去に飛んだ我々は驚おどろいた。どうやってもそれ以上の過去に遡さかのぼることが出来なかったから」

　また三年前か。

「大きな時間の断層が時間平面と時間平面の間にあるんだろうってのが結論。でもどうしてその時代に限ってそれがあるのかは解らなかった。どうやらこれが原因らしいってことが解ったのはつい最近。……んん、これはわたしのいた未来での最近のことだけど」

「……何だったんです？」

　まさかアレが原因なんじゃないだろうな、という俺の願いは聞き届けられなかった。

「涼宮さん」

　朝比奈さんは、一番俺が聞きたくなかった言葉を言った。

「時間の歪ゆがみの真ん中に彼女がいたの。どうしてそれが解ったのかは訊きかないで。禁則事じ項こうに引っかかるから説明出来ないの。でも確かよ。過去への道を閉とざしたのは涼宮さんなのよ」

「……ハルヒにそんなことが出来るとは思えないんですが……」

「わたしたちだって思わなかったし、本当のこと言えば、一人の人間が時間平面に干かん渉しよう出来るなんて未いまだに解明出来ていないの。謎なぞなんです。涼宮さんも自分がそんなことしてるなんて全然自覚してない。自分が時間を歪わい曲きよくさせている時間震動の源だなんて考えてもいない。わたしは涼宮さんの近くで新しい時間の変異が起きないかどうかを監かん視しするために送られた……ええと、手て頃ごろな言葉が見つからないけど、監視係みたいなもの」

「…………」と俺。

「信じてもらえないでしょうね。こんなこと」

「いや……でも何で俺にそんなことを言うんです？」

「あなたが涼宮さんに選ばれた人だから」

　朝比奈さんは上半身ごと俺のほうへと向き直って、

「詳くわしくは言えない。禁則にかかるから。多分だけど、あなたは涼宮さんにとって重要な人。彼女の一挙手一投足にはすべて理由がある」

「長門や古泉は……」

「あの人たちはわたしと極めて近い存在です。まさか涼宮さんがこれだけ的確に我々を集めてしまうとは思わなかったけど」

「朝比奈さんはあいつらが何者か知ってるんですか？」

「禁則事項です」

「ハルヒのすることを放っておいたらどうなるんですか」

「禁則事項です」

「て言うか、未来から来たんだったらこれからどうなるか解りそうなもんなんですけど」

「禁則事項です」

「ハルヒに直接言ったらどうなんです」

「禁則事項です」

「…………」

「ごめんなさい。言えないんです。特に今のわたしにはそんな権限がないの」

　申し訳なさそうに朝比奈さんは顔を曇くもらせ、

「信じなくてもいいの。ただ知っておいて欲しかったんです。あなたには」

　似たようなセリフを先日も聞いたな。人の気配がしない静かなマンションの一室で。

「ごめんね」

　黙だまりこくる俺にどういう感想を抱いだいたのか、朝比奈さんは切なそうに目を潤うるませた。

「急にこんなこと言って」

「それは別にいいんですが……」

　自分が宇宙人に作られた人造人間だとか言い出す奴やつがいたと思ったら今度は未来人の出現ですか。何をどうやったらそんなことが信じられるんだ？　よかったら教えて欲しい。

　ベンチに手をついた拍ひよう子しに朝比奈さんと手が触ふれ合った。小指しか触さわってないのに朝比奈さんは電流でも走ったみたいに大げさに手を引っ込めて、またうつむいた。

　俺たちは黙って川かわ面もを見つめ続けていた。

　どれだけの時間が経過したことか。

「朝比奈さん」

「はい……？」

「全部、保留でいいですか。信じるとか信じないとかは全部脇わきに置いておいて保留ってことで」

「はい」

　朝比奈さんは微笑ほほえんだ。いい笑え顔がおです。

「それでいいです。今は。今後もわたしとは普ふ通つうに接して下さい。お願いします」

　朝比奈さんはベンチに三つ指をついて深々と頭を下げた。大げさな。

「一個だけ訊いていいですか？」

「何でしょう」

「あなたの本当の歳としを教えて下さい」

「禁則事項です」

　彼女はイタズラっぽく笑った。





　その後、俺たちはひたすらに街をブラついて過ごした。ハルヒにはデートじゃないんだからと釘くぎを刺さされていたが、あんな話を聞いた後ではもうどうでもよくなっていた。俺と朝比奈さんはコジャレ系のブティックをウィンドーショッピングして回ったり、ソフトクリームを買って食いながら歩いたり、バッタモノのアクセサリーを往来に広げている露ろ天てん商しようを冷やかしたり……つまり普通のカップルのようなことをして時間を潰つぶした。

　これで手でも繋つないでくれたら最高だったんだけどな。

　携けい帯たい電話が鳴った。発信元はハルヒ。

『十二時にいったん集合。さっきの駅前のとこ』

　切れた。腕うで時計を見ると十一時五十分。間に合うわけがねえ。

「涼宮さん？　何って？」

「また集まれだそうです。急いで戻もどったほうがよさそうですね」

　俺たちが腕でも組んで現れたらハルヒはどんな顔をするだろう。怒おこり出すだろうか。

　カーディガンの前を合わせながら朝比奈さんは不思議そうに俺を見上げた。





「収しゆう穫かくは？」

　十分ほど遅おくれて行くと開口一番、ハルヒは不ふ機き嫌げんな面つらで、

「何かあった？」

「何も」

「本当に探してた？　ふらふらしてたんじゃないでしょうね。みくるちゃん？」

　朝比奈さんはふるふると首を振ふる。

「そっちこそ何か見つけたのかよ」

　ハルヒは沈ちん黙もくする。その後ろで古泉が清せい涼りよう感かん溢あふれる顔で頭をかき、長門はぼんやりと突つっ立っていた。

「昼ご飯にして、それから午後の部ね」

　まだやるつもりかよ。





　ハンバーガーショップで昼飯を食っている最さ中なかにハルヒはまたグループ分けをしようと言い出し、喫きつ茶さ店てんで使用した五本の爪つま楊よう枝じを取り出した。用意のいい奴だ。

　無造作に手を一いつ閃せんさせ、古泉が、

「また無印ですね」

　白すぎる歯。こいつは笑ってばかりいるような気がするな。

「わたしも」

　朝比奈さんがつまんだ楊よう枝じを俺に見せた。

「キョンくんは？」

「残念ですが、印入りです」

　ますます不機嫌な顔で、ハルヒは長門にも引くようにうながした。

　クジの結果、今度は俺と長門有希の二人とその他三人という組み合わせになった。

「……」

　印の付いていない己おのれの爪楊枝を親の仇きゆう敵てきのような目つきで眺ながめ、それから俺とチーズバーガーをちまちま食べている長門を順番に見て、ハルヒはペリカンみたいな口をした。

　何が言いたい。

「四時に駅前で落ち合いましょう。今度こそ何かを見つけてきてよね」

　シェイクをチュゴゴゴと飲み干した。





　今度は北と南に別れることになり、俺たちは南担当。去り際ぎわに朝比奈さんは小さく手を振ってくれた。心が温まるね。

　そして今、俺は昼下がりの駅前で、喧けん噪そうの中に長門と並んで立ちつくしているわけだ。

「どうする」

「……」

　長門は無言。

「……行くか」

　歩き出すとついてくる。だんだんとこいつの扱あつかいにも慣れてきた。

「長門、この前の話だがな」

「なに」

「なんとなく、少しは信じてもいいような気分になってきたよ」

「そう」

「ああ」

「…………」

　空くう虚きよなオーラをまといながら俺たちは黙もく々もくと駅の周りを回り続けた。

「お前、私服持ってないのか」

「……」

「休みの日はいつも何してんのさ」

「……」

「今、楽しいか」

「……」

　ま、こんな感じか。

　いい加減に虚きよ無む的な行動を続けるのもしんどくなってきたので、俺は長門を図書館に誘さそった。本館はもっと海べりにあるのだが、駅前が行政開発によって土地整備されたときに出来た新しい図書館である。本なんかほとんど借りたりしないから俺は入ったことがない。

　ソファでもあったら座って休もうと思っていたのだが、あるにはあるものの全部ふさがっていた。ヒマ人どもめ。他ほかに行くところがないのか。

　俺が憮ぶ然ぜんと館内を見み渡わたしていると、長門はまるで夢遊病患かん者じやのようなステップでふらふらと本ほん棚だなに向かって歩き出した。放ほうっておこう。

　本は昔よく読んだ。小学生の低学年の頃ころ、母親が図書館で子供向けのジュブナイルを借りてきて俺にあてがった本を片かた端はしから読んでいた。ジャンルも何もまちまちだったが、それでも読む本すべてが面おも白しろかったように記き憶おくしている。何読んだかは忘れたけど。

　いつからかな。本を読まなくなったのは。読んでも面白いと思わなくなったのは。

　俺は本棚から目に付いた本を抜ぬいて、パラパラめくっては元に戻もどすことを繰くり返しながらこれだけの量の中から事前情報なしに面白い本を探すのは一苦労だなと考えながら棚の間をさまよった。

　長門の姿を探すと、壁かべ際ぎわのやたらでかくて分厚い本が立ち並んでいる棚の前でダンベルの代わりになりそうな本を立ち読みしていた。厚モノ好きだな、ほんと。

　スポーツ紙を広げてふんぞり返っていたオッサンがソファを離はなれたのを見つけて、俺は適当に選んだノベルス本を抱かかえて空いたスペースに滑すべり込んだ。

　読む気もない本を読むのはさすがにノレず、瞬またたく間に俺は睡すい魔まとの闘たたかいを余よ儀ぎなくされ、敵の圧あつ倒とう的な波状攻こう撃げきにあっさり陥かん落らく、俺は速すみやかに眠ねむりに落ちた。

　尻しりポケットが震しん動どうした。

「おわ？」

　飛び起きる。周囲の客が迷めい惑わくそうに俺を見て俺はここが図書館であることを思い出した。ヨダレをぬぐいつつ俺は館外に小走りで出た。

　バイブレータ機能をいかんなく発揮していた携けい帯たい電話を耳に当てる。

『何やってんのこのバカ！』

　金切り声が鼓こ膜まくをつんざいた。おかげで頭がはっきりする。

『今何時だと思ってんのよ！』

「すまん、今起きたとこなんだ」

『はあ？　このアホンダラゲ！』

　お前だけにはアホとは言われたくないな。

　腕うで時計を見ると四時半を回っている。四時集合だったっけ。

『とっとと戻りなさいよ！　三十秒以内にね！』

　無茶言うな。

　乱暴に切られた携帯電話をポケットに戻して図書館に戻る。長門は簡単に見つかった。最初に見かけた棚の前を動かずに百科事典みたいな本を読みふけっていたからである。

　そこからが一苦労だった。床ゆかに根を生やしたように動かない長門をその場から移動させるには、カウンターに行って長門の貸し出しカードを作ってその本を借りてやるまでの時間が必要で、その間にかかりまくってくるハルヒからの電話を俺はすべて無視した。

　何だか難しい名前の外国人が著者の哲てつ学がく書を大切そうに抱える長門を急せかして駅前に戻って来た俺たちを、三人は三者三様の反応で出で迎むかえてくれた。

　朝比奈さんは疲つかれ切った顔でため息混じりに微笑ほほえんで、古泉の野や郎ろうはオーバーアクションで肩かたをすくめ、ハルヒはタバスコを一気飲みしたような顔で、

「遅ち刻こく。罰ばつ金きん」と言った。

　またおごりかよ。





　結局のところ、成果もへったくれもあるはずがなく、いたずらに時間と金を無む駄だにしただけでこの日の野外活動は終わった。

「疲れました。涼宮さん、ものすごい早足でどんどん歩いていくんだもの。ついて行くのがやっと」

　別れ際に朝比奈さんが言って息をついた。それから背せ伸のびして俺の耳元に唇くちびるを近づけ、

「今日は話を聞いてくれてありがとう」

　すぐに後ろに下がって照れて笑う。未来人ってのは皆みなこんなに優ゆう雅がに笑うものなのかね。

　じゃ、と可愛かわいく会え釈しやくして朝比奈さんは立ち去った。古泉が俺の肩を軽く叩たたき、

「なかなか楽しかったですよ。いや、期待にたがわず面白い人ですね、涼宮さんは。あなたと一いつ緒しよに行動出来なかったのは心残りですが、またいずれ」

　いやになるほど爽さわやかな笑えみを残して古泉も退去、長門はとうの昔に姿を消していた。

　一人残ったハルヒが俺を睨にらみつけ、

「あんた今日、いったい何をしてたの？」

「さあ。いったい何をしてたんだろうな」

「そんなことじゃダメじゃない！」

　本気で怒おこっているようだった。

「そう言うお前はどうなんだよ。何か面白いもんでも発見出来たのか？」

　うぐ、と詰つまってハルヒは下唇をかんだ。放っとくとそのまま唇を噛かみやぶらんばかりである。

「ま、一日やそこらで発見出来るほど、相手も無防備じゃないだろ」

　フォローを入れる俺をジロリという感じで見て、ハルヒはつんと横を向いた。

「明後日あさつて、学校で。反省会しなきゃね」

　きびすを返し、それっきり振ふり返ることもなくあっと言う間に人混みに紛まぎれていく。

　俺も帰らせてもらおうかと銀行の前まで行けば、自転車がなかった。かわりに「不法駐ちゆう輪りんの自転車は撤てつ去きよしました」と書かれたプレートが近くの電柱にかかっていた。





　　第五章





　週明け、そろそろ梅雨つゆを感じさせる湿しつ気けを感じながら登校すると着いた頃ころには今までにも増して汗あせみずくになった。誰だれかこの坂道にエスカレータを付けるという公約を掲かかげて選挙に出る奴やつはいないものか。将来選挙権を得たときにそいつに投票してやってもいい。

　教室で下した敷じきを団扇うちわ代わりにして首元から風を送り込んでいたら、珍めずらしく始業の鐘かねギリギリにハルヒが入ってきた。

　どすりと鞄かばんを机に投げ出し、

「あたしも扇あおいでよ」

「自分でやれ」

　ハルヒは二日前に駅前で別れたときとまったく変化のない仏ぶつ頂ちよう面づらで唇を突つき出していた。最近マシな顔になったと思っていたのに、また元に戻もどっちまった。

「あのさ、涼宮。お前『しあわせの青い鳥』って話知ってるか？」

「それが何？」

「いや、まあ何でもないんだけどな」

「じゃあ訊きいてくんな」

　ハルヒは斜ななめ上を睨み、俺は前を向き、岡部教師がやって来てホームルームが始まった。





　この日の授業中、不ふ機き嫌げんオーラを八方に放射するハルヒのダウナーな気配がずっと俺の背中にプレッシャーを与あたえていて、いや、今日ほど終業のチャイムが福ふく音いんに聞こえた日はなかった。山火事をいち早く察知した野ネズミのように、俺は部室棟とうへと退たい避ひする。

　部室で長門が読書する姿は今やデフォルトの風景であり、もはやこの部屋と切り離はなせない固定の置物のようでもあった。

　だから俺は、一足先に部室に来ていた古泉一樹にこのように言った。

「お前も俺に涼宮のことで何か話があるんじゃないのか？」

　この場には三人しかいない。ハルヒは今週が掃そう除じ当番だし朝比奈さんはまだ来ていない。

「おや、お前も、と言うからにはすでにお二方からアプローチを受けているようですね」

　古泉は、昨日図書館から借り出した本に顔を埋うずめている長門を一いち瞥べつする。すべてを知ってるみたいな訳知り口調が気に入らない。

「場所を変えましょう。涼宮さんに出くわすとマズイですから」

　古泉が俺を伴ともなって訪れた先は食堂の屋外テーブルだった。途と中ちゆうで自じ販はん機きのコーヒーを買って俺に手て渡わたし、丸いテーブルに男二人でつくのもアレだけども、この際仕方がない。

「どこまでご存じですか？」

「涼宮がただ者ではないってことくらいか」

「それなら話は簡単です。その通りなのでね」

　これは何かの冗じよう談だんなのか？　ＳＯＳ団に揃そろった三人が三人とも涼宮を人間じゃないみたいなことを言い出すとは、地球温暖化のせいで熱気にあてられてるんじゃねえのか。

「まずお前の正体から聞こうか」

　宇宙人と未来人には心当たりがあるから、

「実は超ちよう能のう力りよく者でして、などと言うんじゃないだろうな」

「先に言わないで欲しいな」

　古泉は紙コップをゆるゆると振って

「ちょっと違ちがうような気もするんですが、そうですね、超能力者と呼ぶのが一番近いかな。そうです、実は僕は超能力者なんですよ」

　俺は黙だまってコーヒーを飲んだ。減糖しておくべきだった。甘ったるい。

「本当はこんな急に転校してくるつもりはなかったんですが、状じよう況きようが変わりましてね。よもやあの二人がこうも簡単に涼宮ハルヒと結けつ託たくするとは予定外でした。それまでは外部から観察しているだけだったんですけど」

　ハルヒを珍しい昆こん虫ちゆうか何かみたいに言うな。

　俺の眉まゆが寄ったのを見てとったか、

「どうか気を悪くしないで下さい。我々も必死なんですよ。涼宮さんに危害を加えたりはしませんし、むしろ我々は彼女を危機から守ろうとしているんですから」

「我々ってことは、お前の他ほかにもいっぱいいるのか。その超能力者とやらは」

「いっぱいってことはないですが、それなりには。僕は末まつ端たんなので正確には知りませんが、地球全土で十人くらいでしょう。その全員が『機関』に所属しているはずです」

『機関』と来たか。

「実体は不明です。構成員が何人いるのかも。トップにいる人たちがすべてを統とう括かつしているそうですが」

「……それで、その『機関』なる秘密結社は何をする団体なんだ」

　古泉はぬるくなったコーヒーで唇くちびるを湿しめらせ、

「あなたの想像通りですよ。『機関』は三年前の発ほつ足そく以来、涼宮ハルヒの監かん視しを最重要事じ項こうにして存在しています。きっぱり言い切ってしまえば、涼宮さんを監視するためだけに発生した組織です。ここまで言えばそろそろお解わかりでしょうが、この学校にいる『機関』の手の者は僕だけではありません。何人ものエージェントがすでに潜せん入にゆう済みです。僕は追加要員としてここに来ました」

　だしぬけに俺は谷口の顔を思い出した。ハルヒとは中学からずっと同じクラスであるとか言っていた。まさか、あいつも古泉と同種類の人間なのか？

「さあ、それはどうでしょう」

　古泉はするりとしらばっくれ、

「しかしまあ、それなりの人員が涼宮さんの周りにいることは保証してもいいですよ」

　どうしてみんなそんなにハルヒが好きなんだ。エキセントリックで居い丈たけ高だかで周囲の迷めい惑わくを顧かえりみない自己中女のどこにそんな大げさな組織から狙ねらわれるような要因があると言うんだ。見てくれがいいのは認めてやっていいが。

「今から三年前に何があったのかは解りません。僕に解るのは、三年前のあの日、突とつ然ぜん僕の身に超能力としか思えない力が芽生えたことですね。最初はパニックでしたよ。怖こわい思いもずいぶんしましたしね。すぐに『機関』からお迎むかえが来て救われましたが、あのままではてっきり自分の頭がおかしくなったと思って自殺してたかもしれません」

　その時から今までずっとお前の頭はおかしくなり続けなんじゃないか。

「ええ、その可能性もなくはない。しかし我々はもっと畏い怖ふすべき可能性を危き惧ぐしているのですよ」

　自じ嘲ちよう的な笑えみと一いつ緒しよにコーヒーを飲み込んだ古泉は不意に真顔になった。

「あなたは、世界がいつから存在していると思いますか？」

　えらくマクロな話に飛んだな。

「遥はるか昔にビッグバンとかいう爆ばく発はつが起きてからじゃないのか」

「そういうことになってますね。ですが我々は一つの可能性として、世界が三年前から始まったという仮説を捨てきれないのですよ」

　俺は古泉の顔を見返した。正気の沙さ汰たとは思えんな。

「そんなわけがないだろ。俺は三年前より以前の記き憶おくだってちゃんとあるし、親だって健在だ。ガキの頃ころにドブに落ちて三針縫ぬった傷きず跡あとだってちゃんと残ってる。日本史で必死こいて覚えている歴史はどうなるんだよ」

「もし、あなたを含ふくめる全人類が、それまでの記憶を持ったまま、ある日突然世界に生まれてきたのではないということを、どうやって否定するんですか？　三年前にこだわることもない。いまからたった五分前に全宇宙があるべき姿をあらかじめ用意されて世界が生まれ、そしてすべてがそこから始まったのではない、と否定出来る論ろん拠きよなどこの世のどこにもありません」

「…………」

「例えば、仮想現実空間を考えてみて下さい。あなたが脳に電極を埋うめ込まれ、見ている映像や空気の匂においやテーブルを触さわった感覚などが、全部直接脳に与あたえられている情報なのだとしたら、あなたはそれが本当の現実でないと気付くことはないでしょう。現実とは、世界とは意外に脆もろいものなんです」

「……それはそれでいいことにしておこう。世界が三年前か五分前に始まったってのもまあいい。そこから何をどう捻ひねったらハルヒの名前が出てくるんだ？」

「『機関』のお偉えら方は、この世界をある存在が見ている夢のようなものだと考えています。我々は、いやこの世界そのものがその存在にとっての夢にすぎないのではないかとね。なにぶん夢ですから、その存在にとって我々が現実と呼ぶ世界を創造したり改変したりすることなどは児じ戯ぎにも等しいはずです。そして我々はそんなことの出来る存在の名を知っています」

　丁てい寧ねい語で落ち着いた喋しやべりのせいか古泉の顔つきは腹立たしいほど大人びて見えた。

「世界を自らの意思で創ったり壊こわしたり出来る存在──人間はそのような存在のことを、神、と定義しています」

　……おい、ハルヒ。お前とうとう神様にまでされちまったぞ。どうすんだ。

「ですから『機関』の者は戦せん々せん恐きよう々きようとしているんですよ。万が一、この世界が神の不興を買ったら、神はあっさり世界を破は壊かいして一から創り直そうとするかもしれません。砂場に作った山の形が気に入らなかった子供のように。僕はいくら矛む盾じゆんに満ちた世の中だとは言え、この世界にそれなりの愛着を抱いだいています。ですので、『機関』に協力しているというわけなんです」

「ハルヒに頼たのんでみたらどうだ、世界を壊すのはどうかやめて下さいってな。聞いてくれるかもしれないぞ」

「もちろん涼宮さんは自分がそのような存在であることには無自覚です。彼女はまだ本来の能力に気付いていない。我々は出来れば生しよう涯がい気付かないまま平へい穏おん無事な人生を送ってもらいたいと考えています」

　ここでやっと古泉は元の笑みを取り戻もどした。

「言うならば彼女は未完成の神ですよ。自在に世界を操あやつるまでにはなっていない。ただし未発達ながら、片へん鱗りんを見せるようにはなっています」

「どうして解る？」

「あなたは何故なぜ我々みたいな超ちよう能のう力りよく者や、あるいは朝比奈みくるや長門有希のような存在がこの世にいると思うんですか。涼宮さんがそう願ったからですよ」

　宇宙人、未来人、異世界人、超能力者がいたら、あたしのところに来なさい。

　最初に出会った教室の自己紹しよう介かいでハルヒが述べたセリフが蘇よみがえる。

「彼女はまだ自覚的に神のごとき力を発揮出来はしない。無意識のうちに偶ぐう然ぜんその力を行使しているにすぎません。しかしこの数ヶ月ほど、明らかに人知を越こえた力が涼宮さんから放たれたことは解わかっています。その結果は、もう言うまでもありませんね。涼宮さんは朝比奈みくると出会い、長門有希に出会い、そして僕をも彼女の一団に加えてしまった」

　俺だけ除のけ者かよ。

「そうではありません。それどころか、あなたが一番の謎なぞなんです。失礼とは思いましたが、あなたについては色々調べさせてもらいました。保証します、あなたは特別何の力も持たない普ふ通つうの人間です」

　ほっとしていいのか、悲しむべきなのか。

「解りませんね。ひょっとしたらあなたが世界の命運を握にぎっているということも考えられます。これは我々からのお願いです。どうか涼宮さんがこの世界に絶望してしまわないように注意して下さい」

「ハルヒが神様だと言うのならな」と俺は提案した。「あいつを捕つかまえて解かい剖ぼうでもして、頭の中の仕組みでも調べるなりなんなりしてみたらどうだ。手っ取り早く世界の仕組みが解るかもしれないぞ」

「そのように主張する強きよう硬こう派も、確かに『機関』には存在します』

　あっさり古泉はうなずいた。

「ですが、軽々しく手を出すべきではないという意見で大勢は占しめられています。もしうっかりと神の機き嫌げんを損そこねてしまうようなことがあれば、高確率で取り返しのつかないことになるでしょう。我々が望んでいるのは世界の現状維い持じですから、涼宮さんには平和な生活を送っていただけることを希望しています。ヘタを打てば、火ひ鉢ばちの中の焼やき栗ぐりを取ろうとして結果、火傷やけどをすることになるだけですよ」

「……いったいどうすりゃいいんだよ」

「それも解りません」

「もし、もしもだな、ハルヒがポックリ逝いっちまったら世界はどうなる？」

「さて、同時に世界も一いつ瞬しゆんにして消しよう滅めつするのか、神なき世界が続くのか、また新しい神が生まれるのか。誰だれにも解りません。その時が来るまでね」

　紙コップのコーヒーはすっかり冷たくなっていた。飲む気が失うせて、俺はそれをテーブルの端はしに追いやると、

「超能力者とか言ったな」

「ええ、我々はまた違ちがう名めい称しようをつけていますが、簡単に言えばそれで間違いないでしょう」

「だったら何か力を使って見せてくれよ。そうしたらお前の言うことを信用してやる。例えばこのコーヒーを元の熱さに戻すとか」

　古泉は楽しそうに笑った。含ふくみ笑い以外の笑えみを見るのはこれが最初かもしれない。

「すみません無理です。そういう解りやすい能力とはちょっと違うんです。それに普段の僕には何の力もありません。力を使えるのはいくつかの条件が重なって初めて出来ることなんです。お見せする機会もあるでしょう」

　長々と話したりしてすみませんでした、今日はもう帰ります、と言って、古泉はにこやかにテーブルを離はなれた。

　俺は軽快に去りゆく古泉の背中が見えなくなるまで見送って、ふと思いついて紙コップを手に取った。

　言うまでもないかもしれないが。

　当然、中身は冷たいままだった。





　部室に戻ると朝比奈さんが下着姿で立っていた。





「……」

　朝比奈さんはフリフリのエプロンドレスを手に持って、ドアノブを握ったまま佇たたずむ俺をびっくりした猫ねこのように丸い目で見つめて、ゆっくりと口を悲鳴の形に開いていく。

「失礼しました」

　声を出される前に俺は踏ふみ出しかけていた足を元の位置に戻もどしてドアを閉めた。幸いなことに悲鳴は聞かずにすんだ。

　しまったな、ノックすべきだった。いや待て、着き替がえるんなら鍵かぎくらいかけておいてくれよなあ。

　網もう膜まくに映った白い裸ら身しんを長期記き憶おくに移行すべきかどうか考えていると、内側から控ひかえめなノックの音。「どうぞ……」声も控えめだ。

「すみません」

「いえ……」

　ドアを開けてくれた朝比奈さんの頭二つぶんくらい低いところにある旋毛つむじを見つつ謝る俺に、朝比奈さんは目元をうっすらピンクに染めて、

「わたしこそ、いつも恥はずかしいところばかり見せちゃって……」

　全然けっこうです。

　どうやらハルヒの注文を愚ぐ直ちよくに守っているらしい。朝比奈さんは例のメイド服を着込んでしきりと恥じらっていた。

　やっぱり可愛かわいい。

　このまま朝比奈さんと見つめ合っていたら、さっきの映像やら何やらが脳内でこんがらがって究極的にダメになりそうだったので、俺は理性を総動員してリビドーを迎げい撃げき、団長席に座ってパソコンのスイッチを入れた。

　視線を感じて目を上げると長門有希が珍めずらしくこっちを眺ながめていて、眼鏡めがねのブリッジに手を添そえてちょいと上げ、読書に戻る。奇き妙みようなほど人間くさい仕草に見えた。

　ＨＴＭＬエディタを起動してホームページファイルを呼び出す。いつまでも代わり映えしないＳＯＳ団サイトをどうにかしようと思ったのだが、何をどう発展させればいいのか見当もつかない。いつも無む駄だに時間を浪ろう費ひして嘆たん息そくとともにファイルを閉じるだけであり、だったらせんでもいいじゃないかという気もしつつ、何せヒマだからな。オセロも飽あきたし。

　腕うでを組んで呻しん吟ぎんする俺の前に湯飲みが置かれた。メイド服の朝比奈さんが、にっこりして盆ぼんを掲かかげている。もうまるで本物のメイドさんに給仕されている気分。

「ども」

　さっき古泉にコーヒーを奢おごられたばかりだが、当たり前だ、ありがたく頂ちよう戴だいする。

　朝比奈さんはさらに長門にもお茶を配って、その隣となりに座り、ふーふー冷ましながら煎せん茶ちやを飲み始めた。





　結局その日、ハルヒは部室に姿を現さなかった。





「昨日はどうして来なかったんだよ。反省会をするんじゃなかったのか？」

　例によって例のごとし。朝のホームルーム前に後ろの席に話しかける俺である。

　机に顎あごをつけて突つっ伏ぷしていたハルヒは面めん倒どうくさそうに口を開いた。

「うるさいわね。反省会なら一人でしてたわよ」

　訊きけばハルヒは土曜に三人で歩いたコースを、昨日学校が引けた後で一人で廻めぐっていたのだと言う。

「見落としがあったんじゃないかと思って」

　犯行現場に何度も足を運ぶ習性のあるのは刑けい事じだけかと思っていたが。

「暑いし疲つかれた。衣ころも替がえはいつからなのかしら。早く夏服に着替えたいわ」

　衣替えは六月からだ。あと一週間ほど五月は残っている。

「涼宮、前にも言ったかもしれないけどさ、見つけることも出来ない謎なぞ探しはすっぱり止やめて、普ふ通つうの高校生らしい遊びを開かい拓たくしてみたらどうだ」

　ガバッと起きあがって睨にらみつけられる……ことを予想したのだが、あにはからんや、ハルヒはぐてっと頬ほおを机にくっつけたままだった。疲れているのは本当のようだ。

「高校生らしい遊びって何よ」

　声にも潤うるおいがない。

「だから、いい男でも見つけて市内の散策ならそいつとやれよ。デートにもなって一石二鳥だろうが」

　あの日の朝比奈さんとの語らいを思い出しながら俺はそう提案する。

「それにお前なら男には不自由しないぞ。その奇き矯きような性格を隠いん蔽ぺいしていればの話だが」

「ふんだ。男なんかどうでもいいわ。恋れん愛あい感情なんてのはね、一時の気の迷いよ、精神病の一種なのよ」

　机を枕まくらにして窓の外へぼんやり視線を固定したまま、ハルヒは無気力に言った。

「あたしだってねー、たまーにだけどそんな気分になったりするわよ。そりゃ健康な若い女なんだし身体からだをもてあましたりもするわ。でもね、一時の気の迷いで面倒ごとを背負い込むほどバカじゃないのよ、あたしは。それにあたしが男漁あさりに精出すようになったらＳＯＳ団はどうなるの。まだ作ったばっかりなのに」

　ほんと言うとまだ出来てもいないんだがな。

「何か適当なお遊びサークルにすればいい。そうすりゃ人も集まるぞ」

「いやよ」

　一言で拒きよ絶ぜつされた。

「そんなのつまんないからＳＯＳ団を作ったのに。萌もえキャラと謎の転校生も入団させたのに。何も起こらないのは何故なぜなのよ？　あああ、そろそろ何かパアッと事件の一つでも発生しないかな」

　こんなに参っているハルヒを見るのも初めてだが、弱気になっている顔は割合可愛かった。笑わなくても普通の顔をしているだけで、こいつはけっこう見み栄ばえがするんだ。つくづく、もったいない。

　その後、午前の授業中のほとんどを、ハルヒは熟じゆく睡すいして過ごした。一度も教師に発見されなかったのは奇き跡せき……いや偶ぐう然ぜんだろう、やはり。





　だがこの時、奇くしくも事件はひそかに始まっていたのだ。パアッというほど派手じゃなかったからほとんど誰だれも知らないうちに始まって、また終わった事件なのだが、少なくとも俺は朝のホームルームの時点で、そうだな、足首にまでその事件に浸つかっていたんだ。

　実はハルヒに話しかけながら、俺は一つの懸けん案あん事じ項こうを抱かかえていた。その懸案は朝、俺の下げ駄た箱ばこに入っていたノートの切れ端はし。

　そこには、

『放課後誰もいなくなったら、一年五組の教室に来て』

　と、明らかな女の字で書いてあった。





　どう解かい釈しやくするか、脳内人格を結集して会議を開く必要がある。まず一人目が「前にも同じようなことがあったよな」と言っている。しかしこれはあの栞しおりに書いてあった長門の字とは明らかに違ちがう。あの自じ称しよう宇宙人モドキの字は機械のように綺き麗れいだったが、この紙切れの字はいかにも女子高生が書きそうな丸味を帯びている。それに長門なら下駄箱にメッセージを入れるなんて率直な手は使わないだろう。すると二人目が「朝比奈みくるってセンはないか」と言い出した。それもどうかと思う。千切ったノートの切れっ端にこんな時間指定もない伝言をよこすとは思えない。そうだな、朝比奈さんだったらちゃんとした封ふう筒とうと便びん箋せんで書いてくれるであろう。それに一年五組などと俺の教室を場所に指名しているのもおかしい。「ハルヒなら？」と三人目。ますますありえん。あいつならいつかのように階段の踊おどり場ばまで強ごう引いんに引っ張って行って話をつけるだろう。似たような理由で古泉説も却きやつ下か。四人目がとうとう「じゃあ見も知らない第三の人物からのラブレター」。ラブレターかどうかはさておき、呼び出しを告げる連れん絡らく文書であることは確かだ。相手が女とは限らないが。「のぼせるなよ。谷口と国木田あたりのとびっきりジョークかもしれないぜ」。そうだな、その可能性が最も理解しやすい。いかにもアホの谷口がやりそうな頭の悪いギャグの匂においがプンプンする。が、だったらもっとディテールに凝こるような気もするのだが。

　そんなことを考えながら俺はワケもなく校内を練り歩いた。ハルヒは体調不十分を理由に早々に帰宅しちまった。好都合と言えば好都合だ。

　俺はいったん部室に行くことにした。あまり早く五組に戻もどって、それこそ誰もいない教室で誰とも知れない奴やつを待っているのも業ごう腹はらだし、待っている最中に谷口がやって来て、「よう、どんだけ待った？　あんな紙切れ一枚でひょいひょいやって来るとは、お前も単純だなゲラゲラ」とか言われるともっとシャクに障さわる。時間を潰つぶしてから教室をひょいと覗のぞいて、誰もいないことを確認してさっさと帰ろう。うむ、完かん璧ぺきな作戦だ。

　一人うなずきながら歩いている間に部室の前までたどり着いた。ノックを忘れない。

「はーい、どうぞ」

　朝比奈さんの返答を確認して俺はドアを開ける。朝比奈さんのメイド姿はいつ何回見ても可か憐れんだ。

「遅おそかったんですね。涼宮さんは？」

　お茶を煎いれてくれる姿も様になっている。

「帰りました。何だか疲つかれ気味のようでしてね。逆ぎやく襲しゆうするなら今ですよ、弱ってる最中みたいだから」

「そんなの、しませんよー」

　長門が読書に情熱を傾かたむける姿を背景に、俺たちは向かい合ってお茶を飲んだ。また元の無目的な同好会未満になっている感じ。

「古泉は来てないんですか？」

「古泉くんね、さっきちょっと顔を見せたんだけど、アルバイトがあるからって帰っちゃった」

　何のバイトなんだかな。ま、この様子ではここにいる二人が手紙の主ではなさそうだ。

　他ほかにすることもないので俺と朝比奈さんは途と切ぎれがちの会話の合間にオセロをして、三戦全勝を俺が飾かざり、次いでネットに繋つないで二人してニュースサイトをぐるぐる回っていると長門がパタリと本を閉じ、最近はそれを部活終しゆう了りようの合図にしている俺たちは帰り支じ度たくを始めた。もうまったく何を活動しているのか解わからない。

　着き替がえるから先に帰ってて、という朝比奈さんのお言葉に甘えて俺は部室を飛び出した。

　時計は五時半あたりを指している。教室に残っている生徒など一人としていまい。

　谷口だって痺しびれを切らして帰っちまってる時間だろう。それでも俺は二段飛ばしで階段を駆かけ上がり、校舎の最上階を目指した。何事にも万が一ということがある。だろ？

　人ひと気けの絶たえた廊ろう下かで、俺は深呼吸一つ。窓は磨すりガラスなので中の様子はうかがえないが、西日でオレンジ色に染まっていることだけは解る。俺はことさら何でもなさそうに一年五組の引き戸を開けた。





　誰だれがそこにいようと驚おどろくことはなかったろうが、実際にそこにいた人物を目にして俺はかなり意表をつかれた。まるで予想だにしなかった奴が黒板の前に立っていたからだ。

「遅いよ」

　朝倉涼子が俺に笑いかけていた。

　清潔そうなまっすぐの髪かみを揺ゆらして、朝倉は教きよう壇だんから降りた。プリーツスカートから伸のびた細い脚あしと白いソックスがやけに目に付く。

　教室の中なか程ほどに進んで歩みを止め、朝倉は笑え顔がおをそのままに誘さそうように手を振ふった。

「入ったら？」

　引き戸に手をかけた状態で止まっていた俺は、その動きに誘われるように朝倉に近寄る。

「お前か……」

「そ。意外でしょ」

　くったくなく笑う朝倉。その右半身が夕日に紅あかく染まっていた。

「何の用だ？」

　わざとぶっきらぼうに訊きく。くつくつと笑い声を立てながら朝倉は、

「用があることは確かなんだけどね。ちょっと訊きたいことがあるの」

　俺の真正面に朝倉の白い顔があった。

「人間はさあ、よく『やらなくて後こう悔かいするよりも、やって後悔したほうがいい』って言うよね。これ、どう思う？」

「よく言うかどうかは知らないが、言葉通りの意味だろうよ」

「じゃあさあ、たとえ話なんだけど、現状を維い持じするままではジリ貧ひんになることは解ってるんだけど、どうすれば良い方向に向かうことが出来るのか解らないとき。あなたならどうする？」

「なんだそりゃ、日本の経済の話か？」

　俺の質問返しを朝倉は変わらない笑顔で無視した。

「とりあえず何でもいいから変えてみようと思うんじゃない？　どうせ今のままでは何も変わらないんだし」

「まあ、そういうこともあるかもしれん」

「でしょう？」

　手を後ろで組んで、朝倉は身体からだをわずかに傾けた。

「でもね、上の方にいる人は頭が固くて、急な変化にはついていけないの。でも現場はそうもしてられない。手をつかねていたらどんどん良くないことになりそうだから。だったらもう現場の独断で強きよう硬こうに変革を進めちゃってもいいわよね？」

　何を言おうとしているんだ？　ドッキリか？　俺は掃そう除じ用具入れにでも谷口が隠かくれてるんじゃないかと思って教室を見み渡わたした。隠れやすそうな所は、あと教きよう卓たくの中とかか。

「何も変化しない観察対象に、あたしはもう飽あき飽きしてるのね。だから……」

　キョロキョロするのに気を取られて、俺はあやうく朝倉の言うことを聞き漏もらすところだった。

「あなたを殺して涼宮ハルヒの出方を見る」

　惚ほうけているヒマはなかった。後ろ手に隠されていた朝倉の右手が一いつ閃せん、さっきまで俺の首があった空間を鈍にぶい金属光が薙ないだ。

　猫ねこを膝ひざに抱だいて背中を撫なでているような笑顔で、朝倉は右手のナイフを振りかざした。軍隊に採用されてそうな恐おそろしげなナイフだ。

　俺が最初の一いち撃げきをかわせたのはほとんど僥ぎよう倖こうだ。その証しよう拠こに俺は無様に尻しり餅もちをついて、しかもアホ面づらで朝倉の姿を見上げている。マウントポジションを取られたら逃にげようがない。慌あわててバッタみたいに跳とびすさる。

　なぜか朝倉は追ってこない。

　……いや、待て。この状じよう況きようは何だ？　なんで俺が朝倉にナイフを突つきつけられねばならんのか。待て待て、朝倉は何と言った？　俺を殺す？　ホワイ、なぜ？

「冗じよう談だんはやめろ」

　こういうときには常じよう套とう句くしか言えない。

「マジ危ないって！　それが本物じゃなかったとしてもビビるって。だから、よせ！」

　もうまったくワケが解らない。解る奴やつがいたらここに来い。そして俺に説明しろ。

「冗談だと思う？」

　朝倉はあくまで晴れやかに問いかける。それを見ているとまるで本気には見えない。笑顔でナイフを向けてくる女子高生がいたら、それはとても怖こわいと思う。と言うか、確かに今俺はめっちゃ怖い。

「ふーん」

　朝倉はナイフの背で肩かたを叩たたいた。

「死ぬのっていや？　殺されたくない？　わたしには有機生命体の死の概がい念ねんがよく理解出来ないけど」

　俺はそろそろと立ち上がる。冗談、シャレだよな、これ。本気だったらシャレですまされんが。だいたい信じられるわけがないだろ。別に泥どろ沼ぬま化したあげくこっぴどく振った女でもなくクラスでもロクに喋しやべりゃしない真ま面じ目めな委員長に刃は物もので斬きりつけられるなんて、本気の出来事だと思えるわけがない。

　だが、もしあのナイフが本物だったなら、とっさに避よけなければ俺は今いま頃ごろ血だまりの中に沈しずんでいたに違ちがいないだろう。

「意味が解わからないし、笑えない。いいからその危ないのをどこかに置いてくれ」

「うん、それ無理」

　無む邪じや気きそのもので朝倉は教室で女子同士かたまっているときと同じ顔で微笑ほほえんだ。

「だって、あたしは本当にあなたに死んで欲しいのだもの」

　ナイフを腰こしだめに構えた姿勢で突っ込んで来た。速い！　が、今度は俺にも余よ裕ゆうがあった。朝倉が動く前に脱だつ兎とのごとく走り出し、教室から逃げだそう──として、俺は壁かべに激げき突とつした。

　？？？？？

　ドアがない。窓もない。廊ろう下か側に面した教室の壁は、まったくの塗ぬり壁さながらにネズミ色一色で染まっていた。

　ありえない。

「無む駄だなの」

　背後から近づいてくる声。

「この空間は、あたしの情報制せい御ぎよ下にある。脱だつ出しゆつ路ろは封ふう鎖さした。簡単なこと。この惑わく星せいの建造物なんて、ちょっと分子の結合情報をいじってやればすぐに改変出来る。今のこの教室は密室。出ることも入ることも出来ない」

　振ふり返る。夕日すら消えている。校庭側の窓もすべてコンクリートの壁に置き換かわっていた。知らないうちに点灯していた蛍けい光こう灯とうが寒々しく並んだ机の表面を照らしている。

　嘘うそだろ？

　薄うすい影かげを床ゆかに落としながら朝倉がゆっくりと歩いてくる。

「ねえ、あきらめてよ。結果はどうせ同じことになるんだしさあ」

「……何者なんだ、お前は」

　何回見ても壁は壁でしかない。立て付けの悪かった引き戸も磨すりガラスの窓も何もない。それとも、どうかしちまったのは俺の頭のほうなのか。

　俺はじりじりと机の間をぬって朝倉から少しでも離はなれようとする。しかし朝倉は一直線に俺に向かってきた。机が勝手に動いて朝倉の進路を妨ぼう害がいしないようにしているのに比べて、俺の下がる先には必ず机が一団になっている。

　おっかけっこは長くは続かず、俺はたちまちのうちに教室の端はしに追いやられた。

　こうなったら。

　椅い子すを持ち上げて思い切り投げつけてやった。椅子は朝倉の手前で方向転てん換かんすると横に飛んで、落ちた。そんなアホな。

「無駄。言ったでしょう。今のこの教室はすべてあたしの意のままに動くって」

　待て待て待て待て。

　何だこれは。何なんだこれは。冗談でもシャレでも俺か朝倉の頭が変になったわけでもないとしたら、いったいこれは何だ。

　あなたを殺して涼宮ハルヒの出方を見る。

　またハルヒか。人気者だな、ハルヒ。





「最初からこうしておけばよかった」

　その言葉で俺は身体からだを動かせなくなっているのを知る。アリかよ！　反則だ。

　足が床から生える木にでもなったみたいに微び動どうだにしない。手もパラフィンで固められたみたいに上がらない。それどころか指一本動かせない。下を向いた状態で固定された俺の視線に朝倉の上うわ履ばきが入ってきた。

「あなたが死ねば、必ず涼宮ハルヒは何らかのアクションを起こす。多分、大きな情報爆ばく発はつが観測出来るはず。またとない機会だわ」

　知らねえよ。

「じゃあ死んで」

　朝倉がナイフを構える気配。どこを狙ねらってるんだろう。頸けい動どう脈みやくか、心臓か。解っていれば少しは心構えも出来るんだが。せめて目を閉じ……れない。なんつうこっちゃ。

　空気が動いた。ナイフが俺に降ってくる。

　その時。

　天てん井じようをぶち破るような音とともに瓦が礫れきの山が降ってきた。コンクリートの破片が俺の頭にぶつかって痛えなこの野や郎ろう！　降り注ぐ白い石の雨が俺の身体を粉まみれにして、このぶんじゃ朝倉も粉だらけだろう、しかし確認しようにも身体がピクリとも……あれ、動く。

　顔を上げた俺は見た。何を？

　俺の首筋に今にも触ふれようとしているナイフの切っ先とナイフの柄えを逆さか手てに握にぎって驚おどろきの表情で静止する朝倉とナイフの刃はを素す手でで握りしめている──素手でだぜ──長門有希の小こ柄がらな姿だった。

「一つ一つのプログラムが甘い」

　長門は平素と変わらない無感動な声で、

「天井部分の空間閉へい鎖さも、情報封鎖も甘い。だからわたしに気づかれる。侵しん入にゆうを許す」

「邪じや魔まする気？」

　対する朝倉も平然たるものだった。

「この人間が殺されたら、間ま違ちがいなく涼宮ハルヒは動く。これ以上の情報を得るにはそれしかないのよ」

「あなたはわたしのバックアップのはず」

　長門は読ど経きようのような平へい坦たんな声で、

「独断専行は許可されていない。わたしに従うべき」

「いやだと言ったら？」

「情報結合を解除する」

「やってみる？　ここでは、わたしのほうが有利よ。この教室はわたしの情報制御空間」

「情報結合の解除を申しん請せいする」

　言うが早いか、長門の握ったナイフの刃が煌きらめき出した。紅茶に入れた角砂糖のように、微び小しような結けつ晶しようとなってサラサラとこぼれ落ちていく。

「！」

　ナイフを放して朝倉はいきなり五メートルくらい後ろにジャンプした。それを見て俺は、

　ああ、この二人本当に人間じゃないみたいだな、とか悠ゆう長ちようなことを思った。

　一気に距きよ離りを稼かせいだ朝倉は教室の後ろにふわりと着地。微笑ほほえみは変わりない。

　空間がぐにゃりと歪ゆがんだ。としか言いようがない。朝倉も机も天井も床ゆかもまとめて揺ゆらぎ、液体金属のように変化する様が見て取れたが、よくは見えない。

　ただその空間そのものが槍やりのように凝ぎよう縮しゆくする、と思った瞬しゆん間かんには長門のかざした掌てのひらの前で結晶が爆発したことだけが解わかった。

　間かん髪はつ置かず、長門の周囲で次々と結晶の粉が炸さく裂れつしては舞まい落ちる。空間を凝こごめた槍状の武器が視認不可能な速度で俺たちを襲おそい、長門の手が同様の速度でそのすべてを迎げい撃げきしていることに気付いたのは、しばらくたってからのことだった。

「離れないで」

　長門は朝倉の攻こう撃げきを弾はじきながら片手で俺のネクタイをつかんで引き下ろし、俺は屈かがみ込んだ長門の背中に乗っかるような体勢で膝ひざをついた。

「うわっ！」

　俺の頭を見えない何かがかすめて黒板を粉々に叩たたき潰つぶした。

　長門がチラリと上を見上げる。その刹せつ那な、天井から氷柱が生えて朝倉の頭上に降り注ぐ。残像だけを残す高速移動。天井色の氷柱が床に何十本ともなく突つき立って林を作る。

「この空間ではわたしには勝てないわ」

　まったくの余よ裕ゆうの表情で朝倉は佇たたずんでいる。数メートルの間を挟はさんで長門と対たい峙じ。俺はと言うと、情けないことに腰こしが立たず、床にへばりついていた。

　長門は俺の頭をまたいで立っていた。生き真ま面じ目めにも上履きの横に小さく名前を書いているのがこいつらしい。小説の朗読をするような口調で長門は何かを呟つぶやいた。こう聞こえた。

「SELECTシリアルコードFROMデータベースWHEREコードデータORDER BY攻性情報戦せん闘とうHAVINGターミネートモード。パーソナルネーム朝倉涼子を敵性と判定。当とう該がい対象の有機情報連結を解除する」

　教室の中はもうまともな空間ではなくなっていた。何もかもが幾き何か学模様と化して湾わん曲きよくし、渦うずを巻いて躍おどっている。見ていると酔よいそうだ。まるで遊園地のビックリハウスに乗っているような視覚効果。目が回る。

「あなたの機能停止のほうが早いわ」

　極ごく彩さい色しきの蜃しん気き楼ろうの陰かげに隠かくれた朝倉の声がどこから聞こえてくるのか全然解らない。

　ヒュン、と風切り音。

　長門のかかとが俺を思い切り蹴け飛ばした。

「なにす」

　る、と言いかけた俺の鼻先を見えない槍が通過、床がめくれ返る。

「そいつを守りながら、いつまで持つかしら。じゃあ、こんなのはどう？」

　次の瞬間、俺の前に立ちはだかった長門の身体からだが一ダースほどの茶色の槍に貫つらぬかれていた。

「…………」

　つまり、朝倉は俺と長門に向かって同時に多方向から攻撃を加え、そのうちのいくつかを結晶化して無効にしたものの、迎撃しきれなかった槍が俺を襲い、俺を守るために長門は自分の身体を使用した、ということだったのだが、この時の俺にはそんなこと知るよしもなかった。

　長門の顔から眼鏡めがねが落ちて、床で小さく跳はねた。

「長門！」

「あなたは動かないでいい」

　胸から腹にかけてビッシリと突き刺ささった槍を一いち瞥べつして長門は平然と言った。

　鮮せん血けつが長門の足許に小さな池を作り始めている。

「へいき」

　いや、ちっとも平気には見えねえって。

　長門は眉まゆ一つ動かさずに身体に生えた槍を引き抜ぬいて床に落とした。乾かわいた音を立てて転がった血まみれの槍は、数瞬ののちに生徒机へと姿を変える。槍の正体はそれか。

「それだけダメージを受けたら他の情報に干かん渉しようする余裕はないでしょ？　じゃ、とどめね」

　揺らぐ空間の向こうに、朝倉の姿が見え隠れする。笑っている。両手が静かに上がり──俺の見み間ま違ちがいでなければ、指先から二にの腕うでまでがまばゆい光に包まれて二倍ほどに伸のびた。いや、二倍どころか──。

「死になさい」

　朝倉の腕が、さらに伸び、触しよく手しゆのようにのたくって突とつ出しゆつ、左右からの同時攻撃、動けない長門の小こ柄がらな身体が揺れ……。俺の顔に赤くて温かい液体が飛び散った。

　右の脇わき腹ばらに突き立った朝倉の左腕と、左胸を貫いた右腕が、背中を突き破やぶって教室の壁かべをもぶち抜いてようやく止まっていた。

　長門の身体から吹ふき出した血が白い足をつたって床の血ち溜だまりの幅はばを拡大させていく。

「終わった」

　ポツリと言って、長門は触手を握にぎった。何も起こらない。

「終わったって、何のこと？」

　朝倉は勝ちを確信したかのような口調。

「あなたの三年あまりの人生が？」

「ちがう」

　これだけの重傷を負いながら長門は何もなかったように言った。

「情報連結解除、開始」

　いきなりだ。

　教室のすべてのものが輝かがやいたかと思うと、その一秒後にはキラキラした砂となって崩くずれ落ちていく。俺の横にあった机も細かい粒りゆう子しに変じて、崩ほう壊かいする。

「そんな……」

　天てん井じようから降る結けつ晶しようの粒つぶを浴びながら、今度こそ朝倉は驚きよう愕がくの様子だった。

「あなたはとても優ゆう秀しゆう」

　長門の体中に刺さった槍やりも砂になる。

「だからこの空間にプログラムを割り込ませるのに今までかかった。でももう終わり」

「……侵しん入にゆうする前に崩壊因子を仕込んでおいたのね。どうりで、あなたが弱すぎると思った。あらかじめ攻こう性せい情報を使い果たしていたわけね……」

　同じく結晶化していく両腕を眺ながめながら朝倉は観念したように言葉を吐はいた。

「あーあ、残念。しょせんわたしはバックアップだったかあ。膠こう着ちやく状態をどうにかするいいチャンスだと思ったのにな」

　朝倉は俺を見てクラスメイトの顔に戻もどった。

「わたしの負け。よかったね、延命出来て。でも気を付けてね。統合思念体は、この通り、一枚岩じゃない。相反する意識をいくつも持ってるの。ま、これは人間も同じだけど。いつかまた、わたしみたいな急進派が来るかもしれない。それか、長門さんの操あやつり主が意見を変えるかもしれない」

　朝倉の胸から足はすでに光る結晶に覆おおわれていた。

「それまで、涼宮さんとお幸せに。じゃあね」

　音もなく朝倉は小さな砂場となった。一ひと粒つぶ一粒の結晶はさらに細かく分解、やがて目に見えなくなるまでになる。

　さらさら流れ落ちる細かいガラスのような結晶が降る中、朝倉涼子という女子生徒はこの学校から存在ごと消しよう滅めつした。

　とすん、と軽い音がして、俺はそっちへ首をねじ曲げ、長門が倒たおれているのを発見して慌あわてて立ち上がった。

「おい！　長門、しっかりしろ、今救急車を、」

「いい」

　目を見開いて天井を見上げながら長門は、

「肉体の損傷はたいしたことない。正常化しないといけないのは、まずこの空間」

　砂の崩ほう落らくが止まっていた。

「不純物を取り除いて、教室を再構成する」

　見る間に一年五組が見慣れた一年五組へと、元通りに、そうだな、まるでビデオの逆回しだな、いつもの教室に戻っていく。

　白い砂から黒板が、教きよう卓たくが、机が生まれて、放課後教室を出た時と同じ場所に並んでいく光景は、何と言えばいいんだろうな。こうして生で見ていなければ良く出来たＣＧだと思ったろうな。

　壁だったところに窓まど枠わくが出来て、すうっと透とう明めい化して窓ガラスとなる。西日がオレンジ色に俺と長門を彩さい色しよくした。試しに自分の机の中を調べてみたら、ちゃんと入れたままにしておいたものがそのまま入っている。俺の体中に散った長門の血もいつしか消えている。たいしたもんだ。魔ま法ほうとしか思えない。

　俺はまだ寝ねている長門の脇わきに屈かがみ込んだ。

「本当にだいじょうぶなのか？」

　確かにどこにもケガがあるように見えない。あれだけ突つき刺ささっていたら制服も穴だらけだと思ったが、そんなものは一つもなかった。

「処理能力を情報の操作と改変に回したから、このインターフェースの再生は後回し。今やってる」

「手を貸そうか」

　俺の伸のばした手に、案外素直にすがりついた。上体を起こしたところで、

「あ」

　わずかに唇くちびるを開いた。

「眼鏡めがねの再構成を忘れた」

「……してないほうが可愛かわいいと思うぞ。俺には眼鏡属性ないし」

「眼鏡属性って何？」

「何でもない。ただの妄もう言げんだ」

「そう」

　こんなどうでもいい会話をしている場合ではなかったのである。後々俺は、とことん悔くやむことになる。長門を置き去りにしてでも、さっさとこの場を立ち去るべきだったかと。

「ういーす」

　ガサツに戸を開けて誰だれかが入ってきた。

「わっすれーもの、忘れ物ー」

　自作の歌を歌いながらやって来たそいつは、よりにもよって谷口だった。

　まさか谷口もこんな時間に教室に誰かがいるとは思わなかっただろう。俺たちがいるのに気づいてギクリと立ち止まり、しかるのちに口をアホみたいにパカンと開けた。

　この時、俺はまさに長門を抱だき起こそうとするモーションに入ったばかりだった。その静止画をみたら、逆に押し倒そうとしているとも思えなくもない体勢なわけで。

「すまん」

　聞いたこともない真ま面じ目めな声で谷口は言うとザリガニのように後ろへ下がり、戸も閉めないで走り去った。追うヒマもなかった。

「面おも白しろい人」と長門。

　俺は盛大なため息をついた。

「どうすっかなー」

「まかせて」

　俺の手にもたれ掛かかったまま動くことなく長門は言った。

「情報操作は得意。朝倉涼子は転校したことにする」

　そっちかよ！

　などとツッコンでいる場合ではない。唐とう突とつに俺は愕がく然ぜんとした。よく考えたら俺はとんでもない体験をしてしまったんじゃないか？　この前に長門が延々と語ったデンパ話、トンチキな妄もう想そう語りを信じるとか信じないとかいう問題ではない。半信半疑とも言ってられん。さっきの出来事は本気のヤバさとは何かを俺に実感させてくれた。マジで死ぬかと思った。長門が天てん井じようから落ちてこなければ、確実に俺は朝倉によって強制昇しよう天てんさせられていただろう。ぐにゃぐにゃした教室の光景も、バケモノじみた姿になった朝倉も、それをどうやってか消しよう滅めつさせてしまった長門の無感動さも、それらはすべてリアルに俺の身へと降り注いだことだった。

　これじゃ、長門が本格的に宇宙人か何かの関係者であることを納得せざるを得ないではないか。

　おまけに、このままでは俺はこのイカレタ状じよう況きようの当事者になってしまう。冒ぼう頭とうに言ったとおり、俺は巻き込まれ型の傍ぼう観かん者でいたいのだ。脇わき役やくで充じゆう分ぶんなのだ。なのに、これではまるで俺が主人公みたいじゃねえか。確かに俺は宇宙人みたいな奴やつが出てくる物語の登場人物になりたいとかつて思っていたが、本当に自分がそんなキャラになってしまうとなると話は別だ。

　はっきり言や、困る。

　何かしらの問題に直面して困っている奴に横から半笑いで適当なアドバイスをするような、そんな役割を俺は望んでいたのだ。こんな俺自身がクラスメイトに命を狙ねらわれるような、不条理な展開は願い下げにしたい。本当の話、俺はまだ人生に執しゆう着ちやくがあるのだ。

　オレンジ色に染められた教室で、俺はしばし唖あ然ぜんとしたまま硬こう化かしていた。長門の体重を感じさせない身体からだを支えたままで。

　これは……いったいどうしたものだろう？　俺は何を思えばいいんだ？　呆ぼけていたおかげで俺は、とっくに再生とやらが終しゆう了りようした長門が無表情に見上げていることにも気付かずじまいだった。





　翌日、クラスに朝倉涼子の姿はなかった。

　当たり前と言えば当たり前のことなのだが、それを当たり前だと思っているのはどうやら俺だけであり、岡部担任が、

「あー、朝倉くんだがー、お父さんの仕事の都合で、急なことだと先生も思う、転校することになった。いや、先生も今朝聞いて驚おどろいた。なんでも外国に行くらしく、昨日のうちに出立したそうだ」

　と、あまりにも嘘うそくさいことをホームルームで言ったときも、「えーっ？」「何でーっ？」と主に女子どもが騒さわぎ立て、男子連中も、ザワ……ザワ……と顔を見合わせ、岡部教師も首をひねっていたわけなのだが、もちろんこの女も黙だまっていたりはしなかった。

　ごん、と俺の背中を拳こぶしで突ついて、

「キョン。これは事件だわ」

　すっかり元気を取り戻もどした涼宮ハルヒが目を輝かがやかせていた。

　どうする？　本当のことを言うか？

　実は朝倉は情報統合思念体なる正体不明の存在に作られた長門の仲間で、なんか知らんが仲間割れして、その理由が俺を殺すか殺さないかで、なぜ俺かと言うとハルヒの情報がどうのこうので、あげくの果てに長門によって砂に変えられてしまいました、とさ。

　言えるわけねえ。つーか俺が言いたくない。あれはすべて俺の幻げん覚かくだったと思っていたいくらいなのだ。

「謎なぞの転校生が来たと思ったら、今度は理由も告げずに転校していく女子までいたのよ。何かあるはずよ」

　勘かんの良さを褒ほめてやるべきなのだろうか。

「だから親父おやじの仕事の都合なんだろ」

「そんなベタな理由は認めらんない」

「認めるも認めないも、転校の理由で一番ポピュラーなのはそれだろうよ」

「でもおかしいでしょ。いくら何でも昨日の今日よ。転勤の辞令から引ひっ越こしまで一日もないって、どんな仕事よ、それ」

「娘むすめに知らせてなかったとか……」

「あるわけないわよ、そんなの。これは調査の必要ありね」

　仕事の都合というのは言い訳で本当は夜よ逃にげだったんじゃないかとか言おうとしたがやめておいた。それが真実でないのは俺が一番よく知っている。

「ＳＯＳ団として、学校の不思議を座視するわけにはいかないわ」

　やめてくれ。

　昨日の事件は俺に徹てつ底てい的な変革を要求せしめた。なにしろ、マジモノの超ちよう常じよう現象を目まの当たりにしてしまったのだから、それをなかったことにするには、俺の目か頭かのどちらかがどうにかしていたか、この世界そのものが実はおかしかったのか、実は俺は長々と夢を見続けているのかの、どれかを選ばなくてはならなくなってしまった。

　そして俺はこの世界が非現実のシロモノだとは、どうしても思うことが出来ないでいるのだ。

　まったく、人生の転機が訪れるには、十五年と数ヶ月は少々早すぎの気がしやしないか？

　なんで俺は高一にして、世界の在り方などという哲てつ学がく的な命題に直面しなければならないのだろう。そんなもん、俺が考える事ではないはずだ。これ以上、余計な仕事を増やさないで欲しい。

　そうでなくとも、俺はまたまた懸けん案あん事じ項こうを抱かかえているんだからな。





　　第六章





　その懸案事項は封ふう筒とうの形をして昨日に引き続き俺の下げ駄た箱ばこに入っていた。なんだろう、下駄箱に手紙を入れるのが最近の流行なのか？

　しかし今度のブツは一味違ちがうぞ。二つにおったノートの切きれ端はしの名無しではない。少女マンガのオマケみたいな封筒の裏にちゃんと名前が記入されている。几き帳ちよう面めんなその文字は、俺の目がどうにかしているのでもない限り、

　朝比奈みくる

　と、読めた。

　封筒を一動作でブレザーのポケットに収めた俺が男子トイレの個室に飛び込んで封ふうを切ったところ、印刷された少女キャラのイラストが微笑ほほえむ便びん箋せんの真ん中に、

『昼休み、部室で待ってます　　　みくる』

　昨日あんな目にあったおかげで、俺の人生観と世界観と現実感はまとめてバレルロールを描えがきつつ現在アクロバット中だ。

　ほいさと出かけて行って、また生命の危機に直面するのは御ご免めんこうむりたい。

　しかしここで行かないわけにはいくまい。誰だれあろう、朝比奈さんの呼び出しである。この手紙の主が朝比奈さんであると断言する根こん拠きよはないが、俺はさっぱり疑わなかった。いかにもこんな回りくどいことをしそうな人だし、可愛かわいらしいレターセットにいそいそとペンを走らせている光景はまさしく彼女に似つかわしいじゃないか。それに昼休みの部室なら、長門もいるだろうし、何かあればあいつがなんとかしてくれるさ。

　情けないとか言わんでくれ。こちとら一いつ介かいの通常な男子高生に過ぎないんだからよ。





　四時限が終わるや俺は、休み時間の間から意味深な視線を送ってくる谷口に話しかけられたり一いつ緒しよに弁当食べようと国木田が近寄ったり職員室行って朝倉の引っ越し先を調べようとかハルヒが言い出す前に、弁当も持たずに教室から脱だつ出しゆつした。部室まで早歩き。

　まだ五月だと言うのに照りつける陽気はすでに夏の熱気、太陽は特大の石炭でもくべられたみたいに嬉うれしそうにエネルギーを地球へ注いでいる。今からこれじゃ夏本番になると日本は天然のサウナ列島になるんじゃないだろうか。歩いているだけで汗あせでパンツのゴムが濡ぬれてくる。

　三分とかからず、俺は文芸部の部室前に立つ。とりあえずノック。

「あ、はーい」

　確かに朝比奈さんの声だった。間ま違ちがいない。俺が朝比奈さんの声を聞き間違えるわけがない。どうやら本物だ。安心して、入る。

　長門はいなかった。それどころか朝比奈さんもいなかった。

　校庭に面した窓にもたれるようにして、一人の女性が立っていた。白いブラウスと黒のミニタイトスカートをはいている髪かみの長いシルエット。足あし許もとは来客用のスリッパ。

　その人は俺を見ると、顔中に喜色を浮うかべて駆かけ寄り、俺の手を取って握にぎりしめた。

「キョンくん……久しぶり」

　朝比奈さんじゃなかった。朝比奈さんにとてもよく似ている。本人じゃないかと錯さつ覚かくするほど似ている。実際、本人としか思えない。

　でもそれは朝比奈さんではなかった。俺の朝比奈さんはこんなに背が高くない。こんなに大人っぽい顔をしていない。ブラウスの布地を突つき上げる胸が一日にして三割増しになったりはしない。

　俺の手を胸の前で捧ささげ持って微笑んでいるその人は、どうやったって二十歳前後だろう。中学生のような朝比奈さんとは雰ふん囲い気きが違う。しかしそれでもなお、彼女は朝比奈さんとウリ二つだった。何もかもが。

「あの……」

　俺はとっさに思いつく。

「朝比奈さんのお姉さん……ですか？」

　その人は可笑おかしそうに目を細めて肩かたを震ふるわせた。笑った顔まで同じだ。

「うふ、わたしはわたし」と彼女は言った。

「朝比奈みくる本人です。ただし、あなたの知ってるわたしより、もっと未来から来ました。……会いたかった」

　俺はバカみたいな顔をしていたに違いない。そうだ、確かに目の前の女性が今から何年後かの朝比奈さんだと言われると一番すっきりする。朝比奈さんが大人になったらこんな感じの美人になるだろうなというそのまんまな美人がここにいた。ついでに言うと身長も伸のびてさらにグラマー度がアップしている。まさかここまでになるとは。

「あ、信用してないでしょ？」

　その秘書スタイルの朝比奈さんはいたずらっぽく言うと、

「証しよう拠こを見せてあげる」

　やにわにブラウスのボタンを外しだした。第二ボタンまでを外してしまうと、面食らう俺に向けて胸むな元もとを見せつけ、

「ほら、ここに星形のホクロがあるでしょう？　付けボクロじゃないよ。触さわってみる？」

　左の胸のギリギリ上に確かにそんな形のホクロが艶なまめかしく付いていた。白い肌はだに一つだけ浮かんだアクセント。

「これで信じた？」

　信じるも何も、俺は朝比奈さんのホクロの位置なんか覚えちゃいない。そんな際きわどい部分までを見ることが出来たのは、バニーガールのコスプレをしていた時と、不ふ可か抗こう力りよくで着き替がえを覗のぞいてしまった時くらいだが、どっちにしたってそこまで細かいところを観察などしていない。俺がその旨むねを伝えると、魅み惑わくの大人朝比奈さんは、

「あれ？　でもここにホクロがあるって言ったのキョンくんだったじゃない。わたし、自分でも気づいてなかったのに」

　不思議そうに首を傾かしげ、次に彼女は驚おどろきに目を見開き、それから急激に赤くなった。

「あ……やだ、今……あっ、そうか。この時はまだ……うわ、どうしよっ」

　シャツの前をはだけたまま、その朝比奈さんは両手で頬ほおを包んで首を振ふった。

「わたし、とんでもない勘かん違いを……ごめんなさい！　今の忘れて下さい！」

　そう言われてもなあ。それより早くボタンとめてくれないかな。どこ見たらいいのか迷います。

「解わかりました。とにかく信じますから。今の俺はたいていのことは信じてしまえるような性格を獲かく得とくしたので」

「は？」

「いえ、こちらの話です」

　まだ赤らむ頬を押さえていた年ねん齢れい不ふ詳しようの朝比奈さんは、どうしてもそっちに吸い寄せられてしまう俺の目線に気づいて、慌あわててボタンをとめた。居住まいを正し、こほんと乾かわいた咳せきを一つ落として、

「この時間平面にいるわたしが未来から来たって、本当に信じてくれました？」

「もちろん。あれ、そしたら今、二人の朝比奈さんがこの時代にはいるってことですか？」

「はい。過去の……わたしから見れば過去のわたしは、現在教室でクラスメイトたちとお弁当中です」

「そっちの朝比奈さんはあなたが来ていることを……」

「知りません。実際知りませんでしたし。だってそれ、わたしの過去だもの」

　なるほど。

「あなたに一つだけ言いたいことがあって、無理を言ってまたこの時間に来させてもらったの。あ、長門さんには席を外してもらいました」

　長門のことだから、この朝比奈さんを見ても瞬まばたき一つしなかったことだろう。

「……朝比奈さんは長門のことを知ってるんですか？」

「すみません。禁則事じ項こうです。あ、これ言うのも久しぶりですね」

「俺は先日聞いたばかりですが」

　そうでした、と自分の頭をぽかりと叩たたいて朝比奈さんは舌を出した。こんなところは間ま違ちがいようもなく朝比奈さんである。

　が、急に真ま面じ目めな顔になると、

「あまりこの時間にとどまれないの。だから手短に言います」

　もう何でも言ってくれ。

「白雪姫ひめって、知ってます？」

　俺は今や背せ丈たけのそう変わらない朝比奈さんを見つめた。ちょっと潤うるみがちの黒い瞳ひとみ。

「そりゃ知ってますけど……」

「これからあなたが何か困った状態に置かれたとき、その言葉を思い出して欲しいんです」

「七人の小人とか魔ま女じよとか毒リンゴとかの、あれですか？」

「そうです。白雪姫の物語を」

「困った状態なら昨日あったばかりですが」

「それではないんです。もっと……そうですね、詳くわしくは言えないけど、その時、あなたの側そばには涼宮さんもいるはずです」

　俺と？　ハルヒが？　揃そろってやっかいごとに巻き込まれるって？　いつ、どこで。

「……涼宮さんはそれを困った状じよう況きようとは考えないかもしれませんが……あなただけじゃなくて、わたしたち全員にとって、それは困ることなんです」

「詳しく教えてもらうわけには──いかないんでしょうね」

「ごめんなさい。でもヒントだけでもと思って。これがわたしの精せい一いつ杯ぱい」

　大人朝比奈さんはちょっと泣きが入っている顔をした。ああ、確かに朝比奈さんだな、これは。

「それが白雪姫なんですか」

「ええ」

「覚えておきますよ」

　俺がうなずくと朝比奈さんは、もうちょっとだけ時間があります、と言って、懐なつかしそうに部室を見み渡わたし、ハンガーラックにかかっていたメイド服を手にして愛いとおしげに撫なでた。

「よくこんなの着れたなあ、わたし。今なら絶対ムリ」

「今の格好もＯＬのコスプレみたいですよ」

「ふふ、制服を着るわけにはいかなかったから、ちょっと教師風にしてみました」

　何を着ても似合う人というのはいるものだ。試しに訊きいてみる。

「ハルヒには他ほかにどんな衣装を着せられたんです？」

「内ない緒しよ。恥はずかしいもん。それに、そのうち解るでしょう？」

　スリッパをペタペタ鳴らしながら朝比奈さんは俺の目の前に立つと、妙みように潤んだ目とまだ少し赤い頬で、

「じゃあ、もう行きます」

　もの問いたげに、朝比奈さんは真正面から俺を見つめ続ける。唇くちびるが何かを求めるように動き、俺はキスでもしたほうがいいのかなと思って朝比奈さんの肩かたを抱だこうとして──逃にげられた。

　ひょいと身をひねった朝比奈さんは、

「最後にもう一つだけ。わたしとはあまり仲良くしないで」

　鈴すず虫むしのため息のような声。

　入り口に走った朝比奈さんに、俺は声をかけた。

「俺も一つ教えて下さい！」

　ドアを開こうとしてピタリと止まる朝比奈さんの後ろ姿。

「朝比奈さん、今、歳としいくつ？」

　巻き毛を翻ひるがえして朝比奈さんは振ふり返った。見る者すべてを恋こいに落としそうな笑え顔がおだった。

「禁則事項です」





　ドアが閉まった。多分、追いかけていっても無む駄だなんだろうな。

　はー、それにしても朝比奈さんがあんなに美人になるとは、と考えて、俺は先ほど彼女が最初に言ったセリフを思い出した。何と言った？　「久しぶり」。この言葉が表す意味は一つしかない。つまり朝比奈さんは長らく俺に会っていなかったのだ。と言うことは。

「そうか。そうだよな」

　未来人であるところの朝比奈さんは、遠からず元いた時代に戻もどってしまうのだ。それから何年も経たって再び相まみえたのが、つまり今さっきなのだ。

　いったい彼女にとってどれくらいの時間が経過していたのだろうか。あの成長ぶりから見ると、五年……三年くらいか。女ってのは高校を出ると劇的に変化するからな。それまで秀しゆう才さいタイプの目立たない女だったのに大学に入った途と端たんにサナギから羽う化かしたブラジル蝶ちようみたいになってしまった従姉妹いとこを思い浮うかべて、そういやそもそも朝比奈さんの実じつ年ねん齢れいを知らないな、本当に十七ってことはないと思うのだが。

　腹が減った。教室に戻ろう。

「…………」

　長門有希が冷れい凍とう保存したような普ふ段だん通りの顔で入ってきた。ただし、眼鏡めがねはない。ガラス越ごしではない生の視線が直接俺を射い抜ぬく。

「よお、来るとき朝比奈さんに良く似た人とすれ違ちがわなかったか」

　冗じよう談だん交じりに言った言葉に長門は、

「朝比奈みくるの異時間同位体。朝に会った」

　衣きぬ擦ずれの音をまったく立てずに長門はパイプ椅い子すに座りテーブルの上で本のページを広げた。

「今はもういない。この時空から消えたから」

「ひょっとしてお前も時間移動とか出来るのか？　その情報ナントカ体も」

「わたしには出来ない。でも時間移動はそんなに難しいことではない。今の時代の地球人はそれに気づいていないだけ。時間は空間と同じ。移動するのは簡単」

「コツを教えてもらいたいね」

「言語では概がい念ねんを説明出来ないし理解も出来ない」

「そうかい」

「そう」

「そりゃ、しょうがないな」

「ない」

　山びこと会話しているようなむなしさを感じ、俺は今度こそ教室に戻ることにした。飯食う時間あるかな。

「長門、昨日はありがとよ」

　無機質な表情がほんの少しだけ動いた。

「お礼ならいい。朝倉涼子の異常動作はこっちの責任。不ふ手て際ぎわ」

　前まえ髪がみがわずかに動いた。

　ひょっとして頭を下げたのだろうか。

「やっぱり眼鏡はないほうがいいぞ」

　返答はなかった。





　なんとか超ちよう特急でオカズだけでも食おうと弁当の待ちわびる教室の前で、俺はハルヒの妨ぼう害がいにあい、ついに食いっぱぐれることになった。これも運命というやつなのだろう。すでに諦てい観かんの域に達しつつある俺である。

　どうやら廊ろう下かで俺を待っていたらしいハルヒは、苛いら立だたしげに、

「どこ行ってたのよ！　すぐ帰ってくると思ってご飯食べないで待ってたのに！」

　そんな心から怒おこるんじゃなくて幼おさな馴な染じみが照てれ隠かくしで怒っている感じで頼たのむ。

「アホなことほざいてないで、ちょっとこっち来て」

　俺の腕うでをとって関節技わざを決めたハルヒはまた俺を薄うす暗ぐらい階段の踊おどり場ばへと拉ら致ちした。

　とにかく腹が減っていた。

「さっき職員室で岡部に聞いたんだけどね、朝倉の転校って朝になるまで誰だれも知らなかったみたいなのよ。朝イチで朝倉の父親を名乗る男から電話があって急に引ひっ越こすことになったからって、それもどこだと思う？　カナダよカナダ。そんなのあり？　胡う散さん臭くさすぎるわよ」

「そうかい」

「それであたし、カナダの連れん絡らく先を教えてくれって言ったのよ。友達のよしみで連絡したいからって」

　まともに口をきいたこともないくせに。

「そしたらどうよ、それすら解わからないって言うのよ？　普ふ通つう引っ越し先くらい伝えるでしょ。これは何かあるに違いないわ」

「ねえよ」

「せっかくだから引っ越し前の朝倉の住所を訊きいてきた。学校が終わったら、その足で行くことにするわ。何か解るかもしれない」

　相変わらず人の話を聞かない奴やつだ。

　ま、別に止めないことにする。無む駄だ骨ぼねを折るのはハルヒであって、俺ではない。

「あんたも行くのよ」

「なんで？」

　ハルヒは肩かたを怒いからせ、火か炎えんを吹ふく前の怪かい獣じゆうのように呼気を吸い上げ、廊下にまで届くような大声で叫さけんだ。

「あんたそれでもＳＯＳ団の一員なの！」





　ハルヒの伝言を仰おおせつかった俺はその場を這ほう々ほうの体ていで退散し、部室へと取って返すと長門に今日は俺もハルヒも部室には来ないことを伝え、それを朝比奈さんと古泉が放課後に来たら教えるように言い、しかしこの寡か黙もくな宇宙人だけではどんな伝言ゲームが結果になるか知れたものではなかったので、部室に余っていた藁わら半ばん紙しのビラの裏に「ＳＯＳ団、本日自主休日　　　ハルヒ」とマジックで書いてドアに画が鋲びようで留めた。

　古泉はともかく朝比奈さんがメイド服に着き替がえる手間くらいは省いてあげるべきだろう。

　そんなことをしていたおかげで、俺は徹てつ底てい的に空腹のまま、五限の始まりの鐘かねを聞く羽目になった。合間の休み時間に食ったけどな。





　女子と肩を並べて下校する、なんてのは実に学生青春ドラマ的で、俺だってそういう生活を夢に見なかったかと言うと嘘うそになる。俺は現在その夢を実現させているわけなのだが、ちっとも楽しくないのはどうしたことだろう。

「何か言った？」

　俺の左ひだり隣どなりでメモを片手に大またで歩いているハルヒが言った。俺には、「何か文句あるの？」とでも言ってるように思える。

「いや何も」

　坂をずんずんと下って私鉄の線路沿いを歩いている。もう少し行けば光陽園駅だ。

　そろそろ長門の住んでるマンションだなと思っていたら、ハルヒは本当にその方角を目差し、ついに見覚えのある新築の分ぶん譲じようマンションの前で止まった。

「ここの５０５号室に住んでいたみたい」

「なるほどね」

「何がなるほどよ」

「いや何でも。それよりどうやって入るつもりだ。玄げん関かんも鍵かぎ付きだぜ」

　と、俺はインターフォン横のテンキーの存在を教えてやる。

「あれで数字を入力して開ける仕組みだろ。お前ナンバー知ってんのか？」

「知らない。こういうときは持久戦ね」

　何を待つというのか、と思っていたら、そう待つこともなかった。買い物に行くらしいオバサンが中から扉とびらを開けて、棒立ちしている俺たちを気味悪そうに眺ながめながら出て行き、その扉が閉まりきらないうちにハルヒがつま先を押し込んでストッパー代わりにする。

　あまりスマートな手口とは言えないな。

「早く来なさいよ」

　引きずり込まれるようにして俺はマンションの玄関ホールに立っていた。ちょうど一階に止まっていたエレベータに乗り込む。黙だまって階数表示を見つめるのがマナーだ。

「朝倉なんだけど」

　どうやらハルヒはそんなマナーなどおかまいなしのようだ。

「おかしなことがまだあるのよね。朝倉って、この市内の中学から北きた高に来たんじゃないらしいのよ」

　そりゃまあそうだろうが。

「調べてみたらどこか市外の中学から越えつ境きよう入学してたわけ。絶対おかしいでしょ。別に北高は有名進学校でもなんでもない、ただのありふれた県立高校よ。なんでわざわざそんなことするわけ？」

「知らん」

「でも住居はこんなに学校の近くにある。しかも分譲よ、このマンション。賃貸じゃないのよ。立地もいいし、高いのよ、ここ。市外の中学へここから通っていたの？」

「だから、知らん」

「朝倉がいつからここに住んでたのか調べる必要があるわね」

　五階に到とう着ちやくし、５０５号室の前で俺たちはしばらく物言わぬ扉を眺めた。あったかもしれない表札は今は抜ぬき取られ、無言で空き部屋であることを示している。ハルヒがノブを捻ひねっていたが、当然開くはずもなく。

　どうにかして中に入れないかと腕うでを組むハルヒの横で俺はあくびをかみ殺していた。我ながら時間の無む駄だなことをしていると思う。

「管理人室に行きましょ」

「鍵貸してくれるとは思えないけどな」

「そうじゃなくて、朝倉がいつからここに住んでんのか聞くためよ」

「あきらめて帰ろうぜ。そんなん解わかったところでどうしょうもないだろ」

「ダメ」

　俺たちはエレベータで一階に取って返し、玄関ホール脇わきの管理人室へと向かった。ガラス戸の向こうは無人だったが、壁かべのベルを鳴らすと、ややあって白はく髪はつをふさふさとさせた小さな爺じいさんがゆっくりゆっくり現れた。

　爺さんが何かを言うより早く、

「あたしたちここに住んでた朝倉涼子さんの友達なんですけど、彼女ったら急に引ひっ越こしちゃって連れん絡らく先とか解んなくて困ってるんです。どこに引っ越すとか聞いてませんか？　それからいつから朝倉さんがここに入ってたのかそれも教えて欲しいんです」

　こういう常識的な口調も出来るのかと俺が感かん嘆たんしていると、耳の遠いらしい管理人に何度も「えっ？」「えっ？」と訊きき返されながら、ハルヒは朝倉一家の突とつ然ぜんの引っ越しは管理人たる自分にも寝ね耳みみに水だったこと（引っ越し屋が来た様子もないのに部屋が空っぽになっておって度ど肝ぎもを抜かれたわ）、朝倉がいたのは三年ほど前からだったこと（めんこいお嬢じようさんがわしんとこに和わ菓が子しの折おり詰づめを持ってきたから覚えておる）、ローンはなく一いつ括かつニコニコ現金払ばらいだったこと（えれえ金持ちだと思ったもんだて）、などを首しゆ尾び良く聞き出していた。探たん偵ていにでもなればいい。

　爺さんはうら若き乙女おとめと会話することがよほど楽しいらしく、

「そう言えばお嬢さんのほうはたびたび目にしたが、両親さんとはついぞ挨あい拶さつした覚えもないのー」

「涼子さんと言うのかね、あの娘むすめさんは。気だての良い、いい子だったのー」

「せめて一言別れを言いたかったのに、残念なことよのー。ところであんたもなかなか可愛かわいい顔しとるのー」

　とか、もはやジジイの繰くり言ごとの様相を呈ていしてきて、ハルヒもこれ以上の情報提供は得られないと判断したのか、

「ご丁てい寧ねいにありがとうございました」

　模も範はん的なお辞じ儀ぎをして、俺をうながした。うながされるまでもなく、俺はハルヒに遅おくれてマンションを後にする。

「少年、その娘さんは今にきっと美人になる。取り逃にがすんじゃないぞー」

　追ってくるジジイの声が余計だ。ハルヒの耳にも届いたはずで、それに何かのリアクションがあるかとビクビクしていたがハルヒは何をコメントすることもなくずんずんと歩き続け、見習って俺もノーコメントを選せん択たくし、玄げん関かんから数歩歩いたところで、コンビニ袋ぶくろと学生鞄かばんを提さげた長門に出くわした。いつもは下校時間まで部室に残っているのが通例なのにこの時間にここにいるということは、あれから間もなくこいつも学校を出たのだろう。

「あら、ひょっとしてあんたもこのマンションなの？　奇き遇ぐうねえ」

　白はく皙せきの表情で長門はうなずいた。どう考えても奇遇じゃないだろ。

「だったら朝倉のこと、何か聞いてない？」

　否定の仕草。

「そう。もし朝倉のことで解ったら教えてよね。いい？」

　肯こう定ていの動作。

　俺は缶かん詰づめや総菜のパックが入っているコンビニ袋を見ながら、こいつも飯食うんだなとか考えてた。

「眼鏡めがねどうしたの？」

　その問いには直接答えず、長門はただ俺を見た。見られても困る。ハルヒもまともな回答が返ってくるとはハナから思っていなかったようだ。肩かたをすくめ後も見ずに歩き出す。俺は片手をヒラヒラと振ふって長門に別れの意を表明し、すれ違ちがいざま、長門は俺にだけ聞こえる小声で言った。

「気をつけて」

　今度は何に気をつければいいんだか、それを訊こうと振り返る前に、すでに長門はマンションに吸い込まれていた。





　ローカル線の線路沿いを歩いていくハルヒの二、三歩後に俺は位置し、目的地不明のウォーキングに付き従っている。このままでは俺の自宅から離はなれるばかりなので、ハルヒにこれからどこに行くつもりなのかを尋たずねてみた。

「別に」

　答えが返ってきた。俺はハルヒの後頭部を眺ながめたまま、

「俺、もう帰っていいか？」

　いきなり立ち止まるもんだから、もう少しでつんのめるところだった。ハルヒは長門みたいな無感動な白い顔を俺に向け、

「あんたさ、自分がこの地球でどれだけちっぽけな存在なのか自覚したことある？」

　何を言い出すんだ。

「あたしはある。忘れもしない」

　線路沿いの県道、そのまた歩道の上で、ハルヒは語り始めた。





「小学生の、六年生の時。家族みんなで野球を見に行ったのよ球場まで。あたしは野球なんか興味なかったけど。着いて驚おどろいた。見み渡わたす限かぎり人だらけなのよ。野球場の向こうにいる米こめ粒つぶみたいな人間がびっしり蠢うごめいているの。日本の人間が残らずこの空間に集まっているんじゃないかと思った。でね、親父おやじに聞いてみたのよ。ここにはいったいどれだけ人がいるんだって。満員だから五万人くらいだろうって親父は答えた。試合が終わって駅まで行く道にも人が溢あふれかえっていたわ。それを見て、あたしは愕がく然ぜんとしたの。こんなにいっぱいの人間がいるように見えて、実はこんなの日本全体で言えばほんの一部に過ぎないんだって。家に帰って電でん卓たくで計算してみたの。日本の人口が一億数千ってのは社会の時間に習っていたから、それを五万で割ってみると、たった二千分の一。あたしはまた愕然とした。あたしなんてあの球場にいた人混みの中のたった一人でしかなくて、あれだけたくさんに思えた球場の人たちも実は一つかみでしかないんだってね。それまであたしは自分がどこか特別な人間のように思ってた。家族といるのも楽しかったし、なにより自分の通う学校の自分のクラスは世界のどこよりも面おも白しろい人間が集まっていると思っていたのよ。でも、そうじゃないんだって、その時気付いた。あたしが世界で一番楽しいと思っているクラスの出来事も、こんなの日本のどこの学校でもありふれたものでしかないんだ。日本全国のすべての人間から見たら普ふ通つうの出来事でしかない。そう気付いたとき、あたしは急にあたしの周りの世界が色あせたみたいに感じた。夜、歯を磨みがいて寝ねるのも、朝起きて朝ご飯を食べるのも、どこにでもある、みんながみんなやってる普通の日常なんだと思うと、途と端たんに何もかもがつまらなくなった。そして、世の中にこれだけ人がいたら、その中にはちっとも普通じゃなく面白い人生を送っている人もいるんだ、そうに違いないと思ったの。それがあたしじゃないのは何故なぜ？　小学校を卒業するまで、あたしはずっとそんなことを考えてた。考えていたら思いついたわ。面白いことは待っててもやってこないんだってね。中学に入ったら、あたしは自分を変えてやろうと思った。待ってるだけの女じゃないことを世界に訴うつたえようと思ったの。実際あたしなりにそうしたつもり。でも、結局は何もなし。そうやって、あたしはいつの間にか高校生になってた。少しは何かが変わるかと思ってた」





　まるで弁論大会の出場者みたいにハルヒは一気にまくしたて、喋しやべり終えると喋ったことを後こう悔かいするような表情になって天を仰あおいだ。

　電車が線路を走り抜ぬけ、その轟ごう音おんのおかげで俺は、ここはツッコムべきなのか何か哲てつ学がく的な引用でもしてごまかしたほうがいいのか、考える時間を得た。ドップラー効果を残して遠くへ去っていく電車を意味もなく見送って、





「そうか」

　こんなことくらいしか言えない自分がちょっと憂ゆう鬱うつだ。ハルヒは電車が巻き起こした突とつ風ぷうで乱れた髪かみを撫なでつけ、

「帰る」

　と言って、もと来た方向へ歩き出した。俺もどっちかと言えばそっちから帰ったほうが早く帰れるんだが。しかしハルヒの背中は無言で「ついてくんな！」と言っているような気がして、俺はただひたすらに、ハルヒの姿が見えなくなるまで──その場に立ちつくしていた。

　何をやってるんだろうね。





　自宅に戻もどると、門の前で古泉一樹が俺を待っていた。

「こんにちは」

　十年前からの友人みたいな笑え顔がおがそらぞらしい。制服に通学鞄かばんという完かん璧ぺきな下校途と中ちゆうスタイルで、馴なれ馴れしく手を振ふりながら、

「いつぞやの約束を果たそうかと思いまして。帰りを待たせてもらいました。意外に早かったですね」

「俺がどこに行ってたのか知ってるみたいな話し方だな」

　スマイルゼロ円みたいな笑みをたたえた古泉は、

「少しばかりお時間を借りていいでしょうか。案内したいところがあるんですよ」

「涼宮がらみで？」

「涼宮さんがらみで」

　俺は自宅の扉とびらを開けると玄げん関かんに鞄を置き、ちょうど奥から出てきた妹に、ちょっと遅おそくなるかもしれないことを告げ、また古泉のところへ取って返し、その数分後には車上の人となっていた。





　ありえないくらいのタイミングの良さで通りかかったタクシーを古泉が止め、俺と奴やつを乗せた車は国道を東へと向かっている。乗り際ぎわに古泉が口にした地名は、県外にある大都市のものであり、電車で行ったほうが遥はるかに安上がりに違ちがいないのだが、どうせ払はらいはこいつ持ちだ。

「ところで、いつぞやの約束って何だっけ」

「超ちよう能のう力りよく者ならその証しよう拠こを見せてみろとおっしゃったでしょう？　ちょうどいい機会が到とう来らいしたもんですから、お付き合い願おうと思いまして」

「わざわざ遠出する必要があるのか？」

「ええ。僕が超能力者的な力を発揮するには、とある場所、とある条件下でないと。今日これから向かう場所が、いい具合に条件を満たしているというわけです」

「まだハルヒが神様だとか思ってんのか」

　後部座席に並んで座っている古泉は、俺に横目をくれて、

「人間原理という言葉をご存じですか？」

「ご存じでないな」

　ふっと息いき継つぎみたいな笑い声を上げて、古泉は言った。

「煎せんじ詰つめて言えば、『宇宙があるべき姿をしているのは、人間が観測することによって初めてそうであることを知ったからだ』という理論です」

　ちっとも解わからん。

「我観測す、ゆれに宇宙あり。とでも言い換かえましょうか。要するに、この世に人間なる知的生命体がいて物理法則や定数を発見し、宇宙はこのようにして成っていると観測出来て初めて宇宙そのものの存在が知られたわけです。ならば宇宙を観測する人類がもし地球でここまで進化することがなかったら、観測するものがいない以上、宇宙はその存在を誰だれにも知られることがない。つまりあってもなくても同じことになってしまう。人類がいるからこそ宇宙は存在を認められている、という人間本位的な理り屈くつのことです」

「そんな無茶な話があるか。人類がいようがいまいが、宇宙は宇宙だろう」

「その通りです。だから人間原理は科学的とは言えません。思し索さく的な理論にすぎない。しかし面おも白しろい事実がここから浮ふ上じようします」

　タクシーが信号で止まる。運転手は前を見たまま、俺たちを一いつ顧こだにしない。

「なぜ宇宙は、こうも人類の生存に適した形で創造されたのか。重力定数がわずかでも小さいか大きいかしていたなら、宇宙がこのような世界になることはなかったでしょう。あるいはプランク定数が、あるいは粒りゆう子しの質量比が、まさに人間にとってうってつけとしか言いようがない値をとっているゆえに世界はあり、人類もある。不思議なことだとは思いませんか？」

　俺は背中がむず痒がゆくなるのを感じた。何だか科学かぶれした新興宗教のパンフレットにありそうな謳うたい文句だ。

「ご安心を。僕は全知全能たる絶対神が人間の造物主である、などと信しん仰こうしているわけではありません。僕の仲間たちもね。ただし疑ってはいます」

　何をだ。

「僕たちは、崖がけっぷちで爪つま先さき立だちしている道化師のごとき存在なのではないかとね」

　俺がよほど変な顔をしていたのだろう。古泉は喘ぜん息そくにかかった鶏にわとりのオスみたいな笑い声を響ひびかせ、

「冗じよう談だんです」

「お前の言ってることは何一つとして理解出来ん」

　俺はハッキリ言ってやった。笑えないコントに付き合っているヒマはない。ここで俺を降ろすか、さっさとＵターンしろ。出来れば後者がいい。

「人間原理を引き合いに出したのは、ものの例えですよ。涼宮さんの話がまだです」

　だから、どうしてお前も長門も朝比奈さんもハルヒがそんなに好きなんだ。

「魅み力りよく的な人だとは思いますが。それは置いときましょう。覚えていますか、僕が、世界は涼宮さんによって作られたのかもしれないと言ったこと」

　いまいましいことだが記き憶おくには残っているようだな。

「彼女には願望を実現する能力がある」

　そんなことを大まじめに断言するな。

「断言せざるを得ません。事態はほとんど涼宮さんの思い通りに推移していますから」

　そんなはずがあるか。

「涼宮さんは宇宙人はいるに違ちがいない、そうであって欲しいと願った。だから長門有希がここにいる。同様に未来人もいて欲しいと思った。だから朝比奈みくるがここにいる。そして僕も、彼女に願われたからというただそれだけの理由でここにいるのですよ」

「だーかーら、何で解るんだよ！」

「三年前のことです」

　三年前はもういい。聞き飽あきた。

「ある日、突とつ然ぜん僕は自分に、ある能力が備わったことに気付いた。その力をどう使うべきかも何故なぜか知っていた。僕と同じ力を持つ人間が僕と同様に力に目覚めたこともね。ついでにそれが涼宮ハルヒによってもたらされたことも。これは説明出来ません。解ってしまうんだから仕方がないとしか」

「一億万歩譲ゆずったとして、ハルヒにそんなことが出来るとは思えん」

「そうでしょうね。我々だって信じられなかった。一人の少女によって世界が変化、いや、ひょっとしたら創造されたのかもしれない、なんてことをね。しかもその少女はこの世界を自分にとって面白くないものだと思いこんでいる。これはちょっとした恐きよう怖ふですよ」

「なぜだ」

「言ったでしょう。世界を自由に創造出来るのなら、今までの世界をなかったことにして、望む世界を一から作り直せばいい。そうなると文字通りの世界の終わりが訪れます。もっとも僕たちがそれを知るすべもないでしょうが。むしろ、我々が唯ゆい一いつ無二だと思っているこの世界も、実は何度も作り直された結果なのかもしれません」

　信じられるか、と言う代わりに俺は別の言葉を作っていた。

「だったらハルヒに自分の正体を明かしたらいい。超ちよう能のう力りよく者が実在すると知ったら、喜ぶぞ、あいつ。世界をどうにかしようとは思わないかもしれん」

「それはそれで困るんですよ。涼宮さんが超能力なんて日常に存在するのが当たり前だと思ったなら、世界は本当にそのようになります。物理法則がすべてねじ曲がってしまいます。質量保存の法則も、熱力学の第二法則も。宇宙全体がメチャメチャになりますよ」

「どうにも解わからないことがある」

　俺は言った。

「ハルヒが宇宙人や未来人や超能力者を望んだから、お前や長門や朝比奈さんがいるんだって言ったな」

「そうです」

「なら、なぜハルヒ自身はまだそれに気付いていないんだ。お前たちや、俺までが知っているのに。おかしいだろう」

「矛む盾じゆんだと思いますか。ところがそうではないのですよ。矛盾しているのは涼宮さんの心のほうです」

　解りやすく言え。

「つまるところ、宇宙人や未来人や超能力者が存在して欲しいという希望と、そんなものがいるはずないという常識論が、彼女の中でせめぎ合っているんですよ。彼女は言動こそエキセントリックですが、その実、まともな思考形態を持つ一いつ般ぱん的な人種なんです。中学時代は砂すな嵐あらしのようだった精神も、ここ数ヶ月は割に落ち着いて、僕としてはこのまま落ち着いていて欲しかったんですけどね、ここに来てまた、トルネードを発生させている」

「どういうわけだ」

「あなたのせいですよ」

　古泉は口だけで笑っていた。

「あなたが涼宮さんに妙みようなことを思いつかせなければ、我々は今もまだ彼女を遠目から観察するだけですんでいたでしょう」

「俺がどうしたって？」

「怪あやしげなクラブを作るように吹ふき込んだのはあなたです。あなたとの会話によって彼女は奇き妙みような人間ばかりを集めたクラブを作る気になったのだから、責任のありかはあなたに帰結します。その結果、涼宮ハルヒに関心を抱いだく三つの勢力の末まつ端たんが一堂に会することになってしまった」

「……濡ぬれ衣ぎぬだ」

　我ながら力のこもらない反論。古泉は薄うすく笑いながら、

「まあ、それだけが理由ではないのですが」

　それだけ言って口を閉ざした。俺が続きを言えと言い出す前に、運転手が言った。

「着きました」

　車が止まり、ドアが開かれる。雑ざつ踏とうの中に俺と古泉は降り立った。料金を受け取ることもなくタクシーは走り去ったが、俺は全然驚おどろかなかった。





　周辺地域に住む人間が、街に出る、と言えばたいていこの辺りのことを差す。私鉄やＪＲのターミナルがごちゃごちゃと連なり、デパートや複合建築物が建ち並ぶ日本有数の地方都市。夕日がせわしなく道行く人々を明るく彩さい色しきするスクランブル交差点。どこから湧わいたのかと思うほどの人間が青信号と同時に動き出した。その長い横断歩道の際きわで車を降りた俺たち二人は、たちまちのうちに雑踏に紛まぎれた。

「ここまでお連れして言うのも何ですが」

　ゆっくりと横断歩道を渡わたりつつ、古泉は前を見たまま、

「今ならまだ引き返せますよ」

「いまさらだな」

　すぐ横を歩く古泉の手が俺の手を握にぎった。何のマネだ、気持ち悪い。

「すみませんが、しばし目を閉とじていただけませんか。すぐすみます。ほんの数秒で」

　肩かたがぶつかりそうになった会社員風のスーツ姿を身体からだをよじって避よける。青信号が点てん滅めつを始める。

　いいだろう。俺は素す直なおに目をつむった。大量の靴くつ音おと、車のエンジン音、一時も途と絶だえることのない人声、喧けん噪そう。

　古泉に手を引かれて、一歩、二歩、三歩。ストップ。

「もうけっこうです」

　俺は目を開いた。





　世界が灰色に染まっていた。





　暗い。思わず空を見上げる。あれほど目ま映ばゆい橙だいだい色いろを放っていた太陽はどこにもなく、空は暗あん灰かい色しよくの雲に閉ざされている。雲なのだろうか？　どこにも切れ目のない平面的な空間がどこまでも広がり、周囲を陰かげで覆おおっている。太陽がない代わりに灰色の空は薄うすボンヤリとした燐りん光こうを放って世界を暗黒から救っている。

　誰だれもいない。

　交差点の真ん中に立ちつくす俺と古泉以外、横断歩道を埋うめ尽つくすまでだった人の群れは、存在の名残なごりもなく消え失うせていた。薄うす闇やみの中で、信号機だけがむなしく点滅し、今、赤になった。車道側の信号が青に変わる。しかし走り出す車も一台もなかった。地球の自転すら止まったのではないかと思うまでの静せい寂じやく。

「次元断層の隙すき間ま、我々の世界とは隔かく絶ぜつされた、閉へい鎖さ空間です」

　古泉の声が静まりかえった大気の中でやけによく響ひびいた。

「ちょうどこの横断歩道の真ん中が、この閉鎖空間の《壁かべ》でしてね。ほら、このように」

　伸のばした古泉の手が抵てい抗こうを受けたように止まった。俺も真似まねしてみる。冷たい寒天のような手て触ざわり。弾だん力りよくのある見えない壁はわずかに俺の手を受け入れたが、十センチも進まないうちにビクともしなくなった。

「半径はおよそ五キロメートル。通常、物理的な手段では出入り出来ません。僕の持つ力の一つが、この空間に侵しん入にゆうすることですよ」

　タケノコのように地面から生えているビルの数々には明かり一つ灯ともっていない。商店街に並ぶ店にも。人工的な光を放っているのは信号と、弱々しく輝かがやく街灯だけだ。

「ここはどこだ」

　むしろ、何だ、と言うべきだろうか。

　歩きながら説明しましょう、と古泉はどうということもなさそうに、

「詳しよう細さいは不明ですが、我々の住む世界とは少しだけズレたところにある違ちがう世界……とでも言いましょうか。先ほどの場所から次元断層が発生し、我々はその隙間に入り込んだ状態になっています。今この時でも、外部は何ら変わらない日常が広がっていますよ。常人がここに迷い込むことは……まあ滅めつ多たにありません」

　道路を渡り切り、古泉は目的地が決まっているのか、確かな足取りで歩を進める。

「地上に発生したドーム状の空間を想像して下さい。お椀わんを伏ふせたようなと言いますか。ここはその内部ですよ」

　雑居ビルの中に入る。人の気配どころかホコリ一つ落ちていない。

「閉鎖空間はまったくのランダムに発生します。一日おきに現れることもあれば、何ヶ月も音おと沙さ汰たなしのこともある。ただ一つ明らかなのは、」

　階段を登る。ひどく暗い。前を歩く古泉の姿がわずかでも見えていなければ足を取られるところだ。

「涼宮さんの精神が不安定になると、この空間が生まれるってことです」

　四階建ての雑居ビルの屋上に出る。

「閉鎖空間の現出を僕は探知することが出来ます。僕の仲間も。なぜそれを知ってしまうのかは僕らにも謎なぞです。なぜだか出る場所と時間が解わかってしまう。同時にここへの入り方もね。言葉では説明出来ません、この感覚は」

　屋上の手すりにもたれて空を見上げる。そよとも風が吹ふいていない。

「こんなものを見せるために、わざわざ連れてきたのか？　誰もいないだけじゃないか」

「いえ、核かく心しんはこれからですよ。もう間もなく始まります」

　もったいぶるな。しかし古泉は俺の仏ぶつ頂ちよう面づらに気付かないふりをして、

「僕の能力は閉鎖空間を探知して、ここに入るだけではありません。言うなれば、僕には涼宮さんの理性を反映した能力が与あたえられているのです。この世界が涼宮さんの精神に生まれたニキビだとしたら、僕はニキビ治ち療りよう薬なんですよ」

「お前の比ひ喩ゆは解りにくい」

「よく言われます。しかしあなたもたいしたものだ。この状じよう況きようを見て、ほとんど驚おどろいていませんね」

　俺は消えた朝倉とゴージャスな朝比奈さんを思い出した。すでに色々あったからな。

　不意に古泉は顔を上げた。相対した俺の頭の向こう側に、遠くに焦しよう点てんを合わせた目を向ける。

「始まったようです。後ろを見て下さい」

　見た。





　遠くの高層ビルの隙すき間まから、青く光る巨きよ人じんの姿が見えた。





　三十階建ての商業ビルよりも頭一つ高い。くすんだコバルトブルーの痩そう身しんは発光物質ででも出来ているのか、内部から光を放っているようだ。輪りん郭かくもはっきりしない。目鼻立ちといえるものもない。目と口があるらしき部分がそこだけ暗くなっている他ほかは、ただののっぺらぼうだ。

　何だ、アレは。

　挨あい拶さつでもするように、巨人は片手をゆるゆると上げ、鉈なたのように振ふり下ろした。

　かたわらのビルを屋上から半ばまで叩たたき割り、腕うでを振る。コンクリートと鉄筋の瓦が礫れきがスローモーションで落下、轟ごう音おんとともにアスファルトに降り注ぐ。

「涼宮さんのイライラが具現化したものだと思われます。心のわだかまりが限界に達するとあの巨人が出てくるようです。ああやって周りをぶち壊こわすことでストレスを発散させているんでしょう。かと言って、現実世界で暴れさせるわけにもいかない。大惨さん事じになりますかね。だからこうして閉鎖空間を生み出し、その内部のみで破は壊かい行動をする。なかなか理性的じゃないですか」

　青い光の巨人が腕を振るたびにビルたちは半分からへし折られて崩ほう壊かいし、崩壊したビルの残ざん骸がいを踏ふみつぶしながら巨人は足を踏み出した。建物がひしゃげる鈍にぶい音は聞こえても、巨人の足音は不思議と響いて来ない。

「あれくらいの巨大な人型になると、物理的には自重で立つことも出来ないはずなんですがね。あの巨人はまるで重力がないかのように振る舞まうんです。ビルを破壊出来るということは質量を持っているはずなんですが、いかなる理り屈くつもあれには通用しませんよ。たとえ軍隊を動員したとしても、あれを止めることは出来ないでしょう」

「じゃ、あれは暴れっぱなしなのか」

「いいえ。僕がいるのはそのためでもあるのですから。見てください」

　古泉は指を巨人に向けた。俺は目を凝こらす。さっきまではなかった、赤い光点がいくつか巨人の周りを旋せん回かいしていた。高層ビルと伍ごする雲つく青い巨人に比べると、ゴマ粒つぶみたいな矮わい小しような球状の赤い光。五つまでは数えれたが、動きが速すぎて目で追いきれない。衛星のように巨人を周回する赤い点は、まるで巨人の行く手を遮さえぎるような動きを見せていた。

「僕の同志ですよ。僕と同じように涼宮さんによって力を与えられた、巨人を狩かる者です」

　赤い光の粒は、淡たん々たんと街並みを破壊する青い巨人が振り回す両腕を巧たくみに回かい避ひしながら、急激に軌き道どうを変えて巨人の身体からだに突とつ撃げきを仕し掛かけていた。巨人の身体はまるで気体で出来ているようだった。やすやすと貫かん通つうする。

　だが巨人は自分の顔の前を飛び回る赤い球体など目に入らない様子で、攻こう撃げきを無視、義務的な動作でまた一つのデパートビルに手刀を振り下ろした。

　複数の赤しやつ光こうが一いつ斉せいに突撃してもその動きは変わらない。巨人は体中を速すぎてレーザーのようにも見える赤い光に貫つらぬかれていたが、遠目からではどんなダメージを受けているのかはまったく解らなかった。巨人の身体には穴すら開いていないように見える。

「さて、僕も参加しなければ」

　古泉の身体から赤い光が滲しみ出していた。オーラが可視光線なんだとしたら、まさにそんな感じだ。発光する古泉の身体はたちまちのうちに赤い光の球体に飲み込まれ、俺の目の前に立っているのは、もはや人間の姿ではなく、ただの大きな光の玉だった。

　デタラメだな、もう。

　ふわりと浮うき上がった赤い光球は、俺に目配せでもするように二三度ばかり左右に揺ゆれると、残像すら残らないスピードで飛び去った。一直線に、巨人へ向けて。

　古泉のなれの果てを加えた赤い光群は一秒もじっとしていないため総数を数える気にもならないが、二桁けたってことはないだろう。果か敢かんに巨人への体当たりアタックをかましているものの突つき抜ぬけるばかりで何かの効果を上げているようには思えない、と俺が傍ぼう観かんしていると、赤い玉の一つが巨人の青い腕、肘ひじの辺りに取りついて、そのまま腕に沿って一周した。

　ゆらあり、と巨人の片腕が肘から切断され、主あるじを失った巨きよ腕わんが地面に落下していく、と思いきや、青い光がモザイク状に煌きらめきながら、腕は厚みを失って、日向ひなたに置いた雪の欠片かけらのように消えた。肘を失った切断部から気体のような青い煙けむりがゆっくりと滴したたっているのは、あれは巨人の血液だろうか。幻げん想そう的と言えなくもない光景である。

　赤い玉たちは猪ちよ突とつ猛もう進しんから切り刻み攻撃に宗しゆう旨し変えをしたようで、犬にたかるノミみたいに一斉に巨人の身体にピタリと身を寄せると、青い光を切り刻み始める。巨大な顔に赤い線が斜ななめ走り頭部がずり落ちる。肩かたが崩ほう落らくし、たちまちのうちに上半身は奇き怪かいなオブジェと化した。切断された部位はモザイクとなって広がり、そして消しよう滅めつする。

　青い光が立つ辺り一面が荒こう野やになっているおかげで遮しや蔽へい物がなく、俺は一部始終を観劇することが出来た。身体の半分以上を失ったと同時に巨人、崩壊。塵ちりよりも小さく分解し、後には瓦礫の山が残されるばかりだった。

　上空を旋回していた赤い点々は、それを見届けると、四方に散った。大半はすぐに見えなくなったが一つが俺に向かって飛んできて、雑居ビルの屋上に軟なん着ちやく陸りくを決めると赤い光がパトランプからコタツ強、弱へと明るさを弱め、すっかり光の放出をやめたとき、そこに立っているのは、気取った手つきで髪かみをなでつけているいつもの微笑ほほえみを浮かべた古泉なのだった。

「お待たせしました」

　息一つ乱れていない。

「最後に、もう一つ面おも白しろいものが観みれますよ」

　空を指さした。これ以上何があるんだと思いながら、俺はダークグレー一色に染まった天空を見上げ、それを見た。

　最初に巨人を見かけた辺り、その上空に亀き裂れつが入っていた。卵から孵ふ化かしようとしている雛ひな鳥どりがつついたようなひび割れ。亀裂は蜘蛛くもの巣状に成長していた。

「あの青い怪かい物ぶつの消滅に伴ともない、閉へい鎖さ空間も消滅します。ちょっとしたスペクタクルですよ」

　古泉の説明口調が終わるかどうかのうちに、亀裂は世界を覆おおい尽つくしていた。まるで金属製の巨大なザルをすっぽりかぶせられた気分だ。網あみの目が細かくなっていき、ほぼ黒い湾わん曲きよくとしか思えなくなったその直後、

　パリン。

　音はしなかった。だが俺はガラスが砕くだけるような擬ぎ音おんを脳のう裏りに感じた。天頂の一点から明るい光が一いつ瞬しゆんにして円形に広がる。光が降ってくる、と思ったのは間ま違ちがいで、ドーム球場の開閉式の屋根が数秒もしないで全開された、というのが近い。ただし屋根だけではなく建物すべてが。

　つんざくような騒そう音おんが鼓こ膜まくを打って、俺は反射的に耳を押さえた。だがその音は無音の世界でしばらく過ごしたことによる単なる錯さつ覚かく、日常の喧けん噪そう。

　世界は元の姿を取り戻もどしている。

　崩くずれ去った高層ビルも灰色の空も空飛ぶ赤い光もどこにもない。道路は車と人の山でごった返し、ビルの合間には見慣れたオレンジ色の太陽が輝かがやき、世界をあまねく照らすその光は恩おん恵けいを受ける物体すべてに長い影かげを生じさせていた。

　風が吹ふいていた。





「解わかっていただけましたか？」

　雑居ビルを後にした俺たちの前に嘘うそみたいに止まったタクシーに乗り込みながら古泉が訊きいた。見覚えのある無口な運転手。

「いいや」と俺は答えた。本心から。

　そう言うと思いました、と古泉は笑いを含ふくんだ声で、「あの青い怪物──我々は《神しん人じん》と呼んでいますが──は、すでにお話ししたとおり涼宮さんの精神活動と連動しています。そして我々もまたそうなんです。閉鎖空間が生まれ、《神人》が生まれるときに限り、僕は異能の力を発揮出来る。それも閉鎖空間の中でしか使えない力です。例えば今、僕には何の力もありません」

　俺は黙だまって運転手の後頭部を眺ながめていた。

「なぜ我々にだけこんな力が備わったのかは不明ですが、多分誰だれでもよかったんでしょう。宝くじに当たったみたいなものです。到とう底てい当たりそうにない低確率でも、誰かには命中する。たまたま僕に矢が刺ささっただけなんですよ」

　因果な話です、と言って古泉は微び苦く笑しようを浮うかべ、俺は黙り続けた。何と言っていいものやらさっぱりだ。

「《神人》の活動を放置しておくわけにはいきません。なぜなら、《神人》が破は壊かいすればするほど、閉鎖空間も拡大していくからです。あなたがさっき見たあの空間は、あれでもまだ小規模なものなのです。放ほっておけばどんどん広がっていって、そのうち日本全国を、それどころか全世界を覆い尽くすでしょう。そうなれば最後、あちらの灰色の空間が、我々のこの世界と入れ換かわってしまうのですよ」

　俺はようやく口を開いた。

「なぜそんなことが解る」

「ですから、解ってしまうのだからしょうがありません。『機関』に所属している人間はすべてそうです。ある日突とつ然ぜん、涼宮さんと彼女が及およぼす世界への影えい響きようについての知識と、それから妙みような能力が自分にあることを知ってしまったのです。閉鎖空間の放置がどのような結果をもたらすのかもね。知ってしまった以上はなんとかしなければならないと思うのが普ふ通つうですよ。僕たちがしなければ、確実に世界は崩ほう壊かいしますから」

　困ったものです、と呟つぶやいて、古泉も黙り込んだ。

　それきり俺の自宅に到とう着ちやくするまで、俺たちは窓を流れる日常の風景を眺め続けた。

　車が止まって俺が降りる際きわになって、

「涼宮さんの動向には注意しておいて下さい。ここしばらく安定していた彼女の精神が、活性化の兆きざしを見せています。今日のあれも、久しぶりのことなんですよ」

　俺が注意しててもどうこうなるもんでもないんじゃないのか？

「さあ、それはどうでしょうか。僕としてはあなたにすべてのゲタを預けてしまってもいいと思ってるんですがね。我々の中でも色々と思おも惑わくが錯さく綜そうしておりまして」

　半分ほど開いたドアから身を乗り出していた古泉は俺が言い返すよりも早く頭を引っ込めた。ドアが閉まる。都市伝説にありそうな幽ゆう霊れいタクシーのように走り去る車を見送るのもバカらしく、俺はさっさと自宅に戻った。





　　第七章





　自じ称しよう、宇宙人に作られた人造人間。自称、時をかける少女。自称、少年エスパー戦隊。それぞれに自称が取れる証しよう拠こを律りち儀ぎにも俺に見せつけてくれた。三者三様の理由で、三人は涼宮ハルヒを中心に活動しているようだが、それはいい。いや、ちっともよくないが、百光年ほど譲ゆずっていいことにしてみても、さっぱり解わからないことがある。

　なぜ、俺なのだ？

　宇宙人未来人エスパー少年がハルヒの周りをうようよするのは、古泉いわくハルヒがそう望んだからだと言う。

　では、俺は？

　なんだって俺はこんなけったいなことに巻き込まれているんだ？　百パーセント純正の普通人だぞ。突然ヘンテコな前世に目覚めでもしない限り履り歴れき書に書けそうもない謎なぞの力もなんにもない普ふ遍へん的な男子高校生だぞ。

　これは誰の書いたシナリオなんだ？

　それとも誰かに怪あやしいクスリでも嗅かがされて幻げん覚かくでも見ているのか。毒電波を受信しているだけなのか。俺を踊おどらせているのはいったい誰だ。

　お前か？　ハルヒ。





　なーんてね。





　知ったこっちゃねえや。

　なぜ俺が悩なやまなくてはならんのだ。すべての原因はハルヒにあるらしい。だとしたら悩まなくてはならないのは俺ではなくてハルヒだろう。俺がその困こん惑わくを肩かた代がわりしなければならない理由がどこにある。ない。ないと言ったらない。俺がそう決めた。長門も古泉も朝比奈さんも、俺にあんなことを告白するくらいなら本人に直接何もかも話してやればいいのだ。その結果、世界がどうなろうとそれはハルヒの責任であって、俺は無関係だ。

　せいぜい走り回ればいいのさ。俺以外の人間がな。

　季節は本格的に夏の到とう来らいを前まえ倒だおしすることを決めたに違ちがいない。俺は汗あせをダラダラ垂らしながら坂道を登りながら脱ぬいだブレザージャケットで汗を拭ぬぐいながらネクタイも外してシャツの第三ボタンまでを開けながらノロくさく足を動かしていた。朝にこんなに暑ければ昼にはどんなことになるのか解らないというくらい暑い。ナチュラルハイキングコースが学校への通学路になっている虚むなしさをかみしめる俺の肩かたが後ろから叩たたかれた。触さわるな、余計に暑くなるだろ、と振ふり返った先には谷口のにやけ面づら。

「よっ」

　俺の横に並んだ谷口もさすがに汗まみれだった。うっとおしいよなあ、せっかくキメた髪かみ型がたが汗でベタベタになっちまう、などと言いながらも元気そうな奴やつである。

「谷口」

　一方的に興味ゼロの飼っている犬の話を始めた口を遮さえぎって俺は訊きいた。

「俺って、普ふ通つうの男子高校生だよな」

「はあ？」

　そんな面おも白しろい冗じよう談だんは初めて聞いたと言わんばかりのわざとらしい顔をする谷口。

「まず普通の意味を定義してくれ。話はそっからだな」

「そうかい」

　訊かないほうがマシだった。

「嘘うそ嘘、冗談。お前が普通かって？　あのな、普通の男子生徒は、誰だれもいなくなった教室で女を押し倒たおしたりはしねえ」

　当たり前だが、覚えていたらしい。

「俺も男だ。根ほり葉ほり訊いたりしないだけの分別とプライドを持っている。だがな、解るだろ？」

　全然。

「どうやっていつのまにああなったんだ。え？　しかも俺様的美的ランクＡマイナーの長門有希と」

　Ａマイナーだったのか。そんなことより、

「あれはだな……」

　俺は釈しやく明めいした。谷口が考えていると思われるストーリーは妄もう想そう、夢想、完全フィクションである。長門は気の毒にも部室を根城にしてしまったハルヒの被ひ害がい者しやであり、文芸部の活動に支障をきたすようになった彼女は困りあぐねたあげく、俺に相談した。なんとか涼宮さんをここから退去させるわけにはいかないだろうか。真しん摯しな訴うつたえに同調すること大だった俺は気の毒な彼女を救うべく、ハルヒの目の届かない場所で共とも々どもに善後策を協議することにし、ハルヒの帰ったあとの教室でアイデアを出し合っていると、長門は持病の貧ひん血けつを起こして倒れとっさに俺が彼女と床ゆかとの衝しよう突とつを防ごうとしたまさにその時闖ちん入にゆうしてきたのがお前、谷口である。まこと、真実とは明らかになってみれば下らないものであることよなあ。

「嘘うそつけ」

　一いつ蹴しゆうされた。くそ、ところどころに真実を交えた完かん璧ぺきな作り話だと思ったのに。

「その嘘話を信じたとして、あの誰とも接点を持ちたがらない長門有希から相談を持ちかけられた時点でもうお前は普通じゃねえよ」

　そんなに有名人だったのか、長門は。

「なにより涼宮の手下でもあるしな。お前が普通の男子生徒ってんなら、俺なんかミジンコ並に普通だぜ」

　ついでに訊いておこう。

「なあ、谷口。お前、超ちよう能のう力りよくを使えるか？」

「あーん？」

　マヌケ面が第二段階に進行する。ナンパに成功した美少女がアブナイ宗教の勧かん誘ゆう員だったと知ったときのような顔をして、谷口は、

「……そうか。お前はとうとう涼宮の毒に浸おかされてしまいつつあるんだな……。短い間だったが、お前はいい奴だった。あんまり近づかないでくれ。涼宮が移る」

　俺は谷口を小こ突づき、谷口はぷふぅっと吹ふき出してから表情を崩くずして笑い出した。こいつが超能力者と言うのなら、俺は今日から国連事務総長だ。

　校門から校舎へと続く石いし畳だたみを歩きながら、まあ一応感謝しておく。少なくとも話している間は暑さが少しは紛まぎれたからな。





　さしものハルヒも熱気にだけはいかんともしがたいらしく、くたりと机に寄りかかってアンニュイに彼方かなたの山並を見物していた。

「キョン、暑いわ」

　そうだろうな、俺もだよ。

「扇あおいでくんない？」

「他人を扇ぐくらいなら自分を扇ぐわい。お前のために余分に使うエネルギーが朝っぱらからあるわけないだろ」

　ぐんにゃりとしたハルヒは昨日の弁べん舌ぜつさわやかな面おも影かげもなく、

「みくるちゃんの次の衣装なにがいい？」

　バニー、メイドと来たからな、次は……ってまだ次があるのかよ。

「ネコ耳？　ナース服？　それとも女王様がいいかしら？」

　俺は頭の中で朝比奈さんを次々と着きせ替かえさせ、恥はずかしそうに顔を赤らめる小さな姿を想像して眩暈めまいを感じた。可愛かわいすぎる。

　真しん剣けんに悩なやみ始めた俺を、ハルヒは眉まゆをひそめて睨ねめつけて耳の後ろに髪かみを払はらい、

「マヌケ面づら」

　と決めつけた。お前が話を振ふったんだろうが。多分その通りだろうから抗こう議ぎするつもりはないが。セーラー服の胸むな元もとから教科書で風を送り込みながら、

「ほんと、退たい屈くつ」

　ハルヒは口を見事なへの字にした。まるでマンガのキャラクターみたいに。





　輻ふく射しや熱でこんがり焼けそうな午後の時間をまるまる使った地じ獄ごくの体育が終わり、二時間も使ってマラソンさせんじゃねえよバカ岡部などとののしりながら俺たちは六組で濡ぬれ雑ぞう巾きんになった体操着を着き替がえて、五組に戻もどってきた。

　早めに体育を切り上げていた女子どもの着替えは終わっていたが、後はホームルームを残すだけとあって運動部に直行する数人は体操着のままであり、運動部とは無む縁えんのハルヒもなぜか体操服を着ていた。

「暑いから」

　というのがその理由である。

「いいのよ、どうせ部室に行ったらまた着替えるから。今週は掃そう除じ当番だし、このほうが動きやすい」

　頬ほお杖づえをついた卵形の顔を外に向けたままハルヒは流れる入道雲を目で追っていた。

「そりゃ合理的だな」

　朝比奈さんのコスプレは体操着でもいいな。コスプレと言わないか。正体は不明でも一応は高校生をやってるんだし。

「なんか妄もう想そうしてるでしょ」

　心を読んだとしか思えない的確なツッコミを放って俺をじろりと睨にらむ。

「あたしが部室に行くまで、みくるちゃんにエロいことしちゃダメよ」

　お前が来てからならいいのか、という言葉を飲み込んで、俺は新米の保安官に拳けん銃じゆうを突つきつけられた西部時代の指名手配犯のようにぞんざいな仕草で両手を広げた。





　いつものようにノックの返事を待って部室に入る。テレーズ人形のようにちょこんと椅い子すに座ったメイドさんが草原のヒマワリのような笑え顔がおで出で迎むかえてくれた。安らぐ。

　テーブルの隅すみでページを繰くる長門はさしずめなんかの間ま違ちがいで春に咲さいてしまったサザンカである。いやもう自分でも何の例えなんだか解わからん。

「お茶煎いれますね」

　頭のカチューシャをちょいと直し朝比奈さんは上うわ履ばきをパタパタ鳴らしてガラクタが溢あふれているテーブルに駆かけ寄った。急きゆう須すにお茶っ葉を慎しん重ちような手つきで入れている。

　俺はどっかりと団長机に腰こしを下ろして、いそいそとお茶の用意をする朝比奈さんを眺ながめて一人悦えつに入いっていたが、その姿をみているうちに天てん啓けいが閃ひらめいた。

　パソコンのスイッチを入れ、ＯＳの起動を待つ。ポインタから砂時計マークが消えたのを見計らって、俺はフリーソフトのビューワを立ち上げると、自分で設定したパスワードを入力してフォルダ「ＭＩＫＵＲＵ」の中身を表示させた。さすがコンピュータ研が泣きながら手放した新機種だけあってたちどころにサムネイル表示、朝比奈さんのメイド画像コレクション。

　朝比奈さんが湯飲みを用意している様子を片目で確認しながら、俺はその中の一枚を拡大し、さらに拡大。

　ハルヒによって無理矢理取らされた雌め豹ひようのポージング。大きくはだけた胸元から豊満な谷間がギリギリまで覗のぞいている。左の白い丘おかに黒い点があった。もう一段階拡大表示。だいぶドットが荒あれていたが、確かにそれは星形をしていた。

「なるほど、これか」

「何か解ったんですか？」

　机に湯飲みが置かれるより前に俺は手際よく画像を閉じていた。このへん、抜ぬかりはない。朝比奈さんがモニタを横から覗き込む。何もないですよん。

「あれ、これ何です？　このＭＩＫＵＲＵってフォルダ」

　ぐあ、抜かった。

「どうして、あたしの名前がついてるの？　ね、ね、何が入ってるの？　見せて見せて」

「いやあ、これはその、何だ、さあ何なんでしょうね。きっと何でもないでしょう。うん、そうです、何でもありません」

「嘘うそっぽいです」

　朝比奈さんは楽しそうに笑ってマウスに手を伸のばし、後ろから覆おおい被かぶさるように俺の右手を取ろうとする。させるまじ、とマウスをつかむ俺。背中に柔やわらかい身体からだを押しつけてくれながら朝比奈さんは俺の肩かたの上に顔を出した。甘やかな吐と息いきが頬ほおにかかる。

「あの、朝比奈さん、ちょっと離はなれ……」

「見せて下さいよー」

　左手を俺の肩にかけ、右手でマウスを追いかける朝比奈さんの上半身が背中でつぶれている感かん触しよくに、俺はほとほと参るしかなかった。

　クスクス笑いが耳じ朶だを打ち、そのあまりの心地ここちよさに俺はマウスを放しそうになり──、

「何やってんの、あんたら」

　摂せ氏しマイナス２７３度くらいに冷え切った声が俺と朝比奈さんを凍こおり付かせた。通学鞄かばんを肩に引っかけた体操服のハルヒが父親の痴ち漢かん現場を目もく撃げきしたような顔で立っていた。

　止まっていた朝比奈さんの時間が動いた。メイド服のスカートをぎこちなく揺ゆらせて俺の背中から離れた朝比奈さんはロボット歩きで後ずさり、バッテリー切れ寸前のＡＳＩＭＯアシモのように、かくんと椅子に座り込んだ。蒼そう白はくの顔が今にも泣きそうになっている。

　ふん、と鼻息を吹ふいて、ハルヒは足音高く机に近寄って俺を見下ろし、

「あんた、メイド萌もえだったの？」

「なんのこった」

「着き替がえるから」

　好きにしたらいい。朝比奈さんが煎いれてくれた番茶を飲んでくつろぐ俺。

「着替えるって言ってるでしょ」

　だから何なんだ。

「出てけ！」

　ほとんど蹴け飛ばされるように俺は廊ろう下かへ転がり、鼻先で荒あら々あらしくドアが閉められた。

「なんだ、あいつ」

　湯飲みを置くヒマもなかった。俺は茶色の液体で濡ぬれたシャツを指でつまみ上げて、ドアに背をあずけた。

　この違い和わ感かんはなんだろう。何か日常と違うところが感じられてならない。

「あー、そうか」

　教室でも堂々と着替えをおっぱじめるハルヒが、わざわざ俺を部室から放りだしたのが引っかかっているのだ。

　はて。どういう心境の変化だろ。それともいつしか恥はじらいを覚えるお年とし頃ごろになったのか。相変わらず五組の男は体育の時間前には脱だつ兎とのごとく教室から飛び出すのが習慣になってるから解りようもない。そう言えばその習慣を植え付けた朝倉ももういないんだな。

　持ったままの湯飲みをリノリウムの廊下に置いて、俺は片あぐらをかいた。

　しばらく待って、部屋でごそごそする気配が止まっても中に入れと言う声がかからず、俺がぼんやり膝ひざを抱かかえて待つこと十分、

「どうぞ……」

　朝比奈さんの小さな声がドア越ごしに聞こえた。本物のメイドよろしく扉とびらを開けてくれた朝比奈さんの肩かた越ごしに、たいして面おも白しろくもなさそうに机に肘ひじをついたハルヒの白く長い脚あしが見える。頭で揺れるウサ耳。懐なつかしのバニーガール姿。面めん倒どうくさいのか、カラーやカフス抜き、網あみタイツなしの生足で、しかし耳だけはしっかりつけたバニースタイルのハルヒが足を組んで座っていた。

「手と肩は涼すずしいけど、ちょっと通気性が悪いわね、この衣装」

　と言って、ハルヒはずるずると湯飲みの茶をすする。長門がページをパラリとめくった。

　バニーガールとメイドさんに囲まれ、どうしていいものやら見当もつかない。どっかでこの二人を客引きのバイトにでも斡あつ旋せんしたら儲もうかりそうだなと考えていると、

「うわ、なんですか」

　笑顔のままで素すっ邨とん狂きような声をあげるという愉ゆ快かいな反応をしつつ、古泉が現れた。

「あれ、今日は仮装パーティの日でしたっけ。すみません、僕、何の準備もしてなくて」

　話をややこしくするようなことを言うな。

「みくるちゃん、ここに座って」

　ハルヒが自分の前のパイプ椅い子すを指し示す。朝比奈さんは明らかにおどおどと、おっかなびっくりハルヒに背を向けて椅子に座った。何をするのかと思ったら、おもむろにハルヒは朝比奈さんの栗くり色いろの髪かみを手にとって、三つ編みに結ゆい始めた。

　この場面だけを切り取れば、まるで妹の髪をセットしてやっている姉、みたいな美しい風ふ情ぜいだが、いかんせん朝比奈さんは表情をこわばらせているし、ハルヒは仏ぶつ頂ちよう面づらだ。単に三つ編みメイドにしたいだけだろう。

　底の浅い笑えみでその風景を見ている古泉に俺は問いかけた。

「オセロでもやるか」

「いいですね。久しぶりです」

　俺たちが白と黒の争そう覇は戦せんをひたすら繰くり返している間（光の玉に変化出来るくせに古泉はやたらに弱かった）、ハルヒは朝比奈さんの髪を結ったりほどいたりツインテールにしたり団子にしたりして遊び（ハルヒの手が触ふれるごとに小さく震ふるえる朝比奈さん）、長門は一いつ瞬しゆんたりとも面おもてを上げずに読書に浸ひたっていた。

　何の集まりなんだか、ますます解わからなくなってきた。





　そう、その日、俺たちは何の変へん哲てつもないＳＯＳ団的活動をして過ごした。そこには空間を歪ゆがめる情報がどうとか言う宇宙人も未来からの訪問者も青い巨きよ人じんと赤い球体も何も関係なかった。やりたいことも取り立てて見当たらず、何をしていいのかも知らず、時の流れに身をまかすままのモラトリアムな高校生活。当たり前の世界、平へい凡ぼんな日常。

　あまりの何もなさに物足りなさを感じつつも、「なあに、時間ならまだまだあるさ」と自分に言い聞かせてまた漫まん然ぜんと明日を迎むかえる繰り返し。

　それでも俺は充じゆう分ぶん楽しかった。無目的に部室に集まり、小間使いのようによく動く朝比奈さんを眺ながめ、仏像のように動かない長門を眺め、人じん畜ちく無む害がいな微笑ほほえみの古泉を眺め、ハイとローの間を忙いそがしく行き来するハルヒの顔を眺めているのは、それはそれで非日常の香かおりがして、それは俺にとって妙みように満足感を与あたえてくれる学校生活の一部だった。クラスメイトに殺されそうになったり、灰色の無人世界で暴れる化け物に出会ったりなんぞ、そうそうありやしないだろうしな。あれが幻げん覚かくや催さい眠みん術や白昼夢でないとは断言しきれないが。

　涼宮ハルヒとその一味みたいに呼ばれるのは業ごう腹はらだが、色んな意味でこんな面白い連中と一いつ緒しよにいれるのは俺だけだ。なぜ俺だけなのかという疑問はこの際脇わきに置いておく。そのうち俺以外の人間の参加もあるかもしれん。

　そうさ、俺はこんな時間がずっと続けばいいと思っていたんだ。

　そう思うだろ？　普ふ通つう。

　だが、思わなかった奴やつがいた。

　決まっている。涼宮ハルヒだ。





　夜になって、晩飯だの風ふ呂ろだの明日の英語で和訳を当てられそうなところの予習だのを適当に済ませ、もう後は寝ねるしかない時間を時計の針が指したあたりで、俺は自室のベッドに寝ころんで長門から押しつけられた厚い書物をひもといていた。たまには読書もいいかなと思って何の気なしに読み始めたのだが、これが存外面白くてすいすいページが進む進む。やっぱり本なんてものは読むまで面白さが解らないもんだ。いいね、読書は。

　ただし一夜で読み切るにはあまりに文字量が多いので、俺は登場人物の一人が長々とした独白をちょうど終えたキリのいいところで本を置いた。そろそろ睡すい魔まの野や郎ろうが目ま蓋ぶたの上でキャンプを張った頃ころ合あいだ。長門の文字が刻まれた栞しおりを挟はさんで本を閉じ、電気を消して布ふ団とんに潜もぐり込む。まどろみ数分、俺は寝付きよく眠ねむりに落ちた。





　ところで人が夢を見る仕組みをご存じだろうか。睡眠にはレム睡眠とノンレム睡眠の二種類があって周期的に繰り返されるわけなのだが、眠りばなの数時間は深い眠り、ノンレム睡眠が多く訪れる。この時の脳は活動を休止しており、身体からだは眠っているが脳が軽く活動しているレム睡眠時に我々は夢を見るのである。朝方になってレム睡眠の構成比は増えていき、つまり夢というものはほとんど寝起き直前に続けて見るものなのだ。俺も毎日のように夢を見るが、ギリギリまで寝ね床どこにいていざ起きたら慌あわただしく登校の用意をしなくてはならないからすぐに忘れてしまう。ふとしたきっかけで何年か前の見たことも忘れていた夢の内容を思い出すこともあって、いや人間の記き憶おくの仕組みってのはまだ不思議で満ちているんだな。

　閑かん話わ休きゆう題だい。そんなことはどうでもいいんだ。

　頬ほおを誰だれかが叩たたいている。うざい。眠い。気持ちよく眠っている俺を邪じや魔まするな。

「……キョン」

　まだ目覚ましは鳴ってないぞ。何度鳴ってもすぐ止めてしまうけどな。お袋ふくろに命じられた妹が面おも白しろ半分に俺を布団から引きずり出すにはまだ余よ裕ゆうがあるはずだ。

「起きてよ」

　いやだ。俺は寝ていたい。胡う乱ろんな夢を見ているヒマもない。

「起きろってんでしょうが！」

　首を絞しめた手が俺を揺ゆり動かし、後頭部を固い地面に打ち付けて俺はやっと目を開いた。

……固い地面？

　上半身を跳はね上げる。俺を覗のぞき込んでいたハルヒの顔がひょいと俺の頭を避よけた。

「やっと起きた？」

　俺の横で膝ひざ立ちになっているセーラー服姿のハルヒが、白い顔に不安を滲にじませていた。

「ここ、どこだか解わかる？」

　解る。学校だ。俺たちの通う県立北高校。その校門から靴くつ脱ぬぎ場までの石いし畳だたみの上。明かり一つ灯ともっていない、夜の校舎が灰色の影かげとなって俺の目の前にそびえ──、

　違ちがう。

　夜空じゃない。

　ただ一面に広がる暗い灰色の平面。単一色に塗ぬり潰つぶされた燐りん光こうを放つ天空。月も星も雲さえない、壁かべのような灰色空。

　世界が静せい寂じやくと薄うす闇やみに支配されていた。

　閉へい鎖さ空間。

　俺はゆっくりと立ち上がった。寝ね間ま着きがわりのスウェットではなく、ブレザーの制服が俺の身体をまとっている。

「目が覚めたと思ったら、いつの間にかこんな所にいて、隣となりであんたが伸のびてたのよ。どういうこと？　どうしてあたしたち学校なんかにいるの？」

　ハルヒが珍めずらしくか細い声で訊きいている。俺は返事の代わりに自分の身体にあちこち手を触ふれてみた。手の甲こうをつねった感かん触しよくも、制服の手て触ざわりも、まるで夢とは思えない。髪かみの毛を二本ばかり引っ張って抜ぬくと確かに痛い。

「ハルヒ、ここにいたのは俺たちだけか？」

「そうよ。ちゃんと布団で寝てたはずなのに、なんでこんな所にいるわけ？　それに空も変……」

「古泉を見なかったか？」

「いいえ。……どうして？」

「いや何となくだが」

　ここが例の次元断層がどうのこうのしたとかの閉鎖空間なら、光の巨きよ人じんと古泉たちもいるはずだ。

「とりあえず学校を出よう。どこかで誰かに会うかもしれない」

「あんた、あんまり驚おどろかないのね」

　驚いてるさ。特にお前がここにいることにな。ここはお前が作り出す巨人の遊び場じゃなかったのか？　それともやはりこれは異常にリアル感のある俺が見ている夢か。人気のない学校でハルヒと二人きり。フロイト博士ならなんと分ぶん析せきしてくれるだろう。

　ハルヒと付つかず離はなれず並んで門もん扉ぴから足を踏ふみ出そうとした俺の鼻先が見えない壁に押された。ねっとりした感触には記憶がある。力を込めればある程度は進めるものの、すぐに固い壁にぶち当たる。透とう明めいな壁が校門のすぐ外に立ちはだかっていた。

「……何、これ」

　ハルヒが両手を盛んに突つき出しながら、目を見開いている。俺は学校の敷しき地ちぞいに歩いて確認する。不可視の壁は歩いた範はん囲い内では途と切ぎれることなく続いていた。

　まるで、俺たちを学校に閉じこめるように。

「ここからは出られないらしい」

　風がそよとも吹ふいていない。大気すら動きを止めたようだ。

「裏門へ回ってみるか」

「それより、どこかと連れん絡らくが取れない？　電話でもあればいいんだけど、携けい帯たいは持ってないし」

　ここが古泉が説明したとおりの閉鎖空間なら電話があっても無む駄だだろうが、俺たちはいったん校舎へ入ることにした。職員室に行けば電話くらいあるだろう。

　巨人が歩き出した。崩くずれ落ちることなく残っていた校舎の残ざん骸がいを蹴けり倒たおして中庭を進んでくる。渡わたり廊ろう下かに手刀をかまし、部室棟とうにもパンチを入れる。吹ふき飛んでいく俺たちの学校。俺たちの部室。

　ハルヒの頭越ごしに、その巨人とは別の方角にも青い壁が立ち上がってくるのが見えた。一つ、二つ、三つ……。五匹ひき目まで数えて、俺はカウントを放ほう棄きした。

　光の巨人たちは、赤い光玉に邪じや魔まされることもなく、灰色の世界を好きなように破は壊かいし始め、し続けていた。その姿がどこか喜々として見えるのは俺の精神上の問題だろうか。奴やつらが手足を振ふり上げるたびに空間が削けずり取られるように、そこに見えていた風景が消え去っていく。

　もう校舎の跡あと形かたは半分も残っていない。

　閉へい鎖さ空間が拡大しているのかどうか俺は感じ取ることが出来ないし、また拡大しまくったこの空間がやがて新たな現実空間に成り果てるのかどうかも知らん。ただ、そうなのだろうと思うだけだ。今の俺は、電車で隣となりに座った酔よっぱらいのおっさんが「誰だれにも言うなよ、実はわしは宇宙人じゃ」と言ったところで信じてしまえる。すでに俺の経験値は一ヶ月前の三倍の数値くらいには膨ふくれあがっているのだ。

　俺に出来ることは何か。一ヶ月前なら無理でも、今の俺になら出来ることだ。ヒントならすでにいくつも貰もらってある

　俺は決意して、そして言った。

「あのな、ハルヒ。俺はここ数日でかなり面白い目にあってたんだ。お前は知らないだろうけど、色んな奴らが実はお前を気にしている。世界はお前を中心に動いていたと言ってもいい。みんな、お前を特別な存在だと考えていて、実際そのように行動してた。お前が知らないだけで、世界は確実に面白い方向に進んでいたんだよ」

　俺はハルヒの肩かたをつかもうとして、まだ手を握にぎりしめたままだったことに気付いた。ハルヒは、こいつは何か悪いものでも食べたのかと言いたそうな顔をしていた。

　つい、と視線をそらしてハルヒは校舎をめちゃくちゃに破壊している巨人を、そうするのが当然だと言うように眺ながめた。

　その横顔は、あらためて見ると年相応の線の柔やわらかさが浮うき彫ぼりになっている。長門は言った、「進化の可能性」と。朝比奈さんによると「時間の歪ゆがみ」で、古泉に至っては「神」扱あつかいだ。では俺にとってはどうなのか。涼宮ハルヒの存在を、俺はどう認識しているのか？

　ハルヒはハルヒであってハルヒでしかない、なんてトートロジーでごまかすつもりはない。ないが、決定的な解答を、俺は持ち合わせてなどいない。そうだろ？　教室の後ろにいるクラスメイトを指して「そいつはお前にとって何なのか」と問われて何と答えりゃいいんだ？　……いや、すまん。これもごまかしだな。俺にとって、ハルヒはただのクラスメイトじゃない。もちろん「進化の可能性」でも「時間の歪み」でもましてや「神様」でもない。あるはずがない。

　巨きよ人じんが振り向いた。グラウンドへと。顔も目もないのに、俺は確かな視線を感じた。歩き出す。その一歩は何メートルあるのか、緩かん慢まんな歩みの割に俺たちに近づく姿が巨大さを増してくる。

　思い出せ。朝比奈さんは何と言ったか。その予言を。それから長門が最後に俺に伝えたメッセージ。白雪姫ひめ、スリーピング・ビューティ。いくら俺でもsleeping beautyの邦ほう訳やくを何というのかは知っている。両者に共通することと言えば何だ？　俺たちが今置かれている状じよう況きようと合わせて考えてみたら答えは明快だ。なんてベタなんだ。ベタすぎるぜ、朝比奈さん、そして長門。そんなアホっぽい展開を俺は認めたくはない。絶対にない。

　俺の理性がそう主張する。しかし人間は理性のみによって生きる存在にあらず。長門ならそれを「ノイズ」と言うかもしれない。俺はハルヒの手を振りほどいて、セーラー服の肩をつかんで振り向かせた。

「なによ……」

「俺、実はポニーテール萌もえなんだ」

「なに？」

「いつだったかのお前のポニーテールはそりゃもう反則なまでに似合ってたぞ」

「バカじゃないの？」

　黒い目が俺を拒きよ否ひするように見る。抗こう議ぎの声を上げかけたハルヒに、俺は強ごう引いんに唇くちびるを重ねた。こういう時は目を閉じるのが作法なので俺はそれに則のつとった。ゆえに、ハルヒがどんな顔をしているのかは知らない。驚おどろきに目を見開いているのか、俺に合わせて目を閉じているのか、今にもぶん殴なぐろうと手を振りかざしているのか、俺に知るすべはない。だが俺は殴られてもいいような気分だった。賭かけてもいい。誰がハルヒにこうしたって、今の俺のような気持ちになるさ。俺は肩にかけた手に力を込める。しばらく離はなしたくないね。

　遠くでまた轟ごう音おんが響ひびき、巨人がまた校舎に殴る蹴けるをしているんだろ、とか思った次の瞬しゆん間かん、俺は不意に無重力下に置かれ、反転し、左半身を嫌いやと言うほどの衝しよう撃げきが襲おそって、いくら何でも払はらい腰ごしをかけることはないだろうと思いながら上体を起こして目を開き、見慣れた天てん井じようを目にして固まった。





　そこは部屋。俺の部屋。首をひねればそこはベッドで、俺は床ゆかに直接寝ね転ころがっている自分を発見した。着ているものは当然スウェットの上下。乱れた布ふ団とんが半分以上もベッドからずり下がり、そして俺は手を後ろについてバカみたいに半口を開けているという寸法だ。

　思考能力が復活するまでけっこうな時間がかかった。

　半分無意識の状態で立ち上がった俺は、カーテンを開けて窓の外をうかがい、ぽつぽつと光る幾いくばくかの星や道を照らす街灯、ちらちらと点ついている住宅の明かりを確認してから、部屋の中央をぐるぐる円を描えがいて歩き回った。

　夢か？　夢なのか？

　見知った女と二人だけの世界に紛まぎれ込んだあげくにキスまでしてしまうという、フロイト先生が爆ばく笑しようしそうな、そんな解わかりやすい夢を俺は見ていたのか。

　ぐあ、今すぐ首つりてえ！

　日本が銃じゆう社会化を免まぬかれていることに感謝すべきだったかもしれない。手の届く範はん囲いに自動小銃の一丁でもあれば、俺は躊ちゆう躇ちよなく自分の頭を打ち抜ぬいていただろう。あれが朝比奈さんなら、まだ俺は自分の夢の内容について正しい自己分ぶん析せきが出来ていたものを、なのによりにもよってハルヒとは、俺の深層意識はいったい何を考えているんだ？

　俺はぐったりとベッドに着席し、頭を抱かかえた。夢だったとすると、俺は未いまだかつてないリアルなもんを見たことになる。汗あせばんだ右手、それに唇に残る温かくて湿しめった感かん触しよく。

　……か、ここはすでに元の世界ではないとか。ハルヒによって創造された新世界なのか。だったとして、俺にそんなことを確かめるすべはあるのか。

　ない。あるのかもしれないが思いつかない。というか何も考えたくない。自分の脳ミソがあんな夢を見せたなどと認めるくらいなら、世界がぶっ壊こわれたと言われたほうがだんだんマシに思えてきた。今すぐ誰だれかに逆ギレしたい。

　目覚まし時計を持ち上げて現時刻を確認、午前二時十三分。

　……寝ねよう。

　俺は布団を頭まで被かぶり、冴さえ渡わたった脳のう髄ずいに睡すい眠みんを要求した。





　一いつ睡すいも出来なかったけどな。

　そんなわけで俺は今、這はうようにして今日も不元気に坂道を登っている。正直、ツライ。途と中ちゆうで谷口に会ってバカ話をされなかっただけマシと思おう。かんかん照りの太陽は律りち儀ぎに核かく融ゆう合ごう全開だ。少しは休めばいいのに。

　来て欲しいときに来なかった睡すい魔まの野や郎ろうが今いま頃ごろ俺の頭の上を旋せん回かいしている。一限を何分聞いていられるか、かなり疑問だ。

　校舎が見えてきた時、俺は不覚にも立ち止まってしみじみと古ぼけた四階建てを眺ながめてしまった。汗だらけになった生徒たちが巣穴に向かうアリの行列のように吸い込まれていく玄げん関かんも、部室棟とうも、渡り廊ろう下かもちゃんとそのままだ。

　俺は足を引きずり引きずり、よたよたと階段を上がって懐なつかしむべき一年五組の教室へ向かい、開けっ放しの戸口から三歩歩いたところでまた立ち止まった。

　窓まど際ぎわ、一番後ろの席に、ハルヒはすでに座っていた。何だろうね、あれ。頬ほお杖づえをつき、外を見ているハルヒの後頭部がよく見える。

　後ろでくくった黒くろ髪かみがちょんまげみたいに突つき出していた。ポニーテールには無理がある。それ、ただくくっただけじゃないか。

「よう、元気か」

　俺は机に鞄かばんを置いた。

「元気じゃないわね。昨日、悪夢を見たから」

　ハルヒは平へい坦たんな口調で応こたえる。それは奇き遇ぐうなことがあったもんだ。

「おかげで全然寝れやしなかったのよ。今日ほど休もうと思った日もないわね」

「そうかい」

　硬かたい椅い子すにどっかと腰こしを下ろし、俺はハルヒの顔をうかがった。耳の上から垂れる髪かみが横顔を覆おおっていて表情が解りにくい。ただ、まあ、あんまり上じよう機き嫌げんではなさそうだ。少なくとも、顔の面だけは。

「ハルヒ」

「なに？」

　窓の外から視線を外さないハルヒに、俺は言ってやった。

「似合ってるぞ」





　　エピローグ





　その後のことを少しだけ語ろう。

　ハルヒはその昼にはあっさり髪をほどいて元のストレートヘアに戻もどしてしまった。飽あきたのだろう。また髪が伸のびた頃ころに、遠回しに薦すすめてみようと思っている。

　古泉とはトイレ行った帰りの休み時間に廊下で出会った。

「あなたには感謝すべきなんでしょうね」

　無む駄だに爽さわやかな笑え顔がおで言う。

「世界は何も変わらず、涼宮さんもここにいる。僕のアルバイトもしばらく終わりそうにありません。いやいや、本当にあなたはよくやってくれましたよ。皮肉じゃありませんよ？　まあ、この世界が昨日の晩に出来たばかりという可能性も否定できないわけですが。とにかく、あなたと涼宮さんにまた会えて、光栄です」

　長い付き合いになるかもしれませんね、と言いつつ、古泉は俺に手を振ふった。

「また、放課後に」





　昼休みに顔を出した文芸部部室では、長門がいつもの情景で本を読んでいた。

「あなたと涼宮ハルヒは二時間三十分、この世界から消えていた」

　第一声がそれである。そしてそれだけだった。素知らぬ顔で文字を黙もく読どくし続ける長門に、

「貸してくれた本な、今読んでるんだ。あと一週間もしたら返せると思う」

「そう」

　視線を合わさないのはいつものことだ。

「教えてくれ。お前みたいな奴やつは、お前の他ほかにどれだけ地球にいるんだ？」

「けっこう」

「なあ、また朝倉みたいなのに俺は襲おそわれたりするのかな」

「だいじょうぶ」

　この時だけ長門は顔を上げ、俺を見つめた。

「あたしがさせない」

　図書館の話はしないことにした。





　放課後の部室にいた朝比奈さんは珍めずらしくメイド服を着ておらずセーラー服姿で、俺を目にするや全身でぶつかってきた。

「よかった、また会えて……」

　俺の胸に顔を埋うずめて朝比奈さんは涙なみだ声ごえで、

「もう二度と……（ぐしゅ）こっちに、も、（ぐしゅ）戻ってこないかと、思、」

　背中に手を回そうとした俺の動きを感じたのか、朝比奈さんは両手を俺の胸に当てて突っ張ぱった。

「だめ、だめです。こんなとこ涼宮さんに見られたら、また同じ穴の二にの舞まいです」

「意味解わからないですよ、それ」

　涙を溜ためた大きな瞳ひとみが可か憐れんを通り越こしている。思わず人生をやり直したくなるような、この素す直なおな瞳に参らない男はいまい。

「今日はメイド服は着ないんですか」

「お洗せん濯たく中です」

　その時思いついた。俺は自分の心臓の上を指さして、

「そう言えば朝比奈さん、胸のここんとこに星形のホクロがありますよね」

　目め尻じりを指で拭ぬぐっていた朝比奈さんは、目の前で散さん弾だん銃じゆうをぶっ放された旅りよ行こう鳩ばとみたいな顔になり、くるりと背を向けて、襟えりぐりを広げて胸むな元もとを覗のぞき込み、面おも白しろいようにみるみる耳を赤く染めた。

「どっ！　どうして知ってるんですか！　あたしも今まで星の形なんて気付かなかったのにっ！　いいいいいつ見たんですか！」

　首まで赤くして朝比奈さんは幼児のように両手で俺をぽかすか殴なぐりつける。

　もっと未来のあなたが教えてくれました、正直に言ったほうがいいのだろうか。

「なにやってんの、あんたら？」

　戸口のハルヒが呆あきれたように言った。握にぎり拳こぶしを停止させた朝比奈さんがまた顔面蒼そう白はくになる。しかしハルヒは、義理の娘むすめは毒リンゴを囓かじって死にましたと報告を受けた継母ままははのようなニマニマ笑いを顔中で表現しながら、提さげていた紙かみ袋ぶくろを持ち上げた。

「みくるちゃん、メイド服もそろそろ飽きたでしょう。さあ、着き替がえの時間よ」

　古流武術の達人さながら、一いつ瞬しゆんにして間合いを詰つめたハルヒはいともやすやすと硬こう直ちよく中の朝比奈さんを取り押さえ、

「いっ、きゃ、なっ、やっ、やめ、」

　悲鳴を上げる朝比奈さんの制服を脱ぬがせにかかるのだった。

「暴れないの。抵てい抗こうは無駄よ。今度のはナースよナース、看護婦さん。最近は看護師って言うんだっけ？　まあいいや。同じことだし」

「せめてドアは閉じてぇ！」

　ものすごく見物していたかったが、俺は失礼して部室を辞し、扉とびらを閉めて合がつ掌しようした。

　朝比奈さんには悪いが、扉を開ける時が実に楽しみだ。

　ああ、長門なら最初から最後までテーブルで本読んでた。





　さて長らく棚たな上げしていたＳＯＳ団設立に伴ともなう書類申しん請せいだが、このたび俺はようやくそれらしい文書をでっちあげて生徒会に提出してやった。「世界を大いに盛り上げるための涼宮ハルヒの団」では賄わい賂ろでも包まない限り却きやつ下かされること確実と思われたので、「生徒社会を応おう援えんする世界造りのための奉ほう仕し団体（同好会）」（略りやく称しよう・ＳＯＳ団）と独断で改名し、活動内容も「学園生活での生徒の悩なやみ相談、コンサルティング業務、地域奉仕活動への積極参加」ということにした。言葉の意味なんか俺にだって解りはしないが、首しゆ尾び良く申請を受け付けられたら悩み相談募ぼ集しゆうのポスターでも掲けい示じ板ばんに貼はり付けようかと思う。俺たちに相談してどうなるもんでもないような気もするけどな。





　一方で、ハルヒ指揮のもと、市内の「不思議探たん索さくパトロール」も鋭えい意い継けい続ぞく中で、本日は記念すべきその第二回目である。例によってせっかくの休みを一日潰つぶしてあてどもなくそこらをウロウロするという企き画かくなのだが、どういう偶ぐう然ぜんだろう、朝比奈さんと長門と古泉が直前になって行けなくなった、どうしても外せない重要な用事が出来て、と言い出し、というわけで俺は今、駅の改札口で一人、ハルヒを待っている。

　三人が何かの気をきかせたつもりでいるのか、それとも本当に急用が出来たのかは解らないが、それぞれ常人ばなれしている三人のことだから、また俺たちの知らないところで妙みような事態になっててその対応に追われている気がしないでもない。

　俺は腕うで時計に目をやった。集合時間まではあと三十分もある。俺がここに突つっ立ってからすでに三十分が経過してて、つまり俺は待ち合わせの一時間前にここに到とう着ちやくしたのであって、これは別段はやる心を抑おさえかねてというわけではなく、遅ち刻こくの有う無むにかかわらず最後に来た者は罰ばつ金きんという定めがＳＯＳ団にあるからであり他意はない。なんせ参加人数二人だからな。

　時計から目を上げると、すぐに遠くから歩いてくる見覚えのある私服姿が目に入った。よもや三十分前に来たのに俺がもう待っていると思わなかったのか、ぎくりとしたように立ち止まり、また憤ふん然ぜんと歩き始める。眉まゆ根ねを寄せるしかめっ面つらのゆえんが参加率の低さを嘆なげいたものか、俺に後おくれを取った不覚を嘆いたものなのかは解らない。後でゆっくり聞いてやろう。ハルヒの奢おごりの喫きつ茶さ店てんで。

　その際に俺は色々なことを話してやりたいと思う。ＳＯＳ団の今後の活動方針について、朝比奈さんへのコスプレ衣装の希望、クラスでは俺以外の奴やつとも会話してやれ、フロイトの夢判断をどう思うか、などなど。

　しかしまあ、結局のところ。

　最初に話すことは決まっているのだ。

　そう、まず──。

　宇宙人と未来人と超ちよう能のう力りよく者について話してやろうと俺は思っている。





　　あとがき





　なんとなくですが、一人の人間が一いつ生しよう涯がいで書くことのできる文章量は、その人が生まれ落ちた瞬しゆん間かんにすでに決定されているのではないかと思うことがあります。あらかじめ規定の文字数があるのだとすると、書けば書くほど目減りしていくわけなので、そうするとどんどん書くことがなくなっていく計算になりますが、実際問題として一日で四百字詰づめ原げん稿こう用紙換かん算さん三百枚くらい書いてしまおうと思っても書けたためしがないので案外正解なのかもしれません。もっとも一日で十二万文字も書こうとしたら一秒で一文字をタイプしたとしても約三十三時間かかるため、そんなんできっこないのですが、どこかでやり遂とげている人がいるかもしれないので確証を得ることができません。

　できないと言えば、この前まえ振ふりから話題を膨ふくらませることもできないのですが、それはいったん脇わきに置いておいて別の話に移行すると、猫ねこは良い生き物です。可愛かわいいしグンニャリしてるしニャーと鳴きます。だからそれがどうしたんだと思われても困るのですが、僕自身が困っているのでそのあたりはいいわけのしようもなく、「そのようなものである」と思っていただければ幸いです。

　ところで、この本は畏おそれ多くも有あり難がたくもスニーカー大賞を授じゆ与よされた結果としてこの世に出ていると思うのですが、受賞した旨むねの連れん絡らくをいただいたとき、僕はまず自分の耳を疑い次に頭を疑い受話器を疑い現実を疑い地球が自転しているという事実を疑い始めて、ようやく「どうやら本当のことらしい」と思い当たり、意味もなく猫を振り回してみたりもして噛かみつかれ、手の甲こうに残った歯形を眺ながめながら、もし人間が持っている運があらかじめ決定されているのならば、この時点ですべての幸運を使い果たしているに違ちがいないと考えたところまでは覚えていますが、なにぶん、あまりの精神的衝しよう撃げきにより部分的な記き憶おくの欠けつ如じよが見られますので自分でも確かなことが言えません。いろいろあったような気がします。

　そのようなわけで、この本が出るにあたっての作業行程過程決定にたずさわられた方々の労苦は書いた本人のそれをさらに二乗した以上のものだと思われます。現在私が感じている感謝の念を言語化しようとしても日本語にその感謝規模を表現できる語ご彙いは存在しないくらいの途と方ほうもなさです。特に選考委員の方々には何とお礼申し上げればいいものか解わからず、新しい形容詞を考案している最中なのですが、たぶんそんな自作言語で何か言われても意味不明となって終しゆう了りようするであろうことも容易に想像できます。とにかく有り難いことです。有り難うございました。心底から、そう思います。

　今ここにいる私は、なんとかスタート地点に立たせてもらったばかりの上に号ごう砲ほうと同時にコケるかもしれずゴールがどっちでどこらへんにあるのか、ひょっとしたら給水ポイントすらない道を走り出してしまったのかもしれませんが、迷走しつつも走り続けることができたらよいなとしみじみと思います。そんな他人ひと事ごとみたいに思っている場合でもないのですが。

　最後に、この本の製造制作出版に際し直接的間接的有形無形のかかわりを持っていただけた方々全員と、読んでいただけた方々全員に無限の感謝をささげつつ、今回はこれにて失礼いたします。





谷川　流





　　解説





　本作『涼宮ハルヒの憂鬱』は、第８回スニーカー大賞の〈大賞〉を受賞した作品です。新しい才能を発はつ掘くつするために設けられたスニーカー大賞は、設立以来、数多くの作家を見いだしてきましたが、最高の賞である〈大賞〉はこれまで２人しか受賞していませんでした。〈第２回〉吉よし田だ直すなお（代表作『トリニティ・ブラッド』）、〈第３回〉安やす井い健けん太た郎ろう（代表作『ラグナロク』）です。ご存じのとおり、この両名ともが大人気シリーズを発表し、大賞受賞という大きな看板にふさわしい活かつ躍やくをしています。逆に言えば、大賞を受賞するためには、この両名と同じ、いやそれ以上の実力がある、と認められなければならないのですから大変です。だけどもついに、安井健太郎以来、５年ぶりに大賞を与あたえるにふさわしい才能、作品が登場しました。それが谷たに川がわ流ながる『涼宮ハルヒの憂鬱』だったのです。





　スニーカー大賞の最終選考会では毎年、選考委員の熱い議論が交かわされています。選考委員全員が、新しい才能を一人でも多く世に送り出したい、という気持ちで選考にあたっているのですが、候補者に対して無節操に賞を与えるわけにはいきません。ちょっと選考会の裏話をすると、まずは選考委員の議論の過程でその作品の長所と短所を徹てつ底てい的に指し摘てきしあいます。それをふまえてなお魅み力りよく的なポイントがあるかどうかが、受賞の大きな分かれ目になるのです。そしてその作品が賞を受賞した場合、編集者はそこで指摘された短所を解消し、長所をさらに伸のばすべく、著者と作品づくりをしていくわけです。

　さてこの『涼宮ハルヒの憂鬱』は、その最終選考において選考委員全員一いつ致ちの上で大賞に推おされました。涼宮ハルヒという破は天てん荒こうなキャラクターを軸じくにした小説の、その根幹となるアイデアの料理の仕方、一いち人にん称しようというスタイルで最後まで飽あきさせずに読ませるストーリーの運び方と文章力、登場するキャラクターのあふれる魅力、どれをとっても大賞にふさわしいと、それはもう同席した編集者もびっくりするぐらい、あっさりと大賞に決定したのでした。





　本作『涼宮ハルヒの憂鬱』とはどういった内容なのか。それは、涼宮ハルヒという美少女がとっぴな言動と行動で周りを振ふり回す学園物語なのです……かと思いきや、途と中ちゆうで明かされるハルヒ本人も知らない秘密のなんと大おお風ぶ呂ろ敷しきなことか！　ネタばれになりますのでその大風呂敷を解説するわけにはいきませんが、思わず「うそー！」と言ってしまう展開が進むにつれ、いつのまにかこの驚おどろくべきハルヒ・ワールドに誰だれしもが納なつ得とくさせられてしまうところが、この作品の不思議な、そして大きな魅力なのです。現実というものが薄うす皮かわ一枚であっというまに非日常になってしまう不思議さ、異常だと思っていた出来事が本当は通常だとわかった瞬しゆん間かんの奇き妙みような感覚にぜひハマってください。

　登場するキャラクターたちも強きよう烈れつな個性をもったヤツらばかりです。わがまま、自己中、ご意見無用なスーパーヒロイン・涼宮ハルヒは、自分が面おも白しろいと思えることを妥だ協きようせずに求め続ける、良く言えば超ちようポジティブ、悪く言うと迷めい惑わく感あふれる女の子。そんな彼女に振り回されるこの物語の語かたり部べのキョンは、最初から最後まで本名を呼んでもらえないかわいそうな扱あつかいの上に、ＳＯＳ団の設立やその後のとんでもない騒そう動どうに巻き込まれてしまいます。それでもハルヒとつきあえるのですから、これは一種の才能でしょう。そして、いつもハルヒに無理矢理コスプレさせられてしまう朝比奈みくる。毎回イヤだイヤだと言いながら、実は彼女、コスプレを気に入っているんじゃないでしょうか？　雑誌連れん載さいのほうでも様々なコスチュームにチャレンジしていますし。

　そう、この文庫発売と合わせて雑誌『ザ・スニーカー』での短編連載が始まっています。文庫版の後の物語が描えがかれているこの短編でも、ハルヒはわがままを言い、みくるはコスプレし、キョンはブツブツとぼやきつつ、右往左往しながら活躍しています。





　この『涼宮ハルヒの憂鬱』を読んで、もしあなたが気に入っていただけたならば、ぜひお友達に本書を勧すすめてください。そして『ザ・スニーカー』の連載も読んでみてください。一人でも多くの人にこの物語が読まれること、それが作者と編集部の一番の願いであるのです。
