「お前、この前涼宮に話しかけてたな」

「わけの解らんこと言われて追い返されただろ」

　その通りだ。

　谷口はゆで卵の輪切りを口に放り込み、もぐもぐしながら、

「もしあいつに気があるんなら、悪いことは言わん、やめとけ。涼宮が変人だってのは充じゆう分ぶん解ったろ」

　中学で涼宮と三年間同じクラスだったからよく知ってるんだがな、と前置きし、

「あいつの奇き人じんぶりは常じよう軌きを逸いつしている。高校生にもなったら少しは落ち着くかと思ったんだが全然変わってないな。聞いたろ、あの自己紹しよう介かい」

「あの宇宙人がどうとか言うやつ？」

　焼き魚の切り身から小骨を細心の注意で取り除いていた国木田が口を挟はさんだ。

「そ。中学時代にもわけの解らんことを言いながらわけの解らんことを散々やり倒たおしていたな。有名なのが校庭落書き事件」

「何だそりゃ？」

「石せつ灰かいで白線引く道具があるだろ。あれ何つうんだっけ？　まあいいや、とにかくそれで校庭にデカデカとけったいな絵文字を書きやがったことがある。しかも夜中の学校に忍しのび込んで」

　そん時のことを思い出したのか谷口はニヤニヤ笑いを浮うかべた。

「驚おどろくよな。朝学校来たらグラウンドに巨きよ大だいな丸とか三角とかが一面に書きなぐってあるんだぜ。近くで見ても何が書いてあるのか解らんから試しに校舎の四階から見てみたんだが、やっぱり何が書いてあるのか解らんかったな」

「あ、それ見た覚えあるな。確か新聞の地方欄らんに載のってなかった？　航空写真でさ。出来そこないのナスカの地上絵みたいなの」

　と国木田が言う。俺には覚えがない。

「載ってた載ってた。中学校の校庭に描えがかれた謎なぞのイタズラ書き、ってな。で、こんなアホなことをした犯人は誰だれだってことになったんだが……」

「その犯人があいつだったってわけか」

「本人がそう言ったんだから間ま違ちがいない。当然、何でそんなことしたんだってなるわな。校長室にまで呼ばれてたぜ。教師総掛がかりで問いつめられたらしい」

「何でそんなことしたんだ？」

「知らん」

　あっさり答えて谷口は白飯をもしゃもしゃと頬ほお張ばった。

「とうとう白状しなかったそうだ。だんまりを決め込んだ涼宮のキッツい目で睨にらまれてみろ、もうどうしようもないぜ。一説によるとＵＦＯを呼ぶための地上絵だとか、あるいは悪あく魔ま召しよう喚かんの魔ま法ほう陣じんだとか、または異世界への扉とびらを開こうとしてたとか、噂うわさはいろいろあったんだが、とにかく本人が理由を言わんのだから仕方がない。今もって謎のままだ」

　俺の脳のう裏りには、真っ暗の校庭に真しん剣けんな表情で白線を引いている涼宮ハルヒの姿が浮かんでいた。ガラゴロ引きずっているラインカーと山積みにしている石灰の袋ふくろはあらかじめ体育倉庫からガメていたんだろう。懐かい中ちゆう電灯くらいは持っていたかもしれない。頼たよりない明かりに照らされた涼宮ハルヒの顔はどこか思い詰つめた悲ひ壮そう感に溢あふれていた。俺の想像だけどな。

　たぶん涼宮ハルヒは本気でＵＦＯあるいは悪魔または異世界への扉を呼び出そうとしたのだろう。ひょっとしたら一晩中、中学の運動場でがんばっていたのかもしれない。そしてとうとう何も現れなかったことにたいそう落らく胆たんしたに違いない、と根こん拠きよもなく思った。

「他ほかにもいっぱいやってたぞ」

　谷口は弁当の中身を次々と片づけつつ、

「朝教室に行ったら机が全部廊ろう下かに出されてたこともあったな。校舎の屋上に星マークをペンキで描いたり、学校中に変なお札、キョンシーが顔にはっ付けているようなやつな、あれがベタベタ貼はりまくられたこともあった。意味わかんねーよ」

　ところで今教室に涼宮ハルヒはいない。いたらこんな話も出来ないだろうが、たとえいたとしてもまったく気にしないような気もする。その涼宮ハルヒだが、四時間目が終わるとすぐ教室を出て行って五時間目が始まる直前にならないと戻もどってこないのが常だ。弁当を持ってきた様子はないから食堂を利用しているんだろう。しかし昼飯に一時間もかけないだろうし、そういや授業の合間の休み時間にも必ずと言っていいほど教室にはいない奴やつで、いったいどこをうろついているんだか。

「でもなぁ、あいつモテるんだよな」

　谷口はまだ話している。

「なんせツラがいいしさ。おまけにスポーツ万能で成績もどちらかと言えば優ゆう秀しゆうなんだ。ちょっとばかし変人でも黙だまって立ってたら、んなこと解わかんねーし」

「それにも何かエピソードがあんの？」

　問う国木田は谷口の半分も箸はしが進んでいない。

「一時期は取っ替かえ引っ替えってやつだったな。俺の知る限り、一番長く続いて一週間、最短では告白されてオーケーした五分後に破局してたなんてのもあったらしい。例外なく涼宮が振ふって終わりになるんだが、その際に言い放つ言葉がいつも同じ、『普ふ通つうの人間の相手してるヒマはないの』。だったらオーケーするなってーの」

　こいつもそう言われたクチかもな。そんな俺の視線に気付いたか、谷口は慌あわてたふうに、

「聞いた話だって、マジで。何でか知らねえけどコクられて断るってことをしないんだよ、あいつは。三年になった頃ころにはみんな解ってるもんだから涼宮と付き合おうなんて考える奴はいなかったけどな。でも高校でまた同じことを繰くり返す気がするぜ。だからな、お前が変な気を起こす前に言っておいてやる。やめとけ。こいつは同じクラスになったよしみで言う俺の忠告だ」

　やめとくも何も、そんな気ないんだがな。

　食い終わった弁当箱を鞄かばんにしまい込んで谷口はニヤリと笑った。

「俺だったらそうだな、このクラスでのイチオシはあいつだな、朝あさ倉くら涼りよう子こ」

　谷口がアゴをしゃくって示した先に、女どもの一団が仲むつまじく机をひっつけて談だん笑しようしている。その中心で明るい笑え顔がおを振りまいているのが朝倉涼子だった。

「俺の見立てでは一年の女の中でもベスト３には確実に入るね」

　一年の女子全員をチェックでもしたのか。

「おうよ。ＡからＤにまでランク付けしてそのうちＡランクの女子はフルネームで覚えたぜ。一度しかない高校生活、どうせなら楽しく過ごしたいからよ」

「朝倉さんがそのＡなわけ？」と国木田。

「ＡＡランクプラス、だな。俺くらいになると顔見るだけで解る。アレはきっと性格までいいに違いない」

　勝手に決めつける谷口の言葉はまあ話半分で聞くとしても、実のところ朝倉涼子もまた涼宮ハルヒとは別の意味で目立つ女だった。

　まず第一に美人である。いつも微笑ほほえんでいるような雰ふん囲い気きがまことによい。第二に性格がいいという谷口の見立てはおそらく正しい。この頃になると涼宮ハルヒに話しかけようなどという酔すい狂きような人間は皆かい無むに等しかったが、いくらぞんざいにあしらわれてもそれでもめげずに話しかける唯ゆい一いつの人間が朝倉である。どことなく委員長っぽい気質がある。第三に授業での受け答えを見てると頭もなかなかいいらしい。当てられた問題を確実に正答している。教師にとってもありがたい生徒だろう。第四に同性にも人気がある。まだ新学期が始まって一週間そこそこだが、あっという間にクラスの女子の中心的人物になりおおせてしまった。人を惹ひきつけるカリスマみたいなものが確かにある。

　いつも眉み間けんにシワ寄せている頭の内部がミステリアスな涼宮ハルヒと比べると、そりゃ彼女にするんならこっちかな、俺だって。つーか、どっちにしろ谷口には高た嶺かねの花だと思うが。





　まだ四月だ。この時期、涼宮ハルヒもまだ大人しい頃合いで、つまり俺にとっても心安まる月だった。ハルヒが暴走を開始するにはまだ一ヶ月弱ほどある。

　しかしながら、ハルヒの奇き矯きような振ふる舞まいはこの頃から徐じよ々じよに片へん鱗りんを見せていたと言うべきだろう。

　と言うわけで、片鱗その一。

　髪かみ型がたが毎日変わる。何となく眺ながめているうちにある法則性があることに気付いたのだが、それはつまり、月曜日のハルヒはストレートのロングヘアを普通に背中に垂らして登場する。次の日、どこから見ても非のうちどころのないポニーテールでやって来て、それがまたいやになるくらい似合っていたのだが、その次の日、今度は頭の両りよう脇わきで髪をくくるツインテールで登校し、さらに次の日になると三つ編みになり、そして金曜日の髪型は頭の四ヶ所を適当にまとめてリボンで結ぶというすこぶる奇き妙みようなものになる。

　月曜＝〇、火曜＝一、水曜＝二……。

　ようするに曜日が進むごとに髪を結ぶ箇か所しよが増えているのである。月曜日にリセットされ後は金曜日まで一つずつ増やしていく。何の意味があるのかさっぱり解らないし、この法則に従うなら最終的には六ヶ所になっているはずで、果たして日曜日にハルヒがどんな頭になっているのか見てみたい気もする。

　片鱗その二。

　体育の授業は男女別に行われるので五組と六組の合同でおこなわれる。着き替がえは女が奇き数すうクラス、男が偶ぐう数すうクラスに移動してすることになっており、当然前の授業が終わると五組の男子は体操着入れを手にぞろぞろと六組に移動するわけだ。

　そんな中、涼宮ハルヒはまだ男どもが教室に残っているにもかかわらず、やおらセーラー服を脱ぬぎ出したのだった。

　まるでそこらの男などカボチャかジャガイモでしかないと思っているような平然たる面おも持もちで脱いだセーラー服を机に投げ出し、体操着に手をかける。

　あっけにとられていた俺を含ふくめた男たちは、この時点で朝倉涼子によって教室から叩たたき出された。

　その後朝倉涼子をはじめとしてクラスの女子はこぞってハルヒに説教をしたらしいが、まあ何の効果もなかったね。ハルヒは相変わらず男の目などまったく気にせず平気で着替えをやり始めるし、おかげで俺たち男連中は体育前の休み時間になるとチャイムと同時にダッシュで教室から撤てつ退たいすることを──主に朝倉涼子に──義務づけられてしまった。

　それにしてもやけにグラマーだったな……いや、それはさておき。

　片鱗その三。

　基本的に休み時間に教室から姿を消すハルヒはまた放課後になるとさっさと鞄かばんを持って出て行ってしまう。最初はそのまま帰宅してるのかと思っていたらさにあらず、呆あきれることにハルヒはこの学校に存在するあらゆるクラブに仮入部していたのだった。昨日バスケ部でボールを転がしていたかと思ったら、今日は手芸部で枕まくらカバーをちくちく縫ぬい、明日はラクロス部で棒振り回しているといった具合。野球部にも入ってみたというから徹底している。運動部からは例外なく熱心に入部を薦すすめられ、そのすべてを断ってハルヒは毎日参加する部活動を気まぐれに変えたあげく、結局どこにも入部することもなかった。

　何がしたいんだろうな、こいつはよ。

　この件により「今年の一年におかしな女がいる」という噂うわさは瞬またたく間に全校に伝でん播ぱし、涼宮ハルヒを知らない学校関係者などいないという状態になるまでにかかった日数はおよそ一ヶ月。五月の始まる頃ころには、校長の名前を覚えていない奴やつがいても涼宮ハルヒの名を知らない奴は存在しないまでになっていた。





　そんなこんなをしながら──もっとも、そんなこんなをしていたのはハルヒだけだったが──五月がやってくる。

　運命なんてものを俺は琵び琶わ湖こで生きたプレシオサウルスが発見される可能性よりも信じない。だが、もし運命が人間の知らないところで人生に影えい響きようを行使しているのだとしたら、俺の運命の輪はこのあたりで回り出したんだろうと思う。きっと、どこか遥はるか高みにいる誰だれかが俺の運命係数を勝手に書き換かえやがったに違ちがいない。

　ゴールデンウィークが明けた一日目。失われた曜日感覚と共に、まだ五月だってのに異様な陽気にさらされながら俺は学校へと続く果てしない坂道を汗あせ水みず垂らして歩いていた。地球はいったい何がやりたいんだろう。黄熱病にでもかかってるんじゃないか。

「よ、キョン」

　後ろから肩かたを叩かれた。谷口だった。

　ブレザーをだらしなく肩に引っかけ、ネクタイをよれよれに結んだニヤケ面づらで、

「ゴールデンウィークはどっか行ったか？」

「小学の妹を連れて田舎いなかのバーさん家ちに」

「しけてやんなあ」

「お前はどうなんだよ」

「ずっとこバイト」

「似たようなもんじゃないか」

「キョン、高校生にもなって妹のお守りでジジババのご機き嫌げんうかがいに行っててどうすんだ。高校生なら高校生らしいことをだな、」

　ちなみにキョンというのは俺のことだ。最初に言い出したのは叔母おばの一人だったように記き憶おくしている。何年か前に久しぶりに会った時、「まあキョンくん大きくなって」と勝手に俺の名をもじって呼び、それ聞いた妹がすっかり面おも白しろがって「キョンくん」と言うようになり、家に遊びに来た友達がそれを聞きつけ、その日からめでたく俺のあだ名はキョンになった。くそ、それまで俺を「お兄ちゃん」と呼んでいてくれてたのに。妹よ。

「ゴールデンウィークに従兄弟いとこ連中で集まるのが家の年中行事なんだよ」

　投げやりに答えて俺は坂道を登り続ける。髪かみの中から滲しみ出す汗がひたすら不快だ。

　谷口はバイトで出会った可愛かわいい女の子がどうしたとか小金が貯たまったからデート資金に不足はないとか、やたら元気に喋しやべりまくっていた。他人の見た夢の話とペットの自じ慢まん話と並んで、この世で最もどうでもいい情報の一つだろう。

　谷口の計画する相手不在の仮想デートコースを三パターンほど聞き流しているうちに、ようやく俺は校門に到とう達たつした。





　教室に入ると涼宮ハルヒはとっくに俺の後ろの席で涼すずしい顔を窓の外に向けていて、今日は頭に二つドアノブを付けているようなダンゴ頭で、それで俺は、ああ今日は二ヶ所だから水曜日かと認識して椅い子すに座り、そして何か魔まが差してしまったんだろう。それ以外の理由に思い当たるフシがない。気が付いたら涼宮ハルヒに話しかけていた。

「曜日で髪型変えるのは宇宙人対策か？」

　ハルヒはロボットのような動きで首をこちらに向けると、いつもの笑わない顔で俺を見つめた。ちと怖こわい。

「いつ気付いたの」

　路ろ傍ぼうの石に話しかけるような口調でハルヒは言った。

　そう言われればいつだっただろう。

「んー……ちょっと前」

「あっそう」

　ハルヒは面めん倒どうくさそうに頬ほお杖づえをついて、

「あたし、思うんだけど、曜日によって感じるイメージってそれぞれ異なる気がするのよね」

　初めて会話が成立した。

「色で言うと月曜は黄色。火曜が赤で水曜が青で木曜が緑、金曜は金色で土曜は茶色、日曜は白よね」

　それは解わかるような気もするが。

「つうことは、数字にしたら月曜がゼロで日曜が六なのか？」

「そう」

「俺は月曜は一って感じがするけどな」

「あんたの意見なんか誰も聞いてない」

「……そうかい」

　投げやりに呟つぶやく俺の顔のどこがどうなのか、ハルヒは気に入らなさそうなしかめ面づらでこちらを見つめ、俺が少しばかり精神に不安定なものを感じるまでの時間を経過させておいて、

「あたし、あんたとどこかで会ったことがある？　ずっと前に」

　と、訊きいた。

「いいや」

　と、俺は答え、岡部担任教師が軽快に入ってきて、会話は終わった。





　きっかけ、なんてのは大たい抵ていどうってことないものなんだろうけど、まさしくこれがきっかけになったんだろうな。

　だいたいハルヒは授業中以外に教室にいたためしがないから何か話そうと思うとそれは朝のホームルーム前くらいしか時間がないわけで、たまたま俺がハルヒの前の席にいただけってこともあって何気なく話しかけるには絶好のポジションにいたことは否定出来ない。

　しかしハルヒがまともな返答をよこしたことは驚おどろきだ。てっきり「うるさいバカ黙だまれどうでもいいでしょ、んなこと」と言われるものだとばかり思っていたからな。思っていながら話しかけた俺もどうかしてるが。

　だから、ハルヒが翌日、法則通りなら三つ編みで登校するところを、長かった麗うるわしい黒髪をばっさり切って登場したときには、けっこう俺は動どう揺ようした。

　腰こしにまで届こうかと伸のばしていた髪が肩かたの辺りで切りそろえられていて、それはそれでめちゃくちゃ似合っていたんだが、それにしたって俺が指し摘てきした次の日に短くするってのも短たん絡らく的にすぎないか、おい。

　そのことを尋たずねるとハルヒは、

「別に」

　相変わらず不機嫌そうに言うのみで格別な感想を漏もらすわけもなく、髪を切った理由を教えてくれるわけもなかった。

　だろうと思ったけどさ。





「全部のクラブに入ってみたってのは本当なのか」

　あれ以来、ホームルーム前のわずかな時間にハルヒと話すのは日課になりつつあった。話しかけない限りハルヒは何のアクションも起こさない上、昨日のテレビドラマとか今日の天気とかいったハルヒ的「死ぬほどどうでもいい話」にはノーリアクションなので、話題には毎回気をつかう。

「どこか面おも白しろそうな部があったら教えてくれよ。参考にするからさ」

「ない」

　ハルヒは即そく答とうした。

「全然ない」

　駄だ目め押ししてハルヒは蝶ちようの羽ばたきのような吐と息いきを漏らした。ため息のつもりだろうか。

「高校に入れば少しはマシかと思ったけど、これじゃ義務教育時代と何も変わんないわね。入る学校間ま違ちがえたかしら」

　何を基準に学校選びをしているのだろう。

「運動系も文化系も本当にもうまったく普ふ通つう。これだけあれば少しは変なクラブがあってもよさそうなのに」

　何をもって変だとか普通だとかを決定するんだ？

「あたしが気に入るようなクラブが変、そうでないのは全然普通、決まってるでしょ」

　そうかい、決まってるのかい。初めて知ったよ。

「ふん」

　そっぽを向き、この日の会話、終しゆう了りよう。





　また別の日は、

「ちょいと小耳に挟はさんだんだけどな」

「どうせロクでもないことをでしょ」

「付き合う男全部振ふったって本当か？」

「何であんたにそんなこと言わなくちゃいけないのよ」

　肩にかかる黒髪をハラリと払はらい、ハルヒは真っ黒な瞳ひとみで俺を睨にらみつけた。まったく、無表情でいないときは怒おこった顔ばっかりだな。

「出どころは谷口？　高校に来てまであのアホと同じクラスなんて、ひょっとしたらストーカーかしら、あいつ」





「それはない」と思う。

「何を聞いたか知らないけど、まあいいわ、多分全部本当だから」

「一人くらいまともに付き合おうとか思う奴やつがいなかったのか」

「全然ダメ」

　どうやらこいつの口くち癖ぐせは「全然」のようだ。

「どいつもこいつもアホらしいほどまともな奴だったわ。日曜日に駅前に待ち合わせ、行く場所は判で押したみたいに映画館か遊園地かスポーツ観戦、ファストフードで昼ご飯食べて、うろうろしてお茶飲んで、じゃあまた明日ね、ってそれしかないの？」

　それのどこが悪いのだと思ったが、口に出すのはやめておいた。ハルヒがダメだと言うからにはそれはすべからくダメなのだろうな。

「あと告白がほとんど電話だったのは何なの、あれ。そういう大事なことは面と向かって言いなさいよ！」

　虫でも見るような目つきを前にして重大な──少なくとも本人にとっては──打ち明けごとをする気になれなかっただろう男の気分をトレースしながら一応俺は同意しておいた。

「まあ、そうかな、俺ならどっかに呼び出して言うかな」

「そんなことはどうでもいいのよ！」

　どっちなんだよ。

「問題はね、くだらない男しかこの世に存在しないのかどうなのってことよ。ほんと中学時代はずうっとイライラしっぱなしだった」

　今もだろうが。

「じゃ、どんな男ならよかったんだ？　やっぱりアレか、宇宙人か？」

「宇宙人、もしくはそれに準じる何かね。とにかく普通の人間でなければ男だろうが女だろうが」

　どうしてそんなに人間以外の存在にこだわるのだろう。俺がそう言うと、ハルヒはあからさまにバカを見る目をして言い放った。

「そっちのほうが面白いじゃないの！」

　それは……そうかもしれない。

　俺だってハルヒの意見に否いなやはない。転校生の美少女が実は宇宙人と地球人のハーフであったりして欲しい。今、近くの席から俺とハルヒをチラチラうかがっているアホの谷口の正体が未来から来た調査員かなにかであったりしたらとても面おも白しろいと思うし、やはりこっちを向いてなぜか微笑ほほえんでいる朝倉涼子が超ちよう能のう力りよく者だったら学園生活はもうちょっと楽しくなると思う。

　だが。そんなことはまずあり得ない。宇宙人や未来人や超能力者がいるなんてことがあり得ないし、たとえいたとしてもホイホイ俺たちの前に登場することも、だいたい何の関係もない俺の前にやってきて「いやあワタクシ、その正体は宇宙人とかでして」と自己紹しよう介かいしてくれるわけねーだろ。

「だからよ！」

　ハルヒは椅い子すを蹴け倒たおして叫さけんだ。教室に揃そろっていた全員が振り返る。

「だからあたしはこうして一いつ生しよう懸けん命めい、」

「遅おくれてすまない！」

　息せき切って明朗快活岡部体育教師が駆かけ込んできて、拳こぶしを握にぎりしめて立ち上がった姿勢で天てん井じようを睨にらんでいるハルヒとそのハルヒを一いつ斉せいに振り返って見ている一同を目にして、ギョッと立ちすくんだ。

「あー……ホームルーム、始めるぞ」

　すとんとハルヒは腰こしを下ろし、机の角を熱心に眺ながめ始める。ふう。

　俺も前を向き、他の連中も前を向き、岡部教きよう諭ゆはよたよたと壇だん上じように登り、咳せき払ばらいを一つ。

「遅れてすまない。あー……ホームルーム、始めるぞ」

　最初から言い直し、いつもの日常が復活した。おそらくこんな日常こそがハルヒの最も忌いむべきものなんだろうな。

　でも人生ってそんなもんだろ？





　しかしな。ハルヒの生き様をうらやましいと思う理り屈くつでは割り切れない感情が心の片かた隅すみでひっそり躍おどっていることも無視出来ない。

　俺がとうにあきらめてしまった非日常との邂かい逅こうをいまだに待ち望んでいるわけだし、何と言ってもやり方がアクティブだよな。

　ただ待っていても都合よくそんなもんは現れやしない。だったらこちらから呼んじまおう。で、校庭に白線引いたり屋上にペンキ塗ぬったりフダを貼はり回ったり。

　いやはや（これって死語か？）。

　いつからハルヒが傍はた目めから見るとトチ狂くるっているとしか思えないことをやっていたのか知らんけど、待てど暮らせど何も現れず、業ごうを煮にやして奇き怪かいな儀ぎ式しきを行なってもナシのツブテ、そりゃいつも全世界を呪のろっているような顔にもなる……わけないか。

「おい、キョン」

　休み時間、谷口が難しい表情を顔に貼り付けてやって来た。そんな顔してると本当にアホみたいだぞ、谷口。

「ほっとけ。んなこたぁいい。それよりお前、どんな魔ま法ほうを使ったんだ？」

「魔法って何だ？」

　高度に発達した科学は魔法と見分けがつかないという警句を思い出しながら俺は聞き返した。授業が終わると例によって教室から消えてしまったハルヒの席を親指で差して谷口は言った。

「俺、涼宮が人とあんなに長い間喋しやべってるの初めて見るぞ。お前、何言ったんだ？」

　さて、何だろう。適当なことしか訊きいていないような気がするんだが。

「驚きよう天てん動どう地ちだ」

　あくまで大げさに驚おどろきを表明する谷口。その後ろからひょこりと国木田が顔を出した。

「昔からキョンは変な女が好きだからねぇ」

　誤解を招くようなことを言うな。

「キョンが変な女を好きでもいっこうに構わん。俺が理解しがたいのは、涼宮がキョンを相手にちゃんと会話を成立させていることだ。納なつ得とくがいかん」

「どちらかと言うとキョンも変な人間にカテゴライズされるからじゃないかなぁ」

「そりゃ、キョンなんつーあだ名の奴やつがまともであるはずはないんだがな。それにしても」

　キョンキョン言うな。俺だってこんなマヌケなニックネームで呼ばれるくらいなら本名で呼ばれたほうがいくらかマシだ。せめて妹には「お兄ちゃん」と呼んでもらいたい。

「あたしも聞きたいな」

　いきなり女の声が降って来た。軽かろやかなソプラノ。見上げると朝倉涼子の作り物でもこうはいかない笑え顔がおが俺に向けられていた。

「あたしがいくら話しかけても、なーんも答えてくれない涼宮さんがどうしたら話すようになってくれるのか、コツでもあるの？」

　俺は一応考えてみた。と言うか考えるフリをして首を振ふった。考えるまでもないからな。

「解わからん」

　朝倉は笑い声を一つ。

「ふーん。でも安心した。涼宮さん、いつまでもクラスで孤こ立りつしたままじゃ困るもんね。一人でも友達が出来たのはいいことよね」

　どうして朝倉涼子がまるで委員長みたいな心配をするのかと言うと、委員長だからである。この前のロングホームルームの時間にそう決まったのだ。

「友達ね……」

　俺は首をかしげる。そうなのか？　それにしては俺はハルヒの渋じゆう面めんしか見てないような気がするぞ。

「その調子で涼宮さんをクラスに溶とけ込めるようにしてあげてね。せっかく一いつ緒しよのクラスになったんだから、みんな仲良くしていきたいじゃない？　よろしくね」

　よろしくね、と言われてもな。

「これから何か伝えることがあったら、あなたから言ってもらうようにするから」

　いや、だから待てよ。俺はあいつのスポークスマンでも何でもないぞ。

「お願い」

　両手まで合わされた。俺は「ああ」とか「うう」とか呻うめき、それを肯こう定ていの意思表示と取ったのか、朝倉は黄色いチューリップみたいな笑顔を投げかけて、また女子の輪の中へ戻もどって行った。輪を構成する女どもが残らずこちらを注目していたことが俺の気分をさらにツーランクほどダウンさせる。

「キョン、俺たち友達だよな……」

　谷口が胡う乱ろんな目で俺に言う。何の話だよ。国木田までが目を閉じ腕うでを組んで意味もなく頷うなずいている。

　どいつもこいつもアホだらけだ。





　席せき替がえは月に一度といつの間にやら決まったようで、委員長朝倉涼子がハトサブレの缶かんに四つ折りにした紙片のクジを回して来たものを引くと俺は中庭に面した窓まど際ぎわ後方二番目というなかなかのポジションを獲かく得とくした。その後ろ、ラストグリッドについたのが誰だれかと言うと、なんてことだろうね、涼宮ハルヒが虫歯をこらえるような顔で座っていた。

「生徒が続けざまに失しつ踪そうしたりとか、密室になった教室で先生が殺されてたりとかしないものかしらね」

「物ぶつ騒そうな話だな」

「ミステリ研究会ってのがあったのよ」

「へえ。どうだった？」

「笑わせるわ。今まで一回も事件らしい事件に出くわさなかったって言うんだもの。部員もただのミステリ小説オタクばっかで名探たん偵ていみたいな奴もいないし」

「そりゃそうだろう」

「超ちよう常じよう現象研究会にはちょっと期待してたんだけど」

「そうかい」

「ただのオカルトマニアの集まりでしかないのよ、どう思う？」

「どうも思わん」

「あー、もう、つまんない！　どうしてこの学校にはもっとマシな部活動がないの？」

「ないもんはしょうがないだろう」

「高校にはもっとラディカルなサークルがあると思ってたのに。まるで甲こう子し園えんを目指す気まんまんで入学したのに野球部がなかったと知らされた野球バカみたいな気分だわ」

　ハルヒはお百度参りを決意した呪のろい女のようなワニ目で中空を眺ながめ、北風のようなため息をついた。

　気の毒だと思うところなのか、ここは？

　だいたいにおいて、ハルヒがどんな部活動なら満足するのか、その定義が不明である。本人にも解っていないんじゃないのか？　漠ばく然ぜんと「何か面おも白しろいことをしてて欲しい」と思っているだけで、その「面白いこと」が何なのか、殺人事件の解決なのか、宇宙人探しなのか、妖よう魔ま退散なのか、こいつの中でも定まってない気がする。

「ないもんはしょうがないだろ」

　俺は意見してやった。

「結局のところ、人間はそこにあるもので満足しなければならないのさ。言うなれば、それを出来ない人間が、発明やら発見やらをして文明を発達させてきたんだ。空を飛びたいと思ったから飛行機作ったし、楽に移動したいと考えたから車や列車を産み出したんだ。でもそれは一部の人間の才覚や発想によって初めて生じたものなんだ。天才が、それを可能にしたわけだ。凡ぼん人じんたる我々は、人生を凡ぼん庸ように過ごすのが一番であってだな。身分不相応な冒ぼう険けん心しんなんか出さないほうが、」

「うるさい」

　ハルヒは俺が気分良く演説しているところを中断させて、あらぬ方角を向いた。実に機き嫌げんが悪そうだ。まあ、それもいつものことだ。

　多分、この女は何だっていいんだろう。ツマラナイ現実から遊ゆう離りした現象ならば。でもそんな現象はそうそうこの世にはない。つーか、ない。

　物理法則万歳！　おかげで俺たちは平へい穏おん無事に暮らしていられる。ハルヒには悪いがな。

　そう思った。

　普ふ通つうだろ？





　いったい何がきっかけだったんだろうな。

　前述の会話がネタフリだったのかもしれない。

　それは突とつ然ぜんやって来た。





　うららかな日差しに眠ねむ気けを誘さそわれ、船をこぎこぎ首をカクカクさせていた俺の襟えり首くびがわしづかみにされたかと思うと恐おそるべき勢いで引っ張られ、脱だつ力りよくの極きわみにいた俺の後頭部が机の角に猛もう然ぜんと激げき突とつ、俺は目の前に刻ときの涙なみだを見た。

「何しやがる！」

　もっともな怒いかりをもって憤ふん然ぜんと振ふり返った俺が見たものは、俺の襟をひっつかんで突つっ立っている涼宮ハルヒの──初めて見る──赤道直下の炎えん天てん下かじみた笑え顔がおだった。もし笑顔に温度が付帯しているなら、熱帯雨林のど真ん中くらいの気温になっているだろう。

「気がついた！」

　唾つばを飛ばすな。

「どうしてこんな簡単なことに気付かなかったのかしら！」

　ハルヒは白鳥座α星くらいの輝かがやきを見せる両眼をまっすぐ俺に向けていた。仕方なく俺は尋たずねる。

「何に気付いたんだ？」

「ないんだったら自分で作ればいいのよ！」

「何を」

「部活よ！」

　頭が痛いのは机の角にぶつけただけではなさそうだ。

「そうか。そりゃよかったな。ところでそろそろ手を離はなしてくれ」

「なに？　その反応。もうちょっとあんたも喜びなさいよ、この発見を」

「その発見とやらは後でゆっくり聞いてやる。場合によってはヨロコビを分かち合ってもいい。ただ、今は落ち着け」

「なんのこと？」

「授業中だ」

　ようやくハルヒは俺の襟首から手を離した。じんじんする頭を押さえて前に向き直った俺は、全クラスメイトの半口あけた顔と、チョーク片手に今にも泣きそうな大学出たての女教師を視界に捕とらえた。

　俺は後ろに早く座れと手で合図し、次いで哀あわれな英語教師に掌てのひらを上に向けて差し出して見せた。

　どうぞ、授業の続きを。

　なにか呟つぶやきつつ、ともかくハルヒは着席し、女教師は板ばん書しよの続きに戻もどり……

　新しいクラブを作る？

　ふむ。

　まさか、俺にも一枚噛かめと言うんじゃないだろうな。

　痛む後頭部がよからぬ予感を告げていた。





　　第二章





　結果から言おう。そのまさかだった、と。

　その後の休み時間、ハルヒはいつものように一人で教室から出て行くことはなかった。その代わり、俺の手を強ごう引いんに引いて歩き出した。教室を出て廊ろう下かをずんずん進み階段を一段飛ばしで登り屋上へ出るドアの前まで来て停止する。

　屋上へのドアは常時施せ錠じようされていて、四階より上の階段はほとんど倉庫代わりになっている。多分美術部だろう。でかいカンバスやら壊こわれかけのイーゼルやら鼻の欠けたマルス像やらがところ狭せましと積み上げられていて、実際狭い。しかも薄うす暗ぐらい。

　こんな所に連れ込んで俺をどうしようと言うんだ。

「協力しなさい」

　ハルヒは言った。今、ハルヒがつかんでいるのは俺のネクタイだ。頭一つ分低い位置から鋭するどい眼光が俺に迫せまっている。カツアゲされてるような気分だよ。

「何を協力するって？」

　実は解わかっていたが、そう訊きいてみた。

「あたしの新クラブ作りよ」

「なぜ俺がお前の思いつきに協力しなければならんのか、それをまず教えてくれ」

「あたしは部室と部員を確保するから、あんたは学校に提出する書類を揃そろえなさい」

　聞いちゃいねえ。

　俺はハルヒの手を振りほどくと、

「何のクラブを作るつもりなんだ？」

「どうでもいいじゃないの、そんなの。とりあえずまず作るのよ」

　そんな活動内容不明なクラブを作ったとして学校側が認めてくれるか大いに疑問だがな。

「いい？　今日の放課後までに調べておいて。あたしもそれまでに部室を探しておくから。いいわね」

　よくない、などと言えばこの場で撲ぼく殺さつされそうな気配だった。俺が何と返答すべきか考えているうちにハルヒは身を翻ひるがえして軽けい妙みような足取りでさっさかと階段を降りていき、ホコリっぽい階段の踊おどり場で途と方ほうに暮れる一人の男が残された。

「……俺はイエスともノーとも言ってないんだが……」

　石せつ膏こう像に問いかけるのもむなしく、俺は好こう奇き心のかたまりになっているであろうクラスメイトどもに何と挨あい拶さつして教室に入ろうかと考えながら歩き出した。





「同好会」の新設に伴ともなう規定。

　人数五人以上。顧こ問もんの教師、名めい称しよう、責任者、活動内容を決定し、生徒会クラブ運営委員会で承認されることが必要。活動内容は創造的かつ活力ある学校生活を送るに相応ふさわしいものに限られる。発ほつ足そく以降の活動・実績によって「研究会」への昇しよう格かくが運営委員会において動議される。なお、同好会に留とどまる限り予算は配分されない。





　わざわざ調べるまでもなかった。生徒手帳の後ろのほうにそう書いてある。

　人数は適当に名前だけ借りるとかして揃えることも可能だろう。顧問はなかなか難しいが、何とかだまくらかしてなってもらうという手もある。名称も当たり障さわりのないものにする。責任者は勿もち論ろんハルヒでいい。

　だが、賭かけてもいいがその活動内容が「創造的かつ活力ある学校生活を送るに相応しいもの」になることはないだろう。

　そう言ったんだけどな。自分の都合の悪いことには聞く耳持たないのが涼宮ハルヒの涼宮ハルヒたるゆえんである。





　終業のチャイムが鳴るや否いなや俺のブレザーの袖そでを万力のようなパワーで握にぎりしめたハルヒは拉ら致ち同然に俺を教室から引きずり出してたったかと早足で歩き出した。鞄かばんを教室に置き去りにしないようにするのが精せい一いつ杯ぱいだった。

「どこ行くんだよ」

　俺の当然の疑問に、

「部室っ」

　前方をのたりのたり歩いている生徒たちを蹴け散ちらす勢いで歩を進めつつハルヒは短く答え、後は沈ちん黙もくを守り通した。せめて手は離はなせ。

　渡わたり廊下を通り、一階まで降り、いったん外に出て別校舎に入り、また階段を登り、薄暗い廊下の半ばでハルヒは止まり俺も立ち止まった。

　目の前にある一枚のドア。

　文芸部。

　そのように書かれたプレートが斜ななめに傾かしいで貼はり付けられている。

「ここ」

　ノックもせずにハルヒはドアを引き、遠えん慮りよも何もなく入って行った。無論俺も。

　意外に広い。長テーブルとパイプ椅い子す、それにスチール製の本ほん棚だなくらいしかないせいだろうか。天てん井じようや壁かべには年代を思わせるヒビ割れが二、三本走っており建物自体の老ろう朽きゆう化かを如によ実じつに物語っている。

　そしてこの部屋のオマケのように、一人の少女がパイプ椅子に腰こし掛かけて分厚いハードカバーを読んでいた。

「これからこの部屋が我々の部室よ！」

　両手を広げてハルヒが重々しく宣言した。その顔は神こう々ごうしいまでの笑えみに彩いろどられていて、俺はそういう表情を教室でもずっと見せていればいいのにとか思ったが言わずにおいた。

「ちょい待て。どこなんだよ、ここは」

「文化系部の部室棟とうよ。美術部や吹すい奏そう楽がく部なら美術室や音楽室があるでしょ。そういう特別教室を持たないクラブや同好会の部室が集まってるのがこの部室棟。通つう称しよう、旧館。この部屋は文芸部」

「じゃあ、文芸部なんだろ」

「でも今年の春に三年が卒業して部員ゼロ、新たに誰だれかが入部しないと休部が決定していた唯ゆい一いつのクラブなのよ。で、このコが一年生の新入部員」

「てことは休部になってないじゃないか」

「似たようなもんよ。一人しかいないんだから」

　呆あきれた野や郎ろうだ。こいつは部室を乗っ取る気だぞ。俺は折りたたみテーブルに本を開いて読書にふける文芸部一年生らしきその女の子に視線を振ふった。

　眼鏡めがねをかけた髪かみの短い少女である。

　これだけハルヒが大おお騒さわぎしているのに顔を上げようともしない。たまに動くのはページを繰くる指先だけで残りの部分は微び動どうだにせず、俺たちの存在を完かん璧ぺきに無視してのけている。これはこれで変な女だった。

　俺は声をひそめてハルヒに囁ささやいた。

「あの娘こはどうするんだよ」

「別にいいって言ってたわよ」

「本当かそりゃ？」

「昼休みに会ったときに。部室貸してって言ったら、どうぞって。本さえ読めればいいらしいわ。変わってると言えば変わってるわね」

　お前が言うな。

　俺はあらためてその変わり者の文芸部員を観察した。

　白い肌はだに感情の欠落した顔、機械のように動く指。ボブカットをさらに短くしたような髪がそれなりに整った顔を覆おおっている。出来れば眼鏡を外したところも見てみたい感じだ。どこか人形めいた雰ふん囲い気きが存在感を希き薄はくなものにしていた。身も蓋ふたもない言い方をすれば、早い話がいわゆる神秘的な無表情系ってやつ。

　しげしげと眺ながめる俺の視線をどう思ったのか、その少女は予備動作なしで面おもてを上げて眼鏡のツルを指で押さえた。

　レンズの奥から闇やみ色の瞳ひとみが俺を見つめる。その目にも、唇くちびるにも、まったく何の感情も浮うかんでいない。無表情レベル、マックスだ。ハルヒのものとは違ちがって、最初から何の感情も持たないようなデフォルトの無表情である。

「長なが門と有ゆ希き」

　と彼女は言った。それが名前らしい。聞いた三秒後には忘れてしまいそうな平へい坦たんで耳に残らない声だった。

　長門有希は瞬まばたきを二回するあいだぶんくらい俺を注視すると、それきり興味を失ったようにまた読書に戻もどった。

「長門さんとやら」俺は言った。「こいつはこの部屋を何だか解わからん部の部室にしようとしてんだぞ、それでもいいのか？」

「いい」

　長門有希はページから視線を離はなさずに答える。

「いや、しかし、多分ものすごく迷めい惑わくをかけると思うぞ」

「別に」

「そのうち追い出されるかもしれんぞ？」

「どうぞ」

　即そく答とうしてくるのはいいが、まるで無感動な応答だな。心の底からどうでもいいと思っている様子である。

「ま、そういうことだから」

　ハルヒが割り込んできた。こっちの声はやたらに弾はずんでいる。なんとなく、あまりいい予感がしなかった。

「これから放課後、この部屋に集合ね。絶対来なさいよ。来ないと死し刑けいだから」

　桜満開の笑みで言われて、俺は不承不承ながらうなずいた。

　死刑はいやだったからな。





　こうして部室を間借りすることになったのはいいが、書類のほうはまだ手つかずである。だいたい名めい称しようも活動内容も決まっていないのだ。先にそれを決めてからにしろと言ったんだが、ハルヒにはまた別の考えがあるようだ。

「そんなもんはね、後からついてくるのよ！」

　ハルヒは高らかにのたまった。

「まずは部員よね。最低あと二人はいるわね」

　ってことはなんだ、あの文芸部員も頭数に入れてしまっているのか？　長門有希を部室に付属する備品か何かと勘かん違いしてるんじゃないか？

「安心して。すぐ集めるから。適材な人間の心当たりはあるの」

　何をどう安心すればいいのだろう。疑問は深まるばかりである。





　次の日、一いつ緒しよに帰ろうぜと言う谷口と国木田に断りを入れて俺は、しょうがない、部室へと足を運んだ。

　ハルヒは「先に行ってて！」と叫さけぶや陸上部が是ぜ非ひ我が部にと勧かん誘ゆうしたのも解るスタートダッシュで教室を飛び出した。足首にブースターでも付いているのかと思いたくなる勢いだ。おそらく新しい部員を確保しに行ったのだろう。とうとう宇宙人の知り合いでも出来たんだろうか。

　通学鞄かばんを肩かたに引っかけて俺は気乗りのしない足取りで文芸部に向かった。





　部室にはすでに長門有希がいて、昨日とまったく同じ姿勢で読書をしておりデジャブを感じさせた。俺が入ってもピクリともしないのも昨日と同じ。よく知らないのだが、文芸部ってのは本を読むクラブなのか？

　沈ちん黙もく。

「……何を読んでんだ？」

　二人して黙だまりこくっているのに耐たえかねて俺はそう訊きいてみた。長門有希は返事の代わりにハードカバーをひょいと持ち上げて背表紙を俺に見せる。睡すい眠みん薬やくみたいな名前のカタカナがゴシック体で躍おどっていた。ＳＦか何かの小説らしい。

「面おも白しろい？」

　長門有希は無気力な仕草で眼鏡めがねのブリッジに指をやって、無気力な声を発した。

「ユニーク」

　どうも訊かれたからとりあえず答えているみたいな感じである。

「どういうとこが？」

「ぜんぶ」

「本が好きなんだな」

「わりと」

「そうか……」

「……」

　沈黙。

　帰っていいかな、俺。

　テーブルに鞄を置いて余っていたパイプ椅い子すに腰こしを下ろそうとしたとき、蹴け飛とばされたようにドアが開いた。

「やあごめんごめん！　遅おくれちゃった！　捕つかまえるのに手間取っちゃって！」

　片手を頭の上でかざしてハルヒが登場した。後ろに回されたもう一方の手が別の人間の腕うでをつかんでいて、どう見ても無理矢理連れてこられたと思おぼしきその人物共々、ハルヒはズカズカ部屋に入ってなぜかドアに錠じようを施ほどこした。ガチャリ、というその音に、不安げに震ふるえた小こ柄がらな身体からだの持ち主は、またしても少女だった。

　しかもまたすんげー美少女だった。

　これのどこが「適材な人間」なんだろうか。

「なんなんですかー？」

　その美少女も言った。気の毒なことに半泣き状態だ。

「ここどこですか、何であたし連れてこられたんですか、何で、かか鍵かぎを閉めるんですか？　いったい何を、」

「黙りなさい」

　ハルヒの押し殺した声に少女はビクッとして固まった。

「紹しよう介かいするわ。朝あさ比ひ奈なみくるちゃんよ」

　それだけ言ったきり、ハルヒは黙り込んだ。もう紹介終わりかよ。

　名状しがたき気き詰づまりな沈黙が部屋を支配した。ハルヒはすでに自分の役割を果たしたみたいな顔で立ってるし、長門有希は何一つ反応することなく読書を続けてるし、朝比奈みくるとかいうらしい謎なぞの美少女は今にも泣きそうな顔でおどおどしてるし、誰だれか何か言えよと思いながら俺はやむを得ず口を開いた。

「どこから拉ら致ちして来たんだ？」





「拉致じゃなくて任意同行よ」

　似たようなもんだ。

「二年の教室でぼんやりしているところを捕まえたの。あたし、休み時間には校舎をすみずみまで歩くようにしてるから、何回か見かけてて覚えていたわけ」

　休み時間に絶対教室にいないと思ったらそんなことをしていたのか。いや、そんなことより、

「じゃ、この人は上級生じゃないか！」

「それがどうかしたの？」

　不思議そうな顔をしやがる。本当に何とも思っていないらしい。

「まあいい……。それはそれとして、ええと、朝比奈さんか。なんでまたこの人なんだ？」

「まあ見てごらんなさいよ」

　ハルヒは指を朝比奈みくるさんの鼻先に突つきつけ彼女の小さい肩をすくませて、

「めちゃめちゃ可愛かわいいでしょう」

　アブナイ誘ゆう拐かい犯のようなことを言い出した。と思ったら、

「あたしね、萌もえってけっこう重要なことだと思うのよね」

「……すまん、何だって？」

「萌えよ萌え、いわゆる一つの萌え要素。基本的にね、何かおかしな事件が起こるような物語にはこういう萌えでロリっぽいキャラが一人はいるものなのよ！」

　思わず俺は朝比奈みくるさんを見た。小柄である。ついでに童顔である。なるほど、下手をすれば小学生と間ま違ちがってしまいそうでもあった。微び妙みようにウェーブした栗くり色いろの髪かみが柔やわらかく襟えり元もとを隠かくし、子犬のようにこちらを見上げる潤うるんだ瞳ひとみが守ってください光線を発しつつ半開きの唇くちびるから覗のぞく白磁の歯が小ぶりの顔に絶ぜつ妙みようなハーモニーを醸かもし出し、光る玉の付いたステッキでも持たせたらたちどころに魔ま女じよっ娘こにでも変身しそうな、って俺は何を言ってるんだろうね？

「それだけじゃないのよ！」

　ハルヒは自じ慢まんげに微笑ほほえみながら朝比奈みくるさんなる上級生の背後に回り、後ろからいきなり抱だきついた。

「わひゃああ！」

　叫さけぶ朝比奈さん。お構いなしにハルヒはセーラー服の上から獲え物ものの胸をわしづかみ。

「どひぇええ！」

「ちっこいくせに、ほら、あたしより胸でかいのよ。ロリ顔で巨きよ乳にゆう、これも萌えの重要要素の一つなのよ！」

　知らん。

「あー、本当におっきいなー」

　終しまいにハルヒはセーラー服の下から手を突っ込んでじかに揉もみ始めた。おーい。

「なんか腹立ってきたわ。こんな可愛らしい顔して、あたしより大きいなんて！」

「たたたす助けてえ！」

　顔を真っ赤にして手足をバタつかせる朝比奈さんだが、いかんせん体格の差はいかんともしがたく、調子に乗ったハルヒが彼女のスカートを捲まくり上げかけたあたりで俺は朝比奈さんの背中にへばりついている痴ち漢かん女を引きはがした。

「アホかお前は」

「でも、めちゃデカイのよ。マジよ。あんたも触さわってみる？」

　朝比奈さんは小さく、ひいっ、と悲鳴を漏もらした。

「遠えん慮りよしとく」

　そう言うしかあるまい。

　驚おどろくべきことに、この間、長門有希は一度も顔を上げることなく読書にふけり続けていた。こいつもどうかしている。

　それからふと気が付いて、

「すると何か、お前はこの……朝比奈さんが可愛くて小こ柄がらで胸が大きかったからという理由なだけでここに連れてきたのか？」

「そうよ」

　真性のアホだ、こいつ。

「こういうマスコット的キャラも必要だと思って」

　思うな、そんなこと。

　朝比奈さんは乱れた制服をパタパタ叩たたいて直し、上うわ目め遣づかいに俺をじっと見た。そんな目で見られても困る。

「みくるちゃん、あなた他ほかに何かクラブ活動してる？」

「あの……書道部に……」

「じゃあ、そこ辞やめて。我が部の活動の邪じや魔まだから」

　どこまでも自分本位なハルヒだった。

　朝比奈さんは、飲む毒の種類は青酸カリがいいかストリキニーネがいいかと訊きかれた殺人事件の被ひ害がい者しやのような顔でうつむき、救いを求めるようにもう一度俺を見上げ、次に長門有希の存在に初めて気付いて驚きよう愕がくに目を見開き、しばらく視線を彷徨さまよわせてからトンボのため息ような声で「そっかー……」と呟つぶやいて、

「解わかりました」と言った。

　何が解ったんだろう。

「書道部は辞めてこっちに入部します……」

　可哀かわい想そうなくらいに悲ひ愴そうな声である。

「でも文芸部って何するところなのかよく知らなくて、」

「我が部は文芸部じゃないわよ」

　当たり前のように言うハルヒ。

　目を丸くする朝比奈さんに、俺はハルヒに代わって言ってあげた。

「ここの部室は一時的に借りてるだけです。あなたが入らされようとしてるのは、そこの涼宮がこれから作る活動内容未定で名めい称しよう不明の同好会ですよ」

「……えっ……」

「ちなみにあっちで座って本読んでるのが本当の文芸部員です」

「はあ……」

　愛くるしい唇をポカンと開ける朝比奈さんはそれきり言葉を失った。無理もあるまい。

「だいじょうぶ！」

　無責任なまでの明るい笑え顔がおでハルヒは朝比奈さんの小さい肩かたをどやしつけた。

「名前なら、たった今、考えたから」

「……言ってみろ」

　期待値ゼロの俺の声が部室に響ひびく。出来ればあまり聞きたくない。そんな俺の思いなど頓とん着ちやくするはずもない涼宮ハルヒは声高らかに命名の雄お叫たけびを上げたのだった。





　お知らせしよう。何の紆う余よ曲きよく折せつもなく単なるハルヒの思いつきにより、新しく発ほつ足そくするクラブの名は今ここに決定した。

　ＳＯＳ団。

　世界を大いに盛り上げるための涼宮ハルヒの団。

　略してＳＯＳ団である。

　そこ、笑っていいぞ。

　俺は笑う前に呆あきれたけどな。

　なぜに団かと言うと、本来なら「世界を大いに盛り上げるための涼宮ハルヒの同好会」とすべきなんだろうが、なにしろまだ同好会の体ていすらたっていない上に、何をする集団なのかも解らないのである。「それだったら、団でいいじゃない」という意味不明なハルヒのヒトコトによりめでたくそのように決まった。

　朝比奈さんはあきらめきったように口を閉とざし、長門有希は部外者であり、俺は何を言う気にもなれなかったため、賛成一、棄き権けん三で「ＳＯＳ団」はめでたく発足の運びとなった。





　好きにしろよ、もう。





　毎日放課後ここに集合ね、とハルヒが全員に言い渡わたして、この日は解散となった。肩を落としてトボトボ廊ろう下かを歩いている朝比奈さんの後ろ姿があまりに哀あわれを催もよおしたので、

「朝比奈さん」

「何ですか」

　年上にまったく見えない朝比奈さんは純真そのものの無む垢くな顔を傾かたむけた。

「別に入んなくていいですよ、あんな変な団に。あいつのことなら気にしないで下さい。俺が後から言っときますから」

「いえ」

　立ち止まって、彼女はわずかに目を細めた。笑みの形の唇くちびるから綿毛のような声が、

「いいんです。入ります、あたし」

「でも多分、ろくなことになりませんよ」

「大丈夫です。あなたもいるんでしょう？」

　そういや俺は何でいるんだろうな。

「おそらく、これがこの時間平面上の必然なのでしょうね……」

　つぶらと表現するしかない彼女の目が遠くのほうを見た。

「へ？」

「それに長門さんがいるのも気になるし……」

「気になる？」

「え、や、何でもないです」

　朝比奈さんは慌あわてた感じで首をぶんぶん振ふった。ふわふわの髪かみの毛がふわふわと揺ゆれる。

　そして朝比奈さんは照れ笑いをしながら深々と腰こしを折った。

「ふつつか者ですが、よろしくお願いします」

「まあ、そう言われるんでしたら……」

「それからあたしのことでしたら、どうぞ、みくるちゃんとお呼び下さい」

　にっこりと微笑ほほえむ。

　うーん、眩暈めまいを覚えるほど可愛かわいい。





　ある日のハルヒと俺の会話。

「あと必要なのは何だと思う？」

「さあな」

「やっぱり謎なぞの転校生は押さえておきたいと思うわよね」

「謎の定義を教えて欲しいもんだ」

「新年度が始まって二ヶ月も経たってないのに、そんな時期に転校してくる奴やつは充じゆう分ぶん謎の資格があると思うでしょ、あんたも」

「親父おやじが急な転勤になったとかじゃねえのか」

「いいえ、不自然だわ。そんなの」

「お前にとって自然とはなんなのか、俺はそれが知りたい」

「来ないもんかしらね、謎の転校生」

「ようするに俺の意見なんかどうでもいいんだな、お前は」





　どうもハルヒと俺が何かを企くわだてているという噂うわさが流れているらしい。

「お前さあ、涼宮と何やってんの？」

　こんなこと訊きいてくるのは谷口に決まっている。

「まさか付き合いだしたんじゃねえよな？」

　断じて違ちがう。俺が一体全体何をやっているのか、それはこの俺自身が一番知りたい。

「ほどほどにしとけよ。中学じゃないんだ。グラウンドを使い物に出来なくなるようなことしたら悪けりゃ停学くらいにはなるぜ」

　ハルヒが一人でやるんであれば俺はそこまで面めん倒どう見きれないがな。少なくとも、長門有希や朝比奈みくるさんに害が及およばないように注意はしておこう。こんな配はい慮りよの出来る自分がちょっと誇ほこらしい。

　暴走特急と化したハルヒを止める自信はあまりないけども。





「コンピュータも欲しいところね」

　ＳＯＳ団の設立を宣言して以来、長テーブルとパイプ椅い子すそれに本ほん棚だなくらいしかなかった文芸部の部室にはやたらと物が増え始めた。

　どこから持ってきたのか、移動式のハンガーラックが部屋の片かた隅すみに設置され、給湯ポットと急きゆう須す、人数分の湯飲みも常備、今どきＭＤも付いていないＣＤラジカセに一層しかない冷蔵庫、カセットコンロ、土ど鍋なべ、ヤカン、数々の食器は何だろうか、ここで暮らすつもりなのだろうか。

　今、ハルヒはどっかの教室からガメてきた勉強机の上であぐらをかいて腕うでを組んでいた。その机にはあろうことか「団長」とマジックで書かれた三さん角かく錐すいまで立っている。

「この情報化時代にパソコンの一つもないなんて、許し難がたいことだわ」

　誰だれを許さないつもりなのか。

　一応メンバーは揃そろっていた。相も変わらず長門有希は定位置で土星のマイナー衛星が落ちたとかどうしたとかいうタイトルのハードカバーを読みふけり、来なくてもいいのに生き真ま面じ目めにもちゃんとやって来た朝比奈みくるさんは所在なげにパイプ椅子に腰掛かけている。

　ハルヒは机から飛び降りると、俺に向かって実にいやぁな感じのする笑いを投げかけた。

「と言うわけで、調達に行くわよ」

　狩しゆ猟りよう区くへ鹿しか撃うちに行くハンターの目でハルヒは言った。

「調達って、パソコンを？　どこでだよ。電気屋でも襲おそうつもりか」

「まさか。もっと手近なところよ」

　ついてきなさい、と命令された俺と朝比奈さんを引き連れてハルヒが向かった先は、二軒けん隣となりのコンピュータ研究部だった。

　なるほど。

「これ持ってて」

　そう言って俺にインスタントカメラを渡わたす。

「いいこと？　作戦を言うから、その通りにしてよ。タイミングを逃のがさないように」

　俺に身を屈かがめさせてハルヒは耳元でその「作戦」とやらをごにょごにょと呟つぶやいた。

「ああん？　そんな無茶苦茶な」

「いいのよ」

　お前はいいかもしれんが。俺は不思議そうにこっちを見ている朝比奈さんを一いち瞥べつし、アイコンタクトを図はかった。

　とっとと帰ったほうがいいですよ。

　目をパチパチさせている俺を朝比奈さんは怪け訝げんな顔で見上げ、いかなる理り屈くつか、頬ほおを赤らめた。だめだ、通じてない。

　そんなことをしているうちにハルヒは平気な顔でコンピュータ研究部のドアをノックもなしに開いた。

「こんちわー！　パソコン一式、いただきに来ましたー！」

　間取りは同じだが、こちらの部室はなかなかに手て狭ぜまだった。等とう間かん隔かくで並んだテーブルには何台ものディスプレイとタワー型の本体が載のっていて、冷れい却きやくファンの回る低い音が室内の空気を振しん動どうさせている。

　席についてキーボードをカチャカチャと叩たたいていた四人の男子生徒、何事かと身を乗り出して入り口に立ちふさがるハルヒを凝ぎよう視ししていた。

「部長は誰？」

　笑いつつも横おう柄へいにハルヒが言い、一人が立ち上がって答えた。

「僕だけど、何の用？」

「用ならさっき言ったでしょ。一台でいいから、パソコンちょうだい」

　コンピュータ研究部部長、名も知れぬ上級生は「何言ってんだ、こいつ」という表情で首を振ふった。

「ダメダメ。ここのパソコンはね、予算だけじゃ足りないから部員の私費を積み立ててようやく買ったものばかりなんだ。くれと言われてあげるほどウチは機材に恵めぐまれてない」

「いいじゃないの一個くらい。こんなにあるんだし」

「あのねえ……ところでキミたち誰？」

「ＳＯＳ団団長、涼宮ハルヒ。この二人はあたしの部下その一と二」

　言うにことかいて部下はないだろう。

「ＳＯＳ団の名において命じます。四の五の言わずに一台よこせ」

「キミたちが何者かは解わからないけど、ダメなもんはダメ。自分たちで買えばいいだろ」

「そこまで言うのならこっちにも考えがあるわよ」

　ハルヒの瞳ひとみが不敵な光を放つ。よくない兆候である。

　ぼんやり立っていた朝比奈さんの背を押してハルヒは部長へと歩み寄り、いきなりそいつの手首を握にぎりしめたかと思うと、電光石火の早業で部長の掌てのひらを朝比奈さんの胸に押しつけた。

「ふぎゃあ！」

「うわっ！」

　パシャリ。

　二種類の悲鳴をＢＧＭに聞きながら俺はインスタントカメラのシャッターを切った。

　逃にげようとする朝比奈さんを押さえつけ、ハルヒは右手につかんだ部長氏の手でぐりぐりと小こ柄がらな彼女の胸をまさぐった。

「キョン、もう一枚撮とって」

　不本意ながら俺はシャッターボタンを押すのだった。すまない、朝比奈さん。と、名も知らぬ部長。朝比奈さんのスカートの中に突つっ込まれる寸前に部長はやっと手を振りほどいて跳とびすさった。

「何をするんだぁ！」

　紅潮したその顔面の前で、ハルヒは優ゆう雅がに指を振った。

「ちちち。あんたのセクハラ現場はバッチリ撮らせてもらったわ。この写真を学校中にばらまかれたくなかったら、とっととパソコンをよこしなさい」

「そんなバカな！」

　口こう角かく泡あわを飛ばして抗こう議ぎする部長。その気持ちはよく解る。

「キミが無理矢理やらせたんじゃないか！　僕は無実だ！」

「いったい何人があんたの言葉に耳を貸すかしらねえ」

　見ると朝比奈さんは床ゆかにへたり込んでいた。驚おどろきを通り越こしてもはや虚きよ脱だつの境地である。

　なおも部長は抗弁する。

「ここにいる部員たちが証人になってくれる！　それは僕の意思じゃない！」

　唖あ然ぜんと大口を開けて石化していた三人のコンピュータ研部員たちが、我に返ったようにうなずいた。

「そうだぁ」

「部長は悪くないぞぉ」

　しかしそんな気の抜ぬけたシュプレヒコールが通用するハルヒではなかった。

「部員全員がグルになってこのコを輪りん姦かんしたんだって言いふらしてやるっ！」

　俺と朝比奈さんを含ふくむ全員の顔が青ざめた。いくらなんでもそれはないだろう。

「すすす涼宮さんっ……！」

　足にすがりつく朝比奈さんの手を軽く蹴け飛とばして、ハルヒは傲ごう然ぜんと胸を反そらした。

「どうなの、よこすの、よこさないの！」

　赤から青へ目まぐるしく変色していた部長の顔はとうとう土気色になった。

　ついに彼は陥かん落らくした。

「好きなものを持って行ってくれ……」

　倒たおれ込むように椅い子すに背を投げ出した部長に他の部員たちが駆かけ寄った。

「部長！」

「しっかりしてください！」

「気を確かに！」

　糸の切れたマリオネットの動きで部長は首をうなだれた。ハルヒの片棒をかついでいる俺ではあるのだが、同情を禁じ得ない。

「最新機種はどれ？」

　どこまでも冷れい徹てつな女である。

「なんでそんなことを教えなくちゃいけないんだよ」

　怒おこる部員の言葉もなんのその、ハルヒは無言で俺が持つカメラを指さした。

「くそ！　それだよ！」

　そいつが指したタワー型のメーカー名と型番を覗のぞき込みつつハルヒはスカートのポケットから紙切れを取り出した。

「昨日、パソコンショップに寄って店員にここ最近出た機種を一覧にしてもらったのよねえ。これは載のってないみたいだけど？」

　あまりの周しゆう到とうさに慄りつ然ぜんとするね。

　ハルヒはテーブルをぬって確認して回り、その中の一台を指名した。

「これちょうだい」

「待ってくれ！　それは先月購こう入にゆうしたばかりの……！」

「カメラカメラ」

「……持ってけ！　泥どろ棒ぼう！」

　まさしく泥棒だ。返す言葉もない。

　ハルヒの要求はとどまるところを知らない。各ケーブルを引っこ抜かせたハルヒはディスプレイから何からいっさいがっさいを文芸部室に運ばせたあげく配線し直すように求め、さらにインターネットを使用出来るようにＬＡＮケーブルを二つの部屋の間に引かせ、ついで学校のドメインからネットに接続出来るようにすることを申しつけ、そのすべてをコンピュータ研部員にやらせた。盗ぬすつ人と猛たけ々だけしいとはこのことだろう。

「朝比奈さん」

　すっかり手持ちぶさたになってしまった俺は両手で顔を覆おおってうずくまる小さな身体からだに、

「とりあえず帰りましょう」

「ぅぅぅぅ……」

　しくしく泣いている朝比奈さんを介かい添ぞえして立たせた。自分の胸を握にぎらせたらよかったのにな、ハルヒも。男の目の前でも平気で着き替がえをするあいつなら、んなこと屁へとも思わないだろうに。泣きやまない朝比奈さんを宥なだめながら、パソコンを使って何をするつもりなのかと俺は考えた。

　まあ、ほどなく明らかになったのだが。





　ＳＯＳ団のウェブサイト立ち上げ。

　ハルヒはそれがしたかったようだ。で、誰だれが作るんだ？　そのウェブサイトとやらを。

「あんた」

　と、ハルヒは言った。

「どうせヒマでしょ。やりなさいよ。あたしは残りの部員を探さなきゃいけないし」

　パソコンは「団長」と銘めい打たれた三さん角かく錐すい付きの机に置かれていた。ハルヒはマウスを操ってネットサーフィンしながら、

「一両日中によろしくね。まずサイトが出来ないことには活動しようがないし」

　我関せずとばかりに本を読む長門有希の横で朝比奈さんはテーブルに突つっ伏ぷして肩かたを震ふるわせていた。ハルヒの言葉を聞いているのは、どうやら俺だけであり、ハルヒの託たく宣せんを聞いた以上は俺がそれをしないといけないようなのである。少なくともハルヒがそう思っているのは間ま違ちがいない。

「そんなこと言われてもなあ」

　言いながらも俺はけっこう乗り気だった。いやいや、ハルヒの命令口調に慣れてきたからじゃないぜ。サイト作りさ。やったことないけど、なんか面おも白しろそうじゃないか。

　つまりそういうわけで、次の日から俺のサイト作成奮戦記が始まった。





　とは言え、奮戦することもそうそうなかった。さすがコンピュータ研究部、あらかたのアプリケーションはすでにハードディスク内に収まっており、サイトの作成もテンプレートに従ってちょこっと切ったり貼はったりすればよかったからだ。

　問題はそこに何を書くかである。

　なんせ俺はＳＯＳ団が何を活動理念とした団体なのか未いまだに知らないのだ。知らない活動理念について書けるはずもなく、トップページに「ＳＯＳ団のサイトにようこそ！」と書いた画像データを貼り付けた段階で俺の指はハタと止まった。いいから作れ早く作れとハルヒが呪じゆ文もんのように耳元で言い続けるのがやかましいので、こうして昼休みに弁当食いながらマウスを握りしめている俺だった。

「長門、何か書きたいことあるか？」

　昼休みにまで部室に来て本を読んでいる長門有希に訊きいてみた。

「何も」

　顔も上げやしない。どうでもいいがこいつはちゃんと授業に出てるんだろうな。

　長門有希の眼鏡めがね顔から十七インチモニタに目を戻もどし、俺は再び考え込んだ。

　もう一つ問題がある。正式に認可を受けていない同好会以下の怪あやしげな団のサイトを、学校のアドレスで作ってしまっていいものなのだろうか。

　バレなきゃいいのよ、とはハルヒの弁。バレたらバレたで放ほっときゃいいのよ、こんなもんはね、やったもん勝ちなのよ！

　この楽観的で、ある意味前向きな性格はちょっとだけだがうらやましい。

　適当に拾ってきたフリーＣＧＩのアクセスカウンタを取り付け、メールアドレスを記き載さいして、──掲けい示じ板ばんは時じ期き尚しよう早そうだろう──タイトルページのみでコンテンツ皆かい無むという手て抜ぬき以前のホームページをアップロードした。

　こんなんでいいだろ。

　ネット上でちゃんと表示されていることを確認して俺はアプリを次々消してパソコンを終しゆう了りようさせ、大きく伸のびをしようとして、長門有希が背後にいることに気付いて飛び上がった。

　気配ってもんがないのか。いつの間にか俺の後ろを取っていた長門の能面のような白い顔。わざとやっても出来そうにない見事な無表情で長門は俺を視力検査表でも見るような目で見つめていた。

「これ」

　分厚い本を差し出した。反射的に受け取る。ずしりと重い。表紙は何日か前に長門が読んでいた海外ＳＦのものだった。

「貸すから」

　長門は短く言い残すと俺に反はん駁ばくするヒマを与あたえることなく部屋を出て行った。こんな厚い本を貸されても。一人取り残されていた俺の耳に、昼休みがもうすぐ終わることを告げる予よ鈴れいが届いた。どうも俺の周りには俺の意見を聞こうとする奴やつが少ないみたいだな。

　ハードカバー本を手みやげに教室へ戻った俺の背中をシャーペンの先がつついた。

「どう、サイト出来た？」

　ハルヒが難しい顔をして机にかじりついていた。破ったノートに何やらせっせとペン先を走らせている。俺は出来るだけクラスの注目を浴びないようなさりげなさを装よそおって、

「出来たには出来たが、見に来た奴が怒おこりそうな何もないサイトだぞ」

「今はまだそれでもいいのよ。メールアドレスさえあればオッケー」

　じゃあ携けい帯たいメールでも充じゆう分ぶんじゃないか。

「それはダメ。メールが殺さつ到とうすると困る」

　何をどうすれば登録したばかりのアドレスにメールが殺到するんだ？

「内ない緒しよ」

　そしてまたいやぁな感じの笑い。不気味だ。

「放課後になったら解わかるわよ。それまで極ごく秘ひ」

　永遠に極秘にしておいて欲しい。





　次の六時間目、ハルヒの姿は教室になかった。おとなしく帰っていてくれればいいのだが、まずあり得まい。悪事の前段階。





　その放課後である。自分のやってることに疑念を覚えつつ、つい部室へと足を向けてしまうのは何故なぜだろうと形けい而じ上じよう学的な考察を働かせながら俺は文芸部室へとやって来た。

「ちわー」

　やっぱりいる長門有希と、両手を揃そろえて椅い子すに座っている朝比奈みくるさん。

　人のことは言えないが、よっぽどヒマなのか、この二人は。

　俺が入っていくと朝比奈さんはあからさまにホッとした表情になって会え釈しやくした。長門と二人で密室にいたら、そりゃ疲つかれるわな。

　つーか、あなた、あんな目にあいながらよく今日も来ましたね。

「涼宮さんは？」

「さあ、六限にはすでにいませんでしたけどね。またどこかで機材を強ごう奪だつしてるんじゃないですか」

「あたし、また昨日みたいなことしないといけないんでしょうか……」

　額に縦線を浮うかべてうつむく朝比奈さんに、俺は精せい一いつ杯ぱいの愛あい想その良さで、

「大だい丈じよう夫ぶです。今度あいつが無理矢理朝比奈さんにあんなことしようとしたら、俺が全力で阻そ止しします。自分の身体からだでやりゃいいんですよ。涼宮なら楽勝です」

「ありがとう」

　ペコリと頭を下げるはにかんだ微笑ほほえみのあまりの可愛かわいさに思わず朝比奈さんを抱だきしめたくなった。しないけどね。

「お願いします」

「お願いされましょう」

　太たい鼓こ判ばんを押したのはいいが、俺のそんな約束が机き上じようの空論、砂上の楼ろう閣かく、太陽内部の水素原子のように崩ほう壊かいするまでに五分とかからなかった。ダメ人間だ、俺。

「やっほー」

　とか言いながらハルヒ登場。両手に提さげているでかい紙かみ袋ぶくろが俺の目を引いた。

「ちょっと手間取っちゃって、ごめんごめん」

　上じよう機き嫌げん時のハルヒは必ず他人の迷めい惑わくになりそうなことを考えていると見て間ま違ちがいない。

　ハルヒは紙袋を床ゆかに置くと後ろ手でドアの鍵かぎをかけた。その音に反射的にビクンとなる朝比奈さん。

「今度は何をする気なんだ、涼宮。言っとくが押し込み強ごう盗とうのマネだけは勘かん弁べんな。あと脅きよう迫はくも」

「何言ってんの？　そんなことするわけないじゃないの」

　では机に載のっているパソコンは何だ。

「平へい和わ裏りに寄付してくれたものよ。そんなことより、ほら、これご覧なさい」

　紙袋の一つからハルヒの取り出したのは、何やら手書き文字が印刷されたＡ４の藁わら半ばん紙しである。

「わがＳＯＳ団の名を知らしめようと思って作ったチラシ。印刷室に忍しのび込んで二百枚ほど刷ってきたわ」

　ハルヒは俺たちにチラシを配った。授業をサボってそんなことをしてたのか。よく見つからなかったもんだ。別段見たくもなかったが俺はとりあえず受け取ったそれに目を通す。





『ＳＯＳ団結団に伴ともなう所信表明。

　わがＳＯＳ団はこの世の不思議を広く募ぼ集しゆうしています。過去に不思議な経験をしたことのある人、今現在とても不思議な現象や謎なぞに直面している人、遠からず不思議な体験をする予定の人、そうゆう人がいたら我々に相談するとよいです。たちどころに解決に導きます。確実です。ただし普ふ通つうの不思議さではダメです。我々が驚おどろくまでに不思議なコトじゃないといけません。注意して下さい。メールアドレスは……』





　この団の存在意義がだんだん解わかってきた。どうあってもハルヒはＳＦだかファンタジーだかホラーだかの物語世界に浸ひたってみたいらしい。

「では配りに行きましょう」

「どこでだよ」

「校門。今ならまだ下校していない生徒もいっぱいいるし」

　はいはいそうですか、と紙袋を持とうとした俺を、しかしハルヒは制した。

「あんたは来なくていいわよ。来るのはみくるちゃん」

「はい？」

　両手で藁半紙を握にぎりしめて駄だ文ぶんを読んでいた朝比奈さんが小首を傾かしげる。ハルヒはもう一つの紙袋をごそごそかき回し、そして勢いよくブツを取り出した。

「じゃあああん！」

　猫ねこ型ロボットのように得意満面にハルヒが手にしているのは最初黒い布切れに見えた。が、オーノー！　ハルヒが四次元ポケットよろしく次々出してきたアイテムが揃うにつれ、俺はなぜハルヒが朝比奈さんを指名したのか悟さとり、そして朝比奈さんのために祈いのった。あなたの魂たましいに安らぎあれ。

　黒いワンウェイストレッチ、網あみタイツ、付け耳、蝶ちようネクタイに、白いカラー、カフス及およびシッポ。

　それはどこからどう見てもバニーガールの衣装なのだった。

「あのあのあの、それはいったい……」

　怯おびえる朝比奈さん。

「知ってるでしょ？　バニーガール」

　こともなげに言うハルヒ。

「まままさかあたしがそれ着るんじゃ……」

「もちろん、みくるちゃんのぶんもあるわよ」

「そ、そんなの着れませんっ！」

「だいじょぶ。サイズは合ってるはずだから」

「そうじゃなくて、あの、ひょっとしてそれ着て校門でビラ配りを、」

「決まってるじゃない」

「い、いやですっ！」

「うるさい」

　いかん、目が据すわっている。群れからはぐれたガゼルに襲おそいかかるライオンのメスのような俊しゆん敏びんな動きで朝比奈さんに飛びついたハルヒは、ジタバタする彼女のセーラー服を手際よく脱ぬがせ始めた。

「いやあああぁぁぁ！」

「おとなしくしなさい！」

　無茶なことを言いながらハルヒは朝比奈さんを取り押さえ、あっさりセーラーを脱がせてしまうとスカートのホックに指をかけ、これは止めたほうがいいだろうと足を上げかけた俺は朝比奈さんと目があってしまい、

「見ないでぇ！」

　泣き声で叫さけばれて大急ぎで回れ右、ドアに走って──くそ、鍵かぎがかかってやがる──無む駄だにガチャガチャとノブを回してからやっと鍵を開けて転がるように廊ろう下かへ脱だつ出しゆつした。

　その時横目で見たのだが、長門有希はまるで何事もないかのように本読みをしていた。

　何か言うことはないのか。

　閉めたドアにもたれかかった俺に、

「ああっ！」「だめえ！」「せめて……じ、自分で外すから……ひぇっ！」

　などと、あられもない朝比奈さんの悲痛そのものの悲鳴と、

「うりゃっ！」「ほら脱いだ脱いだ！」「最初から素す直なおにしときゃよかったのさ！」

　というハルヒの勝ち誇ほこった雄お叫たけびが交こう互ごに聞こえてきた。むむむ。気にならんと言えば嘘うそになるなあ、さすがに。

　それからしばらくして合図があり、

「入っていいわよー」

　少々ためらいがちに部室に戻もどった俺の目が映し出したもの、それはどうしようもないまでに完かん璧ぺきな二人のバニーガールだった。ハルヒも朝比奈さんも呆あきれるほど似合っていた。

　大きく開いた胸むな元もとと背中、ハイレグカットから伸のびる網タイツに包まれた脚あし、ひょこひょこ揺ゆれる頭のウサミミと白いカラーとカフスがポイントを高めている。何のポイントかは俺にだって解りはしない。

　スレンダーなくせして出ているところが出ているハルヒとチビっこいのに出るべきところが出ている朝比奈さんの組み合わせは、はっきり言って目に毒だ。

　うっうっうっと、しゃくりあげている朝比奈さんに「似合ってますよ」と声をかけるべきか悩なやんでいるとハルヒが、

「どう？」

　どうと言われても、俺はお前の頭を疑うくらいしか出来ねえよ。

「これで注目度もバッチリだわ！　この格好なら大たい抵ていの人間はビラを受け取るわ。そうよね！」

「そりゃそんなコスプレした奴やつが学校で二人もうろついていたら嫌いやでも目立つからな……。長門はいいのか？」

「二着しか買えなかったのよ。フルセットだから高かったんだから」

「そんなもんどこで売ってるんだ？」

「ネット通つう販はん」

「……なるほど」

　目線がいつもより高いと思ったら、ご丁てい寧ねいに黒いハイヒールまであつらえてやがる。

　ハルヒはチラシの詰つまった紙かみ袋ぶくろをつかむと、

「行くわよ、みくるちゃん」

　身体からだの前で腕うでを組み合わせている朝比奈さんは、助けを求めるように俺を見た。俺は朝比奈さんのバニースタイルにひたすら見とれるのみだった。

　ごめん。正直、たまりません。

　朝比奈さんは子供のようにぐずりながらテーブルにしがみついていたが、そこはハルヒのバカ力にかなうはずもなく、間もなく小さな悲鳴とともに引きずるように連れ去られ、二人のバニーは部室から姿を消した。罪悪感にさいなまれつつ俺は力無く座ろうとして、

「それ」

　長門有希が床ゆかを差していた。目をやるとそこには乱雑に脱ぎ散らかされた二組のセーラー服と……あれはブラジャーか？

　ショートカットの眼鏡めがね女は黙だまりこくったまま指先をハンガーラックへと向け、そうしてもう用はすんだと言わんばかりに読書に戻る。

　お前がやってくれよ。

　ため息混じりで俺は女どもの制服を拾い上げてハンガーに、げっ、まだ体温が残ってるよ。生々しー。





　三十分後、よれよれになった朝比奈さんが戻ってきた。うわぁ、本物のウサギみたいに目が赤いやあ、なんて言ってる場合じゃないな。慌あわてて俺は椅い子すを譲ゆずり、朝比奈さんはいつかみたいにテーブルに突つっ伏ぷして形のいい肩けん胛こう骨こつを揺らし始めた。着き替がえる気力もないらしい。背中が半ば以上も開いてるから目のやり場に困る。俺はブレザーを脱いで震ふるえる白い背にかけてやった。めそめそ泣く少女とノーリアクションの読書好き、困こん惑わくする腰こし抜ぬけ野や郎ろう（俺のこった）が雰ふん囲い気き最悪の一室で無言のまますごす時間……。遠くで鳴ってるブラバンの下手くそなラッパと野球部の不ふ明めい瞭りような怒ど鳴なり声がやけによく聞こえた。

　俺が今日の晩飯は何だろうなとかどうでもいいようなことを考え出した頃ころになって、ようやくハルヒが勇ましく帰き還かんした。第一声、

「腹立つーっ！　なんなの、あのバカ教師ども、邪じや魔まなのよ、邪魔っ！」

　バニー姿で怒おこっていた。だいたい何が起こったのか解わかる気もするが、一応訊きいてみよう。

「何か問題でもあったのか」

「問題外よ！　まだ半分しかビラまいてないのに教師が走ってきて、やめろとか言うのよ！　何様よ！」

　お前がな。バニーガールが二人して学校の門でチラシ配ってたら教師じゃなくとも飛んでくるってーの。

「みくるちゃんはワンワン泣き出すし、あたしは生活指導室に連行されるし、ハンドボールバカの岡部も来るし」

　生活指導担当の教師も岡部担任もさぞかし目が泳いでいたことだろう。

「とにかく腹が立つ！　今日はこれで終わり、終しゆう了りよう！」

　やおらウサミミをむしり取ったハルヒはそれを床に叩たたきつけると、バニーの制服を脱ぬごうとし、俺は走って部室を後にした。

「いつまで泣いてんの！　ほら、ちゃっちゃと立って着替える！」

　廊ろう下かの壁かべにもたれて二人の着替えが終わるのを待つ。露ろ出しゆつ狂きようというわけではなく、ハルヒは自分たちの半はん裸ら姿が男にどういう影えい響きようを与あたえるかがまったく理解出来ていないのだろう。バニーガールのコスプレも扇せん情じよう的なところに着目したからではなくて、単に目立つからに違ちがいない。

　まともな恋れん愛あいが出来ないはずである。

　少しは男の、少なくとも俺の目くらいは気にかけて欲しいものだ。気き疲づかれすることこの上ない。朝比奈さんのためにも、そう願わずにはいられない。それにしても……長門も少しは何か言ってくれよ。

　やがて部室から出てきた朝比奈さんは滑すべり止めにすら引っかからずすべての受験に失敗した直後の三浪ろう生のような顔になっていた。かける言葉が見つからないので黙っていたら、

「キョンくん……」

　深海に沈しずんだ豪ごう華か客船から発せられる亡ぼう霊れいのような声が、

「……わたしがお嫁よめに行けなくなるようなことになったら、もらってくれますか……？」

　何と言うべきか。て言うか、あなたも俺をその名で呼ぶのですか。

　朝比奈さんは油の切れたロボットの動きで俺にブレザーを返した。胸に飛び込んで泣いてくれたりするのかなと不ふ埒らちなことを一いつ瞬しゆん考えたのだが、彼女は古くなった青菜のようにひしゃげきった面おも持もちで歩き去った。

　ちょっと残念。





　次の日、朝比奈さんは学校を休んだ。





　すでに校内に轟とどろいてた涼宮ハルヒの名は、バニー騒さわぎのおかげで有名を超ちよう越えつして全校生徒の常識にまでなっていた。それは構わない。ハルヒの奇き行こうが全校に知れ渡わたろうがどうしようが俺の知ったことではない。

　問題は涼宮ハルヒのオプションとして朝比奈みくるという名前が囁ささやかれることになったことと、周囲の奇異を見る目が俺にまで向いているような気がすることである。

「キョンよぉ……いよいよもって、お前は涼宮と愉ゆ快かいな仲間たちの一員になっちまったんだな……」

　休み時間、谷口が憐あわれみすら感じさせる口調で言った。

「涼宮にまさか仲間が出来るとはな……。やっぱ世間は広いや」

　うるさいな。

「ほんと、昨日はビックリしたよ。帰り際ぎわにバニーガールに会うなんて、夢でも見てるのかと思う前に自分の正気を疑ったもんね」

　こちらは国木田。見覚えのある藁わら半ばん紙しをヒラヒラさせて、

「このＳＯＳ団って何なの？　何するとこ、それ」

　ハルヒに訊いてくれ。俺は知らん。知りたくもない。仮に知ってたとしても言いたくない。

「不思議なことを教えろって書いてあるけど、具体的に何を指すの？　そんで普ふ通つうじゃダメって、よく解らないんだけど」

　朝倉涼子までがやって来た。

「面おも白しろいことしてるみたいね、あなたたち。でも、公こう序じよ良りよう俗ぞくに反することはやめておいたほうがいいよ。あれはちょっとやりすぎだと思うな」

　俺も休めばよかった。





　ハルヒはまだ怒っていた。ビラ配りを途と中ちゆうで邪魔された怒りもさることながら、今日の放課後になってもまるっきりＳＯＳ団宛あてのメールが届かなかったからである。一つ二つは悪戯いたずらメールが来るんじゃないかと思っていたのだが世間は思いのほか常識的であった。おおかた皆みな、ハルヒに関かかわると面めん倒どうくさいことになりそうだと考えたに違いない。

　空っぽのメールボックスを眉まゆ根ねを寄せて睨にらみながらハルヒは光学マウスを振ふり回した。

「なんで一つも来ないのよ！」

「まあ昨日の今日だし。人に話すのもためらうほどのすげえ謎なぞ体験なのかもしれんし、こんな胡う散さん臭くさい団を信用する気になれないだけかもしれん」

　俺は気休めを言ってやる。本当はだな、

　何か不思議な謎ありませんか。はい、あります。おお素晴らしい、私に教えてください。解わかりました、実は……

　なんてことになるわけないだろう。いいか、ハルヒ。そんなもんはマンガか小説の物語の中にしかないんだ。現実はもっとシビアでシリアスなんだよ。県立高校の一角で世界が終わってしまうような陰いん謀ぼうが進行中とか、人間外の生命体が閑かん静せいな住宅地を徘はい徊かいしてるとか、裏山に宇宙船が埋うまってるとか、ないないない、絶対ないって。解るよな？　お前も本当は理解してるんだろう？　ただもやもやしたやり場のない若さゆえのイラダチがお前を突つき抜ぬけた行動に導いているだけだよな。いい加減に目を覚まして、誰だれか格好のいい男でも捕つかまえて一いつ緒しよに下校したり日曜に映画行ったりしてろよ。それか運動部にでも入って思い切り暴れてろよ。お前なら即そくレギュラーで活かつ躍やく出来るさ。

　……と、もっともらしく説いてやりたいのだが多分五行くらい話したあたりで鉄てつ拳けんが飛んでくるような予感がしたのでやめておいた。

「みくるちゃんは今日休み？」

「もう二度と来ないかもな。可哀かわい想そうに、トラウマにならなければいいのだが」

「せっかく新しい衣装を用意したのに」

「自分で着ろよ」

「もちろんあたしも着るわよ。でも、みくるちゃんがいないとつまんない」

　長門有希は例によって希き薄はくな存在感とともにテーブルと一体化していた。別に朝比奈さんにこだわらず長門を着きせ替かえ人形にすればいいのに。ってのもあまりよくないが、それでも泣き虫の朝比奈さんと違ちがって長門は言われたとおりに淡たん々たんとバニーガールの衣装を身につけるような気がするし、それはそれで見てみたいような気もする。





　待望の転校生がやって来た。

　朝のホームルーム前のわずかな時間に俺はそれをハルヒから聞かされた。

「すごいと思わない？　本当に来たわよ！」

　欲しがっていたオモチャを念願かなって買ってもらえた幼よう稚ち園えん児じのような飛びっきりの笑え顔がおでハルヒは机から身を乗り出していた。

　いったいどこで聞きつけたのか知らないが、その転校生は今日から一年九組に転入するのだと言う。

「またとないチャンスね。同じクラスじゃないのは残念だけど謎の転校生よ。間違いない」

　会ってもないのにどうして謎だと解る。

「前にも言ったじゃないの。こんな中ちゆう途と半はん端ぱな時期に転校してくる生徒は、もう高確率で謎の転校生なのよ！」

　その統計はいつ誰がどうやって取ったんだ？　そっちのほうが謎だ。

　五月の中ちゆう旬じゆんに転校することになった学生がすべからく謎的存在なのだとしたら、日本全国には謎の転校生がたくさんいるんじゃないかと思うぞ。

　しかし独自の涼宮ハルヒ理論はそんな普ふ遍へん的な常識論の追つい随ずいを許可したりはしないのである。一限が終しゆう了りようすると同時にハルヒはすっ飛んで行った。謎の転校生にお目通りしに九組へと向かったのだろう。

　果たしてチャイムギリギリ、ハルヒは何やら複雑な顔つきで戻もどってきた。

「謎っぽかったか？」

「うーん……あんまり謎な感じはしなかったなあ」

　当たり前だ。

「ちょっと話してみたけど、でもまだ情報不足ね。普通人の仮面をかぶっているだけかもしれないし、どっちかって言うとその可能性のほうが高いわ。転校初日から正体を現す転校生もいないだろうし。次の休み時間にも尋じん問もんしてみる」

　尋問ねえ。九組の奴やつらも驚おどろいただろう。俺は想像する。自分から誰だれかに話しかけるなどほぼ皆かい無むのハルヒが、いきなり自分たちの教室に踏ふみ込んで手近な奴を捕まえ「転校生はどいつ？」とか訊きいて答えを聞くや否やそっちへと突とつ進しんし、おそらく親交を深めるべく団だん欒らん中の会話の輪へと突進し、その輪を突き崩くずして中心部へ侵しん入にゆう、驚く転校生に詰つめ寄って「どこから来たの？　あんた何者？」などと詰きつ問もんする様を。

　ふと思いつく。

「男？　女？」

「変装してる可能性もあるけど、一応、男に見えたわね」

　じゃあ男なんだろ。

　てことは、ＳＯＳ団にやっと俺以外の男子生徒が増えるということでもある。その男子は、ただ転校してきたというだけの理由で、有う無むを言わせず入団させられるのだ。しかしそいつが俺や朝比奈さんのようなお人好しとは限らない。そう上手くことが運ぶものだろうか。いくらハルヒが強ごう引いん極きわまろうとも、もっと意思の強い人間ならば拒きよ否ひしおおせるのではないだろうか。

　員数が揃そろってしまえば本当に「世界を大いに盛り上げるための涼宮ハルヒの団」なるバカげた同好会を作らんといかんようになるではないか。学校サイドが認めるかどうかはさておいて、そのために走り回ることになるのは十中八九、俺であろう。そして俺は「涼宮ハルヒの手下」という称しよう号ごうを手に入れてこの三年間を後ろ指差されて過ごすことになるのである。

　卒業後のことを具体的に考えているわけではないが漠ばく然ぜんと大学には行きたいので、あまり内ない申しんに響ひびくような行動は慎つつしみたいのだが、ハルヒといる限りその望みは叶かないそうもない。

　どうしたものだろう。





　どうもこうもない。

　俺は羽は交がい締じめにしてでもハルヒを制止してＳＯＳ団を解散させるべきだったのだ。

　それからハルヒをこんこんと説得し、まともな高校生活を送らせるべきだったのだ。

　宇宙人や未来人や超ちよう能のう力りよく者なんざ、まるっと無視して適当な男を見つけて恋れん愛あいに精を出したり運動部で身体からだを動かしたり、そういうふうな凡ぼん庸ようたる一生徒として三年間を過ごさせるべきだったのだ。

　そう出来たらどんなに良かっただろう。

　俺にもっと絶対的な意思力と行動力があれば、涼宮ハルヒという急流に流されるまま奇き妙みような海へ泳ぎ着くこともなかっただろう。なべて世はこともなく、俺たちは普通に三年間を過ごして普通に卒業したに違ちがいない。

　……多分な。

　今、俺がこんなことを言うのも、つまり全然普通でないことが実際に俺の身の上に降りかかったからであるのは、この話の流れからして、もうお解わかりだろう。

　どこから話そうか。

　まずその転校生が部室に来たあたりからかな。





　　第三章





　謎なぞのバニーガールズとしてすっかり認知を受けてしまった二人組の片割れである朝比奈みくるさんは、けなげにも一日休んだだけで復活し、部活にも顔を出すようになった。

　部活と言ってもすることもないので、俺は自宅の押入に埋うずまっていたオセロを持ってきてポツポツと語り合いながら朝比奈さんとひたすら対戦していた。

　ホームページを作ったはいいがカウンタも回らずメールも届かず、すっかり無用の長物となっている。もっぱらパソコンはネットサーフィン専用機になっており、これではコンピュータ研の連中が泣く。

　長門有希が黙もく々もくと読書する横で、俺と朝比奈さんはオセロの第三戦目に入った。

「涼宮さん、遅おそいね」

　盤ばん面めんをじっと見つめながら朝比奈さんがポツリと漏もらした。

　表情はすぐれないが深く沈しずんだ様子もない。俺は安心する。なんだかんだと言っても一学年上とは言え可愛かわいい女の子と空間を同じくするのは心が躍おどる。

「今日、転校生が来ましたからね。多分そいつの勧かん誘ゆうに行ってるんでしょう」

「転校生……？」

　小鳥のように首を傾かしげる朝比奈さん。

「九組に転入してきた奴がいまして。ハルヒ大喜びですよ。よっぽど転校生が好きなんでしょう」

　黒を置いて白を一枚裏返す。

「ふうん……？」

「それより朝比奈さん、よくまた部室に来る気になりましたね」

「うん……ちょっと悩なやんだけど、でもやっぱり気になるから」

　前にも似たようなことを言ってなかったか？

「何が気になるんです？」

　パチリ、パタパタ。たおやかな指が石をひっくり返していく。

「ん……なんでもない」

　ふと気配を感じて横を見ると、長門が盤上を覗のぞき込んでいた。瀬せ戸と物もの人形のような顔立ちはいつものこと、ただし眼鏡めがねの奥の目には初めて見る光が宿っていた。

「……」

　生まれて初めて犬を見た子こ猫ねこのような目だった。石を置いては石をめくる俺の指先を錐きりのような視線で追っている。

「……代わろうか、長門」

　声をかけると長門有希は機械的に瞬まばたきし、注意して見ていないと解らないほどの微び妙みような角度でうなずいた。俺は長門と場所を交代して朝比奈さんの隣となりに座る。

　オセロの石をつまみ上げ、しげしげと見つめる長門。全然見当違いのマスに持っていき、磁力でパチリとくっつくのに驚おどろいたように指を引っ込める。

「……長門、オセロしたことある？」

　ゆっくりと左右に首が振ふられる。

「ルールは解るか？」

　否定。

「えーとな、お前は黒だから白を挟はさむように黒を置く。挟まれた白は黒になる。そうやって最後に自分の色の数が多かったら勝ち」

　肯こう定てい。優ゆう雅がな動作で長門は石を置いて、ぎこちなく相手の色を自分の色に変える。

　対戦相手が代わって、朝比奈さんの様子もどこかおかしくなった。なんとなく指が震ふるえているように見えるし、決して顔を上げようとしない。そのくせ上目で長門のほうを見ては急いで視線を戻もどすという仕草を何度も繰くり返し、まるでゲームに集中していない。盤ばん面めんはあっというまに黒の優勢へと変化した。

　なんだ？　朝比奈さんは長門が妙みように気になっているらしい。理由が解わからん。

　この勝負はあっさりと黒が大勝、次の試合を始めようかとなったとき、すべての元げん凶きようの元が新たな生いけ贄にえを連れて現れた。

「へい、お待ち！」

　一人の男子生徒の袖そでをガッチリとキープした涼宮ハルヒが的はずれな挨あい拶さつをよこした。

「一年九組に本日やってきた即そく戦力の転校生、その名も、」

　言葉を句切り、顔で後は自分で言えとうながす。虜りよ囚しゆうとなっていたその少年は、薄うすく微笑ほほえんで俺たち三人のほうを向き、

「古こ泉いずみ一いつ樹きです。……よろしく」

　さわやかなスポーツ少年のような雰ふん囲い気きを持つ細身の男だった。如じよ才さいのない笑えみ、柔にゆう和わな目。適当なポーズをとらせてスーパーのチラシにモデルとして採用したらコアなファンが付きそうなルックスである。これで性格がいいならけっこうな人気者になれるだろう。

「ここ、ＳＯＳ団。あたしが団長の涼宮ハルヒ。そこの三人は団員その一と二と三。ちなみにあなたは四番目。みんっな、仲良くやりましょう！」

　そんな紹しよう介かいならされないほうが遥はるかにマシだ。解ったのはお前と転校生の名前だけじゃないか。

「入るのは別にいいんですが」

　転校生の古泉一樹は落ち着いた笑みを絶やさずに言った。

「何をするクラブなんですか？」

　百人いれば百人ともが頭に思い浮うかべる疑問だ。俺が誰だれ彼かれともなく何度も問われ、ついぞ答えることの出来なかったクエスチョン。フェルマーの最終定理を説明出来たとしてもこればっかりは無理だ。知りもしないものを説明出来る奴やつがいたとしたらそいつは詐さ欺ぎ師しの才能がある。が、ハルヒはまったく動じずに、それどころか不敵な笑みすら浮かべて俺たちを順々に眺ながめて言った。

「教えるわ。ＳＯＳ団の活動内容、それは、」

　大きく息を吸い、演出効果のつもりかセリフを溜ために溜めて、そしてハルヒは驚くべき真相を吐はいた。

「宇宙人や未来人や超ちよう能のう力りよく者を探し出して一いつ緒しよに遊ぶことよ！」





　全世界が停止したかと思われた。

　というのは嘘うそで、俺は単に「やっぱりか」と思っただけだった。しかし残りの三人はそうもいかなかったようだ。

　朝比奈さんは完全に硬こう化かしていた。目と口で三つの丸を作ってハルヒのハイビスカスのような笑顔を見つめたまま動かない。動かないのは長門有希も同様で、首をハルヒへと向けた状態で電池切れを起こしたみたいに止まっている。ほんのわずかだけ、目が見開かれているのに気付いて俺は意外に思う。さすがの無感動女もこれには意表をつかれたか。

　最後に古泉一樹だが、微び笑しようなのか苦笑なのか驚きなのか判別しにくい表情で突つっ立っていた。古泉は誰よりも先に我に返り、

「はあ、なるほど」

　と何かを悟さとったような口ぶりで呟つぶやいて、朝比奈さんと長門有希を交こう互ごに眺め、訳知り顔でうなずいた。

「さすがは涼宮さんですね」

　意味不明な感想を言って、

「いいでしょう。入ります。今後とも、どうぞよろしく」

　白い歯を見せて微笑んだ。

　おおい、あんな説明でいいのかよ。本当に聞いていたのか？

　首を捻ひねる俺の目の前に、ぬっと手が差し出された。

「古泉です。転校してきたばかりで教えていただくことばかりとは思いますが、なにとぞ御ご教示願います」

　バカ丁てい寧ねいな定型句を口にする古泉の手を握にぎりかえす。

「ああ、俺は……」

「そいつはキョン」

　ハルヒが勝手に俺を紹介し、次いで「あっちの可愛かわいいのがみくるちゃんで、そっちの眼鏡めがねっ娘こが有希」と二人を指さして、すべてを終えた顔をした。

　ごん。

　鈍にぶい音がした。慌あわてて立ち上がろうとした朝比奈さんがパイプ椅い子すに足を取られて前のめりに蹴けつまずき、オセロ盤に額を打ち付けた音である。

「だいじょうぶですか？」

　声をかけた古泉に朝比奈さんは首振ふり人形のような反応を見せて、その転校生をまぶしげな目で見上げた。む。なんか気に入らない目つきだぞ、それは。

「……はい」

　蚊かが喋しやべってるみたいな小さな声で応こたえつつ朝比奈さんは古泉を恥はずかしそうに見ている。

「そういうわけで五人揃そろったことだし、これで学校としても文句はないわよねえ」

　ハルヒが何か言ってる。

「いえー、ＳＯＳ団、いよいよベールを脱ぬぐ時が来たわよ。みんな、一丸となってがんばっていきまっしょー！」

　何がベールだ。

　ふと気付くと長門はまた定位置に戻もどってハードカバーの続きに挑ちよう戦せんしている。勝手にメンバーに入れられちまってるけど、いいのか、お前。





　学校を案内してあげると言ってハルヒが古泉を連れ出し、朝比奈さんが用事があるからと帰ってしまったので、部室には俺と長門有希だけが残された。

　今いま更さらオセロをする気にもなれず、長門の読書シーンを観察していても面おも白しろくも何ともなく、だから俺もさっさと帰ることにした。鞄かばんを提さげる。長門に一声、

「じゃあな」

「本読んだ？」

　足が止まる。長門有希の暗くら闇やみ色をした目が俺を射い抜ぬいていた。

　本。というと、いつぞや俺に貸した異様に厚いハードカバーのことか？

「そう」

「いや、まだだけど……返した方がいいか？」

「返さなくていい」

　長門のセリフはいつも端たん的てきだ。一文節内で収まる。

「今日読んで」

　長門はどうでもよさそうに言った。

「帰ったらすぐ」

　どうでもよさそうなのに命令調である。

　ここんとこ国語の教科書に載のってる以外の小説なんて読んでもいないけど、そこまで言うからには他人に推すい薦せんしたくなるほどの面白さなのだろう。

「……解わかったよ」

　俺が応えると長門はまた自分の読書に戻った。





　そして俺は今、夕ゆう闇やみの中を必死で自転車をこいでいた。





　長門と別れて自宅に戻った俺は、晩飯食ったりしてダラダラしたのち、自室で借りたと言うより押しつけられた洋モノのＳＦ小説を紐ひも解とくことにした。上下段にみっちり詰つまった活字の海に眩暈めまいを感じながら、こんなの読めるのかよとパラパラめくっていたら、半ばくらいに挟はさんであった栞しおりが絨じゆう毯たんに落ちた。

　花のイラストがプリントしてあるファンシーな栞だ。何の気なしに裏返してみて、俺はそこに手書きの文字を発見した。





『午後七時。光こう陽よう園えん駅前公園にて待つ』





　まるでワープロで印字したみたいに綺き麗れいな手書き文字が書いてあった。このそっけなさ、いかにも長門が書きそうな感じではある。あるのだが、ここで疑問が募つのる。

　俺がこの本を受け取ったのは何日も前の話である。午後七時というのは、その日の午後七時のことなのだろうか。それとも今日の午後七時でいいんだろうか。まさか俺がこのメッセージをいつ目にしてもいいように、毎日公園で待っていたりしてたのじゃないだろうな。今日必ず読めと言った長門の真意は、今日こそこの栞を見つけろってことだったのか？　しかしそれなら部室で直接俺に言えばいいだけだし、そもそも夜の公園に呼び出す必要性が解わからない。

　時計を見ると午後六時四十五分をちょっと過ぎている。光陽園駅は高校から一番近い私鉄の駅だが俺の自宅からではチャリをどんなに飛ばしても二十分はかかる。

　考えていたのは十秒くらいのはずだ。

　俺は栞をジーンズのポケットに入れると三さん月がつ兎うさぎのように部屋を飛び出て階段を駆かけ降り、台所からアイスくわえて出て来た妹の「キョンくんどこ行くのー」の声に「駅前」と答え、玄げん関かん先に繋つないでいたママチャリにまたがって走り出しながらライトを足で点け、帰ったらタイヤに空気入れようと決意しつつ可能な限りのスピードでペダルを踏ふんだ。

　これで長門がいなかったら笑ってやる。





　笑わずに済んだようだ。

　交通法規を真ま面じ目めに遵じゆん守しゆしたおかげで、俺が駅前公園に到とう着ちやくしたのは七時十分頃ころ。大通りから外れているため、この時間になるとあまり人通りもない。

　電車や車の立てる喧けん噪そうを背中で聞きながら俺は自転車を押して公園に入っていく。等とう間かん隔かくで立っている街灯、その下にいくつかかたまって設置されている木製ベンチの一つに、長門有希の細っこいシルエットがぼんやり浮うかんでいた。

　どうにも存在感の希き薄はくな女である。知らずに通りかかったら幽ゆう霊れいかと思うかもしれない。

　長門は俺に気付いて糸に引かれた操あやつり人形のようにすうっと立ち上がった。

　制服姿である。

「今日でよかったのか？」

　うなずく。

「ひょっとして毎日待っていたとか」

　うなずく。

「……学校で言えないことでも？」

　うなずいて、長門は俺の前に立った。

「こっち」

　歩き出す。足音のしない、まるで忍にん者じやみたいな歩き方である。闇やみに溶とけるように遠ざかる長門の後を、俺は仕方なくついて行く。

　微び風ふうに揺ゆれるショートカットを眺ながめるともなく眺めながら歩いて数分後、俺たちは駅からほど近い分ぶん譲じようマンションへたどり着いた。

「ここ」

　玄げん関かん口のロックをテンキーのパスワードで解除してガラス戸を開ける。俺は自転車をその辺に止めてエレベータに向かう長門の後を追った。エレベータの中で長門は何を考えているのか解らない顔で一言も発せず、ただ数字盤ばんを凝ぎよう視ししている。七階着。

「あのさ、どこに行こうとしてるんだ？」

　まことに遅おくればせながら俺は質問する。マンションのドアが立ち並ぶ通路をすたすた歩きながら長門は、

「わたしの家」

　俺の足が止まる。ちょっと待て、何で俺が長門の家に招待されなければならないんだ。

「誰だれもいないから」

　ますますちょっと待て。それはいったいどういう意味であるのか。

　７０８号室のドアを開けて、長門は俺をじいいっと見た。

「入って」

　マジかよ。

　うろたえつつも狼ろう狽ばいを顔に出さないようにして、恐おそる恐る上がらせていただく。靴くつを脱ぬぎ一歩進んだところでドアが閉められる。

　何か取り返しのつかない所に来てしまったような気がした。その音に不ふ吉きつな予感を感じて振ふり返る俺に、長門は、

「中へ」

　とだけ言って自分の靴を足の一ひと振ふりで脱ぎ捨てた。これで室内が真っ暗だったら何を置いても逃にげ出すつもりだったが、煌こう々こうたる明かりが広々とした部屋を寒々と照らしている。

　３ＬＤＫくらい？　駅前という立地を考えると、けっこうな値段なんじゃないだろうか。

　しかしまあ、生活臭しゆうのない部屋だな。

　通されたリビングにはコタツ机が一つ置いてあるだけで他ほかには何もない。なんと、カーテンすらかかっていない。十畳じようくらいのフローリングにはカーペットも敷しかれず茶色の木目をさらしていた。

「座ってて」

　台所へ引っ込む間ま際ぎわにそう言い残し、俺はへっぴり腰ごしでテーブルの際にあぐらをかいた。

　年とし頃ごろの少女が年頃の少年を家人のいない家に連れ込む理由を頭の中に巡めぐらせていると、長門が盆ぼんに急きゆう須すと湯飲みを載のせてカラクリ人形のような動きでテーブルに置き、制服のまま俺の向かいにちょこんと座った。

　沈ちん黙もく。

　お茶を注つごうともしない。眼鏡めがねのレンズを通して俺に突つき刺ささる無感情な視線が俺の居い心地ごこちの悪さを加速させる。

　何か言ってみよう。

「あー……家の人は？」

「いない」

「いや、いないのは見れば解わかるんだが……。お出かけ中か？」

「最初から、わたししかいない」

　今までに聞いた長門のセリフで一番長い発言だった。

「ひょっとして一人暮らしなのか？」

「そう」

　ほほう、こんな高級マンションに高校生になったばかりの女の子が一人暮らしとは。ワケありなんだろうな。でもまあ、いきなり長門の家族と顔を合わさずにすんで安あん堵どしたよ。って安堵してる場合じゃないな。

「それで何の用？」

　思い出したように長門は急須の中身を湯飲みに注ついで俺の前に置いた。

「飲んで」

　飲むけどさ。ほうじ茶をすする俺を動物園でキリンを見るような目で観察する長門。自分は湯飲みには手を付けようともしない。

　しまった、毒か！　……なわけないって。

「おいしい？」

　初めて疑問形で訊きかれた気がする。

「ああ……」

　飲み干した湯飲みを置くと同時に長門は再び茶ちや褐かつ色しよくの液体で湯飲みを満たした。しょうがなしにそれを飲んで、飲み終えるとすかさず三杯ばい目が。ついに急須が空になり、長門がおかわりを用意しようと腰こしを上げかけるのを、やっとのことで俺は止めた。

「お茶はいいから、俺をここまで連れてきた理由を教えてくれないか」

　腰を浮うかせた姿勢で静止した長門はビデオの逆回しのように元の位置に座り直した。なかなか口を開かない。

「学校では出来ないような話って何だ？」

　水を向ける。ようやく長門は薄うすい唇くちびるを開いた。

「涼宮ハルヒのこと」

　背筋を伸のばした綺き麗れいな正座で、

「それと、わたしのこと」





　口をつぐんで一いつ拍ぱく置き、

「あなたに教えておく」

　と言ってまた黙だまった。

　どうにかならないのか、この話し方。

「涼宮とお前が何だって？」

　ここで長門は出会って以来、初めて見る表情を浮かべた。困ったような躊ちゆう躇ちよしてるような、どちらにせよ注意深く見てないと解らない、無表情からミリ単位で変異したわずかな感情の起き伏ふく。

「うまく言語化出来ない。情報の伝達に齟そ齬ごが発生するかもしれない。でも、聞いて」

　そして長門は話し出した。





「涼宮ハルヒとわたしは普ふ通つうの人間じゃない」

　いきなり妙みようなことを言い出した。

「なんとなく普通じゃないのは解るけどさ」

「そうじゃない」

　膝ひざの上で揃そろえた指先を見ながら長門。

「性格に普ふ遍へん的な性質を持っていないという意味ではなく、文字通り純じゆん粋すいな意味で、彼女とわたしはあなたのような大多数の人間と同じとは言えない」

　意味が解らん。

「この銀河を統とう括かつする情報統合思念体によって造られた対有機生命体コンタクト用ヒューマノイド・インターフェース。それが、わたし」

「……」

「わたしの仕事は涼宮ハルヒを観察して、入手した情報を統合思念体に報告すること」

「……」

「生み出されてから三年間、わたしはずっとそうやって過ごしてきた。この三年間は特別な不確定要素がなく、いたって平へい穏おん。でも、最近になって無視出来ないイレギュラー因子が涼宮ハルヒの周囲に現れた」

「……」

「それが、あなた」





　情報統合思念体。

　銀河系、それどころか全宇宙にまで広がる情報系の海から発生した肉体を持たない超ちよう高度な知性を持つ情報生命体である。

　それは最初から情報として生まれ、情報を寄り合わせて意識を生み出し、情報を取り込むことによって進化してきた。

　実体を持たず、ただ情報としてだけ存在するそれは、いかなる光学的手段でも観測することは不可能である。

　宇宙開かい闢びやくとほぼ同時に存在したそれは、宇宙の膨ぼう張ちようとともに拡大し、情報系を広げ、巨きよ大だい化しつつ発展してきた。

　地球、いや太陽系が形成される遥はるか前から全宇宙を知覚していたそれにとって、銀河の辺境に位置する大して珍めずらしくもないこの星系に特別な価値などなかった。有機生命体が発生する惑わく星せいはその他ほかにも数限りなくあったからだ。

　しかしその第三惑星で進化した二足歩行動物に知性と呼ぶべき思し索さく能力が芽生えたことにより、現住生命体が地球と呼こ称しようするその酸化型惑星の重要度はランクアップを果たした。





「情報の集積と伝達速度に絶対的な限界のある有機生命体に知性が発現することなんてありえないと思われていたから」

　長門有希は真ま面じ目めな顔で言った。

「統合思念体は地球に発生した人類にカテゴライズされる生命体に興味を持った。もしかしたら自分たちが陥おちいっている自律進化の閉へい塞そく状態を打開する可能性があるかもしれなかったから」





　発生段階から完全な形で存在していた情報生命体と違ちがい、人類は不完全な有機生命体として出発しながら急速な自律進化を遂とげていった。保有する情報量を増大させ、また新たな情報を創造し、加工し、蓄ちく積せきする。

　宇宙に偏へん在ざいする有機生命体に意識が生ずるのはありふれた現象だったが、高次の知性を持つまでに進化した例は地球人類が唯ゆい一いつであった。情報統合思念体は注意深く、かつ綿密に観測を続けた。





「そして三年前。惑星表面に他では類を見ない異常な情報フレアを観測した。弓きゆう状じよう列れつ島とうの一地域から噴ふん出しゆつした情報爆ばく発はつは瞬またたく間に惑星全土を覆おおい、惑星外空間に拡散した。その中心にいたのが涼宮ハルヒ」





　原因も効果も何一つ解わからない。情報生命体である彼等にもその情報を分ぶん析せきすることは不可能だった。それは意味をなさない単なるジャンク情報にしか見えなかった。

　重要なのは、有機生命としての制約上、限定された情報しか扱あつかえないはずの地球人類の、そのうちのたった一人の人間でしかない涼宮ハルヒから情報の奔ほん流りゆうが発生したことだ。

　涼宮ハルヒから発せられる情報の奔流はそれからも間かん歇けつ的に継けい続ぞくし、またまったくのランダムにそれはおこなわれる。そして涼宮ハルヒ本人はそのことを意識していない。

　この三年間、あらゆる角度から涼宮ハルヒという固体に対し調査がなされたが、今もってその正体は不明である。しかし情報統合思念体の一部は、彼女こそ人類の、ひいては情報生命体である自分たちに自律進化のきっかけを与あたえる存在として涼宮ハルヒの解かい析せきをおこなっている……。





「情報生命体である彼等は有機生命体と直接的にコミュニケート出来ない。言語を持たないから。人間は言葉を抜ぬきにして概がい念ねんを伝達するすべを持たない。だから情報統合思念体はわたしのような人間用のインターフェースを作った。統合思念体はわたしを通して人間とコンタクト出来る」

　やっと長門は自分の湯飲みに口を付けた。一年分くらいの量を喋しやべって喉のどがかれたのかもしれない。

「……」

　俺は二の句がつげない。

「涼宮ハルヒは自律進化の可能性を秘めている。おそらく彼女には自分の都合の良いように周囲の環かん境きよう情報を操作する力がある。それが、わたしがここにいる理由。あなたがここにいる理由」

「待ってくれ」

　混乱したまま俺は言う。

「正直言おう。お前が何を言っているのか、俺にはさっぱり解らない」

「信じて」

　長門は見たこともないほど真しん摯しな顔で、

「言語で伝えられる情報には限りがある。わたしは単なる端たん末まつ、対人間用の有機インターフェースにすぎない。統合思念体の思考を完全に伝達するにはわたしの処理能力ではまかなえない。理解して欲しい」

　んなこと言われても。

「何で俺なんだ。お前がそのナントカ体のインターフェースだってのを信用したとして、それで何故なぜ俺に正体を明かすんだ？」

「あなたは涼宮ハルヒに選ばれた。涼宮ハルヒは意識的にしろ無意識的にしろ、自分の意思を絶対的な情報として環境に影えい響きようを及およぼす。あなたが選ばれたのは必ず理由がある」

「ねーよ」

「ある。多分、あなたは涼宮ハルヒにとっての鍵かぎ。あなたと涼宮ハルヒが、すべての可能性を握にぎっている」

「本気で言ってるのか？」

「もちろん」

　俺は今までになくマジマジと長門有希の顔を直視した。度を越こえた無口な奴やつがやっと喋るようになったかと思ったら、延々と電波なことを言いやがった。変な奴だとは思っていたが、ここまで変だとは想像外だった。

　情報統合思念体？　ヒューマノイド・インターフェース？

　アホか。

「あのな、そんな話ならチョクでハルヒに言ったほうが喜ばれると思うぞ。はっきり言うが、俺はその手の話題にはついていけないんだ。悪いがな」

「統合思念体の意識の大部分は、涼宮ハルヒが自分の存在価値と能力を自覚してしまうと予測出来ない危険を生む可能性があると認識している。今はまだ様子を見るべき」

「俺が聞いたままをハルヒに伝えるかもしれないじゃないか。だからなぜ、俺にそんなことを言うんだよ」

「あなたが彼女に言ったとしても彼女はあなたがもたらした情報を重視したりしない」

　確かにそうかもしれない。

「情報統合思念体が地球に置いているインターフェースはわたし一つではない。統合思念体の意識には積極的な動きを起こして情報の変動を観測しようという動きもある。あなたは涼宮ハルヒにとっての鍵。危機が迫せまるとしたらまずあなた」

　付き合いきれん。

　俺はそろそろおいとまさせていただくことにした。お茶美味うまかったよ。ごちそうさん。

　長門は止めなかった。

　視線を湯飲みに落としたまま、いつもの無表情に戻もどっている。ちょっとばかし寂さびしげに見えたのは俺の錯さつ覚かくだろう。





　どこへ行っていたのかという母親の誰何すいかに生返事をして俺は自室に戻った。ベッドに横になって長門の長ゼリフを反はん芻すうする。

　あいつの言ったことをそのまま信用すると、ようするに長門有希は人類以外の、地球外生命体ってことになる。早い話、宇宙人だ。

　涼宮ハルヒがあれほど熱望し、追い求めている不思議的な存在だ。

　それがこんな身近にいたとは、灯とう台だい下もと暗しとはこれを指して言うべきだ。

　……はっはっは。バカらしい。

　投げ出した状態で転がっていた厚手の小説本が視界のスミに映った。栞しおりとともに拾い上げて、しばらく仰ぎよう々ぎようしいイラストの表紙を眺ながめて枕まくら元もとに置いた。

　一人っきりのマンションでこんなＳＦ本を読んでばっかりいるから、長門もけったいな妄もう想そうに頭を支配されるんだ。どうせ教室でも誰だれとも話さず自分の殻からに閉じこもっているに違ちがいない。本なんか捨てて、表層だけの付き合いでもいいから友達を作って、普ふ通つうに学園生活を楽しめばいいのだ。あの無表情が悪い。笑えばあいつだってかなり可愛かわいいと思うのに。

　この本も明日突つき返そうか……。まあ、せっかくだし読んでみるのもいいかな。





　翌日の放課後。

　掃そう除じ当番だったため、俺が遅おくれて部室へ行くと、ハルヒが朝比奈さんで遊んでいた。

「じっとして！　ほら暴れない！」

「やっ……やめっ……助けてぇ！」

　嫌いやがる朝比奈さんをハルヒがまた半はん裸らに剥むいていた。

「きゃああ！」

　部室に入りかけた俺を見て悲鳴を上げる朝比奈さんだった。

　超ちよう完全に下着姿の朝比奈さんを一いつ瞬しゆんだけ眺めて、俺は半分以上開けかけていたドアを半歩下がって閉めた。

「失礼」

　待つこと十分。朝比奈さんの可愛らしい叫さけび声とハルヒの楽しそうな声の二重奏が消えた。代わりにハルヒが、

「いいわよ、入っても」

　そして俺は室内に入り、しかるのちに絶句した。

　メイドさんがいた。

　エプロンドレスに身を包み、今にも泣きそうな朝比奈さんがパイプ椅い子すにちょこんと腰こし掛かけ、悲しげに俺を見てすぐにうつむいた。

　白いエプロンと、裾すその広がったフレアスカートとブラウスのツーピース。ストッキングの白さが清せい楚そな雰ふん囲い気きを抜ばつ群ぐんに演出していて非常によろしい。頭のてっぺんのレースのカチューシャと、髪かみを後ろでまとめている頭の幅はばよりも大きなリボンがこれまた愛らしい。

　非のうちどころのないメイド少女である。

「どう、可愛いでしょう」

　ハルヒがまるで自分の手て柄がらのように誇ほこらしげに言って朝比奈さんの髪を撫なでた。

　それには同意出来るな。情けなさそうな表情で悄しよう然ぜんと座っている朝比奈さんには悪いが、無茶苦茶可愛い。

「まあ、それはいいとして」

　よくありません、と小声で呟つぶやく朝比奈さんを無視して俺はハルヒに、

「なんでメイドの格好をさせる必要があるんだ？」

「やっぱり萌もえと言ったらメイドでしょ」

　また意味すら解わからないことを。

「これでもあたしはけっこう考えたのよ」

　お前の考えることは考えないほうがいいようなことばかりだ。

「学校を舞ぶ台たいにした物語にはね、こういう萌えキャラが一人は必ずいるものなのよ。言い換かえれば萌えキャラのあるところに物語は発生するの。これはもはや必然と言っていいわね。いい？　みくるちゃんというもともとロリーで気が弱くて、でもグラマーっていう萌え要素を持つ女の子をさらにメイド服で装そう飾しよくすることにより、萌えパワーは飛ひ躍やく的に増大するわ。どこから見ても萌え記号のかたまりよね。もう勝ったも同然ね」

　何に勝つつもりなんだ。

　俺が呆あきれてものを言えないでいると、ハルヒはいつの間にかデジタルカメラを手にして、記念に写真を撮とっておこうと言い出した。

　真っ赤になって朝比奈さんは首を振ふる。

「撮らないで……」

　手を合わせて拝まれようがどうしようが、ハルヒがそれをすると言えばするのである。

　懇こん願がんむなしく朝比奈さんは無理矢理にポーズを取らされ、何度も何度もフラッシュの光を浴びた。

「ふええ……」

「目線こっち。ちょい顎あごひいて手でエプロン握にぎりしめて。そうそうもっと笑って笑って！」

　注文をつけながらハルヒは朝比奈さんを激写する。デジタルカメラなんかどこから持ってきたんだと訊きいたら写真部から借りてきたという。パクってきたの間違いじゃないのか？

　写真撮さつ影えいのかたわらでは、長門有希がいつもの場所でいつものように読書に励はげんでいた。昨日、さんざん俺にデンパな話を語ったことなどおくびにも出さないそのいつもと変わらぬ様子に、俺はどことなくホッとした。

「キョン、カメラマン代わって」

　ハルヒは俺にデジタルカメラを渡わたし、朝比奈さんへと向き直った。水辺の鳥ににじり寄るワニのような動きで小さな肩かたを捕とらえる。

「ひっ……」

　身を縮める朝比奈さんにハルヒは優やさしく微笑ほほえみかけた。

「みくるちゃん、もうちょっと色っぽくしてみようか」

　言うが早いかハルヒはメイド服の胸むな元もとからリボンを引き抜ぬき、ブラウスのボタンをいきなり第三ボタンまで開けて胸元を露ろ出しゆつさせた。

「ちょ、やっ……何する……！」

「いいからいいから」

　何がいいものか。

　朝比奈さんはさらに膝ひざに手をついて前まえ屈かがみの姿勢を取らされる。小こ柄がらな身体からだと幼い顔からは予想も出来ない豊かな谷間が胸きよう襟きんから覗のぞいて、俺は目をそらした。が、そらしていては写真が撮れないので仕方なしにファインダーを覗く。ハルヒに命じられるままシャッターを切りまくる。

　胸を強調するポーズを取って羞しゆう恥ちの色に頬ほおを染め、泣き出す一歩前の潤うるんだ目でぎこちない笑えみを浮うかべてカメラに目線を送る朝比奈さんは、それはもう例えようもないほど魅み力りよく的だった。

　やべ。惚ほれてしまいそうだ。

「有希ちゃん、眼鏡めがね貸して」

　ゆっくりと本から顔を上げた長門は、ゆっくりと眼鏡を外すとハルヒに手て渡わたし、ゆっくり読書に戻もどった。読めるのか？

　ハルヒは受け取った眼鏡を朝比奈さんの顔にかけて、

「ちょっとずらした感じがいいのよねえ。うん、これで完かん璧ぺき！　ロリで美乳でメイドでしかも眼鏡っ娘こ！　素晴らしいわ！　キョン、じゃんじゃん撮ってあげて」

　撮るのに否いなやはないが、朝比奈さんのメイドコスプレ写真をこんなに撮影して何に使うつもりなんだろう。

「みくるちゃん、これから部室にいるときはこの服着るようにしなさい」

「そんなあ……」

　精せい一いつ杯ぱいの否定の意思表示をする朝比奈さん。しかしハルヒは、

「だってこんなに可愛かわいいんだもの！　もう、女のあたしでもどうにかなりそうだわ！」

　朝比奈さんに抱だきついて頬ずりする。朝比奈さんは、わあわあ叫さけびながら逃のがれようとして果たせず、終しまいにはぐったりとハルヒのされるがままになってしまった。

　おいおい。うらやましいぞ、ハルヒ。つーか、止めろよな、俺も。

「そのへんで終わっとけ」

　朝比奈さんに露ろ骨こつなセクハラを続けるハルヒの首根っこをつかむ。なかなか離はなれない。

「こら、いい加減にしろ！」

「いいじゃん。あんたも一いつ緒しよにみくるちゃんにエッチぃことしようよ」

　グッとくるアイデアだが、たちまち真っ青になる朝比奈さんを見ていたら首しゆ肯こうするわけにもいかないだろ。

「うわ、何ですかこれ？」

　もみ合っている俺たちに声をかけたのは、入り口付近で鞄かばん片手に立ちつくしている古泉一樹だった。

　朝比奈さんの開いた胸元に手を突つっ込もうとしているハルヒと、その手を握って止めようとしている俺と、ぶるぶる震ふるえているメイド姿の朝比奈さんと、裸ら眼がんで平然と読書中の長門を興味深そうに眺ながめて、

「何の催もよおしですか？」

「古泉くん、いいところに来たね。みんなでみくるちゃんにイタズラしましょう」

　何てことを言い出すんだ。

　古泉は口元だけでフッと笑った。同意するようならこいつも敵に回さなければならん。

「遠えん慮りよしておきましょう。後が怖こわそうだ」

　鞄をテーブルに置いて壁かべに立てかけてあったパイプ椅い子すを組み立てる。

「見学だけでもいいですか？」

　足を組んで座りながら面おも白しろそうな顔で俺を見やがる。

「お気になさらず、どうぞ続きを」

　違ちがうって、俺は襲おそう方じゃなくて助けに入っている方だっつーの。

　すったもんだの末、俺はどうにかハルヒと朝比奈さんの間に割って入り、ふらりと後ろ向きに倒たおれそうになる朝比奈さんを慌あわてて支え、その軽さにちょっと驚おどろきながら椅子に座らせた。メイド服を乱して、くたっとなっている朝比奈さんの姿は、正直な話、かなりそそられた。

「まあいいか。写真もいっぱい撮とれたし」

　ハルヒは目を閉じて背もたれに寄りかかっている朝比奈さんの綺き麗れいな顔から眼鏡を抜き取ると長門に返した。

　無言で受け取って何をコメントすることもなくかけ直す長門。昨日あんだけ長ちよう広こう舌ぜつをふるったのが嘘うそのようだ。嘘だったんだろうか。それか壮そう大だいな冗じよう談だんだったとか。

「ではこれより、第一回ＳＯＳ団全体ミーティングを開始します！」

　団長席の椅子の上に立ってハルヒが藪やぶから棒に大だい音おん声じようを発した。いきなり何を言い出すんだ。

「今まであたしたちは色々やってきました。ビラも配ったし、ホームページも作った。校内におけるＳＯＳ団の知名度は鰻うなぎの滝たき登のぼり、第一段階は大成功だったと言えるでしょう」

　朝比奈さんの精神に傷を負わせておいて何が大成功だ。

「しかしながら、わが団のメールアドレスには不思議な出来事を訴うつたえるメールが一通も来ず、またこの部室に奇き怪かいな悩なやみを相談しに来る生徒もいません」

　そりゃあ、知名度だけは無む駄だにあっても、何をする部活動なのかいまいち解わからないところだからな。第一、まだ部活動として認められてないし。

「果報は寝ねて待て、昔の人は言いました。でももうそんな時代じゃないのです。地面を掘ほり起こしてでも、果報は探し出すものなのです。だから探しに行きましょう！」

「……何を？」

　誰だれもツッコマないので俺が代表して訊きいた。





「この世の不思議をよ！　市内をくまなく探たん索さくしたら一つくらいは謎なぞのような現象が転がっているに違いないわ！」

　その発想のほうが俺にとってはよっぽど謎だがな。

　俺のあきれ顔、古泉の何を考えているのか計りかねる曖あい昧まいな笑え顔がお、長門の無表情、朝比奈さんのもうどうにでもしてという気力の感じられない顔。いっさい顧かえりみることなく、ハルヒは手を振ふり回して叫さけぶ。

「次の土曜日！　つまり明日！　朝九時に北きた口ぐち駅前に集合ね！　遅おくれないように。来なかった者は死し刑けいだから！」

　死刑て。





　ところで朝比奈さんのメイドコスプレ写真をハルヒがどうするつもりだったのかと言うと、このアマ、デジカメから吸い出した画像データを俺が適当に作ったホームページに載のせるつもりでいやがったことが判明した。

　俺が気付いたときには、朝比奈さんのメイド画像が一ダースばかりトップページにずらりと並び、訪問者を出で迎むかえる準備万ばん端たん、まさにファイルが電脳空間にアップロードされる寸前だった。

　まったく伸のびないアクセス数もこうすればあっという間に万単位で回るんだと言う。

　アホかい。

　こればっかりは死力を決して俺はハルヒを制し、すべての画像を消去した。自分がメイド服で悩のう殺さつポーズを取っているようなあられもない画像が全世界に発信されるなんてことになれば、朝比奈さんはその場で卒そつ倒とうするに相そう違いない。

　珍めずらしく熱心に説教する俺をハルヒはじとっとした目でみやっていたが、ネットに個人を特定出来るような情報を流すことの危険性を解説する俺の言葉をどうにか理解したのか、

「解ったわよ」

　ふてくされたように言って、しぶしぶデリートに同意した。この際だから画像そのものをすべて消去すべきだったのかもしれないが、それはちょっと惜おしい。俺はハードディスクに隠かくしフォルダを作って、こっそり朝比奈みくる写真を格納し、パスワードで鍵かぎをかけた。

　俺の観賞用にしておこう。





　　第四章





　休みの日に朝九時集合だと、ふざけんな。

　とか思いながらも自転車こぎこぎ駅前に向かっている自分が我ながら情けない。

　北口駅はこの市内の中心部に位置する私鉄のターミナルジャンクションということもあって、休みになると駅前はヒマな若者たちでごった返す。そのほとんどは市内からもっと大きな都市部に出て行くお出かけ組で、駅周辺には大きなデパート以外に遊ぶ所なんかない。それでもどこから湧わいたのかと思うほどの人混みには、いつもこの大量の人間一人一人にそれぞれ人生ってのがあるんだよなあと考えさせられる。

　シャッターの閉まった銀行の前に不法駐ちゆう輪りん（すまん）して北側の改札出口に俺が到とう着ちやくしたのが九時五分前。すでに全員が雁がん首くびを揃そろえていた。

「遅おそい。罰ばつ金きん」

　顔をあわせるやハルヒは言った。

「九時には間に合ってるだろ」

「たとえ遅れなくとも一番最後に来た奴やつは罰金なの。それがあたしたちのルールよ」

「初耳だが」

「今決めたからね」

　裾すそがやたらに長いロゴＴシャツとニー丈たけデニムスカートのハルヒは晴れやかな表情で、

「だから全員にお茶おごること」

　カジュアルな格好で両手を腰こしに当てているハルヒは、教室で仏ぶつ頂ちよう面づらしているときの百倍は取っつきやすい雰ふん囲い気きだった。うやむやのうちに俺はうなずかされてしまい、とりあえず今日の行動予定を決めましょうというハルヒの言葉に従って喫きつ茶さ店てんへと向かった。

　白いノースリーブワンピースに水色のカーディガンを羽織った朝比奈さんはバレッタで後ろの髪かみをまとめていて、歩くたびに髪がぴょこぴょこ揺ゆれるのがとてつもなく可愛かわいい。いいとこの小さいお嬢じようさんが背せ伸のびして大人っぽい格好をしているような微笑ほほえましさである。手に提さげたポーチもオシャレっぽい。

　古泉はピンクのワイシャツにブラウンのジャケットスーツ、えんじ色のネクタイまでしめているというカッチリしたスタイルで俺の横に並んでいる。うっとうしいことだが様になっている。俺より背が高いし。

　一同の最さい後こう尾びには見慣れたセーラー服を着た長門有希が無音でついてくる。なんかもう完全にＳＯＳ団の一員になっているが、本当は文芸部員のはずじゃなかったのか。あの日、閑かん散さんとしたマンションの一室で理解不能な話を聞かされた手前、その無表情ぶりがなおのこと気にかかる。しかしなんで休みの日まで制服着てるんだ。

　ロータリーに面した喫茶店の奥まった席に腰を下ろす謎なぞの五人組だった。注文を取りに来たウェイターにおのおのオーダーを言うものの、長門だけがメニューをためつすがめつしながら不可解なまでの真しん剣けんさ──でも無表情──で、なかなか決まらない。インスタントラーメンなら食べ頃ごろになってくる時間をかけて、

「アプリコット」と告げる。

　どうせ俺のおごりさ。





　ハルヒの提案はこうだった。

　これから二手に分かれて市内をうろつく。不思議な現状を発見したら携けい帯たい電話で連れん絡らくを取り合いつつ状じよう況きようを継けい続ぞくする。のちに落ち合って反省点と今後に向けての展望を語り合う。

　以上。

「じゃあクジ引きね」

　ハルヒは卓たく上じようの容器から爪つま楊よう枝じを五本取り出し、店から借りたボールペンでそのうちの二本に印をつけて握にぎり込んだ。頭が飛び出た爪楊枝を俺たちに引かせる。俺は印入り。同じく朝比奈さんも印入り。後の三人が無印。

「ふむ、この組み合わせね……」

　なぜかハルヒは俺と朝比奈さんを交こう互ごに眺ながめて鼻を鳴らし、

「キョン、解ってる？　これデートじゃないのよ。真ま面じ目めにやるのよ。いい？」

「わあってるよ」

　我ながらやに下がった顔になっていたんじゃないだろうか。ラッキー。朝比奈さんは赤い頬ほおに片手を当てて爪楊枝の先を見つめている。いいね、実にいい。

「具体的に何を探せばいいんでしょうか」

　能天気に言ったのは古泉である。その横で長門は定期的にカップを口に運んでいた。

　ハルヒはチュゴゴゴとアイスコーヒーの最後の一いつ滴てきを飲み干して耳にかかる髪を払はらった。

「とにかく不可解なもの、疑問に思えること、謎っぽい人間、そうね、時空が歪ゆがんでる場所とか、地球人のフリしたエイリアンとかを発見出来たら上出来」

　思わず口の中のミントティーを吹ふきそうになった。あれ、隣となりの朝比奈さんも同じような顔になっている。長門は相変わらずだが。

「なるほど」と古泉。

　本当に解わかったのか、お前。

「ようするに宇宙人とか未来人とか超ちよう能のう力りよく者本人や、彼らが地上に残した痕こん跡せきなどを探せばいいんですね。よく解りました」

　古泉の顔は愉ゆ快かいげでありさえした。

「そう！　古泉くん、あんた見所がある奴やつだわね。その通りよ。キョンも少しは彼の物わかりの良さを見習いなさい」

　あまりこいつを増長させるな。恨うらめしげに見る俺に向かって古泉は笑え顔がおで会え釈しやくした。

「ではそろそろ出発しましょ」

　勘かん定じよう書がきを俺に握らせ、ハルヒは大またで店を出て行った。

　何度言ったか解らないが、もう一度言ってみる。

「やれやれ」





　マジ、デートじゃないのよ、遊んでたら後で殺すわよ、と言い残してハルヒは古泉と長門を従えて立ち去った。駅を中心にしてハルヒチームは東、俺と朝比奈さんが西を探たん索さくすることになっていた。何が探索だ。

「どうします？」

　両手でポーチを持って三人の後ろ姿を見送っていた朝比奈さんが俺を見上げた。このまま持って帰りたい。俺は考えるフリをして、

「うーん。まあここに立っててもしょうがないから、どっかブラブラしてましょうか」

「はい」

　素直についてくる。ためらいがちに俺と並び、なにかの拍ひよう子しに肩かたが触ふれ合ったりすると慌あわてて離はなれる仕草が初うい々ういしい。

　俺たちは近くを流れている川の河か川せん敷じきを意味もなく北上しながら歩いていた。一ヶ月前ならまだ花も残っていただろう桜並木は、今はただしょぼくれた川かわ縁べりの道でしかない。

　散策にうってつけの川沿いなので、家族連れやカップルとところどころですれ違ちがう。俺たち二人だって知らない人が見れば仲むつまじい恋こい人びと同士に見えるはずである。まさか自分たちでも解っていないものを探している変な二人組だとは思うまい。

「わたし、こんなふうに出歩くの初めてなんです」

　護岸工事された浅い川のせせらぎを眺めながら朝比奈さんが呟つぶやくように言った。

「こんなふうにとは？」

「……男の人と、二人で……」

「はなはだしく意外ですね。今まで誰だれかと付き合ったことはないんですか？」

「ないんです」

　ふわふわの髪かみでそよ風が遊んでいる。鼻筋の通った横顔を俺は見つめた。

「えー、でも朝比奈さんなら付き合ってくれとか、しょっちゅう言われるでしょ」

「うん……」

　恥はずかしそうにうつむいて、

「ダメなんです。わたし、誰とも付き合うわけにはいかないの。少なくともこの……」

　言いかけて黙だまる。次の言葉を待っている間に三組のカップルがこの世に何一つ悩なやみがないような足取りで俺たちの背後を通り過ぎた。

「キョンくん」

　水みな面もを流れる木の葉の数でも数えようかと思っていた俺は、その声で我に返った。

　朝比奈さんが思い詰つめたような表情で俺を見つめている。彼女は決然と、

「お話ししたいことがあります」

　子こ鹿じかのような瞳ひとみに決意が露あらわに浮うかんでいた。





　桜の下のベンチに俺たちは並んで座る。しかし朝比奈さんはなかなか話し出そうとはしなかった。「どこから話せばいいのか」とか「わたし話ヘタだから」とか「信じてもらえないかもしれませんけど」とか、顔を伏ふせてプツプツ呟いた後、やっと彼女は言葉を句切るようにして話し始めた。

　手始めにこう言われた。

「わたしはこの時代の人間ではありません。もっと、未来から来ました」





「いつ、どの時間平面からここに来たのかは言えません。言いたくても言えないんです。過去人に未来のことを伝えるのは厳重に制限されていて、航時機に乗る前に精神操作を受けて強制暗示にかからなくてはなりませんから。だから必要上のことを言おうとしても自動的にブロックがかかります。そのつもりで聞いて下さい」

　朝比奈さんは語った。

「時間というものは連続性のある流れのようなものでなく、その時間ごとに区切られた一つの平面を積み重ねたものなんです」

　最初から解わからない。

「ええと、そうね。アニメーションを想像してみて。あれってまるで動いているように見えるけど、本体は一枚一枚描えがかれた静止画でしかないですよね。時間もそれと同じで、デジタルな現象なの。パラパラマンガみたいなものと言ったほうが解りやすいかな」

「時間と時間との間には断絶があるの。それは限りなくゼロに近い断絶だけど。だから時間と時間には本質的に連続性がない」

「時間移動は積み重なった時間平面を三次元方向に移動すること。未来から来たわたしは、この時代の時間平面上では、パラパラマンガの途と中ちゆうに描かれた余計な絵みたいなもの」

「時間は連続してないから、仮にわたしがこの時代で歴史を改変しようとしても、未来にそれは反映されません。この時間平面上のことだけで終わってしまう。何百ページもあるパラパラマンガの一部に余計な落書きをしても、ストーリーは変わらないでしょう？」

「時間はあの川みたいにアナログじゃないの。その一いつ瞬しゆんごとに時間平面が積み重なったデジタルな現象なの。解ってくれたかな」

　俺はこめかみを押さえるべきかどうか迷ってから、やっぱり押さえることにした。

　時間平面。デジタル。そんなことはわりかしどうでもいい。けど未来人って？

　朝比奈さんはサンダル履ばきのつま先を眺ながめながら、

「わたしがこの時間平面に来た理由はね……」
